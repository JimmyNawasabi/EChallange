<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 30px; border: 2px solid #333; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        
        .box-section { background: #1f1f1f; padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid #333; }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 12px; }
        
        input[type="text"], input[type="number"] { width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; background: #000; color: white; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 10px; }

        .gender-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .g-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #111; color: #666; cursor: pointer; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px; }
        
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag { background: #000; padding: 8px 12px; border-radius: 10px; font-size: 0.85rem; border: 1px solid #333; color: #999; display: flex; align-items: center; gap: 5px; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }
        .tag .del { font-size: 10px; cursor: pointer; color: rgba(255,255,255,0.5); }

        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tog-btn { padding: 10px; font-size: 0.65rem; border-radius: 8px; border: 1px solid #333; background: #111; color: #555; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .timer-big { font-size: 3.5rem; text-align: center; font-weight: bold; margin: 5px 0; color: var(--accent); }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card-btn { padding: 15px; border-radius: 12px; border: 2px solid #333; background: #111; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }

        .step { display: none; }
        .active { display: block !important; }

        .btn-safeword { background: #ff0000 !important; color: #fff; padding: 20px; width: 100%; border-radius: 15px; font-weight: 900; letter-spacing: 3px; border: 4px solid #fff; margin-top: 20px; cursor: pointer; }
        .edge-counter { text-align: center; margin-bottom: 15px; padding: 10px; background: #000; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="screen-1" class="step active">
        <div class="box-section">
            <span class="label">Master</span>
            <input type="text" id="p1-name" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn active" onclick="setG(1,'M')">Male</div>
                <div class="g-btn" onclick="setG(1,'F')">Female</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Subject</span>
            <input type="text" id="p2-name" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn" onclick="setG(2,'M')">Male</div>
                <div class="g-btn active" onclick="setG(2,'F')">Female</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Rounds</span>
            <input type="number" id="rounds-total" value="10">
        </div>
        <button class="btn" onclick="nav(2)">Initialize Arsenal</button>
    </div>

    <div id="screen-2" class="step">
        <div id="vault-mount"></div>
        <button class="btn" onclick="nav(3)">Lock Protocol</button>
    </div>

    <div id="screen-3" class="step">
        <div id="status-bar" style="display:flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.7rem; color: var(--accent);"></div>
        
        <div class="box-section" id="toggles-ui" style="padding:15px;">
            <span class="label">Arsenal</span>
            <div class="toggle-grid" id="arsenal-mount"></div>
            <span class="label">Decree Type</span>
            <div class="toggle-grid" id="category-mount"></div>
        </div>

        <div id="pre-round-ui"><button class="btn" onclick="actionGenerate()">Generate Decree</button></div>
        
        <div id="active-round-ui" style="display:none;">
            <div class="box-section" id="decree-display" style="min-height: 120px; text-align: center; font-style: italic; font-size: 0.95rem;"></div>
            <div class="timer-big" id="timer-text">10:00</div>
            
            <div class="edge-counter">
                <span class="label">Edging Peaks</span>
                <button onclick="changeEdge(-1)" style="background:none; border:1px solid #444; color:white; padding:5px 15px;">-</button>
                <span id="edge-val" style="font-size: 1.5rem; margin: 0 20px; font-weight: bold;">0</span>
                <button onclick="changeEdge(1)" style="background:none; border:1px solid #444; color:white; padding:5px 15px;">+</button>
            </div>

            <div class="card-grid">
                <button class="card-btn" style="border-color: #ffcc00; color: #ffcc00;" onclick="applyCard('YELLOW')">Yellow Card</button>
                <button class="card-btn" style="border-color: #ff0000; color: #ff0000;" onclick="applyCard('RED')">Red Card</button>
            </div>
            
            <button class="btn" style="background:var(--success);" onclick="complete()">Complete Round</button>
        </div>

        <button class="btn-safeword" onclick="location.reload()">SAFE WORD</button>
    </div>
</div>

<script>
    const defaultArsenal = {
        "The Bindings": { items: ["Rope", "Cuffs", "Tape"], active: true },
        "The Shadows": { items: ["Sleep Mask", "Silk Scarf"], active: true },
        "The Discipline": { items: ["Paddle", "Cane"], active: true },
        "The Silence": { items: ["Ball Gag", "Tape"], active: true },
        "The Pleasures": { items: ["Wand", "Remote Toy"], active: true }
    };

    const decreeCats = {
        "The Solitary Knot": { active: true, desc: "{Subject} must use {The Bindings} to secure themselves. {Master} oversees the struggle." },
        "The Devotion Test": { active: true, desc: "A dare: {Subject} must endure {The Discipline} while wearing {The Silence} without moving." },
        "The Unveiling": { active: true, desc: "Truth: While bound by {The Bindings}, {Subject} must answer {Master}'s questions or face {The Discipline}." },
        "The Intricate Art": { active: true, desc: "{Master} applies complex patterns of {The Bindings} while {Subject} is lost in {The Shadows}." },
        "The Cruel Edge": { active: true, desc: "{Master} uses {The Pleasures} to bring {Subject} to a peak. Stop on command. Increase edge count." },
        "The Mortal Trial": { active: true, desc: "Physical Challenge: {Subject} holds a stress position using {The Bindings} as support/weight." },
        "The Great Escape": { active: true, desc: "{Master} secures {Subject} with {The Bindings}. {Subject} must escape before the timer ends." },
        "The Tender Mercy": { active: true, desc: "Soft play: {Master} uses {The Pleasures} gently. {Subject} remains bound but focused on sensation." }
    };

    const state = {
        players: [{n:"", g:"M"}, {n:"", g:"F"}],
        rounds: { cur: 1, total: 10 },
        edges: 0,
        vault: JSON.parse(localStorage.getItem('sov_v4_arsenal')) || defaultArsenal,
        cats: decreeCats
    };

    function setG(p, g) { state.players[p-1].g = g; }

    function nav(n) {
        if (n === 2) renderVault();
        if (n === 3) {
            state.players[0].n = document.getElementById('p1-name').value || "Master";
            state.players[1].n = document.getElementById('p2-name').value || "Subject";
            state.rounds.total = parseInt(document.getElementById('rounds-total').value) || 10;
            renderToggles('arsenal-mount', state.vault);
            renderToggles('category-mount', state.cats);
            updateStatus();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${n}`).classList.add('active');
    }

    function renderVault() {
        const mount = document.getElementById('vault-mount'); mount.innerHTML = '';
        for (let cat in state.vault) {
            const safeId = cat.replace(/\s+/g, '');
            const div = document.createElement('div');
            div.className = 'box-section';
            div.innerHTML = `<span class="label">${cat}</span><div class="tag-cloud" id="tags-${safeId}"></div>
                             <div class="add-row"><input type="text" id="in-${safeId}" placeholder="Add..."><button onclick="addItem('${cat}')" class="add-btn">+</button></div>`;
            mount.appendChild(div); updateTags(cat);
        }
    }

    function updateTags(cat) {
        const safeId = cat.replace(/\s+/g, '');
        const cloud = document.getElementById(`tags-${safeId}`); cloud.innerHTML = '';
        state.vault[cat].items.forEach((item, index) => {
            const tag = document.createElement('div'); tag.className = 'tag on';
            tag.innerHTML = `${item} <span class="del" onclick="removeItem('${cat}', ${index})">✕</span>`;
            cloud.appendChild(tag);
        });
    }

    function addItem(cat) {
        const safeId = cat.replace(/\s+/g, ''); const input = document.getElementById(`in-${safeId}`);
        if(input.value.trim()){ state.vault[cat].items.push(input.value.trim()); save(); updateTags(cat); input.value = ''; }
    }

    function removeItem(cat, index) { state.vault[cat].items.splice(index, 1); save(); updateTags(cat); }
    function save() { localStorage.setItem('sov_v4_arsenal', JSON.stringify(state.vault)); }

    function renderToggles(mountId, dataSource) {
        const mount = document.getElementById(mountId); mount.innerHTML = '';
        for (let key in dataSource) {
            const btn = document.createElement('button');
            btn.className = `tog-btn ${dataSource[key].active ? 'active' : ''}`;
            btn.innerText = key;
            btn.onclick = () => { dataSource[key].active = !dataSource[key].active; btn.classList.toggle('active'); };
            mount.appendChild(btn);
        }
    }

    function changeEdge(v) { state.edges = Math.max(0, state.edges + v); document.getElementById('edge-val').innerText = state.edges; }

    function actionGenerate() {
        const activeArsenal = Object.keys(state.vault).filter(k => state.vault[k].active);
        const activeCats = Object.keys(state.cats).filter(k => state.cats[k].active);
        const possible = activeCats.filter(catKey => {
            const needed = state.cats[catKey].desc.match(/{The [\w\s]+}/g) || [];
            return needed.every(n => activeArsenal.includes(n.replace(/{|}/g, '')));
        });
        if (possible.length === 0) return alert("Select more tools/categories.");
        const selectedKey = possible[Math.floor(Math.random()*possible.length)];
        let d = state.cats[selectedKey].desc.replace(/{Master}/g, state.players[0].n).replace(/{Subject}/g, state.players[1].n);
        d = d.replace(/{The ([\s\w]+)}/g, (m, tool) => {
            const p = state.vault["The " + tool].items;
            return `<strong>${p[Math.floor(Math.random()*p.length)]}</strong>`;
        });
        document.getElementById('decree-display').innerHTML = `[${selectedKey}]<br><br>${d}`;
        document.getElementById('pre-round-ui').style.display = 'none';
        document.getElementById('active-round-ui').style.display = 'block';
        startTimer();
    }

    function startTimer() {
        let val = 600; const display = document.getElementById('timer-text');
        if(state.int) clearInterval(state.int);
        state.int = setInterval(() => {
            val--; let m = Math.floor(val/60), s = val%60;
            display.innerText = `${m}:${s<10?'0'+s:s}`;
            if(val <= 0) complete();
        }, 1000);
    }

    function applyCard(type) {
        if(type === 'YELLOW') { alert("Yellow Card: Regenerating Decree..."); actionGenerate(); }
        else { if(confirm("Red Card: End session early?")) renderFinal(); }
    }

    function complete() {
        clearInterval(state.int);
        if(state.rounds.cur >= state.rounds.total) renderFinal();
        else { state.rounds.cur++; updateStatus(); document.getElementById('pre-round-ui').style.display = 'block'; document.getElementById('active-round-ui').style.display = 'none'; }
    }

    function updateStatus() {
        document.getElementById('status-bar').innerHTML = `<span>ROUND ${state.rounds.cur}/${state.rounds.total}</span><span>EDGES: ${state.edges}</span>`;
    }

    function renderFinal() {
        const mount = document.getElementById('screen-3');
        const winner = state.players[0].n; // Master wins by default protocol
        mount.innerHTML = `
            <div style="text-align:center; color:var(--accent); font-weight:900; font-size:1.5rem;">FINAL DECREE</div>
            <div class="box-section" style="margin-top:20px; line-height:1.6;">
                <p>The protocol is complete. <strong>${winner}</strong> has secured absolute sovereignty. With <strong>${state.edges} edges</strong> recorded, the Subject is primed for the finale.</p>
                <p style="color:var(--accent); border-top:1px solid #333; padding-top:10px;"><strong>The Sovereign's Reward:</strong><br>
                For the next several hours, ${state.players[1].n} shall be placed in total enclosure using <strong>${state.vault["The Bindings"].items[0]}</strong>. 
                Sensory access is denied via <strong>${state.vault["The Shadows"].items[0]}</strong>. 
                The Master will use the remaining arsenal to reach a descriptive climax, ensuring all RACK guidelines are followed.</p>
            </div>
            <button class="btn" onclick="location.reload()">Reset Protocol</button>
        `;
    }
</script>
</body>
</html>
