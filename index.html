<style>
    .climax-box { background: linear-gradient(145deg, #1a0000, #000); border: 2px solid var(--accent); padding: 30px; border-radius: 20px; line-height: 1.8; color: #f0f0f0; }
    .climax-step { margin-bottom: 25px; border-left: 3px solid var(--accent); padding-left: 15px; }
    .climax-step h3 { color: var(--accent); text-transform: uppercase; margin-top: 0; font-size: 0.9rem; }
    .winner-banner { text-align: center; color: var(--accent); font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; text-shadow: 0 0 10px var(--accent); }
</style>

<script>
    function complete() {
        clearInterval(state.timer.int);
        if(state.rounds.cur >= state.rounds.total) {
            renderFinalClimax();
        } else {
            state.rounds.cur++;
            updateStatus();
            document.getElementById('pre-round-ui').style.display = 'block';
            document.getElementById('active-round-ui').style.display = 'none';
        }
    }

    function renderFinalClimax() {
        const winner = state.cards.r || state.players[0].n;
        const playArea = document.getElementById('screen-3');
        playArea.innerHTML = `
            <div class="winner-banner">PROTOCOL CONSUMMATED</div>
            <div class="box-section" style="text-align:center; margin-bottom:20px;">
                <span class="label">The Sovereign Choice</span>
                <p>${winner} has been awarded the Right of Command. They shall now decide the final roles for the Evening's Climax.</p>
            </div>
            
            <div class="climax-box">
                <div class="climax-step">
                    <h3>Phase I: Total Enclosure (60-90 Mins)</h3>
                    <p>The Master shall use <strong>{The Bindings}</strong> to create a comprehensive web of restraint. The Subject is to be positioned in a fixed, immobile state—wrist to ankle, or spread-eagle. <strong>{The Shadows}</strong> must be applied to erase the world, while <strong>{The Silence}</strong> ensures the Subject's only form of communication is through their body's reaction to the Master's touch.</p>
                </div>

                <div class="climax-step">
                    <h3>Phase II: The Crucible (60 Mins)</h3>
                    <p>Using a rhythmic application of <strong>{The Discipline}</strong>, the Master will mark the Subject's flesh, building a slow, internal heat. This is a trial of endurance. Between strikes, <strong>{The Pleasures}</strong> are to be introduced—remote-controlled or constant—keeping the Subject balanced on the razor's edge of sensory overload.</p>
                </div>

                <div class="climax-step">
                    <h3>Phase III: The Final Sovereignty (The Climax)</h3>
                    <p>The Master dictates the pace of the final release. Every breath and every muscle twitch belongs to the Sovereign. The Subject will remain bound and silenced until the Master reaches their own climax, using the Subject as the ultimate vessel for their satisfaction. Only then may the bindings be loosened for RACK-compliant aftercare.</p>
                </div>
            </div>

            <button class="btn" onclick="location.reload()" style="margin-top:20px;">Archive Protocol & Exit</button>
        `;

        // Inject current arsenal items into the finale text
        const box = playArea.querySelector('.climax-box');
        box.innerHTML = box.innerHTML.replace(/{([\s\w]+)}/g, (m, cat) => {
            const pool = state.vault[cat].items;
            return `<span style="color:var(--accent)">${pool[Math.floor(Math.random()*pool.length)]}</span>`;
        });
    }
</script>
