<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: Manual Control</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --safe-green: #2e7d32; 
        }
        body { background: var(--soft-bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: var(--card-bg); padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; font-style: italic; margin-bottom: 0; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #a18e8e; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }
        
        .step { display: none; }
        .active { display: block !important; }

        .box { background: #fffcf9; border: 1px solid #f0e6d2; padding: 25px; margin-bottom: 20px; border-radius: 25px; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.5px; }

        /* PLAYER ENTRY FIX */
        .player-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .player-row input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }

        /* VAULT & ADD SYSTEM */
        .category-block { margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 20px; border: 1px solid #eee; }
        .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .add-row input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .add-btn { background: var(--crimson); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #f9f4eb; padding: 8px 15px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; border: 1px solid #e2d1b3; display: flex; align-items: center; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }
        .del-x { margin-left: 8px; font-weight: bold; opacity: 0.5; }

        /* COMMAND CONSOLE */
        .console-header { text-align: center; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .item-picker { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .timer-display { font-size: 4rem; text-align: center; color: var(--crimson); font-family: monospace; margin: 15px 0; }
        
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; margin-bottom: 10px; font-size: 1rem; }
        .btn-sec { background: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Sovereignty</h1>
    <div class="subtitle">Scratch Manual Build</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Initiate Participants</span>
            <div class="player-row">
                <input type="text" id="p1_name" placeholder="Player 1 (The Master)">
            </div>
            <div class="player-row">
                <input type="text" id="p2_name" placeholder="Player 2 (The Subject)">
            </div>
            <span class="label">Session Length</span>
            <input type="number" id="rounds" value="10" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd;">
        </div>
        <button class="btn" onclick="toStep(2)">Configure Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Your Permanent Vault (Auto-Saves)</span>
            <div id="vault-container"></div>
        </div>
        <button class="btn" onclick="toStep(3)">Begin Command Console</button>
        <button class="btn btn-sec" onclick="resetVault()">Reset to Defaults</button>
    </div>

    <div id="step3" class="step">
        <div class="box">
            <div class="console-header" id="round-info">ROUND 1</div>
            
            <div id="setup-view">
                <span class="label">Master, Select Your Instruments:</span>
                <div class="item-picker" id="active-picks">
                    </div>
                <span class="label">Set Duration (Seconds)</span>
                <input type="number" id="timer-input" value="300" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px;">
                <button class="btn" style="background:var(--safe-green);" onclick="startCommand()">Execute Command</button>
            </div>

            <div id="timer-view" style="display:none;">
                <div class="timer-display" id="clock">00:00</div>
                <button class="btn" onclick="resolve(true)">Command Successful (+1)</button>
                <button class="btn btn-sec" onclick="resolve(false)">Command Failed (+0)</button>
            </div>
        </div>
    </div>
</div>

<script>
    let players = [], curRound = 1, maxRounds = 10, masterIdx = 0, timer, timeLeft;

    const defaultItems = {
        "Blindfolds": ["Tape", "Gas Mask", "Pillow Case", "Sleep Mask", "Hood"],
        "Gags": ["Tape", "Ball Gag", "Pallet Wrap", "Panties", "Sock Gag"],
        "Restraints": ["Rope", "Leather Cuffs", "Zip Ties", "Pallet Wrap", "Duct Tape"],
        "Sensation": ["Whip", "Ice", "Vibrator", "Clamps", "Cane", "Hot Wax"]
    };

    let vault = JSON.parse(localStorage.getItem('sov_manual_vault')) || null;
    if(!vault) {
        vault = {};
        for(let c in defaultItems) vault[c] = defaultItems[c].map(n => ({n, on: true}));
        localStorage.setItem('sov_manual_vault', JSON.stringify(vault));
    }

    function save() { localStorage.setItem('sov_manual_vault', JSON.stringify(vault)); }
    function resetVault() { localStorage.removeItem('sov_manual_vault'); location.reload(); }

    function renderVault() {
        const cont = document.getElementById('vault-container');
        cont.innerHTML = '';
        for (let c in vault) {
            let div = document.createElement('div');
            div.className = 'category-block';
            div.innerHTML = `<span class="label">${c}</span>
                <div class="add-row">
                    <input type="text" id="add-${c}" placeholder="Add permanent ${c}...">
                    <button class="add-btn" onclick="addItem('${c}')">+</button>
                </div>
                <div class="tag-row"></div>`;
            cont.appendChild(div);
            let tagRow = div.querySelector('.tag-row');
            vault[c].forEach((item, i) => {
                let t = document.createElement('div');
                t.className = `tag ${item.on ? 'on' : ''}`;
                t.innerHTML = `${item.n} <span class="del-x" onclick="removeItem('${c}', ${i}); event.stopPropagation();">×</span>`;
                t.onclick = () => { vault[c][i].on = !vault[c][i].on; save(); renderInv(); };
                tagRow.appendChild(t);
            });
        }
    }
    // Alias for consistent naming
    function renderInv() { renderVault(); }

    function addItem(cat) {
        let v = document.getElementById(`add-${cat}`).value.trim();
        if(v) { vault[cat].push({n: v, on: true}); save(); renderVault(); document.getElementById(`add-${cat}`).value = ""; }
    }
    function removeItem(cat, idx) { vault[cat].splice(idx, 1); save(); renderVault(); }

    function toStep(n) {
        if(n === 2) {
            players = [
                {n: document.getElementById('p1_name').value || "Master", score: 0},
                {n: document.getElementById('p2_name').value || "Subject", score: 0}
            ];
            maxRounds = document.getElementById('rounds').value;
            renderVault();
        }
        if(n === 3) prepConsole();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    function prepConsole() {
        document.getElementById('round-info').innerText = `ROUND ${curRound} | Master: ${players[masterIdx].n}`;
        const picker = document.getElementById('active-picks');
        picker.innerHTML = '';
        for(let c in vault) {
            let sel = document.createElement('select');
            sel.style.padding = "10px";
            sel.style.borderRadius = "10px";
            sel.innerHTML = `<option value="">-- No ${c} --</option>`;
            vault[c].filter(i => i.on).forEach(item => {
                sel.innerHTML += `<option value="${item.n}">${item.n}</option>`;
            });
            picker.appendChild(sel);
        }
    }

    function startCommand() {
        timeLeft = document.getElementById('timer-input').value;
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('timer-view').style.display = 'block';
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(timeLeft <= 0) resolve(false);
        }, 1000);
    }

    function resolve(win) {
        clearInterval(timer);
        if(win) { 
            let subIdx = masterIdx === 0 ? 1 : 0;
            players[subIdx].score++;
            masterIdx = subIdx; // Role Swap
        }
        curRound++;
        if(curRound > maxRounds) {
            alert(`Session Complete! Final: ${players[0].n} ${players[0].score} - ${players[1].n} ${players[1].score}`);
            location.reload();
        } else {
            document.getElementById('setup-view').style.display = 'block';
            document.getElementById('timer-view').style.display = 'none';
            prepConsole();
        }
    }
</script>
</body>
</html>
