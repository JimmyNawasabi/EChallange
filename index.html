<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Procedural</title>
    <style>
        :root { --crimson: #8b0000; --gold: #d4af37; --bg: #0a0a0a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #111; border: 2px solid #333; padding: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; min-height: 95vh; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--crimson); padding-bottom: 10px; margin-bottom: 15px; }
        .step { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .active { display: flex; flex-direction: column; }
        .setup-box { background: #000; padding: 15px; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        label { color: var(--gold); font-size: 0.8em; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], select, input[type="range"] { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        .status-board { display: flex; flex-direction: column; gap: 5px; margin-bottom: 20px; }
        .role-slot { display: flex; align-items: center; border: 1px solid #333; padding: 10px; background: #000; }
        .role-label { width: 120px; font-weight: bold; text-transform: uppercase; font-size: 0.75em; color: #888; border-right: 1px solid #333; margin-right: 15px; }
        .role-name { font-size: 1.4em; color: var(--gold); font-weight: bold; }
        .slot-sub { border: 1px solid var(--crimson); background: #1a0000; }
        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .inv-item { background: #000; padding: 8px; border: 1px solid #222; font-size: 0.7em; display: flex; align-items: center; gap: 8px; cursor:pointer; }
        .fixed-footer { position: sticky; bottom: 0; background: #111; padding: 15px 0; border-top: 1px solid #333; margin-top: auto; z-index: 100; }
        .btn { background: var(--crimson); color: white; border: 1px solid var(--gold); padding: 18px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .card-zone { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .card { flex: 1; height: 40px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; font-size: 0.7em; border-radius: 4px; cursor: pointer; color: #000; }
        .yellow { background: #ffd700; } .red { background: #ff4500; }
        .challenge-card { background: #000; border: 1px solid #444; padding: 20px; line-height: 1.6; font-size: 0.9em; }
        .mod-header { color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 0.75em; display: block; margin-top: 10px; border-bottom: 1px solid #222; }
        .timer-val { font-size: 4em; color: #ff0000; font-family: 'Impact', sans-serif; text-align: center; margin: 10px 0; }
        .diff-meter { color: var(--gold); font-weight: bold; font-size: 0.8em; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <div class="setup-box">
            <label>Submissive Player</label>
            <input type="text" id="p1Name" placeholder="Name">
            <select id="p1Gen"><option value="Male">Male Body</option><option value="Female">Female Body</option></select>
        </div>
        <div class="setup-box">
            <label>Master Player</label>
            <input type="text" id="p2Name" placeholder="Name">
        </div>
        <div class="setup-box">
            <label>Restraint Intensity (1 = Light, 5 = Brutal)</label>
            <input type="range" id="intensity" min="1" max="5" value="3">
        </div>
        <div class="fixed-footer"><button class="btn" onclick="nav(2)">Set Inventory ></button></div>
    </div>

    <div id="step2" class="step">
        <label>Available Materials:</label>
        <div class="inventory-grid" id="invList"></div>
        <div class="fixed-footer"><button class="btn" onclick="nav(3)">Lock Program ></button></div>
    </div>

    <div id="step3" class="step">
        <div class="status-board">
            <div class="role-slot"><div class="role-label">Master</div><div class="role-name" id="masterName">-</div></div>
            <div class="role-slot slot-sub"><div class="role-label">Submissive</div><div class="role-name" id="subName">-</div></div>
        </div>
        <div class="card-zone">
            <div class="card yellow" onclick="cardTrigger('y')">FORCE SWAP</div>
            <div class="card red" onclick="cardTrigger('r')">REROLL TASK</div>
        </div>
        <div id="prepPhase">
            <div class="challenge-card" id="taskBox">Ready for Command...</div>
            <button class="btn" id="genBtn" onclick="generate()">Synthesize Challenge</button>
            <button class="btn" id="startBtn" style="display:none;" onclick="showTimer()">Bonds Confirmed: Go</button>
        </div>
        <div id="timerPhase" style="display:none;">
            <div class="timer-val" id="timeDisp">00:00</div>
            <button class="btn" onclick="resolve(true)">SUCCESS (Earn Swap)</button>
            <button class="btn" style="background:#333; margin-top:10px;" onclick="resolve(false)">FAILURE (Stay Sub)</button>
        </div>
    </div>
</div>

<script>
    const gearFull = ["Rope", "Tape", "Pallet Wrap", "Bandages", "Dildo", "Butt Plug", "Ball Gag", "Tape Gag", "Leather Blindfold", "Straight Jacket", "Spreader Bar", "Cuffs", "Chair"];
    let players = [], activeGear = [], subIdx = 0, domIdx = 1, clock, secs;

    function nav(s) {
        if(s===2) {
            players = [
                { name: document.getElementById('p1Name').value || "P1", gen: document.getElementById('p1Gen').value },
                { name: document.getElementById('p2Name').value || "P2" }
            ];
            const list = document.getElementById('invList');
            list.innerHTML = "";
            gearFull.forEach(g => list.innerHTML += `<div class="inv-item"><input type="checkbox" value="${g}" checked> ${g}</div>`);
        }
        if(s===3) {
            activeGear = Array.from(document.querySelectorAll('#invList input:checked')).map(i => i.value);
            updateBoard();
        }
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    // GRAMMAR ENGINE DATA
    const verbs = ["secure", "bind", "constrain", "wrap", "lock", "tether", "pin"];
    const poses = ["lying face down", "kneeling", "seated on the floor", "standing against a wall", "lying face up", "bent over a chair"];
    
    const armMethods = [
        "wrists to ankles in a 'hogtie' pattern",
        "elbows together behind the back",
        "wrists high on the shoulder blades",
        "arms crossed over the chest and sealed to the ribs",
        "hands pulled into the armpits"
    ];

    const legMethods = [
        "ankles together and knees spread wide",
        "knees pulled tight against the chest",
        "ankles tied to the furniture nearby",
        "toes taped together and ankles bound to thighs"
    ];

    function generate() {
        const sub = players[subIdx].name;
        const dom = players[domIdx].name;
        const gen = players[subIdx].gen;
        const intens = parseInt(document.getElementById('intensity').value);
        
        let totalD = 0;
        let content = "";
        let roll = () => Math.floor(Math.random() * 10);

        // PROCEDURE GENERATOR
        const zones = [
            { id: "UPPER", gear: ["Rope", "Tape", "Straight Jacket", "Cuffs", "Pallet Wrap"], weight: 9 },
            { id: "LOWER", gear: ["Rope", "Tape", "Spreader Bar", "Pallet Wrap"], weight: 7 },
            { id: "SENSORY", gear: ["Ball Gag", "Tape Gag", "Leather Blindfold"], weight: 5 },
            { id: "CORE", gear: ["Dildo", "Butt Plug", "Rope"], weight: 3 }
        ];

        zones.forEach((z, i) => {
            // Intensity Logic: High intensity = higher chance for more zones
            if (roll() < (z.weight + intens - 3)) {
                let avail = z.gear.filter(g => activeGear.includes(g));
                if (avail.length > 0) {
                    let g = avail[Math.floor(Math.random() * avail.length)];
                    let v = verbs[Math.floor(Math.random() * verbs.length)];
                    let p = poses[Math.floor(Math.random() * poses.length)];
                    let m = (i === 0) ? armMethods[Math.floor(Math.random() * armMethods.length)] : 
                            (i === 1) ? legMethods[Math.floor(Math.random() * legMethods.length)] : "thoroughly";
                    
                    // Special Gender Logic for Core
                    if (z.id === "CORE" && gen === "Female" && g === "Rope") m = "tightly through the labia and up to the waist";
                    if (z.id === "CORE" && gen === "Male" && g === "Rope") m = "around the scrotum and cinched to the wrists";

                    content += `<span class="mod-header">${z.id} BODY</span> ${dom} must ${v} ${sub} using <b>${g}</b> while ${sub} is ${p}. The material must be applied ${m}.<br>`;
                    totalD += (intens + 1);
                }
            }
        });

        // OBJECTIVE GENERATOR
        const obs = [
            { t: `${sub} must find and pull a string located 4 feet away using only their teeth.`, d: 3 },
            { t: `${sub} must roll onto their side and stand up without using any bound limbs for balance.`, d: 5 },
            { t: `${sub} must wriggle out of the <b>${activeGear[roll() % activeGear.length]}</b> layer without the help of ${dom}.`, d: 6 },
            { t: `${sub} must navigate through an obstacle course of cushions to reach ${dom}.`, d: 4 },
            { t: `${sub} must withstand ${intens} minutes of continuous tickling or sensation from ${dom} without a safe-word.`, d: 2 }
        ];
        let pickO = obs[Math.floor(Math.random() * obs.length)];
        content += `<span class="mod-header">ESCAPE GOAL</span> ${pickO.t}`;
        totalD += pickO.d;

        // DYNAMIC TIMER: Longer for higher intensity and more restraints
        secs = (totalD * 45) + 60;

        document.getElementById('taskBox').innerHTML = `
            <div class="diff-meter">Complexity Score: ${totalD}</div>
            ${content}
        `;
        document.getElementById('genBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
    }

    function showTimer() {
        document.getElementById('prepPhase').style.display = 'none';
        document.getElementById('timerPhase').style.display = 'block';
        clock = setInterval(() => {
            secs--;
            let m = Math.floor(secs/60), s = secs%60;
            document.getElementById('timeDisp').innerText = `${m}:${s<10?'0':''}${s}`;
            if(secs <= 0) resolve(false);
        }, 1000);
    }

    function resolve(success) {
        clearInterval(clock);
        if(success) {
            alert("SUCCESS! Roles are now Swapped.");
            let t = subIdx; subIdx = domIdx; domIdx = t;
        } else {
            alert("FAILURE! Position retained.");
        }
        reset();
    }

    function cardTrigger(type) {
        if(type === 'y') { let t = subIdx; subIdx = domIdx; domIdx = t; updateBoard(); }
        else generate();
    }

    function reset() {
        document.getElementById('timerPhase').style.display = 'none';
        document.getElementById('prepPhase').style.display = 'block';
        document.getElementById('genBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        updateBoard();
    }

    function updateBoard() {
        document.getElementById('masterName').innerText = players[domIdx].name;
        document.getElementById('subName').innerText = players[subIdx].name;
    }
</script>
</body>
</html>
