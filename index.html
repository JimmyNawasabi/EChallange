<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Meritocracy</title>
    <style>
        :root { --crimson: #8b0000; --gold: #d4af37; --bg: #0a0a0a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #111; border: 2px solid #333; padding: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; min-height: 95vh; }
        
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--crimson); padding-bottom: 10px; margin: 0 0 15px 0; }
        
        .step { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .active { display: flex; flex-direction: column; }

        .setup-box { background: #000; padding: 15px; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        label { color: var(--gold); font-size: 0.8em; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], select { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; margin-bottom: 10px; }

        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .inv-item { background: #000; padding: 10px; border: 1px solid #222; font-size: 0.75em; display: flex; align-items: center; gap: 10px; }

        .fixed-footer { position: sticky; bottom: 0; background: #111; padding: 15px 0; border-top: 1px solid #333; margin-top: auto; z-index: 100; }
        .btn { background: var(--crimson); color: white; border: 1px solid var(--gold); padding: 18px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        .role-header { text-align: center; background: #222; border: 1px solid var(--gold); padding: 15px; margin-bottom: 15px; }
        .role-header span { display: block; font-size: 0.8em; color: #888; text-transform: uppercase; }
        .role-header b { font-size: 1.4em; color: var(--gold); }

        .card-zone { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .card { flex: 1; height: 60px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; font-size: 0.75em; border-radius: 4px; cursor: pointer; color: #000; }
        .yellow { background: #ffd700; }
        .red { background: #ff4500; }
        .disabled { opacity: 0.1; pointer-events: none; filter: grayscale(1); }

        .challenge-card { background: #000; border: 1px solid #444; padding: 20px; line-height: 1.6; }
        .mod-header { color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 0.8em; display: block; margin-top: 12px; border-bottom: 1px solid #222; }
        
        .timer-val { font-size: 5em; color: #ff0000; font-family: 'Impact', sans-serif; text-align: center; margin: 20px 0; text-shadow: 0 0 15px #600; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <div class="setup-box">
            <label>Player 1 (Initial Submissive)</label>
            <input type="text" id="p1Name" placeholder="Name">
            <select id="p1Gen"><option value="Male">Male Body</option><option value="Female">Female Body</option></select>
        </div>
        <div class="setup-box">
            <label>Player 2 (Initial Master)</label>
            <input type="text" id="p2Name" placeholder="Name">
            <select id="p2Gen"><option value="Male">Male Body</option><option value="Female">Female Body</option></select>
        </div>
        <div class="fixed-footer"><button class="btn" onclick="nav(2)">Inventory Setup ></button></div>
    </div>

    <div id="step2" class="step">
        <label>Select Available Assets:</label>
        <div class="inventory-grid" id="invList"></div>
        <div class="fixed-footer"><button class="btn" onclick="nav(3)">Start Simulation ></button></div>
    </div>

    <div id="step3" class="step">
        <div class="role-header">
            <div id="masterDisplay"><span>Master</span><b>-</b></div>
            <div style="margin: 10px 0; border-top: 1px solid #333;"></div>
            <div id="subDisplay"><span>Submissive</span><b>-</b></div>
        </div>
        
        <div class="card-zone">
            <div id="yCard" class="card yellow" onclick="cardTrigger('y')">YELLOW CARD<br>Instant Swap</div>
            <div id="rCard" class="card red" onclick="cardTrigger('r')">RED CARD<br>Skip Challenge</div>
        </div>

        <div id="prepPhase">
            <div class="challenge-card" id="taskBox">Ready for instruction.</div>
            <button class="btn" id="genBtn" onclick="generate()">Generate Extreme Task</button>
            <button class="btn" id="startBtn" style="display:none;" onclick="showTimer()">Ready: Start Clock</button>
        </div>

        <div id="timerPhase" style="display:none;">
            <div class="timer-val" id="timeDisp">00:00</div>
            <button class="btn" onclick="resolve(true)">SUCCESS (Swap Roles)</button>
            <button class="btn" style="background:#333; margin-top:10px;" onclick="resolve(false)">FAILURE (Stay Submissive)</button>
        </div>
    </div>
</div>

<script>
    const gearFull = ["Rope", "Tape", "Pallet Wrap", "Bandages", "Floggers", "Cane", "Dildo", "Butt Plug", "Ball Gag", "Over-the-mouth Gag", "Tape Gag", "Wrap Around Gag", "Mouth Stuffed", "Open Mouth Gag", "Cloth Blindfold", "Tape Blindfold", "Leather Blindfold", "Straight Jacket", "Spreader Bar"];
    let players = [], activeGear = [], subIdx = 0, domIdx = 1, clock, secs, cardOwner = { y: 0, r: 0 };

    function nav(s) {
        if(s===2) {
            players = [
                { name: document.getElementById('p1Name').value || "Unit 1", gen: document.getElementById('p1Gen').value },
                { name: document.getElementById('p2Name').value || "Unit 2", gen: document.getElementById('p2Gen').value }
            ];
            const list = document.getElementById('invList');
            list.innerHTML = "";
            gearFull.forEach(g => list.innerHTML += `<div class="inv-item"><input type="checkbox" value="${g}" checked> ${g}</div>`);
        }
        if(s===3) {
            activeGear = Array.from(document.querySelectorAll('#invList input:checked')).map(i => i.value);
            updateUI();
        }
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    const armLib = [
        { r: "Rope", t: "<b>Rope</b>: Perform a 'Frogtie' on the arms—wrists tied to elbows, elbows pulled together behind the back." },
        { r: "Tape", t: "<b>Tape</b>: Wrap wrists together, then run tape around the neck and back to the wrists to keep hands high." },
        { r: "Straight Jacket", t: "<b>Straight Jacket</b>: Fully secure. Use extra <b>Rope</b> to bind the jacket elbows to the waist strap." },
        { r: "Pallet Wrap", t: "<b>Pallet Wrap</b>: Arms pinned to ribs. Encase the entire chest and arms in 10 tight layers." }
    ];
    const legLib = [
        { r: "Spreader Bar", t: "<b>Spreader Bar</b>: Ankles locked. <b>Rope</b> tied from the bar to the sub's own hair or a collar." },
        { r: "Tape", t: "<b>Tape</b>: Tape the ankles together. Tape the toes together. Tape the knees to each other." },
        { r: "Pallet Wrap", t: "<b>Pallet Wrap</b>: Encase both legs from the ankles to the crotch in 15 layers." }
    ];
    const headLib = [
        { r: "Ball Gag", t: "<b>Ball Gag</b>: Secure tightly. Apply <b>Cloth Blindfold</b> and seal the edges with <b>Tape</b>." },
        { r: "Tape Gag", t: "<b>Tape Gag</b>: Mouth stuffed. 5 vertical strips of tape from nose to chin, then 2 horizontal strips." },
        { r: "Leather Blindfold", t: "<b>Leather Blindfold</b>: Buckle at tightest point. Insert earplugs for total isolation." }
    ];
    const genLib = [
        { g: "Male", r: "Butt Plug", t: "<b>Butt Plug</b>: Inserted. Tethered with <b>Rope</b> to an ankle cuff." },
        { g: "Female", r: "Dildo", t: "<b>Dildo</b>: <b>Tape</b> the dildo to the floor. Submissive must hover over it in a squat." }
    ];

    function generate() {
        const sub = players[subIdx];
        const getMod = (lib) => {
            const v = lib.filter(m => activeGear.includes(m.r) || (m.g && m.g === sub.gen && activeGear.includes(m.r)));
            return v.length ? v[Math.floor(Math.random()*v.length)].t : "Free/Unbound";
        };

        document.getElementById('taskBox').innerHTML = `
            <span class="mod-header">Arms:</span> ${getMod(armLib)}
            <span class="mod-header">Legs:</span> ${getMod(legLib)}
            <span class="mod-header">Head:</span> ${getMod(headLib)}
            <span class="mod-header">Core:</span> ${getMod(genLib)}
            <span class="mod-header">Objective:</span> ${["Move 10 feet and back.", "Wriggle free of one limb bond.", "Stay silent for 5 mins of tickling.", "Retrieve a key from the floor."][Math.floor(Math.random()*4)]}
        `;
        secs = 480; 
        document.getElementById('genBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
    }

    function showTimer() {
        document.getElementById('prepPhase').style.display = 'none';
        document.getElementById('timerPhase').style.display = 'block';
        clock = setInterval(() => {
            secs--;
            let m = Math.floor(secs/60), s = secs%60;
            document.getElementById('timeDisp').innerText = `${m}:${s<10?'0':''}${s}`;
            if(secs <= 0) resolve(false);
        }, 1000);
    }

    function resolve(success) {
        clearInterval(clock);
        if(success) {
            alert("SUCCESS! Roles are now swapped.");
            const oldSub = subIdx;
            subIdx = domIdx;
            domIdx = oldSub;
        } else {
            alert("FAILURE! You remain the Submissive.");
        }
        resetUI();
    }

    function cardTrigger(type) {
        if(type === 'y') {
            alert("FORCED SWAP!");
            const oldSub = subIdx;
            subIdx = domIdx;
            domIdx = oldSub;
            cardOwner.y = domIdx;
        } else {
            alert("SKIPPED.");
            cardOwner.r = domIdx;
            generate();
        }
        updateUI();
    }

    function resetUI() {
        document.getElementById('timerPhase').style.display = 'none';
        document.getElementById('prepPhase').style.display = 'block';
        document.getElementById('genBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        document.getElementById('masterDisplay').querySelector('b').innerText = players[domIdx].name;
        document.getElementById('subDisplay').querySelector('b').innerText = players[subIdx].name;
        document.getElementById('yCard').className = `card yellow ${cardOwner.y !== subIdx ? 'disabled' : ''}`;
        document.getElementById('rCard').className = `card red ${cardOwner.r !== subIdx ? 'disabled' : ''}`;
    }
</script>
</body>
</html>
