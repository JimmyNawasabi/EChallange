<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --off: #2a2a2a;
            --alert: #ff0000;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; 
            display: flex; justify-content: center;
        }

        .container { 
            max-width: 500px; width: 100%; background: var(--card); 
            padding: 30px; border-radius: 30px; border: 2px solid #333; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        
        .box-section { 
            background: #1f1f1f; padding: 20px; margin-bottom: 20px; 
            border-radius: 20px; border: 1px solid #333; 
        }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }

        input[type="text"], input[type="number"] { 
            width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; 
            background: #000; color: white; font-size: 1.1rem; box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn { 
            background: var(--crimson); color: white; border: none; padding: 20px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; 
            border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px;
        }

        .status-header { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-box { background: #000; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.75rem; border: 1px solid #444; flex: 1; }
        
        .timer-big { font-size: 4rem; text-align: center; font-weight: bold; margin: 10px 0; }
        .instruction-highlight { color: var(--accent); font-weight: bold; }
        .step { display: none; }
        .active { display: block !important; }

        .btn-safeword {
            background: #ff0000 !important;
            color: #ffffff !important;
            padding: 25px;
            font-size: 1.5rem;
            letter-spacing: 5px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            animation: pulse-red 1.5s infinite;
            border: 4px solid #ffffff;
            width: 100%;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        .role-btn {
            background: #222; border: 1px solid var(--accent); color: var(--accent);
            padding: 15px; margin-top: 10px; width: 100%; border-radius: 10px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .role-btn:hover { background: var(--accent); color: #000; }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 25px 10px rgba(255, 0, 0, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="step1" class="step active">
        <div class="box-section">
            <span class="label">Primary Participant (Master)</span>
            <input type="text" id="p1_n" placeholder="Name">
        </div>
        <div class="box-section">
            <span class="label">Secondary Participant (Subject)</span>
            <input type="text" id="p2_n" placeholder="Name">
        </div>
        <div class="box-section">
            <span class="label">Rounds</span>
            <input type="number" id="max_r" value="30">
        </div>
        <button class="btn" onclick="nav(2)">Access the Arsenal</button>
    </div>

    <div id="step3" class="step">
        <div class="status-header">
            <div class="stat-box" id="disp-round">ROUND: 1</div>
            <div class="stat-box" id="disp-remain">REMAINING: 29</div>
        </div>

        <div id="extend-prompt" style="display:none; background: var(--accent); color: #000; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px;">
            PROTOCOL NEARLY COMPLETE.<br>
            <button onclick="extendGameCustom()" style="margin-top:10px; padding:8px 15px; cursor:pointer; background:#000; color:#fff; border:none; border-radius:10px; font-weight:bold;">EXTEND PROTOCOL</button>
        </div>

        <div id="active-round">
            <div id="active-trial-text" class="box-section" style="min-height: 200px;"></div>
            <button class="btn-safeword" onclick="triggerSafeWord()" style="margin-top:20px;">SAFE WORD</button>
        </div>
    </div>
</div>

<script>
    let players = [{n:"", s:0}, {n:"", s:0}], curR = 1, maxR = 30, masterIdx = 0;

    function extendGameCustom() {
        let extra = prompt("How many additional rounds shall be added?", "5");
        let num = parseInt(extra);
        if(!isNaN(num) && num > 0) {
            maxR += num;
            updateStatus();
            alert(`PROTOCOL EXTENDED BY ${num} ROUNDS.`);
        }
    }

    function runFinale() {
        let winnerIdx = players[0].s >= players[1].s ? 0 : 1;
        let winner = players[winnerIdx];
        let loser = players[winnerIdx === 0 ? 1 : 0];
        
        document.getElementById('active-round').innerHTML = `
            <h2 style="color:var(--accent); text-align:center;">PROTOCOL TERMINATED</h2>
            <div class="box-section" style="border-color:var(--accent);">
                <p style="text-align:center;"><strong>WINNER: ${winner.n}</strong></p>
                <p style="font-size: 0.85rem;">The engine has determined the final reward/punishment. As the victor, you now hold the right to dictate the roles for the immediate future.</p>
            </div>
            
            <div id="role-selection">
                <span class="label">Choose Post-Game Dynamics:</span>
                <button class="role-btn" onclick="assignRole('${winner.n}', '${loser.n}', 'Total Authority')">Stay in Command (Master/Subject)</button>
                <button class="role-btn" onclick="assignRole('${winner.n}', '${loser.n}', 'Nurturer')">Switch to Aftercare (Nurturer/Cared-for)</button>
                <button class="role-btn" onclick="assignRole('${winner.n}', '${loser.n}', 'Equal Peers')) ">Return to Equality (Partners)</button>
            </div>
            
            <div id="final-verdict" style="display:none; margin-top:20px; text-align:center;">
                <h3 id="role-display" class="instruction-highlight"></h3>
                <button class="btn" onclick="location.reload()" style="margin-top:20px;">Exit Protocol</button>
            </div>
        `;
    }

    function assignRole(wName, lName, role) {
        document.getElementById('role-selection').style.display = 'none';
        const display = document.getElementById('final-verdict');
        const roleText = document.getElementById('role-display');
        
        display.style.display = 'block';
        roleText.innerText = `ROLE ESTABLISHED: ${role}`;
        
        if ("vibrate" in navigator) navigator.vibrate([100, 50, 100]);
        alert(`${wName} has decreed the role: ${role}.`);
    }

    // Navigation and status functions remain consistent with previous requirements.
</script>
</body>
</html>
