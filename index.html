<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Eternal Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b;
            --yellow: #ffd700; --red: #ff4500;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 30px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin: 0; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; }
        .box-section { background: #1f1f1f; padding: 20px; margin-bottom: 15px; border-radius: 20px; border: 1px solid #333; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 10px; background: #000; color: white; font-size: 1rem; box-sizing: border-box; }
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 12px; font-size: 1rem; letter-spacing: 2px; }
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tog-btn { padding: 10px; font-size: 0.65rem; border-radius: 8px; border: 1px solid #333; background: #111; color: #555; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1608; }
        .step { display: none; }
        .active { display: block !important; }
        
        /* Arsenal Visuals */
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .tag { background: #000; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; border: 1px solid #333; }
        .tag span { color: red; margin-left: 8px; cursor: pointer; }

        /* Score & Cards */
        .score-display { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .inv-card { width: 12px; height: 18px; border-radius: 2px; display: inline-block; margin: 2px; }
        .inv-yellow { background: var(--yellow); }
        .inv-red { background: var(--red); }
        .card-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; opacity: 0.2; pointer-events: none; border: none; text-transform: uppercase; font-size: 0.7rem; }
        .card-btn.available { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Eternal Protocol</div>

    <div id="screen-1" class="step active">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p1-name" placeholder="Master Name">
        </div>
        <div class="box-section">
            <span class="label">Player 2</span>
            <input type="text" id="p2-name" placeholder="Slave Name">
        </div>
        <button class="btn" onclick="nav(2)">Configure Arsenal</button>
    </div>

    <div id="screen-2" class="step">
        <div id="vault-mount"></div>
        <button class="btn" onclick="initGame()">Lock Arsenal & Start</button>
    </div>

    <div id="screen-3" class="step">
        <div class="score-display">
            <div style="text-align:center;">
                <div id="p1-role-label" style="font-size:0.6rem; color:#888;">MASTER</div>
                <div id="p1-display-name" style="font-weight:bold;">Name</div>
                <div id="p1-points" style="font-size:1.5rem; color:var(--accent);">0</div>
                <div id="p1-inv"></div>
            </div>
            <div style="text-align:center;">
                <div id="p2-role-label" style="font-size:0.6rem; color:#888;">SLAVE</div>
                <div id="p2-display-name" style="font-weight:bold;">Name</div>
                <div id="p2-points" style="font-size:1.5rem; color:var(--accent);">0</div>
                <div id="p2-inv"></div>
            </div>
        </div>

        <div class="box-section">
            <span class="label">1. Arsenal Availability</span>
            <div class="toggle-grid" id="arsenal-toggle-mount"></div>
            <span class="label">2. Decree Protocols</span>
            <div class="toggle-grid" id="category-toggle-mount"></div>
        </div>

        <div id="pre-round-ui"><button class="btn" onclick="generateDecree()">Generate Decree</button></div>

        <div id="active-round-ui" style="display:none;">
            <div class="box-section" id="decree-text" style="line-height:1.6;"></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="y-btn" class="card-btn" style="background:var(--yellow); color:#000;" onclick="useCard('yellow')">Yellow</button>
                <button id="r-btn" class="card-btn" style="background:var(--red); color:#fff;" onclick="useCard('red')">Red</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1; background:#444;" onclick="outcome(false)">Fail</button>
                <button class="btn" style="flex:1; background:var(--success);" onclick="outcome(true)">Success</button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        players: [
            { n: "", role: "Master", score: 0, cards: [] },
            { n: "", role: "Slave", score: 0, cards: [] }
        ],
        vault: JSON.parse(localStorage.getItem('sov_vault')) || {
            "The Bindings": { items: ["Rope", "Cuffs"], active: true },
            "The Discipline": { items: ["Flogger", "Cane"], active: true },
            "The Shadows": { items: ["Blindfold"], active: true },
            "The Silence": { items: ["Ball Gag"], active: true },
            "The Pleasures": { items: ["Wand"], active: true }
        },
        cats: {
            "The Solitary Bind": true, "The Geometric Cage": true, "The Agony of Nearness": true,
            "The Hidden Truths": true, "The Wicked Gamble": true, "The Flesh Endurance": true,
            "The Desperate Struggle": true, "The Velveteen Command": true
        }
    };

    function nav(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${n}`).classList.add('active');
        if(n === 2) renderVaultEditor();
    }

    function renderVaultEditor() {
        const mount = document.getElementById('vault-mount');
        mount.innerHTML = '<span class="label">Manage Arsenal</span>';
        for (let cat in state.vault) {
            mount.innerHTML += `
                <div class="box-section">
                    <span class="label">${cat}</span>
                    <div class="tag-cloud">${state.vault[cat].items.map((it, i) => `<div class="tag">${it}<span onclick="removeItem('${cat}',${i})">✕</span></div>`).join('')}</div>
                    <input type="text" id="add-${cat}" placeholder="Add item...">
                    <button onclick="addItem('${cat}')">Add</button>
                </div>`;
        }
    }

    function addItem(cat) {
        const val = document.getElementById(`add-${cat}`).value;
        if(val) { state.vault[cat].items.push(val); saveVault(); renderVaultEditor(); }
    }
    function removeItem(cat, i) { state.vault[cat].items.splice(i, 1); saveVault(); renderVaultEditor(); }
    function saveVault() { localStorage.setItem('sov_vault', JSON.stringify(state.vault)); }

    function initGame() {
        state.players[0].n = document.getElementById('p1-name').value || "P1";
        state.players[1].n = document.getElementById('p2-name').value || "P2";
        state.players[0].cards = ['yellow']; state.players[1].cards = ['red'];
        
        renderToggles('arsenal-toggle-mount', state.vault, true);
        renderToggles('category-toggle-mount', state.cats, false);
        updateUI();
        nav(3);
    }

    function renderToggles(id, data, isVault) {
        const mount = document.getElementById(id); mount.innerHTML = '';
        for (let key in data) {
            const active = isVault ? data[key].active : data[key];
            mount.innerHTML += `<button class="tog-btn ${active?'active':''}" onclick="toggleState('${id}','${key}')">${key}</button>`;
        }
    }

    function toggleState(id, key) {
        if(id.includes('arsenal')) state.vault[key].active = !state.vault[key].active;
        else state.cats[key] = !state.cats[key];
        renderToggles(id, id.includes('arsenal') ? state.vault : state.cats, id.includes('arsenal'));
    }

    function updateUI() {
        state.players.forEach((p, i) => {
            document.getElementById(`p${i+1}-display-name`).innerText = p.n;
            document.getElementById(`p${i+1}-points`).innerText = p.score;
            document.getElementById(`p${i+1}-role-label`).innerText = p.role;
            const inv = document.getElementById(`p${i+1}-inv`);
            inv.innerHTML = p.cards.map(c => `<div class="inv-card inv-${c}"></div>`).join('');
        });

        const mIdx = state.players[0].role === "Master" ? 0 : 1;
        document.getElementById('y-btn').classList.toggle('available', state.players[mIdx].cards.includes('yellow'));
        document.getElementById('r-btn').classList.toggle('available', state.players[mIdx].cards.includes('red'));
    }

    function useCard(type) {
        const mIdx = state.players[0].role === "Master" ? 0 : 1;
        const sIdx = mIdx === 0 ? 1 : 0;
        state.players[mIdx].cards.splice(state.players[mIdx].cards.indexOf(type), 1);
        state.players[sIdx].cards.push(type);
        alert(`${type.toUpperCase()} Card Used. Penalty assigned. Card transferred.`);
        updateUI();
    }

    function generateDecree() {
        const activeCats = Object.keys(state.cats).filter(k => state.cats[k]);
        const cat = activeCats[Math.floor(Math.random() * activeCats.length)];
        const mIdx = state.players[0].role === "Master" ? 0 : 1;
        const sIdx = mIdx === 0 ? 1 : 0;
        
        const tools = Object.keys(state.vault).filter(v => state.vault[v].active);
        const toolCat = tools[Math.floor(Math.random() * tools.length)];
        const tool = state.vault[toolCat].items[Math.floor(Math.random() * state.vault[toolCat].items.length)];

        document.getElementById('decree-text').innerHTML = `<strong>[${cat}]</strong><br>${state.players[mIdx].n} commands ${state.players[sIdx].n} to use the <u>${tool}</u> for a challenge of endurance.`;
        document.getElementById('pre-round-ui').style.display = 'none';
        document.getElementById('active-round-ui').style.display = 'block';
    }

    function outcome(success) {
        const mIdx = state.players[0].role === "Master" ? 0 : 1;
        const sIdx = mIdx === 0 ? 1 : 0;
        if(success) {
            state.players[sIdx].score++;
            state.players[0].role = (state.players[0].role === "Master") ? "Slave" : "Master";
            state.players[1].role = (state.players[1].role === "Master") ? "Slave" : "Master";
            alert("Success! Roles Reverted.");
        } else {
            state.players[mIdx].score++;
            alert("Failure. Master retains control.");
        }
        updateUI();
        document.getElementById('pre-round-ui').style.display = 'block';
        document.getElementById('active-round-ui').style.display = 'none';
    }
</script>
</body>
</html>
