<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGNTY: Full Inventory Control</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #28a745; --gold: #ffd700;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 10px 0; }
        
        /* PLAYER SETUP */
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .p-setup { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 5px; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        .gender-select { display: flex; gap: 5px; margin-bottom: 10px; }
        .gen-btn { flex: 1; padding: 10px; border: 1px solid #333; background: #000; color: #444; cursor: pointer; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .gen-btn.active { border-color: var(--accent); color: white; background: #001a35; }

        /* INVENTORY MANAGEMENT */
        .inventory-section { background: #000; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-top: 15px; }
        .inv-category { background: #080808; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        .inv-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; }
        .inv-title { font-weight: bold; font-size: 0.9rem; text-transform: uppercase; color: var(--gold); }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .chip { padding: 6px 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; border-radius: 4px; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .del-item { color: var(--crimson); cursor: pointer; font-weight: bold; font-size: 1rem; line-height: 1; }
        .del-item:hover { color: #ff0000; }
        
        .add-row { display: flex; gap: 5px; }
        .add-row input { margin: 0; padding: 8px; font-size: 0.75rem; flex: 1; border-color: #222; }
        .add-btn { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); width: 40px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* PLAY UI */
        .p-box { flex: 1; padding: 15px; background: #080808; border: 1px solid #222; border-radius: 12px; text-align: center; }
        .active-dom { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,86,179,0.2); }
        #decree-text { background: #050505; padding: 25px; border-radius: 10px; border-left: 4px solid var(--accent); font-size: 1.1rem; line-height: 1.6; text-align: left; margin-top: 20px; }
        #timer { font-size: 4rem; color: var(--crimson); font-family: monospace; text-align: center; }
        
        .btn-main { background: var(--accent); color: white; padding: 20px; width: 100%; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; margin-top: 10px; letter-spacing: 2px; }
        .btn-commence { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase;}
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-screen">
        <div class="setup-grid">
            <div class="p-setup">
                <span class="label">Dominant</span>
                <input type="text" id="name0" value="Master">
                <div class="gender-select">
                    <button class="gen-btn active" id="p0m" onclick="setGender(0,'M')">Male</button>
                    <button class="gen-btn" id="p0f" onclick="setGender(0,'F')">Female</button>
                </div>
            </div>
            <div class="p-setup">
                <span class="label">Submissive</span>
                <input type="text" id="name1" value="Slave">
                <div class="gender-select">
                    <button class="gen-btn" id="p1m" onclick="setGender(1,'M')">Male</button>
                    <button class="gen-btn active" id="p1f" onclick="setGender(1,'F')">Female</button>
                </div>
            </div>
        </div>
        
        <div class="inventory-section">
            <span class="label" style="margin-bottom: 15px;">Physical Inventory Management</span>
            <div id="inventory-list"></div>
        </div>

        <button class="btn-main" onclick="startSession()">Finalize Arsenal & Start</button>
    </div>

    <div id="play-screen" style="display:none;">
        <div id="round-disp" style="text-align:center; color:var(--accent); margin-bottom:10px; letter-spacing: 2px;"></div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div id="box0" class="p-box"><div class="label">DOMINANT</div><div id="disp-name0" style="font-weight:bold;"></div><div id="score0" style="font-size:1.5rem;">0</div></div>
            <div id="box1" class="p-box"><div class="label">SUBMISSIVE</div><div id="disp-name1" style="font-weight:bold;"></div><div id="score1" style="font-size:1.5rem;">0</div></div>
        </div>
        <div id="command-center"><button class="btn-main" onclick="issueDecree()">Generate Decree</button></div>
        <div id="decree-panel" style="display:none;">
            <div id="timer">00:00</div>
            <button class="btn-commence" id="start-t-btn" onclick="startCountdown()">Commence Protocol</button>
            <div id="decree-text"></div>
            <div id="post-commence" style="display:none; gap:10px; margin-top:20px;">
                <button class="btn-main" style="background:#1a1a1a; flex:1;" onclick="endRound(false)">Forfeit (-1)</button>
                <button class="btn-main" style="background:var(--success); flex:1;" onclick="endRound(true)">Success (+1)</button>
            </div>
        </div>
    </div>
</div>

<script>
let state = {
    currRound: 1, lastCat: "",
    p: [{name:"", gender:"M", score:0}, {name:"", gender:"F", score:0}],
    h: {
        "Restraints": {items: ["Rope", "Handcuffs", "Ankle Cuffs", "Zip Ties"], time: 900, enabled: true},
        "Impact Tools": {items: ["Cane", "Paddle", "Flogger", "Crop"], time: 480, enabled: true},
        "Gags": {items: ["Ball Gag", "Tape", "Ring Gag"], time: 600, enabled: true},
        "Internal Items": {items: ["Plug", "Vibrator", "Clamps"], time: 720, enabled: true},
        "Shadow": {items: ["Blindfold", "Hood", "Sleep Mask"], time: 600, enabled: true},
        "Sensory Items": {items: ["Wax", "Ice", "Wartenberg Wheel"], time: 300, enabled: true}
    },
    timer: null
};

function renderInventory() {
    const list = document.getElementById('inventory-list');
    list.innerHTML = '';
    Object.keys(state.h).forEach(cat => {
        const div = document.createElement('div');
        div.className = 'inv-category';
        const safeId = cat.replace(/\s/g, '');
        div.innerHTML = `
            <div class="inv-header">
                <span class="inv-title">${cat}</span>
                <label class="switch"><input type="checkbox" ${state.h[cat].enabled?'checked':''} onchange="state.h['${cat}'].enabled=this.checked"><span class="slider"></span></label>
            </div>
            <div class="chip-container">${state.h[cat].items.map((i, idx) => `
                <span class="chip">${i} <span class="del-item" onclick="removeItem('${cat}', ${idx})">×</span></span>
            `).join('')}</div>
            <div class="add-row">
                <input type="text" id="in-${safeId}" placeholder="Add tool to ${cat}...">
                <button class="add-btn" onclick="addItem('${cat}')">+</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function removeItem(cat, index) {
    state.h[cat].items.splice(index, 1);
    renderInventory();
}

function addItem(cat) {
    const id = `in-${cat.replace(/\s/g, '')}`;
    const val = document.getElementById(id).value;
    if(val) {
        state.h[cat].items.push(val);
        renderInventory();
    }
}

function setGender(p, g) {
    state.p[p].gender = g;
    document.getElementById(`p${p}m`).classList.toggle('active', g==='M');
    document.getElementById(`p${p}f`).classList.toggle('active', g==='F');
}

function startSession() {
    state.p[0].name = document.getElementById('name0').value;
    state.p[1].name = document.getElementById('name1').value;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'block';
    refreshUI();
}

function refreshUI() {
    document.getElementById('round-disp').innerText = `PHASE ${state.currRound}`;
    document.getElementById('disp-name0').innerText = state.p[0].name.toUpperCase();
    document.getElementById('score0').innerText = state.p[0].score;
    document.getElementById('disp-name1').innerText = state.p[1].name.toUpperCase();
    document.getElementById('score1').innerText = state.p[1].score;
    document.getElementById('box0').className = 'p-box active-dom';
    document.getElementById('box1').className = 'p-box';
}

function issueDecree() {
    let cats = Object.keys(state.h).filter(c => state.h[c].enabled && state.h[c].items.length > 0 && c !== state.lastCat);
    if(!cats.length) cats = Object.keys(state.h).filter(c => state.h[c].enabled && state.h[c].items.length > 0);
    
    if(!cats.length) { alert("Please enable at least one category with items."); return; }

    const cat = cats[Math.floor(Math.random()*cats.length)];
    state.lastCat = cat;
    const item = state.h[cat].items[Math.floor(Math.random()*state.h[cat].items.length)];
    const dom = state.p[0].name; const sub = state.p[1].name;
    
    let desc = "";
    if(cat==="Shadow") desc = `${dom} must apply <strong>${item}</strong> to ${sub}. They are to be led to a fixed position. ${sub} must remain perfectly still, reacting only to the psychological weight of the silence.`;
    else if(cat==="Impact Tools") desc = `${sub} will present themselves to ${dom}. Using <strong>${item}</strong>, ${dom} will deliver 30 measured strikes. ${sub} must vocalize a plea for mercy after every 5th strike.`;
    else if(cat==="Restraints") desc = `${dom} is to secure ${sub}'s wrists behind the back using <strong>${item}</strong>. ${sub} is then to be placed in a kneeling position. No slouching is permitted.`;
    else if(cat==="Gags") desc = `${dom} will silence ${sub} with <strong>${item}</strong>. ${sub} must attempt to read a text of ${dom}'s choice; only muffled sounds are allowed.`;
    else if(cat==="Internal Items") desc = `Prepare ${sub} for <strong>${item}</strong>. They must hold the position for the duration of the phase. Climax is strictly forbidden and results in an immediate point deduction.`;
    else desc = `${dom} uses <strong>${item}</strong> to trace patterns across ${sub}'s sensitive areas. ${sub} must identify the shape being drawn with their eyes closed.`;

    document.getElementById('decree-text').innerHTML = desc;
    document.getElementById('timer').innerText = formatTime(state.h[cat].time);
    state.activeTime = state.h[cat].time;
    document.getElementById('command-center').style.display = 'none';
    document.getElementById('decree-panel').style.display = 'block';
    document.getElementById('post-commence').style.display = 'none';
    document.getElementById('start-t-btn').style.display = 'block';
}

function startCountdown() {
    document.getElementById('start-t-btn').style.display = 'none';
    document.getElementById('post-commence').style.display = 'flex';
    let t = state.activeTime;
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        t--; document.getElementById('timer').innerText = formatTime(t);
        if(t <= 0) clearInterval(state.timer);
    }, 1000);
}

function endRound(win) {
    if(win) state.p[1].score++; else state.p[1].score--;
    state.currRound++; state.p.reverse();
    clearInterval(state.timer);
    document.getElementById('command-center').style.display = 'block';
    document.getElementById('decree-panel').style.display = 'none';
    refreshUI();
}

function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

renderInventory();
</script>
</body>
</html>
