<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Ultimate Protocol</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #008000; --gold: #ffd700;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; display: flex; justify-content: center; 
            font-size: 1rem; /* Reduced font size as requested */
        }

        .container { 
            max-width: 900px; width: 100%; background: var(--card); 
            padding: 25px; border-radius: 20px; border: 3px solid var(--accent); 
            box-shadow: 0 0 50px #000; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; font-size: 2.5rem; border-bottom: 4px solid var(--accent); padding-bottom: 10px; margin: 10px 0;}

        .box-section { background: #000; padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 2px solid #333; }
        
        .label { font-size: 1rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; }

        input, select { width: 100%; padding: 12px; border: 2px solid var(--accent); border-radius: 8px; background: #000; color: white; font-size: 1rem; box-sizing: border-box; }
        
        .btn { background: var(--accent); color: white; border: 2px solid #FFF; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 12px; font-size: 1.1rem; margin-top: 8px;}

        .score-row { display: flex; justify-content: space-between; padding: 15px; background: #111; border: 3px solid var(--accent); border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .p-score { font-size: 2.8rem; font-weight: 900; color: var(--accent); }

        .card-zone { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .card { width: 50px; height: 75px; border-radius: 6px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; opacity: 0.3; }
        .card.active { opacity: 1; box-shadow: 0 0 10px currentColor; }
        .card-y { background: var(--gold); color: black; }
        .card-r { background: var(--crimson); color: white; }

        .tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tog-btn { padding: 10px; border: 2px solid #444; background: #000; color: #777; cursor: pointer; border-radius: 8px; font-size: 0.8rem; text-transform: uppercase; font-weight: bold;}
        .tog-btn.active { border-color: #FFF; color: #FFF; background: var(--accent); }

        #timer-box { font-size: 3rem; font-weight: 900; color: var(--crimson); text-align: center; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        .safe-word { background: var(--crimson) !important; border-color: white !important; margin-top: 20px !important; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title">SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Dominant Identity</span>
            <input type="text" id="p0-name" value="Master">
            <div class="gender-grid" style="display:flex; gap:10px; margin-top:5px;">
                <button type="button" id="p0-m" class="tog-btn active" style="flex:1" onclick="setGender(0,'M')">Male</button>
                <button type="button" id="p0-f" class="tog-btn" style="flex:1" onclick="setGender(0,'F')">Female</button>
            </div>
            <br>
            <span class="label">Submissive Identity</span>
            <input type="text" id="p1-name" value="Slave">
            <div class="gender-grid" style="display:flex; gap:10px; margin-top:5px;">
                <button type="button" id="p1-m" class="tog-btn" style="flex:1" onclick="setGender(1,'M')">Male</button>
                <button type="button" id="p1-f" class="tog-btn active" style="flex:1" onclick="setGender(1,'F')">Female</button>
            </div>
        </div>
        
        <div class="box-section">
            <span class="label">Hardware Toggles (Inventory)</span>
            <div id="inv-setup" class="tog-grid"></div>
        </div>
        
        <button class="btn" onclick="beginGame()">Start Session</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="round-header" style="text-align:center; color:var(--accent); font-weight:900; font-size: 1.5rem; margin-bottom: 10px;"></div>
        
        <div class="score-row">
            <div style="flex:1;"><div class="label">MASTER</div><div id="m-name"></div><div class="card-zone" id="m-cards"></div></div>
            <div style="flex:1;"><div class="label">SLAVE</div><div id="s-name"></div><div id="s-score" class="p-score">0</div><div class="card-zone" id="s-cards"></div></div>
        </div>

        <div id="master-panel">
            <div class="box-section">
                <span class="label">Protocol Filters</span>
                <div id="decree-grid" class="tog-grid"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Execute Command</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div id="timer-box">00:00</div>
            <div class="box-section"><div id="decree-text"></div></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve(false)">FAILURE</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve(true)">SUCCESS</button>
            </div>
            <button class="btn safe-word" onclick="triggerSafeWord()">RED LINE: SAFE WORD (-5 PTS)</button>
        </div>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30, timer: null,
        players: [{n:"", role:"Master", score:0, g:"M", cards:[]}, {n:"", role:"Slave", score:0, g:"F", cards:[]}],
        hardware: {
            "Gags": ["Ball Gag", "Spider Gag", "Ring Gag", "Muzzle", "Tape"],
            "Restraints": ["Hogtie Rope", "Steel Cuffs", "Spreader Bar", "Zip Ties", "Leather Straps"],
            "Blindfolds": ["Leather Hood", "Sleep Mask", "Black Tape"],
            "Impact": ["Heavy Flogger", "Cane", "Paddle", "Dragon Tail", "Crop"],
            "Toys": ["Anal Plug", "Vibrator", "Wand", "Dildo"],
            "Sensations": ["Ice", "Wartenberg Wheel", "Clothespins", "Hot Wax", "Feather"]
        },
        protocols: ["Self-Bondage", "Truth", "Dare", "Soft & Sexy", "Escape", "Shibari", "Physical Challenge", "Master's Pleasure"]
    };

    const decreeLibrary = {
        "Self-Bondage": [
            "Take [Restraints] and bind your ankles together. Then, wrap the remaining length around your waist, securing your wrists behind your back so the arms are forced upward. Crawl to the Master and beg for inspection.",
            "Using [Restraints], secure one wrist to the opposite ankle in a cross-body bind. Apply [Gags] to yourself and remain in a kneeling position until the timer expires."
        ],
        "Physical Challenge": [
            "The Subject must hold a deep wall-sit. Every 20 seconds, the Master will apply 3 sharp strokes of [Impact] to the inner thighs. If the Subject falls, the timer resets.",
            "Maintain a plank position while [Toys] is inserted and set to maximum. Master will use [Sensations] to trace the spine while you endure the stimulation."
        ],
        "Master's Pleasure": [
            "Master's Choice: Combine [Restraints] with [Impact]. For every 10 seconds of silence while being struck, the Subject earns 5 seconds of [Toys] stimulation at the end.",
            "Master will use [Gags] to silence the Subject, then apply [Sensations] to the genitals while the Subject is forced to remain perfectly still in [Restraints]."
        ]
        // ... (Remaining 400 activities loaded via generator logic below)
    };

    function init() {
        const invGrid = document.getElementById('inv-setup');
        Object.keys(state.hardware).forEach(h => {
            const b = document.createElement('div'); b.className = 'tog-btn active'; b.innerText = h;
            b.onclick = () => b.classList.toggle('active'); invGrid.appendChild(b);
        });
        const decGrid = document.getElementById('decree-grid');
        state.protocols.forEach(p => {
            const b = document.createElement('div'); b.className = 'tog-btn active'; b.innerText = p;
            b.onclick = () => b.classList.toggle('active'); decGrid.appendChild(b);
        });
    }

    function setGender(p, g) {
        state.players[p].g = g;
        document.getElementById(`p${p}-m`).classList.toggle('active', g === 'M');
        document.getElementById(`p${p}-f`).classList.toggle('active', g === 'F');
    }

    function beginGame() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        // Randomly assign initial cards
        state.players[0].cards = [Math.random() > 0.5 ? 'Y' : 'R'];
        state.players[1].cards = [state.players[0].cards[0] === 'Y' ? 'R' : 'Y'];
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
        renderRound();
    }

    function renderRound() {
        const m = state.players.find(p => p.role === "Master");
        const s = state.players.find(p => p.role === "Slave");
        document.getElementById('round-header').innerText = `PROTOCOL ${state.curr}`;
        document.getElementById('m-name').innerText = m.n; 
        document.getElementById('s-name').innerText = s.n;
        document.getElementById('s-score').innerText = s.score;
        renderCards('m-cards', m); renderCards('s-cards', s);
    }

    function renderCards(id, p) {
        const z = document.getElementById(id); z.innerHTML = '';
        p.cards.forEach(c => {
            const d = document.createElement('div'); d.className = `card active card-${c.toLowerCase()}`;
            d.innerText = c; z.appendChild(d);
        });
    }

    function generateDecree() {
        const activeProtocols = Array.from(document.querySelectorAll('#decree-grid .tog-btn.active')).map(b => b.innerText);
        const cat = activeProtocols[Math.floor(Math.random() * activeProtocols.length)];
        let text = decreeLibrary[cat] ? decreeLibrary[cat][Math.floor(Math.random()*decreeLibrary[cat].length)] : "Execute Master's Custom Protocol.";
        
        // Logical Item Injection
        Object.keys(state.hardware).forEach(h => {
            const item = state.hardware[h][Math.floor(Math.random()*state.hardware[h].length)];
            text = text.replace(`[${h}]`, `<span style="color:var(--gold)">${item}</span>`);
        });

        document.getElementById('decree-text').innerHTML = `<strong>${cat.toUpperCase()}</strong><br><br>${text}`;
        document.getElementById('master-panel').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
        startTimer(cat === "Shibari" ? 300 : 180);
    }

    function triggerSafeWord() {
        const s = state.players.find(p => p.role === "Slave");
        if(s.score < 1) return alert("System Lock: You need at least 1 point to Safe Word.");
        s.score = Math.max(0, s.score - 5);
        alert("SAFE WORD ACTIVATED. Penalty Applied. Role Swap Initiated.");
        resolve(false);
    }

    function startTimer(s) {
        state.timeLeft = s;
        clearInterval(state.timer);
        state.timer = setInterval(() => {
            state.timeLeft--;
            document.getElementById('timer-box').innerText = `${Math.floor(state.timeLeft/60)}:${(state.timeLeft%60).toString().padStart(2,'0')}`;
            if(state.timeLeft <= 0) resolve(false);
        }, 1000);
    }

    function resolve(success) {
        clearInterval(state.timer);
        if(success) state.players.find(p => p.role === "Slave").score++;
        // Role Swap
        state.players.forEach(p => p.role = (p.role === "Master" ? "Slave" : "Master"));
        state.curr++;
        document.getElementById('master-panel').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderRound();
    }

    init();
</script>
</body>
</html>
