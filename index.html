<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Sovereign Default Restored</title>
    <style>
        :root { --accent: #d4af37; --bg: #0a0a0a; --card: #161616; --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --warning: #b38f00; --veto: #444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); margin-bottom: 20px; }
        .box-section { background: #1f1f1f; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .gender-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        .g-btn { flex: 1; padding: 10px; background: #111; border: 1px solid #444; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn { background: var(--crimson); color: white; border: none; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 10px; margin-top: 5px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .tog-btn { padding: 10px; font-size: 0.65rem; border-radius: 6px; border: 1px solid #444; background: #111; color: #555; cursor: pointer; text-transform: uppercase; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1608; }
        .item-chip { display: inline-flex; align-items: center; background: #333; padding: 6px 12px; border-radius: 20px; margin: 4px; font-size: 0.8rem; border: 1px solid #444; cursor: pointer; }
        .item-chip.off { opacity: 0.3; text-decoration: line-through; background: #111; }
        .remove-x { margin-left: 10px; color: var(--crimson); font-weight: bold; }
        .score-row { display: flex; justify-content: space-between; padding: 12px; background: #000; border-radius: 12px; border: 1px solid #222; text-align: center; margin-bottom: 15px; }
        .role-tag { font-size: 0.6rem; font-weight: bold; color: #444; }
        .master-glow { color: var(--accent) !important; text-shadow: 0 0 5px var(--accent); }
        .mgmt-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .veto-btn { background: var(--veto) !important; color: #bbb !important; border: 1px solid #555 !important; font-size: 0.7rem; }
        .panic-btn { background: linear-gradient(45deg, #800, #f00) !important; border: 2px solid #fff !important; font-size: 0.7rem; }
        .grand-decree-text { font-size: 0.85rem; line-height: 1.6; color: #ddd; background: #000; padding: 15px; border-radius: 10px; border: 1px solid var(--accent); max-height: 400px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Initial Master</span>
            <input type="text" id="p0-name" placeholder="Name...">
            <div class="gender-grid">
                <button class="g-btn active" onclick="setG(0,'M',this)">Male</button>
                <button class="g-btn" onclick="setG(0,'F',this)">Female</button>
                <button class="g-btn" onclick="setG(0,'NB',this)">NB</button>
            </div>
            <span class="label">Initial Slave</span>
            <input type="text" id="p1-name" placeholder="Name...">
            <div class="gender-grid">
                <button class="g-btn" onclick="setG(1,'M',this)">Male</button>
                <button class="g-btn active" onclick="setG(1,'F',this)">Female</button>
                <button class="g-btn" onclick="setG(1,'NB',this)">NB</button>
            </div>
            <span class="label">Safeword</span>
            <input type="text" id="safeword-in" value="RED">
            <span class="label">Total Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" style="width:100%" onclick="showStep(2)">Next: Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="inventory-editor"></div>
        <button class="btn" style="background:var(--success); width:100%;" onclick="startSession()">Begin Protocol</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-ui" style="text-align:center; font-size:0.7rem; color:var(--accent); margin-bottom:10px;"></div>
        <div class="score-row">
            <div class="p-block"><div id="r0" class="role-tag">MASTER</div><div id="n0"></div><div id="s0" style="font-size:1.5rem;">0</div></div>
            <div class="p-block"><div id="r1" class="role-tag">SLAVE</div><div id="n1"></div><div id="s1" style="font-size:1.5rem;">0</div></div>
        </div>
        <div id="game-controls"><button class="btn" style="width:100%" onclick="generate()">Command Decree</button></div>
        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-display" style="line-height:1.6; color:#ddd;"></div></div>
            <div style="display:flex; gap:10px;"><button class="btn" style="background:#333; flex:1;" onclick="resolve('fail')">FAIL</button><button class="btn" style="background:var(--success); flex:1;" onclick="resolve('success')">SUCCESS</button></div>
            <div class="mgmt-row"><button class="btn veto-btn" onclick="vetoCurrent()">VETO & PURGE</button><button class="btn panic-btn" id="panic-label" onclick="triggerSafeword()"></button></div>
        </div>
    </div>

    <div id="step-4" style="display:none;">
        <div style="font-size:2rem; color:var(--accent); text-align:center; margin-bottom:10px;">GRAND FINALE</div>
        <div class="box-section" style="text-align:center;"><h2 id="winner-banner" style="color:var(--accent); margin:0;"></h2></div>
        <div class="box-section">
            <span class="label">The Grand Decree (Adult/RACK Protocol)</span>
            <div id="grand-decree-display" class="grand-decree-text"></div>
            <button class="btn" style="background:#333; font-size:0.7rem;" onclick="generateGrandDecree()">Re-Generate Finale</button>
        </div>
        <div class="box-section">
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1; background:var(--success);" id="choice-1" onclick="finalize()"></button>
                <button class="btn" style="flex:1; background:var(--crimson);" id="choice-2" onclick="finalize()"></button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30, lastProtocol: null,
        players: [{n:"", g:"M", role:"Master", score:0}, {n:"", g:"F", role:"Slave", score:0}],
        vault: JSON.parse(localStorage.getItem('sov_v30')) || {
            "Restraints": [{n:"Heavy Rope", a:true}], "Gags": [{n:"Ball Gag", a:true}], "Blindfolds": [{n:"Leather Mask", a:true}], 
            "Sensory": [{n:"Ice Blocks", a:true}], "Toys": [{n:"Vibrator", a:true}], "Impact": [{n:"Heavy Flogger", a:true}]
        },
        prompts: {
            "The Solitary Bind": ["{S}, use {T} to bind your own wrists behind your back. Kneel and await {M}."],
            "The Threshold of Agony": ["{M} will use {T} to edge {S} to the brink. No release until ordered."],
            "The Veiled Confession": ["With {T} applied, {S} must whimper a confession of submission."]
        }
    };

    function setG(i, v, b) { state.players[i].g = v; Array.from(b.parentElement.children).forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
    function showStep(n) { document.querySelectorAll('[id^="step-"]').forEach(s=>s.style.display='none'); document.getElementById('step-'+n).style.display='block'; if(n==2) renderInventory(); }
    
    function renderInventory() {
        const m = document.getElementById('inventory-editor'); m.innerHTML = '<h3 style="color:var(--accent);text-align:center;font-size:0.8rem">ARSENAL CONFIGURATION</h3>';
        for(let c in state.vault) {
            let h = `<div class="box-section"><span class="label">${c}</span><div>`;
            state.vault[c].forEach((it, i) => {
                h += `<span class="item-chip ${it.a?'':'off'}" onclick="toggleItem('${c}',${i})">${it.n} <span class="remove-x" onclick="removeItem('${c}',${i}); event.stopPropagation()">×</span></span>`;
            });
            h += `</div><div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="add-${c}" placeholder="New item..." style="margin:0;"><button class="tog-btn active" style="flex:0.4" onclick="addItem('${c}')">ADD</button></div></div>`;
            m.innerHTML += h;
        }
    }

    function toggleItem(c, i) { state.vault[c][i].a = !state.vault[c][i].a; renderInventory(); }
    function removeItem(c, i) { state.vault[c].splice(i, 1); renderInventory(); }
    function addItem(c) { 
        const v = document.getElementById('add-'+c).value; 
        if(v) { state.vault[c].push({n:v, a:true}); renderInventory(); } 
    }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value || "Master";
        state.players[1].n = document.getElementById('p1-name').value || "Slave";
        state.total = parseInt(document.getElementById('round-total').value) || 30;
        document.getElementById('panic-label').innerText = document.getElementById('safeword-in').value || "RED";
        localStorage.setItem('sov_v30', JSON.stringify(state.vault));
        showStep(3); renderGame();
    }

    function renderGame() {
        if(state.curr > state.total) return triggerFinale();
        document.getElementById('round-ui').innerText = `ROUND ${state.curr} / ${state.total}`;
        state.players.forEach((p, i) => {
            document.getElementById('n'+i).innerText = p.n;
            document.getElementById('s'+i).innerText = p.score;
            document.getElementById('r'+i).innerText = p.role;
            document.getElementById('r'+i).className = 'role-tag ' + (p.role==='Master'?'master-glow':'');
        });
    }

    function generate() {
        const pk = Object.keys(state.prompts);
        state.lastProtocol = pk[Math.floor(Math.random()*pk.length)];
        const p = state.prompts[state.lastProtocol][0];
        const m = state.players.find(x=>x.role==='Master'), s = state.players.find(x=>x.role==='Slave');
        document.getElementById('decree-display').innerHTML = `<strong>${state.lastProtocol}</strong><br><br>${p.replace(/{M}/g, m.n).replace(/{S}/g, s.n).replace(/{T}/g, "Arsenal Item")}`;
        document.getElementById('game-controls').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
    }

    function vetoCurrent() { if(confirm("Purge decree?")) { delete state.prompts[state.lastProtocol]; generate(); } }
    function triggerSafeword() { state.players.find(p=>p.role==='Slave').score -= 5; resolve('fail'); }

    function resolve(type) {
        if(type==='success') { 
            state.players.find(p=>p.role==='Slave').score++; 
            state.players.forEach(p=>p.role=p.role==='Master'?'Slave':'Master');
        } else state.players.find(p=>p.role==='Master').score++;
        state.curr++; document.getElementById('game-controls').style.display='block'; document.getElementById('decree-view').style.display='none'; renderGame();
    }

    function triggerFinale() {
        const win = state.players[0].score > state.players[1].score ? state.players[0] : state.players[1];
        const los = state.players.find(p=>p!==win);
        state.win = win; state.los = los;
        document.getElementById('winner-banner').innerText = `${win.n} IS VICTORIOUS`;
        document.getElementById('choice-1').innerText = `${win.n} (FINAL MASTER)`;
        document.getElementById('choice-2').innerText = `${win.n} (FINAL SLAVE)`;
        generateGrandDecree(); showStep(4);
    }

    function generateGrandDecree() {
        const tasks = [
            "RESTRICT: {S} is to be immobilized with {T1}. Immobility mandatory.",
            "ISOLATE: Apply {T2}. Darkness for 15 minutes of quiet contemplation.",
            "DISCIPLINE: {M} delivers 50 strikes with {T3}. {S} must count each set.",
            "DENY: Using {T4}, {M} edges {S} 5 times. Climax is strictly forbidden.",
            "SILENCE: {S} is fitted with {T5} until the finale concludes.",
            "REWARD: {S} focuses exclusively on {M}'s pleasure until {M} climaxes.",
            "DEVOTION: {S} recites a vow of submission while bearing the weight of {T6}."
        ];
        let d = `<strong>THE GRAND DECREE PROTOCOL:</strong><br><br>`;
        tasks.sort(()=>0.5-Math.random()).forEach((t, i) => {
            d += `${i+1}. ${t.replace('{M}', state.win.n).replace('{S}', state.los.n)
                .replace('{T1}', state.vault.Restraints[0].n).replace('{T2}', state.vault.Blindfolds[0].n)
                .replace('{T3}', state.vault.Impact[0].n).replace('{T4}', state.vault.Toys[0].n)
                .replace('{T5}', state.vault.Gags[0].n).replace('{T6}', state.vault.Sensory[0].n)}<br><br>`;
        });
        d += `<strong>CONCLUSION:</strong> {M} achieves climax. {S} remains denied.`;
        document.getElementById('grand-decree-display').innerHTML = d;
    }

    function finalize() { alert("Grand Decree Activated. The session concludes."); location.reload(); }
</script>
</body>
</html>
