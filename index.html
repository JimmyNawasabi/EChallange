<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --off: #2a2a2a;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 30px; border: 2px solid #333; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        
        .box-section { background: #1f1f1f; padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid #333; }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }
        
        input[type="text"], input[type="number"] { width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; background: #000; color: white; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 15px; }

        .gender-select { display: flex; gap: 10px; margin-bottom: 5px; }
        .g-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #111; color: #666; cursor: pointer; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px; }
        
        /* INVENTORY ARSENAL */
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag { background: #000; padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; border: 1px solid #333; color: #999; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }

        .status-header { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-box { background: #000; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.75rem; border: 1px solid #444; flex: 1; }
        
        .timer-big { font-size: 4rem; text-align: center; font-weight: bold; margin: 10px 0; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .card-btn { background: #2a2a2a; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; }

        .step { display: none; }
        .active { display: block !important; }

        .btn-safeword {
            background: #ff0000 !important; color: #ffffff !important; padding: 25px; font-size: 1.5rem; letter-spacing: 5px; border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); animation: pulse-red 1.5s infinite; border: 4px solid #ffffff; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="step1" class="step active">
        <div class="box-section">
            <span class="label">Primary (Master)</span>
            <input type="text" id="p1_n" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn active" id="p1m" onclick="setGender(1,'M')">Male</div>
                <div class="g-btn" id="p1f" onclick="setGender(1,'F')">Female</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Secondary (Subject)</span>
            <input type="text" id="p2_n" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn" id="p2m" onclick="setGender(2,'M')">Male</div>
                <div class="g-btn active" id="p2f" onclick="setGender(2,'F')">Female</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Rounds</span>
            <input type="number" id="max_r" value="30">
        </div>
        <button class="btn" onclick="nav(2)">Access the Arsenal</button>
    </div>

    <div id="step2" class="step">
        <div id="vault-inject"></div>
        <button class="btn" onclick="nav(3)">Lock Arsenal & Begin</button>
    </div>

    <div id="step3" class="step">
        <div class="status-header">
            <div class="stat-box" id="disp-round">ROUND: 1</div>
            <div class="stat-box" id="disp-remain">REMAINING: 29</div>
        </div>

        <div id="extend-prompt" style="background:var(--accent); color:#000; padding:15px; border-radius:15px; text-align:center; margin-bottom:15px; font-weight:bold; display:none;">
            PROTOCOL NEARLY COMPLETE.<br>
            <button onclick="extendGameCustom()" style="margin-top:10px; padding:8px 15px; cursor:pointer; background:#000; color:#fff; border:none; border-radius:10px; font-weight:bold;">EXTEND PROTOCOL</button>
        </div>

        <div id="game-ui">
            <div id="pre-round">
                <button class="btn" onclick="generateDecree()">Generate Decree</button>
            </div>

            <div id="active-round" style="display:none;">
                <div class="box-section" id="active-trial-text" style="min-height: 150px; font-weight: bold; text-align: center;"></div>
                <div class="timer-big" id="clock">10:00</div>
                
                <div class="card-grid">
                    <button class="card-btn" onclick="playCard('YELLOW')">Yellow Card</button>
                    <button class="card-btn" onclick="playCard('RED')">Red Card</button>
                </div>
                
                <button class="btn" style="background:#1e4d2b;" onclick="finishRound()">Complete</button>
            </div>
        </div>
        
        <button class="btn-safeword" onclick="triggerSafeWord()" style="margin-top:20px;">SAFE WORD</button>
    </div>
</div>

<script>
    let players = [{n:"", g:"M"}, {n:"", g:"F"}], curR = 1, maxR = 30, timer, timeLeft;
    let vault = {
        "Restraints": ["Rope", "Cuffs", "Tape", "Spreader Bar"],
        "Blindfolds": ["Silk Mask", "Hood", "Scarf"],
        "Sensation": ["Ice", "Feather", "Wand", "Paddle"]
    };

    function setGender(p, g) {
        players[p-1].g = g;
        const group = (p === 1) ? ['p1m','p1f'] : ['p2m','p2f'];
        group.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(`p${p}${g.toLowerCase()}`).classList.add('active');
    }

    function nav(n) {
        if (n === 2) renderVault();
        if (n === 3) {
            players[0].n = document.getElementById('p1_n').value || "Master";
            players[1].n = document.getElementById('p2_n').value || "Subject";
            maxR = parseInt(document.getElementById('max_r').value) || 30;
            updateStatus();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function renderVault() {
        const target = document.getElementById('vault-inject');
        target.innerHTML = '<span class="label">Arsenal Configuration</span>';
        for (let cat in vault) {
            let box = document.createElement('div');
            box.className = 'box-section';
            box.innerHTML = `<span class="label" style="color:#666">${cat}</span>`;
            let cloud = document.createElement('div');
            cloud.className = 'tag-cloud';
            vault[cat].forEach(item => {
                let tag = document.createElement('div');
                tag.className = 'tag on';
                tag.innerText = item;
                tag.onclick = () => tag.classList.toggle('on');
                cloud.appendChild(tag);
            });
            box.appendChild(cloud);
            target.appendChild(box);
        }
    }

    function updateStatus() {
        document.getElementById('disp-round').innerText = `ROUND: ${curR}`;
        document.getElementById('disp-remain').innerText = `REMAINING: ${Math.max(0, maxR - curR)}`;
        document.getElementById('extend-prompt').style.display = (maxR - curR === 1) ? 'block' : 'none';
    }

    function generateDecree() {
        const trials = [
            "The Subject must surrender to a sensory trial chosen by the Master.",
            "The Master commands absolute stillness for the duration of the clock.",
            "Use one item from the Restraints category to secure the Subject."
        ];
        document.getElementById('active-trial-text').innerText = trials[Math.floor(Math.random() * trials.length)];
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timeLeft = 600; 
        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft<=0) finishRound();
        }, 1000);
    }

    function playCard(type) {
        if(type === 'YELLOW') {
            alert("YELLOW CARD: Roles Swapped. Task Restarts.");
            generateDecree(); 
        } else {
            alert("RED CARD: Round Skipped.");
            finishRound();
        }
    }

    function finishRound() {
        clearInterval(timer);
        if(curR >= maxR) {
            alert("PROTOCOL COMPLETE.");
            location.reload();
        } else {
            curR++;
            updateStatus();
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('active-round').style.display = 'none';
        }
    }

    function extendGameCustom() {
        let extra = prompt("How many additional rounds?", "5");
        let num = parseInt(extra);
        if(!isNaN(num) && num > 0) {
            maxR += num;
            updateStatus();
            alert(`EXTENDED BY ${num} ROUNDS.`);
        }
    }

    function triggerSafeWord() {
        alert("SAFE WORD DETECTED. SYSTEM RESET.");
        location.reload();
    }
</script>
</body>
</html>
