<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 30px; border: 2px solid #333; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        
        .box-section { background: #1f1f1f; padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid #333; }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }
        
        input[type="text"], input[type="number"] { width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; background: #000; color: white; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 10px; }

        .gender-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .g-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #111; color: #666; cursor: pointer; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px; }
        
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag { background: #000; padding: 8px 12px; border-radius: 10px; font-size: 0.85rem; cursor: pointer; border: 1px solid #333; color: #999; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }
        
        .add-row { display: flex; gap: 8px; margin-top: 10px; }
        .add-row input { margin-bottom: 0 !important; flex-grow: 1; padding: 12px; font-size: 0.9rem; }
        .add-btn { background: var(--accent); border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2rem; color: #000; }

        .status-header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-box { background: #000; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.7rem; border: 1px solid #444; flex: 1; min-width: 40%; }
        
        .timer-big { font-size: 4rem; text-align: center; font-weight: bold; margin: 10px 0; color: var(--accent); }
        
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .card-btn { background: #1a1a1a; color: white; border: 1px solid #444; padding: 15px; border-radius: 12px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; font-weight: bold; }
        .card-btn.yellow:active { background: #ffd700; color: #000; }
        .card-btn.red:active { background: #ff0000; color: #fff; }

        .step { display: none; }
        .active { display: block !important; }

        .btn-safeword {
            background: #ff0000 !important; color: #ffffff !important; padding: 25px; font-size: 1.5rem; letter-spacing: 5px; border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); animation: pulse-red 1.5s infinite; border: 4px solid #ffffff; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="screen-1" class="step active">
        <div class="box-section">
            <span class="label">Primary (Master)</span>
            <input type="text" id="p1-name-input" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn active" onclick="updateGender(1,'M')">Male</div>
                <div class="g-btn" onclick="updateGender(1,'F')">Female</div>
                <div class="g-btn" onclick="updateGender(1,'NB')">NB</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Secondary (Subject)</span>
            <input type="text" id="p2-name-input" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn" onclick="updateGender(2,'M')">Male</div>
                <div class="g-btn active" onclick="updateGender(2,'F')">Female</div>
                <div class="g-btn" onclick="updateGender(2,'NB')">NB</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Rounds</span>
            <input type="number" id="rounds-input" value="30">
        </div>
        <button class="btn" onclick="goToStep(2)">Access the Arsenal</button>
    </div>

    <div id="screen-2" class="step">
        <div id="vault-mount"></div>
        <button class="btn" onclick="goToStep(3)">Lock Arsenal & Begin</button>
    </div>

    <div id="screen-3" class="step">
        <div class="status-header">
            <div class="stat-box" id="stat-round">ROUND: 1</div>
            <div class="stat-box" id="stat-remain">REMAINING: 29</div>
            <div class="stat-box" id="stat-yellow" style="color:#ffd700">YELLOW: -</div>
            <div class="stat-box" id="stat-red" style="color:#ff4444">RED: -</div>
        </div>
        <div id="play-area">
            <div id="pre-round-ui"><button class="btn" onclick="actionGenerate()">Generate Decree</button></div>
            <div id="active-round-ui" style="display:none;">
                <div class="box-section" id="decree-text" style="min-height: 120px; text-align: center; font-weight: bold; display:flex; align-items:center; justify-content:center;"></div>
                <div class="timer-big" id="timer-display">10:00</div>
                <div class="card-grid">
                    <button class="card-btn yellow" onclick="actionCard('YELLOW')">Yellow Card</button>
                    <button class="card-btn red" onclick="actionCard('RED')">Red Card</button>
                </div>
                <button class="btn" style="background:var(--success);" onclick="actionComplete()">Complete Round</button>
            </div>
            <button class="btn-safeword" onclick="actionSafeword()" style="margin-top:20px;">SAFE WORD</button>
        </div>
    </div>
</div>

<script>
    /** THE MODULAR STATE OBJECT **/
    const state = {
        players: [{ name: "", gender: "M" }, { name: "", gender: "F" }],
        rounds: { current: 1, total: 30 },
        cards: { yellowHolder: "", redHolder: "" },
        timer: { value: 600, interval: null },
        vault: {
            "Restraints": ["Rope", "Cuffs", "Tape"],
            "Blindfolds": ["Silk Scarf", "Sleep Mask"],
            "Sensation": ["Ice", "Feather", "Paddle", "Wand"]
        },
        activities: [
            "The Subject must be restrained using {Restraints}. The Master applies {Sensation} for the duration.",
            "Blindfold the Subject with {Blindfolds}. They must guess which {Sensation} is being applied.",
            "Absolute stillness. The Master uses {Sensation} to test the Subject's resolve.",
            "The Master chooses an item from {Sensation}. The Subject must describe the sensation while held by {Restraints}."
        ]
    };

    /** CORE ACTIONS (LOGIC) **/
    function updateGender(playerIdx, g) {
        state.players[playerIdx-1].gender = g;
        // Update visual selector
        const buttons = document.querySelectorAll(`#screen-1 .box-section:nth-child(${playerIdx}) .g-btn`);
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function goToStep(n) {
        if (n === 2) renderVault();
        if (n === 3) {
            state.players[0].name = document.getElementById('p1-name-input').value || "Primary";
            state.players[1].name = document.getElementById('p2-name-input').value || "Secondary";
            state.rounds.total = parseInt(document.getElementById('rounds-input').value) || 30;
            distributeCards();
            refreshStatus();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${n}`).classList.add('active');
    }

    function distributeCards() {
        state.cards.yellowHolder = state.players[Math.floor(Math.random() * 2)].name;
        state.cards.redHolder = state.players[Math.floor(Math.random() * 2)].name;
    }

    function renderVault() {
        const mount = document.getElementById('vault-mount');
        mount.innerHTML = '<span class="label">Arsenal Configuration</span>';
        for (let cat in state.vault) {
            const safeId = cat.toLowerCase();
            const section = document.createElement('div');
            section.className = 'box-section';
            section.innerHTML = `
                <span class="label" style="color:#666">${cat}</span>
                <div class="tag-cloud" id="tags-${safeId}"></div>
                <div class="add-row">
                    <input type="text" id="in-${safeId}" placeholder="Custom ${cat}...">
                    <button class="add-btn" onclick="addVaultItem('${cat}', 'in-${safeId}')">+</button>
                </div>`;
            mount.appendChild(section);
            renderTags(cat);
        }
    }

    function renderTags(cat) {
        const cloud = document.getElementById(`tags-${cat.toLowerCase()}`);
        cloud.innerHTML = '';
        state.vault[cat].forEach(item => {
            const tag = document.createElement('div');
            tag.className = 'tag on';
            tag.innerText = item;
            tag.onclick = () => tag.classList.toggle('on');
            cloud.appendChild(tag);
        });
    }

    function addVaultItem(cat, inputId) {
        const input = document.getElementById(inputId);
        if (input.value.trim()) {
            state.vault[cat].push(input.value.trim());
            input.value = '';
            renderTags(cat);
        }
    }

    function refreshStatus() {
        document.getElementById('stat-round').innerText = `ROUND: ${state.rounds.current}`;
        document.getElementById('stat-remain').innerText = `REMAINING: ${state.rounds.total - state.rounds.current}`;
        document.getElementById('stat-yellow').innerText = `YELLOW: ${state.cards.yellowHolder}`;
        document.getElementById('stat-red').innerText = `RED: ${state.cards.redHolder}`;
    }

    function actionGenerate() {
        let text = state.activities[Math.floor(Math.random() * state.activities.length)];
        text = text.replace(/{(\w+)}/g, (match, cat) => {
            const items = state.vault[cat] || [];
            return items.length > 0 ? items[Math.floor(Math.random() * items.length)] : "[Item]";
        });
        document.getElementById('decree-text').innerText = text;
        document.getElementById('pre-round-ui').style.display = 'none';
        document.getElementById('active-round-ui').style.display = 'block';
        startTimer();
    }

    function startTimer() {
        state.timer.value = 600;
        clearInterval(state.timer.interval);
        state.timer.interval = setInterval(() => {
            state.timer.value--;
            const m = Math.floor(state.timer.value / 60), s = state.timer.value % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (state.timer.value <= 0) actionComplete();
        }, 1000);
    }

    function actionCard(type) {
        const holder = type === 'YELLOW' ? state.cards.yellowHolder : state.cards.redHolder;
        alert(`${type} CARD activated by ${holder}.`);
        if (type === 'YELLOW') actionGenerate(); else actionComplete();
    }

    function actionComplete() {
        clearInterval(state.timer.interval);
        if (state.rounds.current >= state.rounds.total) {
            alert("PROTOCOL COMPLETE.");
            location.reload();
        } else {
            state.rounds.current++;
            refreshStatus();
            document.getElementById('pre-round-ui').style.display = 'block';
            document.getElementById('active-round-ui').style.display = 'none';
        }
    }

    function actionSafeword() { alert("SAFEWORD ACTIVATED."); location.reload(); }
</script>
</body>
</html>
