<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Fixed Inventory</title>
    <style>
        :root { --crimson: #8b0000; --gold: #d4af37; --bg: #0a0a0a; --safe: #2e7d32; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #111; border: 2px solid #333; padding: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; min-height: 95vh; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--crimson); padding-bottom: 10px; margin-bottom: 20px; }
        .step { display: none; flex-grow: 1; }
        .active { display: flex; flex-direction: column; }
        
        /* PAGE 1: GENDER & NAME */
        .identity-box { border: 2px solid var(--gold); padding: 15px; margin-bottom: 20px; background: #000; border-radius: 4px; }
        .label-text { color: var(--gold); font-weight: bold; font-size: 0.8em; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input[type="text"], select { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: white; margin-bottom: 15px; font-family: inherit; box-sizing: border-box; }
        
        /* PAGE 2: INVENTORY */
        .inv-section { background: #080808; padding: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .item-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { background: #1a1a1a; border: 1px solid var(--gold); padding: 5px 10px; font-size: 0.8em; display: flex; align-items: center; gap: 8px; }
        .tag-del { color: var(--crimson); cursor: pointer; font-weight: bold; }
        
        /* PAGE 3: PLAY */
        .display-area { background: #000; border-left: 5px solid var(--crimson); padding: 20px; margin: 15px 0; min-height: 100px; }
        .timer-big { font-size: 5em; color: #ff0000; text-align: center; font-family: 'Impact', sans-serif; margin: 20px 0; }
        
        .btn { background: var(--crimson); color: white; border: 1px solid var(--gold); padding: 18px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
        .add-btn { background: #333; color: var(--gold); border: 1px solid var(--gold); width: 60px; height: 44px; cursor: pointer; }
        .panic-btn { background: var(--safe); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="color:var(--gold)">SESSION PAUSED</h2>
    <button class="btn" onclick="hidePanic()" style="background:var(--safe); width: 200px;">RESUME</button>
</div>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <div class="identity-box">
            <span class="label-text">Submissive Player</span>
            <input type="text" id="p1Name" placeholder="Name">
            <span class="label-text">Body Type</span>
            <select id="p1Gen">
                <option value="Male Body">Male Body</option>
                <option value="Female Body">Female Body</option>
                <option value="Other/Neutral">Other / Neutral</option>
            </select>
        </div>
        <div class="identity-box">
            <span class="label-text">Master Player</span>
            <input type="text" id="p2Name" placeholder="Name">
            <span class="label-text">Body Type</span>
            <select id="p2Gen">
                <option value="Male Body">Male Body</option>
                <option value="Female Body">Female Body</option>
                <option value="Other/Neutral">Other / Neutral</option>
            </select>
        </div>
        <button class="btn" onclick="goStep(2)">Next: Inventory ></button>
    </div>

    <div id="step2" class="step">
        <div class="inv-section">
            <span class="label-text">Bondage Gear (Required)</span>
            <div style="display:flex; gap:5px;">
                <input type="text" id="inBond" placeholder="Rope, Cuffs..." style="margin-bottom:0;">
                <button class="add-btn" onclick="add('bondage')">ADD</button>
            </div>
            <div id="listBond" class="item-list"></div>
        </div>
        <div class="inv-section">
            <span class="label-text">Sensory / Toys (Optional)</span>
            <div style="display:flex; gap:5px;">
                <input type="text" id="inOther" placeholder="Blindfold, Flogger..." style="margin-bottom:0;">
                <button class="add-btn" onclick="add('other')">ADD</button>
            </div>
            <div id="listOther" class="item-list"></div>
        </div>
        <button class="btn" onclick="goStep(3)">Lock & Start Session ></button>
        <button class="btn" style="background:#222; border:1px solid #444;" onclick="goStep(1)">Back</button>
    </div>

    <div id="step3" class="step">
        <div id="preRound">
            <span class="label-text">Choose Activity Type</span>
            <select id="modeChoose">
                <option value="Random">-- Random --</option>
                <option value="Escape">Escape Challenge</option>
                <option value="Shibari">Shibari (Artistic)</option>
                <option value="Truth or Dare">Truth or Dare</option>
                <option value="Mind Fuck">Mind Fuck</option>
            </select>
            <div id="output" class="display-area">Configure your items and generate.</div>
            <button class="btn" id="genB" onclick="generate()">Generate Round</button>
            <button class="btn" id="startB" style="display:none;" onclick="startClock()">Begin Timer</button>
        </div>

        <div id="clockArea" style="display:none;">
            <div class="timer-big" id="timer">00:00</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="end(true)">Success</button>
                <button class="btn" style="background:#222" onclick="end(false)">Fail</button>
            </div>
        </div>
        <button class="panic-btn" onclick="showPanic()">!!! SAFE WORD !!!</button>
    </div>
</div>

<script>
    let inv = { bondage: [], other: [] };
    let players = [], subIdx = 0, clock, time;

    function goStep(s) {
        if(s === 2) {
            players = [
                { n: document.getElementById('p1Name').value || "Sub", g: document.getElementById('p1Gen').value },
                { n: document.getElementById('p2Name').value || "Dom", g: document.getElementById('p2Gen').value }
            ];
        }
        if(s === 3 && inv.bondage.length === 0) {
            alert("ERROR: You must add at least one Bondage item to the list!");
            return;
        }
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    function add(cat) {
        let input = document.getElementById(cat === 'bondage' ? 'inBond' : 'inOther');
        if(input.value.trim() !== "") {
            inv[cat].push(input.value.trim());
            render(cat);
            input.value = "";
        }
    }

    function render(cat) {
        let div = document.getElementById(cat === 'bondage' ? 'listBond' : 'listOther');
        div.innerHTML = inv[cat].map((it, i) => `
            <div class="tag">${it} <span class="tag-del" onclick="inv['${cat}'].splice(${i},1); render('${cat}')">×</span></div>
        `).join('');
    }

    function generate() {
        let sel = document.getElementById('modeChoose').value;
        let modes = ["Escape", "Shibari", "Truth or Dare", "Mind Fuck"];
        let m = sel === "Random" ? modes[Math.floor(Math.random()*4)] : sel;
        let lvl = Math.floor(Math.random()*10)+1;
        
        let sub = players[subIdx];
        let dom = players[subIdx === 0 ? 1 : 0];
        let gear = inv.bondage[Math.floor(Math.random()*inv.bondage.length)];
        let extra = inv.other.length ? inv.other[Math.floor(Math.random()*inv.other.length)] : "manual stimulation";

        let html = `<b style="color:var(--gold)">${m.toUpperCase()} (LVL ${lvl})</b><br><br>`;
        html += `${dom.n} secures ${sub.n} (${sub.g}) with <b>${gear}</b>.<br><br>`;

        if(m === "Escape") { 
            html += `Challenge: Escape completely before time runs out.`; 
            time = (lvl * 40) + 60; 
        } else if(m === "Shibari") { 
            html += `Challenge: Create a complex aesthetic tie for the duration.`; 
            time = 300; 
        } else if(m === "Truth or Dare") { 
            html += `Challenge: Truth or Dare. Failure results in use of <b>${extra}</b>.`; 
            time = 180; 
        } else { 
            html += `Challenge: Mental focus test. Use <b>${extra}</b> to distract Sub.`; 
            time = 120; 
        }

        document.getElementById('output').innerHTML = html;
        document.getElementById('genB').style.display = "none";
        document.getElementById('startB').style.display = "block";
    }

    function startClock() {
        document.getElementById('preRound').style.display = "none";
        document.getElementById('clockArea').style.display = "block";
        clock = setInterval(() => {
            time--;
            let mins = Math.floor(time/60), secs = time%60;
            document.getElementById('timer').innerText = `${mins}:${secs<10?'0':''}${secs}`;
            if(time <= 0) end(false);
        }, 1000);
    }

    function end(success) {
        clearInterval(clock);
        if(success) { subIdx = (subIdx === 0 ? 1 : 0); alert("Roles Swapped!"); }
        document.getElementById('clockArea').style.display = "none";
        document.getElementById('preRound').style.display = "block";
        document.getElementById('genB').style.display = "block";
        document.getElementById('startB').style.display = "none";
    }

    function showPanic() { clearInterval(clock); document.getElementById('overlay').style.display = "flex"; }
    function hidePanic() { document.getElementById('overlay').style.display = "none"; end(false); }
</script>
</body>
</html>
