<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Physical Logic</title>
    <style>
        :root { --crimson: #8b0000; --gold: #d4af37; --bg: #0a0a0a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #111; border: 2px solid #333; padding: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; min-height: 95vh; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--crimson); padding-bottom: 10px; margin-bottom: 15px; }
        .step { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .active { display: flex; flex-direction: column; }
        .setup-box { background: #000; padding: 15px; border-left: 4px solid var(--gold); margin-bottom: 15px; }
        label { color: var(--gold); font-size: 0.8em; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], select, input[type="range"] { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        
        .status-board { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .role-slot { display: flex; align-items: center; border: 1px solid #333; padding: 10px; background: #000; }
        .role-label { width: 100px; font-weight: bold; text-transform: uppercase; font-size: 0.7em; color: #888; border-right: 1px solid #333; margin-right: 15px; }
        .role-name { font-size: 1.2em; color: var(--gold); font-weight: bold; }
        .slot-sub { border: 1px solid var(--crimson); background: #1a0000; }

        .card-zone { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .card-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .card { width: 100%; height: 45px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; font-size: 0.7em; border-radius: 4px; cursor: pointer; color: #000; margin-bottom: 5px; }
        .yellow { background: #ffd700; } .red { background: #ff4500; }
        .owner-tag { font-size: 0.6em; text-transform: uppercase; color: #666; }

        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .inv-item { background: #000; padding: 8px; border: 1px solid #222; font-size: 0.7em; display: flex; align-items: center; gap: 8px; }
        .fixed-footer { position: sticky; bottom: 0; background: #111; padding: 15px 0; border-top: 1px solid #333; margin-top: auto; z-index: 100; }
        .btn { background: var(--crimson); color: white; border: 1px solid var(--gold); padding: 18px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        .challenge-card { background: #000; border: 1px solid #444; padding: 20px; line-height: 1.6; font-size: 0.9em; }
        .mod-header { color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 0.75em; display: block; margin-top: 10px; border-bottom: 1px solid #222; }
        .timer-val { font-size: 4em; color: #ff0000; font-family: 'Impact', sans-serif; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <div class="setup-box">
            <label>Player One (Submissive Start)</label>
            <input type="text" id="p1Name" placeholder="Name">
            <select id="p1Gen"><option value="Male">Male Body</option><option value="Female">Female Body</option></select>
        </div>
        <div class="setup-box">
            <label>Player Two (Master Start)</label>
            <input type="text" id="p2Name" placeholder="Name">
            <select id="p2Gen"><option value="Male">Male Body</option><option value="Female">Female Body</option></select>
        </div>
        <div class="setup-box">
            <label>Session Intensity (1-10)</label>
            <input type="range" id="intensity" min="1" max="10" value="5">
        </div>
        <div class="fixed-footer"><button class="btn" onclick="nav(2)">Inventory Configuration ></button></div>
    </div>

    <div id="step2" class="step">
        <label>Available Gear:</label>
        <div class="inventory-grid" id="invList"></div>
        <div class="fixed-footer"><button class="btn" onclick="nav(3)">Enter Dungeon ></button></div>
    </div>

    <div id="step3" class="step">
        <div class="status-board">
            <div class="role-slot"><div class="role-label">Master</div><div class="role-name" id="masterName">-</div></div>
            <div class="role-slot slot-sub"><div class="role-label">Submissive</div><div class="role-name" id="subName">-</div></div>
        </div>
        <div class="card-zone">
            <div class="card-wrap"><div class="card yellow" onclick="cardTrigger('y')">YELLOW CARD</div><div class="owner-tag" id="yOwner">-</div></div>
            <div class="card-wrap"><div class="card red" onclick="cardTrigger('r')">RED CARD</div><div class="owner-tag" id="rOwner">-</div></div>
        </div>
        <div id="prepPhase">
            <div class="challenge-card" id="taskBox">Awaiting configuration...</div>
            <button class="btn" id="genBtn" onclick="generate()">Generate Task</button>
            <button class="btn" id="startBtn" style="display:none;" onclick="showTimer()">Confirm & Start Clock</button>
        </div>
        <div id="timerPhase" style="display:none;">
            <div class="timer-val" id="timeDisp">00:00</div>
            <button class="btn" onclick="resolve(true)">SUCCESS (Swap Roles)</button>
            <button class="btn" style="background:#333; margin-top:10px;" onclick="resolve(false)">FAILURE (Stay Bound)</button>
        </div>
    </div>
</div>

<script>
    const gearFull = ["Rope", "Tape", "Pallet Wrap", "Dildo", "Butt Plug", "Ball Gag", "Tape Gag", "Blindfold", "Cuffs", "Spreader Bar"];
    let players = [], activeGear = [], subIdx = 0, domIdx = 1, clock, secs;
    let cards = { y: 1, r: 1 };

    // ITEM-RELATIVE LOGIC MAP
    const gearLogic = {
        "Rope": { verb: "tie", pattern: "into a complex harness", difficult: 4 },
        "Tape": { verb: "wrap and seal", pattern: "in 10 tight layers", difficult: 3 },
        "Pallet Wrap": { verb: "mummify", pattern: "until all mobility is lost", difficult: 3 },
        "Cuffs": { verb: "lock", pattern: "behind the back as tight as possible", difficult: 2 },
        "Spreader Bar": { verb: "lock the ankles into", pattern: "extending the legs to the max width", difficult: 5 }
    };

    const physicalObjectives = [
        { act: "retrieve", obj: "a small key", tool: "their teeth", loc: "from a bowl on the floor" },
        { act: "extinguish", obj: "a candle", tool: "one sharp puff of breath", loc: "placed 4 feet away" },
        { act: "drag", obj: "a weighted bag", tool: "their ankles", loc: "across a marked 5ft line" },
        { act: "press", obj: "a buzzer/bell", tool: "their chin", loc: "mounted at knee-height" },
        { act: "unravel", obj: "a single rope knot", tool: "their mouth", loc: "tied to a chair leg" },
        { act: "tip over", obj: "a cup of water", tool: "their head", loc: "sitting on a low stool" }
    ];

    function nav(s) {
        if(s===2) {
            players = [
                { name: document.getElementById('p1Name').value || "P1", gen: document.getElementById('p1Gen').value },
                { name: document.getElementById('p2Name').value || "P2", gen: document.getElementById('p2Gen').value }
            ];
            const list = document.getElementById('invList');
            list.innerHTML = "";
            gearFull.forEach(g => list.innerHTML += `<div class="inv-item"><input type="checkbox" value="${g}" checked> ${g}</div>`);
            cards.y = domIdx; cards.r = domIdx;
        }
        if(s===3) {
            activeGear = Array.from(document.querySelectorAll('#invList input:checked')).map(i => i.value);
            updateBoard();
        }
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    function generate() {
        const sub = players[subIdx];
        const dom = players[domIdx];
        const chaos = parseInt(document.getElementById('intensity').value);
        let content = "";
        let totalD = 0;

        // BINDING PHASE
        const zones = ["UPPER", "LOWER", "SENSORY", "CORE"];
        zones.forEach(z => {
            if (Math.random() * 10 < (chaos + 1)) {
                let pool = activeGear.filter(g => gearLogic[g] || g.includes("Gag") || g.includes("Blindfold") || g.includes("Plug") || g.includes("Dildo"));
                let tool = pool[Math.floor(Math.random()*pool.length)];
                
                if (gearLogic[tool]) {
                    content += `<span class="mod-header">${z}</span> ${dom.name} must ${gearLogic[tool].verb} ${sub.name}'s ${z.toLowerCase()} ${gearLogic[tool].pattern} using <b>${tool}</b>.<br>`;
                    totalD += gearLogic[tool].difficult;
                } else if (z === "SENSORY" && (tool.includes("Gag") || tool === "Blindfold")) {
                    content += `<span class="mod-header">SENSORY</span> ${dom.name} must secure the <b>${tool}</b> on ${sub.name}, ensuring no light/speech is possible.<br>`;
                    totalD += 2;
                } else if (z === "CORE" && (tool.includes("Plug") || tool === "Dildo")) {
                    let anatomy = sub.gen === "Female" ? "labia" : "scrotum";
                    content += `<span class="mod-header">CORE</span> ${dom.name} must insert the ${tool} and use <b>Tape</b> to seal it in place against the ${anatomy}.<br>`;
                    totalD += 4;
                }
            }
        });

        // OBJECTIVE PHASE (Logic check: ensure it's physically relevant)
        const task = physicalObjectives[Math.floor(Math.random() * physicalObjectives.length)];
        content += `<span class="mod-header">OBJECTIVE</span> ${sub.name} must **${task.act}** **${task.obj}** **using ${task.tool}**. Target is **${task.loc}**.`;
        totalD += 5;

        secs = Math.floor((totalD * 40 * (chaos/5)) + 120);
        document.getElementById('taskBox').innerHTML = content;
        document.getElementById('genBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
    }

    function cardTrigger(type) {
        const owner = type === 'y' ? cards.y : cards.r;
        alert(`${players[owner].name} uses the ${type==='y'?'Yellow':'Red'} Card!`);
        if (type === 'y') swapRoles(); else generate();
    }

    function resolve(success) {
        clearInterval(clock);
        if(success) {
            alert(`SUCCESS! ${players[subIdx].name} takes the Master role.`);
            swapRoles();
        } else {
            alert(`FAILURE! ${players[subIdx].name} stays the Submissive.`);
            reset();
        }
    }

    function swapRoles() {
        subIdx = subIdx === 0 ? 1 : 0;
        domIdx = domIdx === 0 ? 1 : 0;
        cards.y = domIdx; cards.r = domIdx;
        reset();
    }

    function updateBoard() {
        document.getElementById('masterName').innerText = players[domIdx].name;
        document.getElementById('subName').innerText = players[subIdx].name;
        document.getElementById('yOwner').innerText = `Held by: ${players[cards.y].name}`;
        document.getElementById('rOwner').innerText = `Held by: ${players[cards.r].name}`;
    }

    function showTimer() {
        document.getElementById('prepPhase').style.display = 'none';
        document.getElementById('timerPhase').style.display = 'block';
        clock = setInterval(() => {
            secs--;
            let m = Math.floor(secs/60), s = secs%60;
            document.getElementById('timeDisp').innerText = `${m}:${s<10?'0':''}${s}`;
            if(secs <= 0) resolve(false);
        }, 1000);
    }

    function reset() {
        document.getElementById('timerPhase').style.display = 'none';
        document.getElementById('prepPhase').style.display = 'block';
        document.getElementById('genBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        updateBoard();
    }
</script>
</body>
</html>
