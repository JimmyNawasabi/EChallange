<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Persistence</title>
    <style>
        :root { --crimson: #7b0000; --gold: #b38b4d; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: #ccc; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--panel); border: 1px solid #333; padding: 20px; box-shadow: 0 0 50px #000; display: flex; flex-direction: column; min-height: 95vh; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; margin: 0 0 15px 0; border-bottom: 2px solid var(--crimson); }
        
        .step { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 100px; }
        .active { display: flex; flex-direction: column; }

        .player-row { background: #000; padding: 12px; margin-bottom: 10px; border: 1px solid #222; }
        label { color: var(--gold); font-size: 0.8em; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input[type="text"], select { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid #444; color: #fff; margin-bottom: 5px; box-sizing: border-box; }

        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .gear-item { background: #000; padding: 8px; border: 1px solid #222; font-size: 0.75em; display: flex; align-items: center; gap: 8px; }

        .fixed-footer { position: sticky; bottom: 0; background: var(--panel); padding: 15px 0; border-top: 1px solid #333; margin-top: auto; z-index: 100; }
        .btn { background: var(--crimson); color: white; border: 1px solid var(--gold); padding: 18px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        .challenge-card { background: #000; border: 1px solid var(--crimson); padding: 20px; margin: 15px 0; line-height: 1.6; color: #fff; }
        .module-title { color: var(--gold); font-weight: bold; display: block; border-bottom: 1px solid #222; margin-top: 10px; }
        .timer { font-size: 5em; color: #ff0000; text-align: center; font-family: Impact; margin: 10px 0; }
        .banner { text-align: center; color: var(--gold); padding: 8px; background: #000; border: 1px solid #333; margin-bottom: 10px; font-size: 0.9em; }
        
        .card-zone { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .card { flex: 1; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; border-radius: 3px; font-size: 0.8em; cursor: pointer; }
        .yellow { background: #e6b800; } .red { background: #a00; color: #fff; }
        .disabled { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <label>Player Count:</label>
        <select id="pCount" onchange="initSetup()">
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
        </select>
        <div id="pNames"></div>
        <div class="fixed-footer"><button class="btn" onclick="nav(2)">Inventory Setup ></button></div>
    </div>

    <div id="step2" class="step">
        <label>Check Available Restraints:</label>
        <div class="inventory-grid" id="gearList"></div>
        <div class="fixed-footer"><button class="btn" onclick="nav(3)">Begin Sequence ></button></div>
    </div>

    <div id="step3" class="step">
        <div class="banner" id="currentRoles"></div>
        
        <div class="card-zone">
            <div id="yC" class="card yellow" onclick="useC('y')">YELLOW: SWAP</div>
            <div id="rC" class="card red" onclick="useC('r')">RED: PASS</div>
        </div>

        <div id="prepArea">
            <div class="challenge-card" id="taskBox">Awaiting data...</div>
            <button class="btn" id="genBtn" onclick="generate()">Generate Extreme Sequence</button>
            <button class="btn" id="startBtn" style="display:none;" onclick="startClock()">Restraints Secure: Start Timer</button>
        </div>

        <div id="playArea" style="display:none;">
            <div class="timer" id="timeDisp">00:00</div>
            <button class="btn" onclick="finish(true)">ESCAPED (Switch Roles)</button>
            <button class="btn" style="background:#333; margin-top:10px;" onclick="finish(false)">FAILED (Stay Submissive)</button>
        </div>
    </div>
</div>

<script>
    const gearFull = ["Rope", "Tape", "Pallet Wrap", "Bandages", "Floggers", "Cane", "Dildo", "Butt Plug", "Ball Gag", "Over-the-mouth Gag", "Tape Gag", "Wrap Around Gag", "Mouth Stuffed", "Open Mouth Gag", "Cloth Blindfold", "Tape Blindfold", "Leather Blindfold", "Straight Jacket", "Spreader Bar"];
    let players = [], activeGear = [], subI = 0, domI = 1, cards = { y: 0, r: 0 }, clock, secs;

    function initSetup() {
        const c = document.getElementById('pCount').value;
        const div = document.getElementById('pNames');
        div.innerHTML = "";
        for(let i=0; i<c; i++) {
            div.innerHTML += `<div class="player-row"><label>Player ${i+1}</label><input type="text" id="n${i}" placeholder="Name"><select id="g${i}"><option value="Male">Male Body</option><option value="Female">Female Body</option></select></div>`;
        }
    }
    initSetup();

    function nav(s) {
        if(s===2) {
            players = Array.from({length: document.getElementById('pCount').value}, (_, i) => ({
                name: document.getElementById('n'+i).value || "P"+(i+1), gen: document.getElementById('g'+i).value
            }));
            const list = document.getElementById('gearList');
            list.innerHTML = "";
            gearFull.forEach(g => list.innerHTML += `<div class="gear-item"><input type="checkbox" value="${g}" checked> ${g}</div>`);
        }
        if(s===3) {
            activeGear = Array.from(document.querySelectorAll('#gearList input:checked')).map(i => i.value);
            updateUI();
        }
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    // RANDOMIZER MODULES
    const armMods = [
        { r: "Rope", t: "Hands tied behind back using a <b>Rope</b> 'box tie'—elbows pulled together until they touch." },
        { r: "Tape", t: "Hands taped into fists, then both wrists taped securely to the upper thighs using <b>Tape</b>." },
        { r: "Straight Jacket", t: "Subject secured in <b>Straight Jacket</b>, sleeves pulled through the crotch strap and cinched tight." },
        { r: "Pallet Wrap", t: "Arms pinned to the sides and encased in 15 layers of <b>Pallet Wrap</b> from shoulder to wrist." }
    ];
    const legMods = [
        { r: "Spreader Bar", t: "Ankles locked into <b>Spreader Bar</b>. A <b>Rope</b> connects the bar to a collar, pulling knees up." },
        { r: "Pallet Wrap", t: "Legs bound together from ankle to mid-thigh in a solid block of <b>Pallet Wrap</b>." },
        { r: "Bandages", t: "Ankles wrapped in <b>Bandages</b>, then tied together with no gap. Knees tied together with <b>Rope</b>." }
    ];
    const headMods = [
        { r: "Ball Gag", t: "<b>Ball Gag</b> applied and buckled at the last hole. <b>Leather Blindfold</b> secured over eyes." },
        { r: "Tape Gag", t: "Mouth stuffed with cloth, then sealed with 4 horizontal strips of <b>Tape</b> across the face." },
        { r: "Wrap Around Gag", t: "<b>Wrap Around Gag</b> applied, then <b>Pallet Wrap</b> wound 5 times around the entire head (nose exposed)." },
        { r: "Tape Blindfold", t: "Cotton pads over eyes, sealed with <b>Tape Blindfold</b>. Earplugs inserted." }
    ];
    const genitalMods = [
        { g: "Male", r: "Butt Plug", t: "<b>Butt Plug</b> inserted and tethered via <b>Rope</b> to the wrist bonds." },
        { g: "Male", r: "Rope", t: "Genitals tied in a 'tension loop' with <b>Rope</b>, connected to an ankle cuff." },
        { g: "Female", r: "Dildo", t: "<b>Dildo</b> taped to a chair seat. Subject must remain sat on it throughout the task." },
        { g: "Female", r: "Butt Plug", t: "<b>Butt Plug</b> inserted. <b>Tape</b> strips applied in an 'X' over the labia to secure it." }
    ];

    function generate() {
        const sub = players[subI];
        let parts = [];
        
        // Pick one mod for each category if gear is available
        [armMods, legMods, headMods].forEach(pool => {
            const valid = pool.filter(m => activeGear.includes(m.r));
            if(valid.length) parts.push(valid[Math.floor(Math.random()*valid.length)].t);
        });
        
        const gValid = genitalMods.filter(m => m.g === sub.gen && activeGear.includes(m.r));
        if(gValid.length && Math.random() > 0.3) parts.push(gValid[Math.floor(Math.random()*gValid.length)].t);

        const tasks = [
            "Escape the leg bonds and reach the far wall.",
            "Untie the wrist knot using only the teeth.",
            "Stand on a chair and balance for 5 minutes without falling.",
            "Wriggle out of the Pallet Wrap completely.",
            "Identify 3 objects placed on the floor by touch only."
        ];

        document.getElementById('taskBox').innerHTML = `
            <span class="module-title">UPPER BODY</span> ${parts[0] || "None"}
            <span class="module-title">LOWER BODY</span> ${parts[1] || "None"}
            <span class="module-title">SENSORY</span> ${parts[2] || "None"}
            <span class="module-title">GENITAL/CORE</span> ${parts[3] || "None"}
            <span class="module-title">THE ESCAPE GOAL</span> ${tasks[Math.floor(Math.random()*tasks.length)]}
        `;

        secs = 480; // 8 Minute default
        document.getElementById('genBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
    }

    function useC(type) {
        if(type === 'y') { [subI, domI] = [domI, subI]; cards.y = domI; }
        else { cards.r = domI; generate(); }
        updateUI();
    }

    function startClock() {
        document.getElementById('prepArea').style.display = 'none';
        document.getElementById('playArea').style.display = 'block';
        clock = setInterval(() => {
            secs--;
            let m = Math.floor(secs/60), s = secs%60;
            document.getElementById('timeDisp').innerText = `${m}:${s<10?'0':''}${s}`;
            if(secs <= 0) finish(false);
        }, 1000);
    }

    function finish(win) {
        clearInterval(clock);
        if(win) {
            alert("SUCCESS! You earned the Master role.");
            [subI, domI] = [domI, subI]; // Swap on success
        } else {
            alert("FAILURE. You remain the submissive.");
            // No swap on failure
        }
        resetUI();
    }

    function resetUI() {
        document.getElementById('playArea').style.display = 'none';
        document.getElementById('prepArea').style.display = 'block';
        document.getElementById('genBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        document.getElementById('currentRoles').innerText = `MASTER: ${players[domI].name} | SUB: ${players[subI].name}`;
        document.getElementById('yC').className = `card yellow ${cards.y !== subI ? 'disabled' : ''}`;
        document.getElementById('rC').className = `card r ${cards.r !== subI ? 'disabled' : ''}`;
    }
</script>
</body>
</html>
