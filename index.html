<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Fixed Logic</title>
    <style>
        :root { --crimson: #8b0000; --gold: #d4af37; --bg: #0a0a0a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #111; border: 2px solid #333; padding: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; min-height: 95vh; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--crimson); padding-bottom: 10px; margin-bottom: 15px; }
        .step { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .active { display: flex; flex-direction: column; }
        
        /* CATEGORY SECTIONS */
        .cat-section { background: #080808; padding: 15px; border: 1px solid #222; margin-bottom: 20px; border-radius: 4px; }
        .cat-header { font-size: 0.8em; color: var(--gold); margin-bottom: 10px; border-bottom: 1px solid var(--crimson); padding-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .inv-item { background: #1a1a1a; padding: 10px; border: 1px solid #333; font-size: 0.75em; display: flex; align-items: center; gap: 10px; }
        
        .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .add-row input { margin-bottom: 0; flex: 1; border: 1px solid #555; background: #000; color: #fff; padding: 8px; }
        .add-btn { background: var(--crimson); color: #fff; border: 1px solid var(--gold); padding: 0 20px; cursor: pointer; font-weight: bold; }

        /* PLAY CARDS */
        .challenge-card { background: #000; border: 1px solid #444; padding: 25px; line-height: 1.8; font-size: 0.95em; border-left: 5px solid var(--gold); position: relative; }
        .mode-badge { display: inline-block; padding: 4px 15px; background: var(--crimson); color: #fff; font-size: 0.9em; font-weight: bold; border-radius: 2px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .intensity-pill { position: absolute; top: 25px; right: 25px; color: var(--gold); font-weight: bold; border: 1px solid var(--gold); padding: 2px 10px; font-size: 0.7em; }
        .mod-header { color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 0.75em; display: block; margin-top: 20px; border-bottom: 1px solid #222; }
        
        .fixed-footer { position: sticky; bottom: 0; background: #111; padding: 15px 0; border-top: 1px solid #333; margin-top: auto; z-index: 100; }
        .btn { background: var(--crimson); color: white; border: 1px solid var(--gold); padding: 18px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .timer-val { font-size: 5em; color: #ff0000; font-family: 'Impact', sans-serif; text-align: center; margin: 20px 0; text-shadow: 0 0 15px rgba(255,0,0,0.4); }
    </style>
</head>
<body>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <div style="background:#000; padding:20px; border-left:4px solid var(--gold);">
            <label style="color:var(--gold); font-size:0.7em; display:block; margin-bottom:5px;">SUBMISSIVE NAME</label>
            <input type="text" id="p1Name" placeholder="Enter Name..." style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:12px; margin-bottom:15px;">
            <label style="color:var(--gold); font-size:0.7em; display:block; margin-bottom:5px;">MASTER NAME</label>
            <input type="text" id="p2Name" placeholder="Enter Name..." style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:12px;">
        </div>
        <p style="color:#666; font-size:0.7em; text-align:center; margin-top:20px;">Intensity and Time are calculated randomly per round.</p>
        <div class="fixed-footer"><button class="btn" onclick="nav(2)">Add Gear ></button></div>
    </div>

    <div id="step2" class="step">
        <div class="cat-section">
            <div class="cat-header">1. Bondage (Tie)</div>
            <div class="add-row"><input type="text" id="inBond" placeholder="e.g. Rope..."><button class="add-btn" onclick="addItem('bondage')">+</button></div>
            <div id="gridBond" class="inventory-grid"></div>
        </div>
        <div class="cat-section">
            <div class="cat-header">2. Sensory (Deprive)</div>
            <div class="add-row"><input type="text" id="inSens" placeholder="e.g. Blindfold..."><button class="add-btn" onclick="addItem('sensory')">+</button></div>
            <div id="gridSens" class="inventory-grid"></div>
        </div>
        <div class="cat-section">
            <div class="cat-header">3. Toys (Stimulate)</div>
            <div class="add-row"><input type="text" id="inToys" placeholder="e.g. Flogger..."><button class="add-btn" onclick="addItem('toys')">+</button></div>
            <div id="gridToys" class="inventory-grid"></div>
        </div>
        <div class="fixed-footer"><button class="btn" onclick="nav(3)">Start Game ></button></div>
    </div>

    <div id="step3" class="step">
        <div id="prepPhase">
            <div class="challenge-card" id="taskBox">Awaiting Synthesis...</div>
            <button class="btn" id="genBtn" onclick="generate()" style="margin-top:20px;">Generate Random Challenge</button>
            <button class="btn" id="startBtn" style="display:none; margin-top:20px;" onclick="showTimer()">Confirm & Start Clock</button>
        </div>
        <div id="timerPhase" style="display:none;">
            <div class="timer-val" id="timeDisp">00:00</div>
            <button class="btn" onclick="resolve(true)">SUCCESS</button>
            <button class="btn" style="background:#222; margin-top:10px;" onclick="resolve(false)">FAILURE</button>
        </div>
    </div>
</div>

<script>
    let items = { bondage: [], sensory: [], toys: [] };
    let players = [], active = { bondage: [], sensory: [], toys: [] }, subIdx = 0, domIdx = 1, clock, secs;

    function nav(s) {
        if(s===2) {
            players = [{ name: document.getElementById('p1Name').value || "Sub" }, { name: document.getElementById('p2Name').value || "Master" }];
        }
        if(s===3) {
            active.bondage = getChecked('gridBond');
            active.sensory = getChecked('gridSens');
            active.toys = getChecked('gridToys');
            if(active.bondage.length === 0) { alert("Please add at least 1 Bondage item."); nav(2); return; }
        }
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    function addItem(cat) {
        const input = document.getElementById(cat === 'bondage' ? 'inBond' : cat === 'sensory' ? 'inSens' : 'inToys');
        if (input.value.trim()) {
            items[cat].push(input.value.trim());
            const grid = document.getElementById(cat === 'bondage' ? 'gridBond' : cat === 'sensory' ? 'gridSens' : 'gridToys');
            grid.innerHTML = "";
            items[cat].slice().reverse().forEach(i => grid.innerHTML += `<div class="inv-item"><input type="checkbox" value="${i}" checked> ${i}</div>`);
            input.value = "";
        }
    }

    function getChecked(id) {
        return Array.from(document.querySelectorAll(`#${id} input:checked`)).map(i => i.value);
    }

    function generate() {
        const sub = players[subIdx];
        const dom = players[domIdx];
        
        // 1. FORCED RANDOM INTENSITY
        const intensity = Math.floor(Math.random() * 10) + 1;
        
        // 2. FORCED MODE SELECTION
        const modes = ["Truth or Dare", "Mind Fuck", "Shibari", "Escape"];
        const mode = modes[Math.floor(Math.random() * modes.length)];
        
        // 3. GEAR PICKING
        let b = active.bondage[Math.floor(Math.random() * active.bondage.length)];
        let s = active.sensory.length > 0 ? active.sensory[Math.floor(Math.random() * active.sensory.length)] : "None";
        let t = active.toys.length > 0 ? active.toys[Math.floor(Math.random() * active.toys.length)] : "None";

        let content = `<div class="mode-badge">${mode}</div><div class="intensity-pill">LVL ${intensity}</div>`;
        content += `<span class="mod-header">RESTRAINT</span> ${dom.name} must secure ${sub.name} using <b>${b}</b> at intensity <b>${intensity}/10</b>.`;

        // 4. MODE LOGIC
        if(mode === "Truth or Dare") {
            content += `<span class="mod-header">THE CHALLENGE</span> ${dom.name} asks a Truth or Dare. If the Sub fails or refuses, they must endure <b>${intensity * 10} seconds</b> of application with <b>${t}</b>.`;
            secs = 180;
        } else if(mode === "Mind Fuck") {
            content += `<span class="mod-header">THE CHALLENGE</span> ${sub.name} is blinded with <b>${s}</b>. ${dom.name} will apply <b>${t}</b> while ${sub.name} must solve math problems or recite the alphabet backward without error.`;
            secs = 120;
        } else if(mode === "Shibari") {
            content += `<span class="mod-header">THE CHALLENGE</span> Focus on the aesthetic. ${dom.name} must use <b>${b}</b> to create a decorative but tight binding. ${sub.name} must remain perfectly still.`;
            secs = 300;
        } else if(mode === "Escape") {
            content += `<span class="mod-header">THE CHALLENGE</span> ${sub.name} must attempt to fully free themselves from the <b>${b}</b> before the clock runs out.`;
            secs = (intensity * 40) + 60;
        }

        document.getElementById('taskBox').innerHTML = content;
        document.getElementById('genBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
    }

    function resolve(success) {
        clearInterval(clock);
        if(success) { 
            alert("OBJECTIVE COMPLETE. Swapping Roles."); 
            subIdx = (subIdx === 0) ? 1 : 0; domIdx = (domIdx === 0) ? 1 : 0; 
        } else { 
            alert("OBJECTIVE FAILED. Master maintains control."); 
        }
        document.getElementById('timerPhase').style.display = 'none';
        document.getElementById('prepPhase').style.display = 'block';
        document.getElementById('genBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
    }

    function showTimer() {
        document.getElementById('prepPhase').style.display = 'none';
        document.getElementById('timerPhase').style.display = 'block';
        clock = setInterval(() => {
            secs--;
            let m = Math.floor(secs/60), s = secs%60;
            document.getElementById('timeDisp').innerText = `${m}:${s<10?'0':''}${s}`;
            if(secs <= 0) resolve(false);
        }, 1000);
    }
</script>
</body>
</html>
