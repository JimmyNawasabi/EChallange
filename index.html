<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: High-Contrast Build</title>
    <style>
        :root { 
            --accent: #FFD700; /* Bright Gold */
            --bg: #000000; /* Pure Black */
            --card: #1a1a1a; /* Dark Gray */
            --text: #FFFFFF; /* Pure White */
            --crimson: #FF0000; /* Pure Red */
            --success: #00FF00; /* Lime Green */
            --warning: #FFFF00; /* Bright Yellow */
            --veto-blue: #00BFFF; /* Deep Sky Blue */
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center; 
            font-size: 1.2rem; /* Base size increased */
        }

        .container { 
            max-width: 650px; width: 100%; 
            background: var(--card); 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px solid #444; 
            box-shadow: 0 0 60px #000; 
        }
        
        h1 { 
            text-align: center; text-transform: uppercase; 
            letter-spacing: 8px; color: var(--accent); 
            margin-bottom: 30px; font-size: 2.8rem; /* +20% */
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .box-section { 
            background: #000000; 
            padding: 25px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            border: 2px solid #555; 
        }
        
        .label { 
            font-size: 1.1rem; /* +20% */
            text-transform: uppercase; font-weight: bold; 
            color: var(--accent); display: block; 
            margin-bottom: 12px; letter-spacing: 1.5px; 
        }

        input[type="text"], input[type="number"], select { 
            width: 100%; padding: 18px; 
            border: 2px solid var(--accent); 
            border-radius: 8px; background: #111; 
            color: white; box-sizing: border-box; 
            margin-bottom: 15px; font-size: 1.4rem; /* +20% */
        }
        
        .gender-grid { display: flex; gap: 12px; margin-bottom: 25px; }
        .g-btn { 
            flex: 1; padding: 18px; 
            background: #222; border: 2px solid #666; 
            color: #AAA; cursor: pointer; 
            border-radius: 8px; font-size: 1.1rem; 
            font-weight: bold; text-transform: uppercase;
        }
        .g-btn.active { 
            background: var(--accent); color: #000; 
            border-color: #FFF; font-weight: 900;
        }

        .btn { 
            background: var(--crimson); color: white; 
            border: 2px solid #FFF; padding: 22px; 
            width: 100%; cursor: pointer; 
            text-transform: uppercase; font-weight: bold; 
            border-radius: 12px; margin-top: 10px; 
            font-size: 1.4rem; /* +20% */
        }
        
        .item-chip { 
            display: inline-flex; align-items: center; 
            background: #222; padding: 10px 18px; 
            border-radius: 30px; margin: 6px; 
            font-size: 1.2rem; border: 2px solid #777; 
        }
        .item-chip.off { opacity: 0.25; text-decoration: line-through; background: #000; border-color: #333; }
        .tag { 
            font-size: 0.8rem; font-weight: 900; 
            background: var(--accent); color: black; 
            padding: 3px 8px; border-radius: 4px; margin-left: 10px; 
        }
        .remove-x { margin-left: 15px; color: var(--crimson); font-weight: bold; cursor: pointer; font-size: 1.5rem; }
        
        .score-row { 
            display: flex; justify-content: space-between; 
            padding: 20px; background: #000; 
            border-radius: 15px; border: 3px solid var(--accent); 
            text-align: center; margin-bottom: 25px; 
        }
        .p-name { font-weight: bold; font-size: 1.4rem; color: #FFF; margin-bottom: 5px; }
        .p-score { font-size: 2.2rem; color: var(--accent); font-weight: 900; }
        
        .tog-btn { 
            padding: 18px; font-size: 1rem; 
            border-radius: 10px; border: 2px solid #666; 
            background: #111; color: #EEE; 
            cursor: pointer; text-transform: uppercase; 
            font-weight: bold; transition: 0.2s; 
        }
        .tog-btn.active { 
            border-color: var(--accent); color: #000; 
            background: var(--accent); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); 
        }

        .m-btn { 
            border-radius: 10px; padding: 18px; 
            font-size: 1rem; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; 
            opacity: 0.2; pointer-events: none; border: 2px solid #FFF; 
        }
        .m-btn.active-card { opacity: 1; pointer-events: auto; }
        .y-card { background: var(--warning); color: #000; }
        .r-card { background: var(--crimson); color: #fff; }

        #decree-display { line-height: 1.6; color: #FFF; font-size: 1.4rem; font-weight: 500; }
        .grand-decree-text { font-size: 1.3rem; line-height: 1.8; color: #FFF; background: #000; padding: 25px; border-radius: 12px; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p0-name" value="Dominus">
            <div class="gender-grid" id="p0-genders">
                <button class="g-btn active" onclick="updateGender(0,'M',this)">Male</button>
                <button class="g-btn" onclick="updateGender(0,'F',this)">Female</button>
                <button class="g-btn" onclick="updateGender(0,'NB',this)">NB</button>
            </div>
            <span class="label">Player 2</span>
            <input type="text" id="p1-name" value="Subject">
            <div class="gender-grid" id="p1-genders">
                <button class="g-btn" onclick="updateGender(1,'M',this)">Male</button>
                <button class="g-btn active" onclick="updateGender(1,'F',this)">Female</button>
                <button class="g-btn" onclick="updateGender(1,'NB',this)">NB</button>
            </div>
            <span class="label">Total Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" style="width:100%" onclick="showStep(2)">Configure Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="inventory-editor"></div>
        <button class="btn" style="background:var(--success); color: #000; border-color: #000; width:100%" onclick="startSession()">Start Session</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-ui" style="text-align:center; color:var(--accent); margin-bottom:15px; font-weight:900; letter-spacing: 3px; font-size: 1.5rem;"></div>
        <div class="score-row">
            <div class="p-block"><div id="r0" class="label" style="margin-bottom:5px;">MASTER</div><div id="n0" class="p-name"></div><div id="s0" class="p-score">0</div><div id="inv0" style="font-size: 1.5rem;"></div></div>
            <div class="p-block"><div id="r1" class="label" style="margin-bottom:5px;">SLAVE</div><div id="n1" class="p-name"></div><div id="s1" class="p-score">0</div><div id="inv1" style="font-size: 1.5rem;"></div></div>
        </div>
        
        <div id="game-controls">
             <div class="box-section">
                 <span class="label" id="master-toggle-label">MASTER'S ARSENAL CONTROL</span>
                 <div id="proto-mount" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"></div>
             </div>
             <button class="btn" style="width:100%; background: var(--accent); color: #000;" onclick="generate()">Command Decree</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-display"></div></div>
            <div style="display:flex; gap:15px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve('fail')">FAIL</button>
                <button class="btn" style="background:var(--success); color: #000; flex:1;" onclick="resolve('success')">SUCCESS</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                <button id="y-btn" class="m-btn y-card" onclick="useYellow()">Yellow Card</button>
                <button id="r-btn" class="m-btn r-card" onclick="useRed()">Red Card</button>
            </div>
        </div>
    </div>

    <div id="step-4" style="display:none;">
        <h2 style="color:var(--accent); text-align:center; font-size: 2.2rem;">THE GRAND DECREE</h2>
        <div class="box-section"><div id="grand-decree-display" class="grand-decree-text"></div></div>
        <button class="btn" style="width:100%; background:var(--success); color: #000;" onclick="location.reload()">New Session</button>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30,
        players: [
            {n:"", g:"M", role:"Master", score:0, hasYellow:false, hasRed:false},
            {n:"", g:"F", role:"Slave", score:0, hasYellow:false, hasRed:false}
        ],
        vault: JSON.parse(localStorage.getItem('sov_v7_hc')) || {
            "The Shackles": [{n:"Handcuffs", a:true, t:"U"}],
            "The Silence": [{n:"Ball Gag", a:true, t:"U"}],
            "The Shadows": [{n:"Silk Scarf", a:true, t:"U"}],
            "The Discipline": [{n:"Leather Whip", a:true, t:"U"}],
            "The Senses": [{n:"Ice Cube", a:true, t:"U"}],
            "The Pleasure": [{n:"Magic Wand", a:true, t:"F"}]
        },
        activeCats: {
            "The Shackles": true, "The Silence": true, "The Shadows": true,
            "The Discipline": true, "The Senses": true, "The Pleasure": true
        }
    };

    const protoNames = {
        "The Shackles": "The Solitary Bind", "The Silence": "The Veiled Confession",
        "The Shadows": "The Silk Labyrinth", "The Discipline": "The Wicked Gamble",
        "The Senses": "The Flesh Endurance", "The Pleasure": "The Threshold of Agony"
    };

    function updateGender(pIdx, g, btn) {
        state.players[pIdx].g = g;
        Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showStep(n) {
        document.querySelectorAll('[id^="step-"]').forEach(s => s.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if (n === 2) renderInventory();
    }

    function renderInventory() {
        const container = document.getElementById('inventory-editor');
        container.innerHTML = '<h2 style="color:var(--accent); text-align:center; font-size: 1.8rem;">ARSENAL VAULT</h2>';
        for (let cat in state.vault) {
            let section = document.createElement('div');
            section.className = 'box-section';
            let chips = state.vault[cat].map((item, idx) => `
                <span class="item-chip ${item.a ? '' : 'off'}" onclick="toggleItem('${cat}',${idx})">
                    ${item.n} <span class="tag">${item.t}</span>
                    <span class="remove-x" onclick="removeItem('${cat}',${idx}); event.stopPropagation()">×</span>
                </span>`).join('');
            section.innerHTML = `
                <span class="label">${cat}</span>
                <div>${chips}</div>
                <div style="display:grid; grid-template-columns: 2fr 1fr 80px; gap:12px; margin-top:15px;">
                    <input type="text" id="in-${cat.replace(/\s/g,'')}" placeholder="Add gear...">
                    <select id="tag-${cat.replace(/\s/g,'')}"><option value="U">U</option><option value="M">M</option><option value="F">F</option></select>
                    <button class="btn" style="padding:0; margin:0;" onclick="addItem('${cat}')">ADD</button>
                </div>`;
            container.appendChild(section);
        }
    }

    function toggleItem(cat, idx) { state.vault[cat][idx].a = !state.vault[cat][idx].a; renderInventory(); }
    function removeItem(cat, idx) { state.vault[cat].splice(idx, 1); renderInventory(); }
    function addItem(cat) {
        const id = cat.replace(/\s/g,'');
        const n = document.getElementById('in-'+id).value;
        const t = document.getElementById('tag-'+id).value;
        if(n) { state.vault[cat].push({n, a:true, t}); renderInventory(); }
    }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = parseInt(document.getElementById('round-total').value);
        state.players[0].hasYellow = true; state.players[1].hasRed = true;
        localStorage.setItem('sov_v7_hc', JSON.stringify(state.vault));
        showStep(3); renderGame();
    }

    function renderGame() {
        if(state.curr > state.total) return showStep(4);
        const dom = state.players.find(p => p.role === 'Master');
        document.getElementById('round-ui').innerText = `ROUND ${state.curr} / ${state.total}`;
        document.getElementById('master-toggle-label').innerText = `${dom.n.toUpperCase()}'S ARSENAL CONTROL`;

        state.players.forEach((p, i) => {
            document.getElementById('n'+i).innerText = p.n;
            document.getElementById('s'+i).innerText = p.score;
            document.getElementById('inv'+i).innerHTML = (p.hasYellow ? '🟡 ' : '') + (p.hasRed ? '🔴' : '');
        });

        const pm = document.getElementById('proto-mount'); pm.innerHTML = '';
        Object.keys(state.activeCats).forEach(catName => {
            pm.innerHTML += `<button class="tog-btn ${state.activeCats[catName]?'active':''}" onclick="state.activeCats['${catName}']=!state.activeCats['${catName}']; renderGame()">${catName}</button>`;
        });
    }

    function generate() {
        const ap = Object.keys(state.activeCats).filter(k => state.activeCats[k]);
        if(ap.length === 0) return alert("Master must enable at least one Category!");
        const catChoice = ap[Math.floor(Math.random()*ap.length)];
        const sub = state.players.find(p => p.role === 'Slave');
        const dom = state.players.find(p => p.role === 'Master');
        const items = state.vault[catChoice].filter(i => i.a && (i.t === 'U' || i.t === sub.g));
        if(items.length === 0) return alert(`${dom.n}, no gear for ${sub.g} in ${catChoice}!`);
        
        const item = items[Math.floor(Math.random()*items.length)];
        document.getElementById('decree-display').innerHTML = `<strong>${protoNames[catChoice]}</strong><br><br>${dom.n} shall apply <strong>${item.n}</strong> to ${sub.n}. Success results in a role swap.`;
        document.getElementById('game-controls').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
        document.getElementById('y-btn').classList.toggle('active-card', state.players.some(p => p.hasYellow));
        document.getElementById('r-btn').classList.toggle('active-card', state.players.some(p => p.hasRed));
    }

    function useYellow() { if(confirm("Swap roles?")) { state.players.forEach(p => p.role = p.role==='Master'?'Slave':'Master'); renderGame(); generate(); } }
    function useRed() { if(confirm("Reroll?")) { generate(); } }

    function resolve(res) {
        const s = state.players.find(p => p.role === 'Slave');
        const m = state.players.find(p => p.role === 'Master');
        if(res === 'success') { s.score++; state.players.forEach(p => p.role = p.role==='Master'?'Slave':'Master'); }
        else { m.score++; }
        state.curr++;
        document.getElementById('game-controls').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderGame();
    }
</script>
</body>
</html>
