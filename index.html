<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Fixed Inventory</title>
    <style>
        :root { --crimson: #8b0000; --gold: #d4af37; --bg: #0a0a0a; --safe: #2e7d32; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #111; border: 2px solid #333; padding: 20px; box-shadow: 0 0 30px #000; display: flex; flex-direction: column; min-height: 95vh; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--crimson); padding-bottom: 10px; margin-bottom: 20px; }
        .step { display: none; flex-grow: 1; }
        .active { display: flex; flex-direction: column; }
        
        /* IDENTITY CARDS */
        .identity-box { border: 2px solid var(--gold); padding: 15px; margin-bottom: 20px; background: #000; }
        .label-text { color: var(--gold); font-weight: bold; font-size: 0.8em; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input[type="text"], select { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: white; margin-bottom: 15px; font-family: inherit; box-sizing: border-box; font-size: 16px; }
        
        /* INVENTORY BOXES */
        .inv-box { background: #080808; padding: 15px; border: 1px solid #333; margin-bottom: 15px; border-left: 4px solid var(--crimson); }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group input { margin-bottom: 0; flex-grow: 1; }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; height: 45px; }
        
        /* ITEM TAGS */
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; min-height: 20px; }
        .tag { background: #1a1a1a; border: 1px solid var(--gold); padding: 5px 12px; font-size: 0.8em; color: #fff; border-radius: 20px; display: flex; align-items: center; gap: 10px; }
        .tag-x { color: var(--crimson); font-weight: bold; cursor: pointer; font-size: 1.2em; }

        .btn { background: var(--crimson); color: white; border: 1px solid var(--gold); padding: 18px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
        .panic-btn { background: var(--safe); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .timer-val { font-size: 5em; color: #ff0000; text-align: center; margin: 20px 0; font-family: Impact, sans-serif; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="color:var(--gold)">SESSION PAUSED</h2>
    <button class="btn" onclick="closePanic()" style="background:var(--safe); width: 220px;">RESUME SESSION</button>
</div>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <div class="identity-box">
            <span class="label-text">Submissive Player</span>
            <input type="text" id="p1Name" placeholder="Name/Alias">
            <span class="label-text">Body Type Selection</span>
            <select id="p1Gen">
                <option value="Male Body">Male Body</option>
                <option value="Female Body">Female Body</option>
                <option value="Neutral/Other">Neutral / Other</option>
            </select>
        </div>
        <div class="identity-box">
            <span class="label-text">Master Player</span>
            <input type="text" id="p2Name" placeholder="Name/Alias">
            <span class="label-text">Body Type Selection</span>
            <select id="p2Gen">
                <option value="Male Body">Male Body</option>
                <option value="Female Body">Female Body</option>
                <option value="Neutral/Other">Neutral / Other</option>
            </select>
        </div>
        <button class="btn" onclick="toStep(2)">Setup Inventory ></button>
    </div>

    <div id="step2" class="step">
        <div class="inv-box">
            <span class="label-text">1. Bondage (Ropes/Cuffs)</span>
            <div class="input-group">
                <input type="text" id="inBond" placeholder="Add gear...">
                <button class="add-btn" onclick="processAdd('bondage')">ADD</button>
            </div>
            <div id="tagsBondage" class="tag-container"></div>
        </div>

        <div class="inv-box">
            <span class="label-text">2. Sensory (Blindfolds/Gags)</span>
            <div class="input-group">
                <input type="text" id="inSens" placeholder="Add gear...">
                <button class="add-btn" onclick="processAdd('sensory')">ADD</button>
            </div>
            <div id="tagsSensory" class="tag-container"></div>
        </div>

        <div class="inv-box">
            <span class="label-text">3. Toys (Impact/Stim)</span>
            <div class="input-group">
                <input type="text" id="inToys" placeholder="Add gear...">
                <button class="add-btn" onclick="processAdd('toys')">ADD</button>
            </div>
            <div id="tagsToys" class="tag-container"></div>
        </div>

        <button class="btn" onclick="toStep(3)">Lock System ></button>
        <button class="btn" style="background:#222; border:none;" onclick="toStep(1)">Back</button>
    </div>

    <div id="step3" class="step">
        <div id="prepUI">
            <span class="label-text">Manual Activity Selection</span>
            <select id="modePick">
                <option value="Random">-- Randomized --</option>
                <option value="Escape">Escape Challenge</option>
                <option value="Shibari">Shibari (Artistic)</option>
                <option value="Truth or Dare">Truth or Dare</option>
                <option value="Mind Fuck">Mind Fuck</option>
            </select>
            <div id="taskDisplay" style="background:#000; padding:20px; border-left:4px solid var(--crimson); margin:15px 0; line-height:1.6;">
                Ready to synthesize.
            </div>
            <button class="btn" id="genBtn" onclick="generate()">Synthesize Round</button>
            <button class="btn" id="startBtn" style="display:none;" onclick="beginClock()">Start Timer</button>
        </div>

        <div id="playUI" style="display:none;">
            <div class="timer-val" id="timeDisp">00:00</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="finish(true)">SUCCESS</button>
                <button class="btn" style="background:#222" onclick="finish(false)">FAIL</button>
            </div>
        </div>
        <button class="panic-btn" onclick="panic()">!!! SAFE WORD !!!</button>
    </div>
</div>

<script>
    let inventory = { bondage: [], sensory: [], toys: [] };
    let players = [], subIdx = 0, ticker, secs;

    function toStep(s) {
        if(s === 2) {
            players = [
                { name: document.getElementById('p1Name').value || "Sub", gen: document.getElementById('p1Gen').value },
                { name: document.getElementById('p2Name').value || "Dom", gen: document.getElementById('p2Gen').value }
            ];
        }
        if(s === 3 && inventory.bondage.length === 0) {
            alert("At least one item must be added to Bondage.");
            return;
        }
        document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    function processAdd(cat) {
        const inputId = cat === 'bondage' ? 'inBond' : cat === 'sensory' ? 'inSens' : 'inToys';
        const input = document.getElementById(inputId);
        const val = input.value.trim();
        
        if(val !== "") {
            inventory[cat].push(val);
            input.value = "";
            renderTags(cat);
        }
    }

    function renderTags(cat) {
        const containerId = 'tags' + cat.charAt(0).toUpperCase() + cat.slice(1);
        const container = document.getElementById(containerId);
        container.innerHTML = inventory[cat].map((item, idx) => `
            <div class="tag">${item} <span class="tag-x" onclick="removeTag('${cat}', ${idx})">×</span></div>
        `).join('');
    }

    function removeTag(cat, idx) {
        inventory[cat].splice(idx, 1);
        renderTags(cat);
    }

    function generate() {
        const pick = document.getElementById('modePick').value;
        const modes = ["Escape", "Shibari", "Truth or Dare", "Mind Fuck"];
        const mode = pick === "Random" ? modes[Math.floor(Math.random()*4)] : pick;
        const level = Math.floor(Math.random()*10)+1;
        
        const sub = players[subIdx];
        const dom = players[subIdx === 0 ? 1 : 0];
        
        const b = inventory.bondage[Math.floor(Math.random()*inventory.bondage.length)];
        const s = inventory.sensory.length ? inventory.sensory[Math.floor(Math.random()*inventory.sensory.length)] : "no blindfold";
        const t = inventory.toys.length ? inventory.toys[Math.floor(Math.random()*inventory.toys.length)] : "manual stimulation";

        let html = `<b style="color:var(--gold)">${mode.toUpperCase()} (LEVEL ${level})</b><br><br>`;
        html += `<b>SETUP:</b> ${dom.name} secures ${sub.name} (${sub.gen}) using <b>${b}</b>. `;

        if(mode === "Escape") { 
            html += `<br><br><b>TASK:</b> ${sub.name} must free themselves before time expires.`; 
            secs = (level * 45) + 60; 
        } else if(mode === "Shibari") { 
            html += `<br><br><b>TASK:</b> Focus on aesthetic and tension. Spend the full duration creating an elaborate pattern.`; 
            secs = 300; 
        } else if(mode === "Truth or Dare") { 
            html += `<br><br><b>TASK:</b> Master asks Truth or Dare. Failure results in penalty with <b>${t}</b>.`; 
            secs = 180; 
        } else { 
            html += `<br><br><b>TASK:</b> Blind with <b>${s}</b>. Sub must solve mental puzzles while being distracted by <b>${t}</b>.`; 
            secs = 120; 
        }

        document.getElementById('taskDisplay').innerHTML = html;
        document.getElementById('genBtn').style.display = "none";
        document.getElementById('startBtn').style.display = "block";
    }

    function beginClock() {
        document.getElementById('prepUI').style.display = "none";
        document.getElementById('playUI').style.display = "block";
        ticker = setInterval(() => {
            secs--;
            let m = Math.floor(secs/60), s = secs%60;
            document.getElementById('timeDisp').innerText = `${m}:${s<10?'0':''}${s}`;
            if(secs <= 0) finish(false);
        }, 1000);
    }

    function finish(success) {
        clearInterval(ticker);
        if(success) { subIdx = (subIdx === 0 ? 1 : 0); alert("Roles Swapped!"); }
        document.getElementById('playUI').style.display = "none";
        document.getElementById('prepUI').style.display = "block";
        document.getElementById('genBtn').style.display = "block";
        document.getElementById('startBtn').style.display = "none";
    }

    function panic() { clearInterval(ticker); document.getElementById('overlay').style.display = "flex"; }
    function closePanic() { document.getElementById('overlay').style.display = "none"; finish(false); }
</script>
</body>
</html>
