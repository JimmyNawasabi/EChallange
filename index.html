<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Absolute Protocol Fix</title>
    <style>
        :root { --accent: #d4af37; --bg: #0a0a0a; --card: #161616; --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --warning: #b38f00; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); margin-bottom: 20px; }
        .box-section { background: #1f1f1f; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .gender-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        .g-btn { flex: 1; padding: 10px; background: #111; border: 1px solid #444; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn { background: var(--crimson); color: white; border: none; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 10px; margin-top: 5px; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .tog-btn { padding: 10px; font-size: 0.65rem; border-radius: 6px; border: 1px solid #444; background: #111; color: #555; cursor: pointer; text-transform: uppercase; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1608; }
        .item-chip { display: inline-flex; align-items: center; background: #333; padding: 4px 10px; border-radius: 20px; margin: 3px; font-size: 0.8rem; border: 1px solid #444; }
        .item-chip.off { opacity: 0.4; text-decoration: line-through; }
        .remove-x { margin-left: 8px; color: var(--crimson); font-weight: bold; cursor: pointer; }
        .score-row { display: flex; justify-content: space-between; padding: 12px; background: #000; border-radius: 12px; border: 1px solid #222; text-align: center; margin-bottom: 15px; }
        .role-tag { font-size: 0.6rem; font-weight: bold; color: #444; }
        .master-glow { color: var(--accent) !important; text-shadow: 0 0 5px var(--accent); }
        .panic-btn { background: linear-gradient(45deg, #800, #f00) !important; border: 2px solid #fff !important; margin-top: 20px; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Initial Master</span>
            <input type="text" id="p0-name" placeholder="Name...">
            <div class="gender-grid"><button class="g-btn active" onclick="setG(0,'M',this)">Male</button><button class="g-btn" onclick="setG(0,'F',this)">Female</button><button class="g-btn" onclick="setG(0,'NB',this)">NB</button></div>
            <span class="label">Initial Slave</span>
            <input type="text" id="p1-name" placeholder="Name...">
            <div class="gender-grid"><button class="g-btn" onclick="setG(1,'M',this)">Male</button><button class="g-btn active" onclick="setG(1,'F',this)">Female</button><button class="g-btn" onclick="setG(1,'NB',this)">NB</button></div>
            <span class="label">Safeword</span>
            <input type="text" id="safeword-in" value="RED">
        </div>
        <button class="btn" onclick="showStep(2)">Next: Configure Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <h3 style="color:var(--accent); text-align:center; font-size:0.8rem;">ARSENAL PREPARATIONS</h3>
        <div id="inventory-editor"></div>
        <button class="btn" style="background:var(--success)" onclick="startSession()">Begin Protocol</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-ui" style="text-align:center; font-size:0.7rem; color:var(--accent); margin-bottom:10px;"></div>
        <div class="score-row">
            <div class="p-block"><div id="r0" class="role-tag">MASTER</div><div id="n0"></div><div id="s0" style="font-size:1.5rem;">0</div></div>
            <div class="p-block"><div id="r1" class="role-tag">SLAVE</div><div id="n1"></div><div id="s1" style="font-size:1.5rem;">0</div></div>
        </div>

        <div id="game-controls">
            <div class="box-section"><span class="label">Active Protocols</span><div class="toggle-grid" id="proto-mount"></div></div>
            <button class="btn" onclick="generate()">Command Decree</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-display" style="line-height:1.8; color:#ddd;"></div></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve('fail')">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve('success')">SUCCESS</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" style="background:var(--warning); color:black; flex:1; font-size:0.7rem;" onclick="triggerCard('YELLOW')">YELLOW CARD</button>
                <button class="btn" style="background:var(--crimson); flex:1; font-size:0.7rem;" onclick="triggerCard('RED')">RED CARD</button>
            </div>
            <button class="btn panic-btn" id="panic-label" onclick="triggerSafeword()">SAFEWORD</button>
        </div>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30, safeword: "RED",
        players: [{n:"", g:"M", role:"Master", score:0}, {n:"", g:"F", role:"Slave", score:0}],
        vault: JSON.parse(localStorage.getItem('sov_v22')) || {
            "Restraints": [ {n:"Rope", a:true}, {n:"Steel Cuffs", a:true} ],
            "Gags": [ {n:"Ball Gag", a:true}, {n:"Tape", a:true} ],
            "Blindfolds": [ {n:"Leather Blindfold", a:true}, {n:"Silk Scarf", a:true} ],
            "Sensory": [ {n:"Wartenberg Wheel", a:true}, {n:"Ice Cube", a:true} ],
            "Toys": [ {n:"Wand", a:true}, {n:"Glass Plug", a:true} ],
            "Impact": [ {n:"Flogger", a:true}, {n:"Cane", a:true} ]
        },
        protocols: {
            "The Solitary Bind": true, "The Wicked Gamble": true, "The Veiled Confession": true,
            "The Silk Labyrinth": true, "The Threshold of Agony": true, "The Flesh Endurance": true,
            "The Great Unshackling": true, "The Velvet Command": true
        }
    };

    const protoToCat = { "The Solitary Bind":"Restraints", "The Wicked Gamble":"Impact", "The Veiled Confession":"Gags", "The Silk Labyrinth":"Restraints", "The Threshold of Agony":"Toys", "The Flesh Endurance":"Restraints", "The Great Unshackling":"Restraints", "The Velvet Command":"Sensory" };

    function setG(i, v, b) { state.players[i].g = v; Array.from(b.parentElement.children).forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
    function showStep(n) { document.querySelectorAll('[id^="step-"]').forEach(s=>s.style.display='none'); document.getElementById('step-'+n).style.display='block'; if(n==2) renderInventory(); }

    function renderInventory() {
        const m = document.getElementById('inventory-editor'); m.innerHTML = '';
        for(let c in state.vault) {
            let h = `<div class="box-section"><span class="label">${c}</span><div>`;
            state.vault[c].forEach((it, i) => { h += `<span class="item-chip ${it.a?'':'off'}" onclick="toggleItem('${c}',${i})">${it.n} <span class="remove-x" onclick="removeItem('${c}',${i}); event.stopPropagation()">×</span></span>`; });
            h += `</div><div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="in-${c}" placeholder="Add..." style="margin:0;"><button class="tog-btn active" style="flex:0.3" onclick="addItem('${c}')">ADD</button></div></div>`;
            m.innerHTML += h;
        }
    }

    function toggleItem(c, i) { state.vault[c][i].a = !state.vault[c][i].a; renderInventory(); }
    function removeItem(c, i) { state.vault[c].splice(i, 1); renderInventory(); }
    function addItem(c) { const v = document.getElementById('in-'+c).value; if(v){ state.vault[c].push({n:v, a:true}); renderInventory(); } }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value || "Dom";
        state.players[1].n = document.getElementById('p1-name').value || "Sub";
        state.safeword = document.getElementById('safeword-in').value.toUpperCase() || "RED";
        localStorage.setItem('sov_v22', JSON.stringify(state.vault));
        document.getElementById('panic-label').innerText = `SAFEWORD: ${state.safeword}`;
        showStep(3);
        renderGame();
    }

    function renderGame() {
        document.getElementById('round-ui').innerText = `ROUND ${state.curr} / 30`;
        state.players.forEach((p, i) => {
            document.getElementById('n'+i).innerText = p.n;
            document.getElementById('s'+i).innerText = p.score;
            document.getElementById('r'+i).innerText = p.role;
            document.getElementById('r'+i).className = 'role-tag ' + (p.role==='Master'?'master-glow':'');
        });
        const pm = document.getElementById('proto-mount'); pm.innerHTML = '';
        for(let k in state.protocols) { pm.innerHTML += `<button class="tog-btn ${state.protocols[k]?'active':''}" onclick="state.protocols['${k}']=!state.protocols['${k}']; renderGame()">${k}</button>`; }
    }

    function triggerSafeword() {
        const subIdx = state.players.findIndex(p => p.role === 'Slave');
        state.players[subIdx].score = Math.max(0, state.players[subIdx].score - 5);
        alert(`PROTOCOL ABORTED: ${state.safeword} was called.\n${state.players[subIdx].n} penalized 5 points.\nRoles remain unchanged.`);
        document.getElementById('game-controls').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderGame();
    }

    function triggerCard(type) {
        if(type === 'YELLOW') {
            const subIdx = state.players.findIndex(p => p.role === 'Slave');
            state.players[subIdx].score = Math.max(0, state.players[subIdx].score - 1);
            alert("YELLOW CARD: Warning Issued. (-1 Point)");
        } else {
            alert("RED CARD: Critical Failure. Point awarded to Master.");
            resolve('fail');
        }
        renderGame();
    }

    function generate() {
        const ap = Object.keys(state.protocols).filter(k=>state.protocols[k]);
        if(!ap.length) return alert("Select a protocol.");
        const p = ap[Math.floor(Math.random()*ap.length)];
        const cat = protoToCat[p];
        const items = state.vault[cat].filter(i=>i.a);
        if(!items.length) return alert(`Enable at least one item in ${cat}`);
        const t = items[Math.floor(Math.random()*items.length)].n;
        const m = state.players.find(x=>x.role==='Master'), s = state.players.find(x=>x.role==='Slave');
        const pron = s.g==='M'?'his':(s.g==='F'?'her':'their');

        const prompts = {
            "The Solitary Bind": "{S}, take the {T} and bind your own wrists behind your back until restricted. Kneel and await {M}'s inspection.",
            "The Wicked Gamble": "{M} will use the {T} for 10 heavy impact strikes. {S} must remain silent or the count resets.",
            "The Veiled Confession": "With the {T} firmly gapping your mouth, {S}, you must whimper your deepest submission to {M}.",
            "The Silk Labyrinth": "{M} will bind {S} into an intricate, restrictive harness using the {T}. Focus on the aesthetic pressure.",
            "The Threshold of Agony": "{M} will use the {T} to edge {S} to the absolute brink. {S} is forbidden from climaxing.",
            "The Flesh Endurance": "{S} must hold a rigid stress position while supporting the weight of the {T}. Don't tremble.",
            "The Great Unshackling": "{M} secures {S} with the {T}. {S} has 2 minutes to struggle free or face a penalty.",
            "The Velvet Command": "{M} traces the {T} slowly across {S}'s most sensitive skin. {S} must describe every sensation."
        };

        document.getElementById('decree-display').innerHTML = `<strong>${p}</strong><br><br>` + prompts[p].replace(/{M}/g, m.n).replace(/{S}/g, s.n).replace(/{SP}/g, pron).replace(/{T}/g, `<strong>${t}</strong>`);
        document.getElementById('game-controls').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
    }

    function resolve(type) {
        if(type === 'success') {
            state.players.find(p=>p.role==='Slave').score++;
            state.players.forEach(p => p.role = p.role==='Master'?'Slave':'Master');
        } else {
            state.players.find(p=>p.role==='Master').score++;
        }
        state.curr++;
        document.getElementById('game-controls').style.display='block';
        document.getElementById('decree-view').style.display='none';
        renderGame();
    }
</script>
</body>
</html>
