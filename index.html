<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGNTY: The Master Architect</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #28a745; --gold: #ffd700;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 1000px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 10px 0; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .p-setup { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 2px; }
        
        /* INVENTORY & THEMES */
        .manager-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        .manager-box { background: #050505; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .inv-category, .theme-item { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; }
        
        .chip { padding: 4px 10px; background: #222; border-radius: 4px; font-size: 0.7rem; margin: 2px; display: inline-flex; align-items: center; gap: 5px; }
        .del-item { color: var(--crimson); cursor: pointer; font-weight: bold; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* PLAY STATE */
        #decree-text { background: #050505; padding: 30px; border-radius: 10px; border-left: 5px solid var(--gold); font-size: 1.2rem; line-height: 1.7; margin: 20px 0; }
        #timer { font-size: 5rem; color: var(--crimson); font-family: monospace; text-align: center; text-shadow: 0 0 20px rgba(208,0,0,0.3); }
        .btn-main { background: var(--accent); color: white; padding: 20px; width: 100%; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .btn-commence { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px;}
        
        .theme-active { border-color: var(--gold) !important; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-screen">
        <div class="setup-grid">
            <div class="p-setup">
                <span class="label">Dominant</span>
                <input type="text" id="name0" value="Master" placeholder="Name">
                <div class="gender-select">
                    <button class="gen-btn active" id="p0m" onclick="setGender(0,'M')">Male</button>
                    <button class="gen-btn" id="p0f" onclick="setGender(0,'F')">Female</button>
                </div>
            </div>
            <div class="p-setup">
                <span class="label">Submissive</span>
                <input type="text" id="name1" value="Slave" placeholder="Name">
                <div class="gender-select">
                    <button class="gen-btn" id="p1m" onclick="setGender(1,'M')">Male</button>
                    <button class="gen-btn active" id="p1f" onclick="setGender(1,'F')">Female</button>
                </div>
            </div>
        </div>

        <div class="manager-grid">
            <div class="manager-box">
                <span class="label">Arsenal (Physical Inventory)</span>
                <div id="inventory-list"></div>
            </div>

            <div class="manager-box">
                <span class="label">Decree Protocol Themes</span>
                <div id="theme-list"></div>
            </div>
        </div>

        <button class="btn-main" style="margin-top:20px;" onclick="startSession()">Initialize Sovereign Protocol</button>
    </div>

    <div id="play-screen" style="display:none;">
        <div id="round-disp" style="text-align:center; color:var(--accent); margin-bottom:10px; letter-spacing: 2px; font-weight: bold;"></div>
        <div style="display:flex; gap:15px; margin-bottom:20px;">
            <div id="box0" class="p-setup" style="flex:1; text-align:center; border: 1px solid var(--accent);">
                <span class="label">Dominant</span>
                <div id="disp-name0" style="font-size: 1.2rem;"></div>
                <div id="score0" style="color:var(--gold); font-size: 1.5rem;">0</div>
            </div>
            <div id="box1" class="p-setup" style="flex:1; text-align:center;">
                <span class="label">Submissive</span>
                <div id="disp-name1" style="font-size: 1.2rem;"></div>
                <div id="score1" style="color:var(--gold); font-size: 1.5rem;">0</div>
            </div>
        </div>

        <div id="command-center"><button class="btn-main" onclick="issueDecree()">Generate Decree</button></div>
        
        <div id="decree-panel" style="display:none;">
            <div id="timer">00:00</div>
            <button class="btn-commence" id="start-t-btn" onclick="startCountdown()">Commence Phase</button>
            <div id="decree-text"></div>
            <div id="post-commence" style="display:none; gap:10px;">
                <button class="btn-main" style="background:#1a1a1a; flex:1;" onclick="endRound(false)">Forfeit</button>
                <button class="btn-main" style="background:var(--success); flex:1;" onclick="endRound(true)">Success</button>
            </div>
        </div>
    </div>
</div>

<script>
const DEFAULT_INV = {
    "Restraints": ["Rope", "Handcuffs", "Ankle Cuffs", "Spreader Bar"],
    "Impact": ["Cane", "Paddle", "Flogger", "Slapper"],
    "Gags": ["Ball Gag", "Ring Gag", "Muzzle"],
    "Sensory": ["Wax", "Ice", "Wartenberg Wheel", "Feather"],
    "Ache": ["Clamps", "Weights", "Internal Plug"]
};

const THEME_MAP = {
    "Self Bondage": "The Solitary Bind",
    "Truth": "The Absolute Confession",
    "Dare": "The Sovereign Challenge",
    "Soft and Sexy": "Sensual Subjugation",
    "Escape": "The Great Liberation",
    "Shibari": "Artful Entwinement",
    "Physical Challenge": "Ordeal of Endurance",
    "Tease and Denial": "The Endless Threshold"
};

let state = {
    currRound: 1, lastTheme: "",
    p: [{name:"", gender:"M", score:0}, {name:"", gender:"F", score:0}],
    inv: JSON.parse(localStorage.getItem('sov_inv_v20')) || DEFAULT_INV,
    themes: JSON.parse(localStorage.getItem('sov_themes_v20')) || Object.keys(THEME_MAP).reduce((a,b)=> (a[b]=true,a), {}),
    timer: null
};

function saveAll() {
    localStorage.setItem('sov_inv_v20', JSON.stringify(state.inv));
    localStorage.setItem('sov_themes_v20', JSON.stringify(state.themes));
}

function renderUI() {
    const iList = document.getElementById('inventory-list');
    iList.innerHTML = '';
    Object.keys(state.inv).forEach(cat => {
        const div = document.createElement('div');
        div.className = 'inv-category';
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="font-size:0.7rem; color:var(--accent); font-weight:bold;">${cat.toUpperCase()}</span>
            </div>
            <div class="chip-container">${state.inv[cat].map((item, idx) => `
                <span class="chip">${item} <span class="del-item" onclick="removeItem('${cat}', ${idx})">×</span></span>
            `).join('')}</div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="add-${cat}" placeholder="Add..." style="flex:1; padding:4px; background:#000; border:1px solid #333; color:white; font-size:0.7rem;">
                <button onclick="addItem('${cat}')" style="background:var(--accent); color:white; border:none; padding:0 10px; cursor:pointer;">+</button>
            </div>
        `;
        iList.appendChild(div);
    });

    const tList = document.getElementById('theme-list');
    tList.innerHTML = '';
    Object.keys(THEME_MAP).forEach(key => {
        const div = document.createElement('div');
        div.className = `theme-item ${state.themes[key] ? 'theme-active' : ''}`;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold;">${THEME_MAP[key]}</span>
                <label class="switch">
                    <input type="checkbox" ${state.themes[key] ? 'checked' : ''} onchange="state.themes['${key}']=this.checked; saveAll(); renderUI();">
                    <span class="slider"></span>
                </label>
            </div>
        `;
        tList.appendChild(div);
    });
}

function addItem(cat) {
    const val = document.getElementById(`add-${cat}`).value;
    if(val) { state.inv[cat].push(val); saveAll(); renderUI(); }
}
function removeItem(cat, idx) { state.inv[cat].splice(idx, 1); saveAll(); renderUI(); }
function setGender(p, g) {
    state.p[p].gender = g;
    document.getElementById(`p${p}m`).classList.toggle('active', g==='M');
    document.getElementById(`p${p}f`).classList.toggle('active', g==='F');
}

function startSession() {
    state.p[0].name = document.getElementById('name0').value;
    state.p[1].name = document.getElementById('name1').value;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'block';
    refreshDisplay();
}

function refreshDisplay() {
    document.getElementById('round-disp').innerText = `PHASE ${state.currRound}`;
    document.getElementById('disp-name0').innerText = state.p[0].name.toUpperCase();
    document.getElementById('score0').innerText = state.p[0].score;
    document.getElementById('disp-name1').innerText = state.p[1].name.toUpperCase();
    document.getElementById('score1').innerText = state.p[1].score;
}

// PROCEDURAL DECREE ENGINE
function issueDecree() {
    const activeThemes = Object.keys(state.themes).filter(t => state.themes[t] && t !== state.lastTheme);
    const theme = activeThemes[Math.floor(Math.random() * activeThemes.length)];
    state.lastTheme = theme;

    const dom = state.p[0].name;
    const sub = state.p[1].name;
    const r = (arr) => arr[Math.floor(Math.random()*arr.length)];
    const tool = (cat) => state.inv[cat] ? r(state.inv[cat]) : "a chosen implement";
    
    let activity = "";
    let time = 600;

    switch(theme) {
        case "Self Bondage":
            activity = `${sub} is ordered to perform the <strong>Solitary Bind</strong>. Using <strong>${tool('Restraints')}</strong>, you must secure your own wrists to your ${r(['ankles', 'thighs', 'waist'])}. ${dom} will inspect the knots. If they are loose, you will receive ${r([5,10,15])} strikes of <strong>${tool('Impact')}</strong> as a reminder of your incompetence.`;
            time = 900;
            break;
        case "Truth":
            activity = `${dom} initiates the <strong>Absolute Confession</strong>. ${sub} will be placed in a ${r(['kneeling', 'standing', 'bent-over'])} position. You must answer 5 probing questions regarding your deepest ${r(['fantasies', 'insecurities', 'desires'])}. For every hesitation, <strong>${tool('Sensory')}</strong> will be applied to your ${r(['inner thighs', 'nipples', 'stomach'])}.`;
            time = 480;
            break;
        case "Dare":
            activity = `A <strong>Sovereign Challenge</strong> is issued. ${sub} must ${r(['crawl to the furthest room and back', 'recite a pledge of service while balancing on one leg', 'maintain a deep squat'])} while <strong>${tool('Ache')}</strong> is applied to your ${r(['chest', 'extremities'])}. If you fail, the timer resets.`;
            time = 300;
            break;
        case "Soft and Sexy":
            activity = `Enter <strong>Sensual Subjugation</strong>. ${dom} will use <strong>${tool('Sensory')}</strong> to trace lines across ${sub}'s ${r(['lips', 'neck', 'spine'])}. ${sub} is forbidden from moving or making a sound. You must focus entirely on the pleasure/pain threshold. If you gasp, <strong>${tool('Gags')}</strong> will be applied immediately.`;
            time = 600;
            break;
        case "Escape":
            activity = `The <strong>Great Liberation</strong> protocol. ${dom} will bind ${sub} tightly using <strong>${tool('Restraints')}</strong> in a ${r(['hogtie', 'frog-tie', 'chair-bind'])}. You have the duration of the timer to escape. If you fail to free yourself, you remain bound for the next round.`;
            time = 1200;
            break;
        case "Shibari":
            activity = `<strong>Artful Entwinement</strong>. ${dom} will use <strong>${tool('Restraints')}</strong> to create a ${r(['Diamond harness', 'Chest harness', 'Crotch rope'])} on ${sub}. ${sub} must remain a living statue, describing the feeling of the rope biting into their skin in poetic detail.`;
            time = 900;
            break;
        case "Physical Challenge":
            activity = `An <strong>Ordeal of Endurance</strong>. ${sub} must hold a ${r(['Plank', 'Wall-sit', 'High Kneel'])} while <strong>${tool('Impact')}</strong> is delivered to your ${r(['buttocks', 'back', 'thighs'])} at random intervals. Any collapse of form results in a failed round.`;
            time = 300;
            break;
        case "Tease and Denial":
            activity = `The <strong>Endless Threshold</strong>. ${dom} will bring ${sub} to the absolute brink of climax using ${r(['manual touch', 'vibration', tool('Sensory')])}. ${sub} must signal when they are 'Close'. ${dom} will then immediately stop and apply <strong>${tool('Impact')}</strong>. This cycle repeats until the timer expires.`;
            time = 720;
            break;
    }

    document.getElementById('decree-text').innerHTML = `<span style="color:var(--gold); font-weight:bold;">PROTOCOL: ${THEME_MAP[theme].toUpperCase()}</span><br><br>${activity}`;
    document.getElementById('timer').innerText = formatTime(time);
    state.activeTime = time;
    
    document.getElementById('command-center').style.display = 'none';
    document.getElementById('decree-panel').style.display = 'block';
    document.getElementById('post-commence').style.display = 'none';
    document.getElementById('start-t-btn').style.display = 'block';
}

function startCountdown() {
    document.getElementById('start-t-btn').style.display = 'none';
    document.getElementById('post-commence').style.display = 'flex';
    let t = state.activeTime;
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        t--; document.getElementById('timer').innerText = formatTime(t);
        if(t <= 0) { clearInterval(state.timer); alert("Phase Complete."); }
    }, 1000);
}

function endRound(win) {
    if(win) state.p[1].score++; else state.p[1].score--;
    state.currRound++;
    state.p.reverse();
    clearInterval(state.timer);
    document.getElementById('command-center').style.display = 'block';
    document.getElementById('decree-panel').style.display = 'none';
    refreshDisplay();
}

function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

renderUI();
</script>
</body>
</html>
