<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --off: #2a2a2a;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; 
            display: flex; justify-content: center;
        }

        .container { 
            max-width: 500px; width: 100%; background: var(--card); 
            padding: 30px; border-radius: 30px; border: 2px solid #333; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        
        .box-section { 
            background: #1f1f1f; padding: 20px; margin-bottom: 20px; 
            border-radius: 20px; border: 1px solid #333; 
        }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }

        input[type="text"], input[type="number"] { 
            width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; 
            background: #000; color: white; font-size: 1.1rem; box-sizing: border-box;
            margin-bottom: 15px;
        }

        .gender-select { display: flex; gap: 10px; margin-bottom: 5px; }
        .g-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; 
            background: #111; color: #666; cursor: pointer; text-align: center; 
            font-weight: bold; text-transform: uppercase; font-size: 0.8rem;
        }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { 
            background: var(--crimson); color: white; border: none; padding: 20px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; 
            border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px;
        }

        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag { background: #000; padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; border: 1px solid #333; color: #999; display: flex; align-items: center; gap: 8px; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }
        .del-x { color: rgba(255,255,255,0.4); font-weight: bold; font-size: 1.2rem; line-height: 1; padding: 2px 5px; }
        
        .add-row { display: flex; gap: 8px; margin-top: 5px; margin-bottom: 20px; }
        .add-row input { margin-bottom: 0; padding: 12px; font-size: 0.9rem; flex-grow: 1; }
        .add-btn { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.5rem; }

        .status-header { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-box { background: #000; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.75rem; border: 1px solid #444; flex: 1; }
        
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .t-btn { padding: 12px; border-radius: 12px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; text-align: center; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .t-btn.on { background: var(--accent); color: #000; border-color: var(--accent); }
        .t-btn.gear-on { background: var(--crimson); color: white; border-color: var(--crimson); }
        .master-all { grid-column: span 2; background: #222; color: var(--accent); border: 1px dashed var(--accent); margin-bottom: 5px; }
        
        .timer-big { font-size: 4rem; text-align: center; font-weight: bold; margin: 10px 0; }
        .instruction-highlight { color: var(--accent); font-weight: bold; }
        .step { display: none; }
        .active { display: block !important; }

        .card-action-btn { font-size: 0.65rem; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        
        #extend-prompt { background: #d4af37; color: #000; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 0.8rem; display: none; }
        
        .veto-btn { background: #444; color: #fff; border: 1px solid #666; font-size: 0.6rem; padding: 5px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="step1" class="step active">
        <div class="box-section">
            <span class="label">Primary Participant (Master)</span>
            <input type="text" id="p1_n" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn active" id="p1m" onclick="setGender(1,'M')">Male</div>
                <div class="g-btn" id="p1f" onclick="setGender(1,'F')">Female</div>
                <div class="g-btn" id="p1n" onclick="setGender(1,'NB')">NB</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Secondary Participant (Subject)</span>
            <input type="text" id="p2_n" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn" id="p2m" onclick="setGender(2,'M')">Male</div>
                <div class="g-btn active" id="p2f" onclick="setGender(2,'F')">Female</div>
                <div class="g-btn" id="p2n" onclick="setGender(2,'NB')">NB</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Safe Word</span>
            <input type="text" id="safe_word_input" value="RED LIGHT">
        </div>
        <div class="box-section">
            <span class="label">Rounds</span>
            <input type="number" id="max_r" value="10">
        </div>
        <button class="btn" onclick="nav(2)">Access the Arsenal</button>
    </div>

    <div id="step2" class="step">
        <div class="box-section" id="vault-inject"></div>
        <button class="btn" onclick="nav(3)">Lock Arsenal & Begin</button>
    </div>

    <div id="step3" class="step">
        <div class="status-header">
            <div class="stat-box" id="disp-round">ROUND: 1</div>
            <div class="stat-box" id="disp-remain">REMAINING: 9</div>
        </div>

        <div id="extend-prompt">
            PROTOCOL NEARLY COMPLETE. EXTEND SESSION?<br>
            <button onclick="extendGame()" style="margin-top:10px; padding:5px 10px; cursor:pointer;">+5 Rounds</button>
        </div>

        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center;">PROTOCOL INITIATED</div>
            <div class="box-section">
                <span class="label">Categories</span>
                <div class="toggle-grid" id="trial-toggles"></div>
            </div>
            <div class="box-section">
                <span class="label">Gear System</span>
                <div class="toggle-grid" id="gear-toggles"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Generate Decree</button>
        </div>

        <div id="active-round" style="display:none;">
            <button class="veto-btn" onclick="vetoCurrent()">⚠ VETO & REMOVE CHALLENGE FROM ENGINE</button>
            <div class="box-section" style="min-height: 250px; display: flex; align-items: center; justify-content: center; font-size: 1rem; line-height: 1.5; padding: 25px;">
                <div id="active-trial-text" style="text-align:left;"></div>
            </div>
            <div class="timer-big" id="clock">00:00</div>
            
            <div class="toggle-grid">
                <button class="card-action-btn" id="btn-y-use" onclick="passCard('yellow')">Play Yellow Card</button>
                <button class="card-action-btn" id="btn-r-use" onclick="passCard('red')">Play Red Card</button>
            </div>

            <button class="btn" style="background:#1e4d2b; margin-top:15px;" onclick="finish(true)">Complete</button>
            <button class="btn" style="background:#2a2a2a; margin-top:10px; color:#aaa;" onclick="finish(false)">Fail / Skip</button>
            <button class="btn" style="background:transparent; border: 1px solid #400; color:#600; margin-top:20px; font-size:0.7rem;" onclick="triggerSafeWord()">[ ACTIVATE SAFE WORD ]</button>
        </div>
    </div>
</div>

<script>
    let players = [{n:"", g:"M", s:0}, {n:"", g:"F", s:0}], curR = 1, maxR = 10, masterIdx = 0, timer, timeLeft;
    let cards = { yellow: 0, red: 1 }, safeWord = "RED LIGHT";
    let currentCategoryRef = null, currentDecreeIdx = -1;
    
    function setGender(p, g) {
        players[p-1].g = g;
        const group = (p === 1) ? ['p1m','p1f','p1n'] : ['p2m','p2f','p2n'];
        group.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(`p${p}${g.toLowerCase()}`).classList.add('active');
    }

    const trials = [
        { n: "The Solitary Bind", t: 600, on: true, d: [
            "Force the subject into a kneeling position. Use [REST] to bind the right ankle to the right wrist tightly, then pull the left arm behind the back and secure it to the left ankle. Apply [VIS] and ensure no light can penetrate.",
            "Instruct the subject to lie face down. Cross their ankles and bind them together with [REST], then pull the rope upward and secure it to a [REST] collar around their neck. Apply [GAG] to prevent all speech."
        ] },
        { n: "Naked Confessions", t: 450, on: true, d: [
            "Apply [VIS] to the subject. While they are blind, use [SENS] to trace circles around their most sensitive areas. They must recount a secret fantasy in graphic detail; if they stop talking, increase the intensity of [SENS].",
            "Place the subject in a chair with arms bound to the sides with [REST]. Master will use [SENS] on the inner thighs. Subject must rate their arousal from 1-10 every 30 seconds while explaining why they deserve the stimulation."
        ] },
        { n: "Reckless Abandon", t: 450, on: true, d: [
            "Bind the subject's hands together over their head using [REST]. Master will apply [SENS] to the torso and ribs rhythmically. Subject must maintain total silence; any sound results in [GAG] being applied for the remainder of the round.",
            "Spread the subject's legs and secure each ankle to a heavy object using [REST]. Apply [GAG] and [VIS]. Master will walk around the subject, applying [SENS] at random intervals to unexpected locations."
        ] },
        { n: "Desperate Liberation", t: 720, on: true, d: [
            "Tie the subject's wrists together behind their back with a complex series of knots using [REST]. Apply [VIS]. The subject has the duration of the timer to untie themselves using only touch and friction. Master may use [SENS] to distract them.",
            "Secure a harness around the subject's chest and arms using [REST]. Apply [GAG]. Subject must attempt to wriggle out of the binding while keeping their knees pressed together. If they fail before the timer, they remain bound into the next round."
        ] },
        { n: "The Crucible of Flesh", t: 600, on: true, d: [
            "Subject must maintain a deep squat. Master will place [REST] around the subject's thighs to keep them at a specific width. Apply [VIS]. Subject must stay perfectly still while Master uses [SENS] on the back of the neck and ears.",
            "Place the subject in a plank position. Secure their wrists together with [REST] so they must balance on their elbows. Apply [GAG]. If their knees touch the floor, Master applies [SENS] to the calves for 30 seconds as a penalty."
        ] },
        { n: "The Edge of Ruin", t: 900, on: true, d: [
            "Master uses [SENS] to bring the subject to the absolute brink of climax. Once there, Master must immediately apply [GAG] and [REST] to the subject's hands to prevent them from touching themselves, forcing a cold 'ruined' state.",
            "Subject must perform self-stimulation while Master watches. Master will hold [VIS] and [GAG] ready. At Master's command, the subject must stop instantly and allow Master to apply the gear, remaining frozen and denied."
        ] },
        { n: "Silken Geometry", t: 1200, on: true, d: [
            "Master will create a decorative web across the subject's chest using [REST], ensuring the rope is tight enough to indent the skin. Once secured, apply [VIS] and leave the subject to feel the weight and restriction of the pattern.",
            "Master ties the subject's legs in a lotus position using [REST], then secures the arms in a 'hug' position around the shins. Apply [GAG] and [SENS] to the soles of the feet for the final 2 minutes of the round."
        ] },
        { n: "Velvet Surrender", t: 600, on: true, d: [
            "Master places the subject in a comfortable reclining position. Apply [VIS] and [REST] loosely to the wrists. Master will slowly use [SENS] to explore the subject's entire body, focusing on areas usually ignored. Subject must remain limp and passive.",
            "Apply a soft [GAG]. Master will use [SENS] to trace the subject's lips and jawline. Subject must follow Master's movements blindly, showing total submission to the touch without moving their limbs."
        ] }
    ];

    let gearCats = { "Blindfolds": true, "Gags": true, "Restraints": true, "Sensation": true };
    let vault = {
        "Blindfolds": [{n:"Sleep Mask", on:true}, {n:"Scarf", on:true}],
        "Gags": [{n:"Ball Gag", on:true}, {n:"Tape", on:true}],
        "Restraints": [{n:"Rope", on:true}, {n:"Cuffs", on:true}],
        "Sensation": [{n:"Feather", on:true}, {n:"Whip", on:true}]
    };

    function nav(n) {
        if(n === 2) {
            players[0].n = document.getElementById('p1_n').value || "Player 1";
            players[1].n = document.getElementById('p2_n').value || "Player 2";
            maxR = parseInt(document.getElementById('max_r').value) || 10;
            safeWord = document.getElementById('safe_word_input').value || "RED LIGHT";
            cards.yellow = Math.floor(Math.random() * 2);
            cards.red = Math.floor(Math.random() * 2);
            renderVault();
        }
        if(n === 3) renderCommand();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function renderVault() {
        const v = document.getElementById('vault-inject');
        v.innerHTML = '<span class="label">Inventory & Arsenal</span>';
        for (let c in vault) {
            const section = document.createElement('div');
            section.innerHTML = `<span class="label" style="color:#666; margin-top:10px;">${c}</span>`;
            const cloud = document.createElement('div');
            cloud.className = 'tag-cloud';
            vault[c].forEach((item, idx) => {
                const tag = document.createElement('div');
                tag.className = `tag ${item.on ? 'on' : ''}`;
                tag.innerHTML = `${item.n} <span class="del-x" onclick="event.stopPropagation(); deleteItem('${c}', ${idx})">×</span>`;
                tag.onclick = () => { item.on = !item.on; renderVault(); };
                cloud.appendChild(tag);
            });
            section.appendChild(cloud);
            const addRow = document.createElement('div');
            addRow.className = 'add-row';
            addRow.innerHTML = `<input type="text" id="in-${c}" placeholder="New ${c}..." onkeydown="if(event.key==='Enter') addItem('${c}')"><button class="add-btn" onclick="addItem('${c}')">+</button>`;
            section.appendChild(addRow);
            v.appendChild(section);
        }
    }

    function addItem(cat) {
        const input = document.getElementById(`in-${cat}`);
        const val = input.value.trim();
        if(val) { vault[cat].push({n: val, on: true}); renderVault(); }
    }

    function deleteItem(cat, idx) { vault[cat].splice(idx, 1); renderVault(); }

    function updateStatus() {
        document.getElementById('disp-round').innerText = `ROUND: ${curR}`;
        document.getElementById('disp-remain').innerText = `REMAINING: ${maxR - curR}`;
        document.getElementById('extend-prompt').style.display = (maxR - curR === 1) ? 'block' : 'none';
        document.getElementById('btn-y-use').style.opacity = (cards.yellow === masterIdx) ? "1" : "0.3";
        document.getElementById('btn-r-use').style.opacity = (cards.red === masterIdx) ? "1" : "0.3";
    }

    function extendGame() {
        maxR += 5;
        updateStatus();
        alert("PROTOCOL EXTENDED BY 5 ROUNDS.");
    }

    function vetoCurrent() {
        if(currentCategoryRef && currentDecreeIdx !== -1) {
            currentCategoryRef.d.splice(currentDecreeIdx, 1);
            alert("CHALLENGE VETOED AND PERMANENTLY REMOVED FROM ENGINE.");
            generateDecree();
        }
    }

    function passCard(type) {
        if(cards[type] !== masterIdx) return;
        cards[type] = (cards[type] === 0 ? 1 : 0);
        alert(`${type.toUpperCase()} Card used and passed.`);
        updateStatus();
    }

    function triggerSafeWord() {
        let p = players[masterIdx === 0 ? 1 : 0]; 
        if(p.s >= 5) p.s -= 5; else p.s = 0;
        alert(`SAFE WORD: ${safeWord} ACTIVATED.`);
        finish(false);
    }

    function renderCommand() {
        document.getElementById('round-header').innerText = `MASTER: ${players[masterIdx].n}`;
        updateStatus();
        const tg = document.getElementById('trial-toggles');
        tg.innerHTML = '<button class="t-btn master-all" onclick="toggleAll()">All Categories</button>';
        trials.forEach(t => {
            const b = document.createElement('button');
            b.className = `t-btn ${t.on ? 'on' : ''}`;
            b.innerText = t.n;
            b.onclick = () => { t.on = !t.on; b.classList.toggle('on'); };
            tg.appendChild(b);
        });
        const gg = document.getElementById('gear-toggles');
        gg.innerHTML = '';
        for (let g in gearCats) {
            const b = document.createElement('button');
            b.className = `t-btn ${gearCats[g] ? 'gear-on' : ''}`;
            b.innerText = g;
            b.onclick = () => { gearCats[g] = !gearCats[g]; b.classList.toggle('gear-on'); };
            gg.appendChild(b);
        }
    }

    function toggleAll() {
        const anyOn = trials.some(t => t.on);
        trials.forEach(t => t.on = !anyOn);
        renderCommand();
    }

    function generateDecree() {
        const act = trials.filter(t => t.on && t.d.length > 0);
        if (!act.length) { alert("No valid challenges left in engine."); return; }
        
        currentCategoryRef = act[Math.floor(Math.random() * act.length)];
        currentDecreeIdx = Math.floor(Math.random() * currentCategoryRef.d.length);
        
        let txt = currentCategoryRef.d[currentDecreeIdx];
        const repl = (cat) => {
            const items = vault[cat].filter(i => i.on);
            const val = items.length ? items[Math.floor(Math.random() * items.length)].n : cat;
            return gearCats[cat] ? `<span class="instruction-highlight">${val}</span>` : `[${cat} Off]`;
        };
        txt = txt.replace(/\[REST\]/g, repl('Restraints')).replace(/\[SENS\]/g, repl('Sensation')).replace(/\[VIS\]/g, repl('Blindfolds')).replace(/\[GAG\]/g, repl('Gags'));
        document.getElementById('active-trial-text').innerHTML = `<strong>${currentCategoryRef.n.toUpperCase()}</strong><br><br>${txt}`;
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        updateStatus();
        timeLeft = currentCategoryRef.t; runClock();
    }

    function runClock() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft<=0) finish(false);
        }, 1000);
    }

    function finish(win) {
        clearInterval(timer);
        if(win) players[masterIdx === 0 ? 1 : 0].s += 1;
        if(curR >= maxR) { runFinale(); } else {
            curR++; masterIdx = (masterIdx === 0 ? 1 : 0);
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('active-round').style.display = 'none';
            renderCommand();
        }
    }

    function runFinale() {
        let winner = players[0].s >= players[1].s ? players[0] : players[1];
        let loser = winner === players[0] ? players[1] : players[0];
        document.getElementById('active-round').style.display = 'block';
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('clock').style.display = 'none';
        document.getElementById('extend-prompt').style.display = 'none';
        document.querySelector('.veto-btn').style.display = 'none';
        document.querySelectorAll('.card-action-btn').forEach(b => b.style.display = 'none');
        
        document.getElementById('active-trial-text').innerHTML = `
            <h2 style="color:var(--accent)">PROTOCOL COMPLETE</h2>
            <div class="box-section" style="border-color:var(--accent);">
                <p><strong>SURPRISE REVEAL:</strong></p>
                <p>${winner.n}: ${winner.s} Points</p>
                <p>${loser.n}: ${loser.s} Points</p>
                <hr style="border:0; border-top:1px solid #333;">
                <p>WINNER: <span class="instruction-highlight">${winner.n}</span></p>
            </div>
            <p class="instruction-highlight">ULTIMATE DECREE FOR ${loser.n}:</p>
            <p style="font-size: 0.9rem;">The session concludes with total surrender. ${winner.n} will now meticulously apply [REST] to bind the subject's limbs together in a tight 'hogtie' configuration. Apply [GAG] and [VIS] so the subject is completely deprived. ${winner.n} will then use every available [SENS] tool to tease ${loser.n} to the edge of ruin multiple times. The subject is forbidden from climax until ${winner.n} has achieved their own sexual release and grants final permission.</p>
            <button class="btn" onclick="location.reload()">Terminate Session</button>
        `;
    }
</script>
</body>
</html>
