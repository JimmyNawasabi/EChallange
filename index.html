<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Gendered Protocol</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #008000; --gold: #ffd700;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 0.85rem; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 20px; border-radius: 20px; border: 3px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 15px 0;}
        
        .box-section { background: #000; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; position: relative; }
        .label { font-size: 0.8rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 2px; }
        
        input, select { width: 100%; padding: 10px; border: 1px solid var(--accent); border-radius: 4px; background: #000; color: white; font-size: 1rem; box-sizing: border-box; }
        
        /* Gender Toggles */
        .tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .tog-btn { padding: 10px; border: 1px solid #333; background: #000; color: #555; cursor: pointer; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; text-align: center; }
        .tog-btn.active { border-color: var(--accent); color: #FFF; background: #001a35; }

        /* Arsenal Management */
        .arsenal-cat { margin-bottom: 20px; border-left: 3px solid #222; padding-left: 15px; }
        .item-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .item-chip { padding: 6px 14px; border: 1px solid #333; background: #0a0a0a; color: #555; cursor: pointer; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; transition: all 0.2s; }
        .item-chip.active { border-color: var(--accent); color: #fff; background: #001a35; box-shadow: 0 0 5px var(--accent); }
        
        .add-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn-add { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 0 15px; cursor: pointer; border-radius: 4px; }

        .btn { background: var(--accent); color: white; border: 1px solid #FFF; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 8px; font-size: 0.9rem; margin-top: 10px; }
        .btn:hover { background: #004494; box-shadow: 0 0 15px var(--accent); }
        
        .score-row { display: flex; justify-content: space-between; padding: 15px; background: #0a0a0a; border: 1px solid var(--accent); border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .p-score { font-size: 2.5rem; font-weight: 200; color: var(--accent); }
        
        #timer-box { font-size: 3.5rem; font-weight: 100; color: var(--crimson); text-align: center; letter-spacing: 5px; }
        #decree-text { font-size: 1.1rem; line-height: 1.7; color: #ccc; }
        .grand-display { border: 2px solid var(--gold); padding: 25px; background: #050500; display: none; }
        .purge-btn { position: absolute; right: 15px; top: 15px; background: none; border: 1px solid var(--crimson); color: var(--crimson); font-size: 0.6rem; padding: 2px 5px; cursor: pointer; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-view">
        <div class="box-section">
            <span class="label">Primary Authority</span>
            <input type="text" id="p0-name" value="Master">
            <div class="tog-grid">
                <button id="p0-m" class="tog-btn active" onclick="setGender(0,'M')">Male</button>
                <button id="p0-f" class="tog-btn" onclick="setGender(0,'F')">Female</button>
            </div>
            <br>
            <span class="label">Subject Participant</span>
            <input type="text" id="p1-name" value="Slave">
            <div class="tog-grid">
                <button id="p1-m" class="tog-btn" onclick="setGender(1,'M')">Male</button>
                <button id="p1-f" class="tog-btn active" onclick="setGender(1,'F')">Female</button>
            </div>
            <br>
            <span class="label">Total Rounds: <input type="number" id="max-rounds" value="10" style="width: 70px; display:inline;"></span>
        </div>

        <div class="box-section">
            <button class="purge-btn" onclick="purgeMemory()">Purge Memory</button>
            <span class="label">Arsenal Configuration</span>
            <div id="arsenal-container"></div>
        </div>
        
        <button class="btn" onclick="beginSession()">Initialize Protocol</button>
    </div>

    <div id="game-view" style="display:none;">
        <div id="round-header" style="text-align:center; color:var(--accent); letter-spacing: 3px; margin-bottom: 10px;"></div>
        <div class="score-row">
            <div style="flex:1;"><div class="label">DOMINANT</div><div id="dom-display" style="font-size:1.1rem;"></div></div>
            <div style="flex:1;"><div class="label">SUBMISSIVE</div><div id="sub-display" style="font-size:1.1rem;"></div><div id="sub-score" class="p-score">0</div></div>
        </div>
        
        <div id="action-panel">
            <button class="btn" onclick="generateDecree()">Issue Decree</button>
        </div>

        <div id="decree-active" style="display:none;">
            <div id="timer-box">00:00</div>
            <div class="box-section"><div id="decree-text"></div></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#1a1a1a; flex:1;" onclick="finalize(false)">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="finalize(true)">SUCCESS</button>
            </div>
        </div>
    </div>

    <div id="grand-view" class="grand-display">
        <h1 style="color:var(--gold); border:none;">GRAND DECREE</h1>
        <p id="winner-announcement" style="font-size:1.3rem; color: #fff;"></p>
        <div id="grand-options" style="text-align:left;"></div>
    </div>
</div>

<script>
const DEFAULT_HARDWARE = {
    "The Quietude": ["Ball Gag", "Ring Gag", "Medical Tape"],
    "The Stillness": ["Hogtie Rope", "Steel Cuffs", "Spreader Bar"],
    "The Shadows": ["Leather Hood", "Silk Scarf", "Blindfold"],
    "The Percussion": ["Heavy Flogger", "Cane", "Glass Paddle"],
    "The Intrusion": ["Anal Plug", "Vibrator", "Internal Probe"],
    "The Nuance": ["Ice Cubes", "Clothespins", "Hot Wax"]
};

let state = {
    round: 1, total: 10, timer: null,
    players: [{n:"", role:"Master", score:0, g:"M"}, {n:"", role:"Slave", score:0, g:"F"}],
    hardware: JSON.parse(localStorage.getItem('sov_hardware')) || DEFAULT_HARDWARE,
    activeSelection: {}, 
    db: {
        "The Quietude": ["{sub} is to be effectively silenced. {dom} will apply {item} and ensure a perfect seal for the remainder of this phase."],
        "The Stillness": ["{sub} must be rendered immobile. {dom} will execute a strict bind using {item}. Any struggle is noted and punished."],
        "The Shadows": ["{sub} is to be deprived of sight. {dom} will apply {item}. In the darkness, {sub} must identify three different sensations from The Nuance."],
        "The Percussion": ["{sub} will receive 20 calculated strikes from {item}. {dom} decides the rhythm. Absolute stillness is required."],
        "The Intrusion": ["{sub} is to accept {item} internally. Once placed, {dom} will focus on The Nuance until the timer expires."],
        "The Nuance": ["{dom} will use {item} to explore {sub}'s most sensitive zones. You must remain silent or face The Percussion."],
        "The Infinite Ache": ["Strict Denial. {dom} will use {item:The Intrusion} to bring {sub} to the edge 3 times. {item:The Percussion} is used to reset the urge. No climax."],
        "Self-Bondage": ["{sub} must use {item:The Stillness} to lock their own ankles and {item:The Quietude} to silence themselves before presenting to {dom}."]
    }
};

function init() {
    const container = document.getElementById('arsenal-container');
    Object.keys(state.hardware).forEach(cat => {
        state.activeSelection[cat] = [...state.hardware[cat]];
        let section = document.createElement('div');
        section.className = 'arsenal-cat';
        section.id = `cat-${cat.replace(/\s/g, '')}`;
        renderCategory(cat, section);
        container.appendChild(section);
    });
}

function renderCategory(cat, element) {
    element.innerHTML = `<span class="label">${cat}</span><div class="item-grid">${state.hardware[cat].map(item => `<div class="item-chip ${state.activeSelection[cat].includes(item) ? 'active' : ''}" onclick="toggleItem('${cat}', '${item}')">${item}</div>`).join('')}</div><div class="add-row"><input type="text" id="input-${cat.replace(/\s/g, '')}" placeholder="Add..."><button class="btn-add" onclick="addItem('${cat}')">+</button></div>`;
}

function toggleItem(cat, item) {
    const index = state.activeSelection[cat].indexOf(item);
    if (index > -1) state.activeSelection[cat].splice(index, 1);
    else state.activeSelection[cat].push(item);
    renderCategory(cat, document.getElementById(`cat-${cat.replace(/\s/g, '')}`));
}

function addItem(cat) {
    const input = document.getElementById(`input-${cat.replace(/\s/g, '')}`);
    const val = input.value.trim();
    if (val && !state.hardware[cat].includes(val)) {
        state.hardware[cat].push(val); state.activeSelection[cat].push(val);
        localStorage.setItem('sov_hardware', JSON.stringify(state.hardware));
        renderCategory(cat, document.getElementById(`cat-${cat.replace(/\s/g, '')}`));
        input.value = '';
    }
}

function setGender(p, g) {
    state.players[p].g = g;
    document.getElementById(`p${p}-m`).classList.toggle('active', g === 'M');
    document.getElementById(`p${p}-f`).classList.toggle('active', g === 'F');
}

function purgeMemory() { if (confirm("Reset Arsenal?")) { localStorage.removeItem('sov_hardware'); location.reload(); } }

function beginSession() {
    state.players[0].n = document.getElementById('p0-name').value;
    state.players[1].n = document.getElementById('p1-name').value;
    state.total = parseInt(document.getElementById('max-rounds').value);
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('game-view').style.display = 'block';
    renderUI();
}

function renderUI() {
    const dom = state.players.find(p => p.role === "Master");
    const sub = state.players.find(p => p.role === "Slave");
    document.getElementById('round-header').innerText = `PHASE: ${state.round} / ${state.total}`;
    document.getElementById('dom-display').innerText = dom.n.toUpperCase();
    document.getElementById('sub-display').innerText = sub.n.toUpperCase();
    document.getElementById('sub-score').innerText = sub.score;
}

function generateDecree() {
    const cats = Object.keys(state.db);
    const cat = cats[Math.floor(Math.random() * cats.length)];
    const dom = state.players.find(p => p.role === "Master");
    const sub = state.players.find(p => p.role === "Slave");
    
    let text = state.db[cat][0].replace(/{item(?::([^}]+))?}/g, (match, spec) => {
        const pool = state.activeSelection[spec || cat] || ["tool"];
        return `<strong>${pool[Math.floor(Math.random() * pool.length)]}</strong>`;
    });
    text = text.replace(/{dom}/g, dom.n).replace(/{sub}/g, sub.n);

    document.getElementById('decree-text').innerHTML = `<strong style="color:var(--accent); font-size:1.4rem;">${cat.toUpperCase()}</strong><br><br>${text}`;
    document.getElementById('action-panel').style.display = 'none';
    document.getElementById('decree-active').style.display = 'block';
    startTimer(180);
}

function startTimer(s) {
    let t = s; clearInterval(state.timer);
    state.timer = setInterval(() => {
        t--; document.getElementById('timer-box').innerText = `${Math.floor(t/60)}:${(t%60).toString().padStart(2, '0')}`;
        if (t <= 0) finalize(false);
    }, 1000);
}

function finalize(success) {
    clearInterval(state.timer);
    if (success) state.players.find(p => p.role === "Slave").score++;
    if (state.round >= state.total) return showGrand();
    state.players.forEach(p => p.role = (p.role === "Master" ? "Slave" : "Master"));
    state.round++;
    document.getElementById('action-panel').style.display = 'block';
    document.getElementById('decree-active').style.display = 'none';
    renderUI();
}

function showGrand() {
    document.getElementById('game-view').style.display = 'none';
    document.getElementById('grand-view').style.display = 'block';
    const winner = state.players[0].score >= state.players[1].score ? state.players[0] : state.players[1];
    document.getElementById('winner-announcement').innerText = `${winner.n.toUpperCase()} HAS ACHIEVED SOVEREIGNTY.`;
    document.getElementById('grand-options').innerHTML = `<div class="box-section"><strong>THE RITUAL OF RELEASE:</strong> Intensive protocol. Master may climax only at the end.</div>`;
}

init();
</script>
</body>
</html>
