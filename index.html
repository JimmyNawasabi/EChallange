<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit: Sovereignty</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --yellow: #ffd700; 
            --red: #ee3333; --safe-green: #2e7d32; --veto: #4a4a4a; --black: #000000;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 18px; }
        .container { max-width: 650px; width: 100%; background: var(--card-bg); padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        .step { display: none; }
        .active { display: block !important; }

        .box { background: #fffcf9; border: 2px solid #f5f2ed; padding: 20px; margin-bottom: 25px; border-radius: 25px; }
        .inner-box { background: #ffffff; border: 1px solid #eee; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.5px; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #fefefe; border-radius: 15px; border: 1px solid #eee; font-size: 0.8rem; }
        .role-indicator { font-weight: 900; color: var(--crimson); text-transform: uppercase; letter-spacing: 1px; }
        .score-pill { background: #eee; padding: 4px 10px; border-radius: 50px; font-weight: bold; color: #666; }

        input[type="text"], select, input[type="number"] { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; outline: none; display: block; font-family: inherit; }
        
        /* Updated Grid for full-length names */
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tgl-btn { background: #f0f0f0; padding: 12px 8px; border-radius: 12px; text-align: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: 0.2s; color: #999; text-transform: uppercase; }
        .tgl-btn.on { background: var(--crimson); color: white; border-color: var(--accent); }

        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag { background: #eee; padding: 5px 10px; border-radius: 50px; font-size: 0.75rem; display: flex; align-items: center; border: 1px solid transparent; cursor: pointer; color: #888; transition: 0.15s; }
        .tag.on { background: #fff; border-color: var(--accent); color: var(--text); font-weight: bold; }
        
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .toggle-all { font-size: 0.6rem; color: var(--accent); cursor: pointer; text-decoration: underline; text-transform: uppercase; font-weight: bold; }

        .badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 1000; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: white; }
        .b-truth { background: #5d6d7e; } .b-dare { background: #af601a; } .b-escape { background: #c0392b; }
        .b-edging { background: #884ea0; } .b-physical { background: #1e8449; } .b-selfbondage { background: #2e4053; }
        
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 20px; font-size: 1rem; margin-bottom: 10px; }
        .btn-veto { background: var(--veto); font-size: 0.8rem; padding: 12px; }
        .btn-add { background: var(--accent); width: 60px; color: white; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
        
        .timer-display { font-size: 5rem; text-align: center; color: var(--crimson); font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">Sovereignty Edition</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Total Rounds</span>
            <input type="number" id="maxRounds" value="6">
            <div class="inner-box">
                <span class="label">Participant One (Slave)</span>
                <input type="text" id="p1" placeholder="Name">
                <select id="g1"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
            <div class="inner-box">
                <span class="label">Participant Two (Master)</span>
                <input type="text" id="p2" placeholder="Name">
                <select id="g2"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
        </div>
        <button class="btn" onclick="goToStep(2)">Configure Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px; text-align: center;">Enable gear for this session.</p>
            <div id="inv-container"></div>
        </div>
        <button class="btn" onclick="goToStep(3)">Start Session</button>
    </div>

    <div id="step3" class="step">
        <div class="status-bar">
            <div><span class="label" style="margin:0">Master</span><div id="master-name" class="role-indicator">---</div></div>
            <div id="scoreboard"><span class="score-pill" id="score-p1"></span> <span class="score-pill" id="score-p2"></span></div>
            <div style="text-align:right;"><span class="label" style="margin:0">Slave</span><div id="slave-name" class="role-indicator">---</div></div>
        </div>

        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center; font-size: 1rem;">Round 1</div>
            <div class="inner-box">
                <span class="label">Active Categories</span>
                <div class="toggle-grid">
                    <div class="tgl-btn on" data-cat="truth" onclick="this.classList.toggle('on')">Truth</div>
                    <div class="tgl-btn on" data-cat="dare" onclick="this.classList.toggle('on')">Dare</div>
                    <div class="tgl-btn on" data-cat="escape" onclick="this.classList.toggle('on')">Escape</div>
                    <div class="tgl-btn on" data-cat="edging" onclick="this.classList.toggle('on')">Edging</div>
                    <div class="tgl-btn on" data-cat="physical" onclick="this.classList.toggle('on')">Physical</div>
                    <div class="tgl-btn on" data-cat="selfbondage" onclick="this.classList.toggle('on')">Self-Bondage</div>
                </div>
            </div>
            <div class="box" style="text-align:center;">
                <div id="badge-container"></div>
                <div id="task-text" style="font-weight: 500; min-height: 60px;">Ready for command...</div>
            </div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Decree</button>
            <div id="pre-start-controls" style="display:none;">
                <button class="btn" style="background: var(--safe-green);" onclick="startT()">Start Clock</button>
                <button class="btn btn-veto" onclick="generate()">Veto (Reroll)</button>
            </div>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <button class="btn" onclick="resolveTurn(true)">Success (Swap)</button>
            <button class="btn" style="background:#888;" onclick="resolveTurn(false)">Failure (Keep)</button>
        </div>
    </div>
</div>

<script>
    let rawInv = {
        vis: [{n:"Blindfold", on:true}, {n:"Sleep Mask", on:true}, {n:"Silk Scarf", on:true}],
        speech: [{n:"Ball Gag", on:true}, {n:"Medical Tape", on:true}, {n:"Muzzle", on:false}],
        rest: [{n:"Rope", on:true}, {n:"Handcuffs", on:true}, {n:"Ankle Cuffs", on:true}],
        sens: [{n:"Feather", on:true}, {n:"Ice Cube", on:true}, {n:"Wand Vibrator", on:true}, {n:"Flogger", on:true}]
    };

    let players = [], currentRound = 1, subIdx = 0, timer, timeLeft;
    let lastTaskString = "";

    const taskData = {
        truth: { label: "Truth", class: "b-truth", time: 90, tasks: ["CONFESSION: Admit a desire while bound in [REST].", "SENSORY: Describe [SENS] while [VIS] is applied."] },
        dare: { label: "Dare", class: "b-dare", time: 180, tasks: ["SERVICE: Serve Master while [REST] and [SPEECH] are active.", "STATUE: Endure [SENS] on your [BODY] without flinching."] },
        escape: { label: "Escape", class: "b-escape", time: 420, tasks: ["FREEDOM: Escape from [REST] while [VIS] is applied.", "TRIAL: Escape [REST] while Master uses [SENS]."] },
        edging: { label: "Edging", class: "b-edging", time: 300, tasks: ["CONTROL: Master uses [SENS] to edge you.", "DENIAL: Endure [SENS] while in [REST]."] },
        physical: { label: "Physical", class: "b-physical", time: 200, tasks: ["STRESS: Hold a deep kneeling pose while [REST] is applied.", "STRENGTH: Hold a plank while ankles are in [REST]."] },
        selfbondage: { label: "Self-Bondage", class: "b-selfbondage", time: 150, tasks: ["BIND: Apply [REST] to yourself tightly.", "PRESENT: Present yourself with [VIS] and [SPEECH] applied."] }
    };

    function renderInv() {
        const container = document.getElementById('inv-container');
        container.innerHTML = '';
        const catMap = {vis: "Vision", speech: "Mouth", rest: "Restraints", sens: "Sensation"};
        for (let key in rawInv) {
            let section = document.createElement('div');
            section.innerHTML = `<div class="cat-header"><span class="label">${catMap[key]}</span><span class="toggle-all" onclick="toggleAll('${key}')">Toggle All</span></div><div style="display:flex; gap:10px; margin-bottom: 10px;"><input type="text" id="add-${key}" placeholder="Add..."><button class="btn-add" onclick="addNewItem('${key}')">+</button></div><div class="tag-row" id="tags-${key}"></div>`;
            container.appendChild(section);
            rawInv[key].forEach((item, idx) => {
                let tag = document.createElement('div');
                tag.className = `tag ${item.on ? 'on' : ''}`;
                tag.innerText = item.n;
                tag.onclick = () => { item.on = !item.on; renderInv(); };
                section.querySelector(`#tags-${key}`).appendChild(tag);
            });
        }
    }

    function toggleAll(cat) {
        const allOn = rawInv[cat].every(i => i.on);
        rawInv[cat].forEach(i => i.on = !allOn);
        renderInv();
    }

    function addNewItem(cat) {
        let input = document.getElementById(`add-${cat}`);
        if (input.value.trim()) { rawInv[cat].push({n: input.value.trim(), on: true}); input.value = ''; renderInv(); }
    }

    function goToStep(n) {
        if (n === 2) {
            players = [
                {n: document.getElementById('p1').value || "Slave", g: document.getElementById('g1').value, wins: 0},
                {n: document.getElementById('p2').value || "Master", g: document.getElementById('g2').value, wins: 0}
            ];
            renderInv();
        }
        if (n === 3) {
            if (!rawInv.vis.some(i=>i.on) || !rawInv.rest.some(i=>i.on)) return alert("Select Gear!");
            updateIdentity();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function updateIdentity() {
        let mIdx = (subIdx === 0 ? 1 : 0);
        document.getElementById('master-name').innerText = players[mIdx].n;
        document.getElementById('slave-name').innerText = players[subIdx].n;
        document.getElementById('score-p1').innerText = `${players[0].n}: ${players[0].wins}`;
        document.getElementById('score-p2').innerText = `${players[1].n}: ${players[1].wins}`;
        document.getElementById('round-header').innerText = `Round ${currentRound} / ${document.getElementById('maxRounds').value}`;
    }

    function generate() {
        let cats = Array.from(document.querySelectorAll('.tgl-btn.on')).map(b => b.getAttribute('data-cat'));
        if (!cats.length) return alert("Select a category!");
        
        let k, task, res;
        do {
            k = cats[Math.floor(Math.random()*cats.length)];
            let pool = taskData[k].tasks;
            task = pool[Math.floor(Math.random()*pool.length)];
            
            const pick = (type) => {
                let p = rawInv[type].filter(i=>i.on);
                return p.length ? `<b>${p[Math.floor(Math.random()*p.length)].n}</b>` : "gear";
            };

            res = task.replace(/\[VIS\]/g, pick('vis')).replace(/\[SPEECH\]/g, pick('speech'))
                      .replace(/\[REST\]/g, pick('rest')).replace(/\[SENS\]/g, pick('sens'))
                      .replace(/\[BODY\]/g, `<b>${players[subIdx].g}</b>`);
        } while (res === lastTaskString && (cats.length > 1 || taskData[k].tasks.length > 1));

        lastTaskString = res;
        document.getElementById('badge-container').innerHTML = `<span class="badge b-${k}">${taskData[k].label}</span>`;
        document.getElementById('task-text').innerHTML = res;
        timeLeft = taskData[k].time;
        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('pre-start-controls').style.display = 'block';
    }

    function startT() {
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) { clearInterval(timer); resolveTurn(false); }
        }, 1000);
    }

    function resolveTurn(success) {
        clearInterval(timer);
        if (success) { players[subIdx].wins++; subIdx = (subIdx === 0 ? 1 : 0); alert("Success! Roles Swapped."); }
        else { players[subIdx === 0 ? 1 : 0].wins++; alert("Failure. Master remains."); }
        currentRound++;
        if (currentRound > parseInt(document.getElementById('maxRounds').value)) finalize();
        else { updateIdentity(); resetUI(); }
    }

    function resetUI() {
        document.getElementById('active-round').style.display = 'none';
        document.getElementById('pre-round').style.display = 'block';
        document.getElementById('gen-btn').style.display = 'block';
        document.getElementById('pre-start-controls').style.display = 'none';
        document.getElementById('task-text').innerText = "Ready for command...";
        document.getElementById('badge-container').innerHTML = "";
    }

    function finalize() {
        let w = players[0].wins >= players[1].wins ? 0 : 1;
        document.body.innerHTML = `<div class="container" style="text-align:center;"><h1>Ascension</h1><div class="box"><span class="label">Victor</span><div style="font-size:2rem;color:var(--crimson);font-weight:bold;">${players[w].n}</div></div><button class="btn" onclick="location.reload()">Reset Session</button></div>`;
    }
</script>
</body>
</html>
