<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Master's Command</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b;
            --yellow: #ffd700; --red: #ff4500;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 550px; width: 100%; background: var(--card); padding: 25px; border-radius: 30px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 6px; color: var(--accent); margin: 0; font-size: 1.5rem; }
        .box-section { background: #1f1f1f; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #333; }
        .label { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        
        /* UI Controls */
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; }
        .btn { background: var(--crimson); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 10px; letter-spacing: 1px; margin-top: 10px; }
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .tog-btn { padding: 8px; font-size: 0.6rem; border-radius: 6px; border: 1px solid #333; background: #111; color: #555; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1608; }
        
        /* Dashboard */
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; background: #000; border-radius: 15px; }
        .p-block { text-align: center; flex: 1; }
        .role-tag { font-size: 0.55rem; font-weight: 900; letter-spacing: 1px; color: #666; }
        .master-glow { color: var(--accent) !important; text-shadow: 0 0 10px var(--accent); }
        .score-num { font-size: 1.8rem; font-weight: bold; margin: 2px 0; }
        
        /* Card Display */
        .card-dock { display: flex; justify-content: center; gap: 4px; height: 20px; }
        .mini-card { width: 12px; height: 18px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2); }
        .card-y { background: var(--yellow); }
        .card-r { background: var(--red); }
        
        /* The Decree Display */
        .decree-box { font-size: 1rem; line-height: 1.6; color: #ddd; border-left: 4px solid var(--crimson); padding-left: 15px; margin: 15px 0; }
        
        .step { display: none; }
        .active { display: block !important; }
        
        /* Vault Editor Overlay */
        #vault-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .tag { display: inline-block; background: #333; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; margin: 2px; }
        .tag span { color: var(--red); margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="vault-overlay">
    <h2 style="color:var(--accent)">ARSENAL VAULT</h2>
    <div id="vault-editor-content"></div>
    <button class="btn" onclick="closeVault()">Save & Close Vault</button>
</div>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <p style="text-align:center; font-size:0.6rem; color:#666; margin-top:-5px;">Competitive Power Exchange</p>

    <div id="screen-setup" class="step active">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p1-name" placeholder="Name...">
        </div>
        <div class="box-section">
            <span class="label">Player 2</span>
            <input type="text" id="p2-name" placeholder="Name...">
        </div>
        <button class="btn" onclick="startGame()">Begin Struggle</button>
    </div>

    <div id="screen-game" class="step">
        <div class="score-row">
            <div class="p-block">
                <div id="p0-role" class="role-tag">SLAVE</div>
                <div id="p0-name-label" style="font-weight:bold;">P1</div>
                <div id="p0-score" class="score-num">0</div>
                <div id="p0-cards" class="card-dock"></div>
            </div>
            <div style="font-weight:900; color:#333;">VS</div>
            <div class="p-block">
                <div id="p1-role" class="role-tag">MASTER</div>
                <div id="p1-name-label" style="font-weight:bold;">P2</div>
                <div id="p1-score" class="score-num">0</div>
                <div id="p1-cards" class="card-dock"></div>
            </div>
        </div>

        <div id="master-controls">
            <div class="box-section">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="label">Round Configuration</span>
                    <button onclick="openVault()" style="font-size:0.6rem; background:none; border:1px solid var(--accent); color:var(--accent); cursor:pointer; padding:2px 5px; border-radius:4px;">Edit Vault Items</button>
                </div>
                <span class="label" style="margin-top:10px; color:#666;">Active Arsenal Sets:</span>
                <div class="toggle-grid" id="arsenal-toggle-mount"></div>
                <span class="label" style="color:#666;">Active Decree Types:</span>
                <div class="toggle-grid" id="category-toggle-mount"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Generate Decree</button>
        </div>

        <div id="active-decree-ui" style="display:none;">
            <div class="box-section">
                <div id="decree-display" class="decree-box"></div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button id="y-btn" class="tog-btn" style="flex:1; background:var(--yellow); color:black;" onclick="useCard('yellow')">Use Yellow</button>
                    <button id="r-btn" class="tog-btn" style="flex:1; background:var(--red); color:white;" onclick="useCard('red')">Use Red</button>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#444; flex:1;" onclick="submitOutcome(false)">FAIL (Retain Role)</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="submitOutcome(true)">SUCCESS (Role Swap)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        players: [
            { n: "", role: "Slave", score: 0, cards: [] },
            { n: "", role: "Master", score: 0, cards: [] }
        ],
        vault: JSON.parse(localStorage.getItem('sov_vault_v3')) || {
            "The Bindings": { items: ["Rope", "Cuffs"], active: true },
            "The Shadows": { items: ["Blindfold"], active: true },
            "The Discipline": { items: ["Flogger", "Cane"], active: true },
            "The Silence": { items: ["Ball Gag"], active: true },
            "The Pleasures": { items: ["Wand"], active: true }
        },
        cats: {
            "The Solitary Bind": true, "The Geometric Cage": true, "The Agony of Nearness": true,
            "The Hidden Truths": true, "The Wicked Gamble": true, "The Flesh Endurance": true,
            "The Desperate Struggle": true, "The Velveteen Command": true
        }
    };

    function startGame() {
        state.players[0].n = document.getElementById('p1-name').value || "P1";
        state.players[1].n = document.getElementById('p2-name').value || "P2";
        state.players[1].cards = ['yellow', 'red']; // Master starts with cards
        nav('screen-game');
        refreshDashboard();
    }

    function nav(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function refreshDashboard() {
        state.players.forEach((p, i) => {
            document.getElementById(`p${i}-name-label`).innerText = p.n;
            document.getElementById(`p${i}-score`).innerText = p.score;
            const rTag = document.getElementById(`p${i}-role`);
            rTag.innerText = p.role;
            rTag.className = 'role-tag' + (p.role === 'Master' ? ' master-glow' : '');
            
            const cardDock = document.getElementById(`p${i}-cards`);
            cardDock.innerHTML = p.cards.map(c => `<div class="mini-card card-${c[0]}"></div>`).join('');
        });

        // Update Toggles
        renderToggles('arsenal-toggle-mount', state.vault, true);
        renderToggles('category-toggle-mount', state.cats, false);

        // Card button availability
        const mIdx = state.players.findIndex(p => p.role === 'Master');
        document.getElementById('y-btn').style.opacity = state.players[mIdx].cards.includes('yellow') ? "1" : "0.2";
        document.getElementById('r-btn').style.opacity = state.players[mIdx].cards.includes('red') ? "1" : "0.2";
    }

    function renderToggles(id, data, isVault) {
        const mount = document.getElementById(id); mount.innerHTML = '';
        for (let key in data) {
            const active = isVault ? data[key].active : data[key];
            mount.innerHTML += `<button class="tog-btn ${active?'active':''}" onclick="toggleData('${key}', ${isVault})">${key}</button>`;
        }
    }

    function toggleData(key, isVault) {
        if(isVault) state.vault[key].active = !state.vault[key].active;
        else state.cats[key] = !state.cats[key];
        refreshDashboard();
    }

    function openVault() {
        const mount = document.getElementById('vault-editor-content');
        mount.innerHTML = '';
        for(let cat in state.vault) {
            mount.innerHTML += `
                <div class="box-section">
                    <span class="label">${cat}</span>
                    <div>${state.vault[cat].items.map((it, i) => `<span class="tag">${it}<span onclick="vaultRemove('${cat}',${i})">✕</span></span>`).join('')}</div>
                    <div style="display:flex; margin-top:5px;"><input type="text" id="in-${cat.replace(/\s/g,'')}" placeholder="New tool..."><button onclick="vaultAdd('${cat}')">Add</button></div>
                </div>`;
        }
        document.getElementById('vault-overlay').style.display = 'block';
    }

    function vaultAdd(cat) {
        const input = document.getElementById(`in-${cat.replace(/\s/g,'')}`);
        if(input.value) { state.vault[cat].items.push(input.value); vaultSave(); openVault(); }
    }
    function vaultRemove(cat, i) { state.vault[cat].items.splice(i, 1); vaultSave(); openVault(); }
    function vaultSave() { localStorage.setItem('sov_vault_v3', JSON.stringify(state.vault)); }
    function closeVault() { document.getElementById('vault-overlay').style.display = 'none'; refreshDashboard(); }

    function generateDecree() {
        const mIdx = state.players.findIndex(p => p.role === 'Master');
        const sIdx = mIdx === 0 ? 1 : 0;
        
        const activeCats = Object.keys(state.cats).filter(k => state.cats[k]);
        const cat = activeCats[Math.floor(Math.random() * activeCats.length)];
        
        const activeTools = Object.keys(state.vault).filter(v => state.vault[v].active && state.vault[v].items.length > 0);
        const toolSet = activeTools[Math.floor(Math.random() * activeTools.length)];
        const tool = state.vault[toolSet].items[Math.floor(Math.random() * state.vault[toolSet].items.length)];

        document.getElementById('decree-display').innerHTML = `<strong>${cat}:</strong><br>${state.players[mIdx].n} commands ${state.players[sIdx].n} to endure a task involving the <u>${tool}</u>. Complete it to earn a chance at Sovereignty.`;
        document.getElementById('master-controls').style.display = 'none';
        document.getElementById('active-decree-ui').style.display = 'block';
    }

    function useCard(type) {
        const mIdx = state.players.findIndex(p => p.role === 'Master');
        const sIdx = mIdx === 0 ? 1 : 0;
        const cIdx = state.players[mIdx].cards.indexOf(type);
        if(cIdx > -1) {
            state.players[mIdx].cards.splice(cIdx, 1);
            state.players[sIdx].cards.push(type);
            alert(`CARD ISSUED! ${type.toUpperCase()} penalty applied. Card transferred to ${state.players[sIdx].n}.`);
            refreshDashboard();
        }
    }

    function submitOutcome(success) {
        const mIdx = state.players.findIndex(p => p.role === 'Master');
        const sIdx = mIdx === 0 ? 1 : 0;

        if(success) {
            state.players[sIdx].score++;
            state.players[0].role = (state.players[0].role === 'Master' ? 'Slave' : 'Master');
            state.players[1].role = (state.players[1].role === 'Master' ? 'Slave' : 'Master');
            alert("SUCCESS. Roles have been REVERSED.");
        } else {
            state.players[mIdx].score++;
            alert("FAILURE. Sovereignty remains unchanged.");
        }

        document.getElementById('master-controls').style.display = 'block';
        document.getElementById('active-decree-ui').style.display = 'none';
        refreshDashboard();
    }
</script>
</body>
</html>
