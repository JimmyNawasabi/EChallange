<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Down to get dirty</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --safe-green: #2e7d32; 
            --gold: #f1c40f; --red-card: #e74c3c; --veto-grey: #4a4a4a;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 18px; }
        .container { max-width: 750px; width: 100%; background: var(--card-bg); padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 5px; font-size: 1.8rem; font-style: italic; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a18e8e; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        .step { display: none; }
        .active { display: block !important; }

        .box { background: #fffcf9; border: 1px solid #f0e6d2; padding: 20px; margin-bottom: 20px; border-radius: 25px; line-height: 1.6; position: relative; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 5px; letter-spacing: 1.5px; }

        .identity-card { background: #ffffff; border: 1px solid #eee; padding: 15px; border-radius: 20px; margin-bottom: 10px; }
        input[type="text"], select, input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-top: 5px; font-size: 1rem; font-family: inherit; box-sizing: border-box; }
        
        /* TACTICAL STATUS TRACKER */
        .tactical-status { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: #fefefe; border-radius: 15px; border: 1px solid #eee; }
        .holder-badge { font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; font-weight: bold; text-transform: uppercase; border: 1px solid transparent; }
        .has-cards { border-color: var(--accent); background: #fff9eb; color: #7b6a4a; box-shadow: 0 2px 5px rgba(197,160,89,0.2); }

        /* INVENTORY */
        .category-block { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px dashed #e2d1b3; }
        .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .add-row input { flex-grow: 1; margin-top: 0; }
        .add-btn { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: #f9f4eb; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; color: #7b6a4a; border: 1px solid #e2d1b3; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }

        /* CARDS */
        .card-dock { display: flex; justify-content: space-around; margin: 15px 0; gap: 8px; }
        .tactical-card { flex: 1; padding: 12px 5px; border-radius: 10px; text-align: center; font-size: 0.65rem; font-weight: 900; cursor: pointer; color: white; text-transform: uppercase; border: none; transition: 0.2s; }
        .t-red { background: var(--red-card); box-shadow: 0 4px 0 #922b21; }
        .t-yellow { background: var(--gold); color: black; box-shadow: 0 4px 0 #b7950b; }
        .t-safe { background: black; box-shadow: 0 4px 0 #333; }
        .t-veto { background: var(--veto-grey); width: 100%; margin-top: 10px; }

        .score-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 0.85rem; color: var(--crimson); }
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; margin-bottom: 10px; }
        .timer-display { font-size: 3.5rem; text-align: center; color: var(--crimson); font-family: monospace; margin: 10px 0; }
        
        b { color: var(--crimson); }
        .finale-text { font-size: 0.95rem; text-align: left; background: #000; color: #fff; padding: 25px; border-radius: 20px; line-height: 1.8; max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>Down to get dirty</h1>
    <div class="subtitle">Sovereignty Edition</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Total Rounds</span>
            <input type="number" id="maxRounds" value="20">
            
            <div class="identity-card">
                <span class="label">Player 1</span>
                <input type="text" id="p1_name" placeholder="Name">
                <select id="p1_gender">
                    <option value="male body">Male Body</option>
                    <option value="female body">Female Body</option>
                </select>
            </div>

            <div class="identity-card">
                <span class="label">Player 2</span>
                <input type="text" id="p2_name" placeholder="Name">
                <select id="p2_gender">
                    <option value="female body">Female Body</option>
                    <option value="male body">Male Body</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="goToStep(2)">Configure Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Custom Inventory</span>
            <div id="inv-container"></div>
        </div>
        <button class="btn" onclick="goToStep(3)">Commence Game</button>
    </div>

    <div id="step3" class="step">
        <div class="tactical-status" id="tactical-tracker">
            <div id="status-p1" class="holder-badge">P1: No Cards</div>
            <div id="status-p2" class="holder-badge">P2: No Cards</div>
        </div>

        <div class="score-row">
            <div id="p1-score">---</div>
            <div id="p2-score">---</div>
        </div>

        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center;">---</div>
            <div class="box">
                <div id="task-text" style="font-style: italic;">Consulting the void...</div>
                <button id="veto-btn" class="tactical-card t-veto" style="display:none;" onclick="useVeto()">Veto Activity (Permanent Deletion)</button>
            </div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Task</button>
            <button class="btn" id="start-btn" style="background:var(--safe-green); display:none;" onclick="startTimer()">Accept & Begin</button>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            
            <div class="card-dock">
                <button id="red-card-btn" class="tactical-card t-red" onclick="useRed()">Red Card</button>
                <button id="yellow-card-btn" class="tactical-card t-yellow" onclick="useYellow()">Yellow Card</button>
                <button class="tactical-card t-safe" onclick="useSafeWord()">Safe Word</button>
            </div>

            <button class="btn" onclick="resolve(true)">Merit Achieved (Swap Roles)</button>
            <button class="btn" style="background:#888;" onclick="resolve(false)">Task Failed (Stay)</button>
        </div>
    </div>

    <div id="stepFinale" class="step">
        <h1 style="color: gold;">THE ULTIMATE DECREE</h1>
        <div class="finale-text" id="finale-content"></div>
        <button class="btn" style="margin-top:20px; background: gold; color: black;" onclick="location.reload()">End Session</button>
    </div>
</div>

<script>
    let players = [];
    let currentRound = 1, masterIdx, slaveIdx, cardHolderIdx, timer, timeLeft;
    let currentTaskKey = "";
    
    let taskPool = {
        truth: { label: "Truth", time: 120, text: "Master shall apply [VIS] and [GAG]. Slave must confess a secret or desire through the binding." },
        dare: { label: "Dare", time: 300, text: "Master must apply [REST] and [VIS]. Then use [SENS] on the Slave's [BODY] until the timer ends." },
        escape: { label: "Escape", time: 480, text: "Master must apply [REST] with maximum tension and [VIS]. Slave must struggle free before the buzzer." },
        shibari_floor: { label: "Shibari Floor Play", time: 600, text: "Master executes a restrictive floor harness using <b>Rope</b>. Once pinned, Master explores the Slave's [BODY] with [SENS]." },
        shibari_suspension: { label: "Suspension", time: 900, text: "Master applies a suspension harness. Slave's [BODY] is partially or fully lifted. Master applies [VIS] and [SENS] during the float." },
        edging: { label: "Edging", time: 360, text: "Master will apply [REST] and use [SENS] to bring Slave's [BODY] to the brink 3 times, denying release." }
    };

    let gear = {
        "Blindfolds": ["Tape", "Gas Mask", "Pillow Case", "Sleep Mask"],
        "Gags": ["Tape", "Ball Gag", "Pallet Wrap", "Panties"],
        "Restraints": ["Rope", "Leather Cuffs", "Tape", "Zip Ties"],
        "Sensation": ["Whip", "Ice", "Vibrator", "Clamps", "Cane"]
    };

    let activeInv = {};
    for (let c in gear) activeInv[c] = gear[c].map(i => ({ n: i, on: true }));

    function renderInv() {
        const cont = document.getElementById('inv-container');
        cont.innerHTML = '';
        for (let c in activeInv) {
            let div = document.createElement('div');
            div.className = 'category-block';
            div.innerHTML = `<span class="label">${c}</span><div class="add-row"><input type="text" id="in-${c}" placeholder="Add..."><button class="add-btn" onclick="add('${c}')">+</button></div><div class="tag-row" id="tags-${c}"></div>`;
            cont.appendChild(div);
            let tagRow = div.querySelector(`#tags-${c}`);
            activeInv[c].forEach((item, i) => {
                let t = document.createElement('div');
                t.className = `tag ${item.on ? 'on' : ''}`;
                t.innerText = item.n;
                t.onclick = () => { activeInv[c][i].on = !activeInv[c][i].on; renderInv(); };
                tagRow.appendChild(t);
            });
        }
    }

    function add(c) {
        let v = document.getElementById(`in-${c}`).value;
        if(v) { activeInv[c].push({n:v, on:true}); renderInv(); }
    }

    function goToStep(n) {
        if(n === 2) {
            players = [
                {n: document.getElementById('p1_name').value || "Player 1", g: document.getElementById('p1_gender').value, score: 0},
                {n: document.getElementById('p2_name').value || "Player 2", g: document.getElementById('p2_gender').value, score: 0}
            ];
            renderInv();
        }
        if(n === 3) {
            masterIdx = Math.floor(Math.random()*2);
            slaveIdx = masterIdx === 0 ? 1 : 0;
            cardHolderIdx = Math.floor(Math.random()*2);
            updateUI();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    function updateUI() {
        document.getElementById('p1-score').innerText = `${players[0].n}: ${players[0].score}`;
        document.getElementById('p2-score').innerText = `${players[1].n}: ${players[1].score}`;
        document.getElementById('round-header').innerHTML = `ROUND ${currentRound} | Master: <b>${players[masterIdx].n}</b>`;
        
        // Update Tactical Tracker
        const p1T = document.getElementById('status-p1');
        const p2T = document.getElementById('status-p2');
        p1T.innerText = `${players[0].n}: ${cardHolderIdx === 0 ? 'HAS CARDS' : 'NO CARDS'}`;
        p2T.innerText = `${players[1].n}: ${cardHolderIdx === 1 ? 'HAS CARDS' : 'NO CARDS'}`;
        p1T.className = `holder-badge ${cardHolderIdx === 0 ? 'has-cards' : ''}`;
        p2T.className = `holder-badge ${cardHolderIdx === 1 ? 'has-cards' : ''}`;

        // Disable card buttons if not holder
        document.getElementById('red-card-btn').disabled = (cardHolderIdx !== masterIdx && cardHolderIdx !== slaveIdx); // Red/Yellow can be used by whoever holds them
        // Note: The logic is that the holder can use them regardless of role
    }

    function generate() {
        let keys = Object.keys(taskPool);
        if(!keys.length) return alert("Task database empty!");
        currentTaskKey = keys[Math.floor(Math.random()*keys.length)];
        let t = taskPool[currentTaskKey];
        const p = (c) => {
            let items = activeInv[c].filter(i=>i.on);
            return items.length ? items[Math.floor(Math.random()*items.length)].n : "the gear";
        };
        let txt = t.text.replace('[VIS]', `<b>${p('Blindfolds')}</b>`).replace('[GAG]', `<b>${p('Gags')}</b>`).replace('[REST]', `<b>${p('Restraints')}</b>`).replace('[SENS]', `<b>${p('Sensation')}</b>`).replace('[BODY]', players[slaveIdx].g);
        document.getElementById('task-text').innerHTML = `[${t.label}]<br>${txt}`;
        timeLeft = t.time;
        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('veto-btn').style.display = 'block';
    }

    function useVeto()
