<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Master's Gateway</title>
    <style>
        :root { 
            --accent: #0056b3; 
            --bg: #000000; 
            --card: #121212; 
            --text: #FFFFFF; 
            --crimson: #d00000; 
            --success: #008000; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center; 
            font-size: 1.35rem; 
        }

        .container { 
            max-width: 750px; width: 100%; 
            background: var(--card); 
            padding: 35px; border-radius: 25px; 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 70px #000; 
        }
        
        h1 { 
            text-align: center; text-transform: uppercase; 
            letter-spacing: 10px; color: var(--text); 
            margin-bottom: 35px; font-size: 3.5rem; 
            border-bottom: 6px solid var(--accent); padding-bottom: 15px;
        }

        .box-section { 
            background: #000; padding: 30px; 
            margin-bottom: 25px; border-radius: 15px; 
            border: 3px solid #333; 
        }
        
        .label { 
            font-size: 1.4rem; text-transform: uppercase; 
            font-weight: bold; color: var(--accent); 
            display: block; margin-bottom: 15px; letter-spacing: 2px; 
        }

        input[type="text"], input[type="number"] { 
            width: 100%; padding: 22px; 
            border: 3px solid var(--accent); border-radius: 10px; 
            background: #000; color: white; 
            box-sizing: border-box; margin-bottom: 20px; font-size: 1.6rem; 
        }
        
        .btn { 
            background: var(--accent); color: white; 
            border: 3px solid #FFF; padding: 25px; 
            width: 100%; cursor: pointer; 
            text-transform: uppercase; font-weight: bold; 
            border-radius: 15px; margin-top: 15px; font-size: 1.6rem; 
        }
        
        .score-row { 
            display: flex; justify-content: space-between; 
            padding: 25px; background: #000; 
            border-radius: 20px; border: 4px solid var(--accent); 
            text-align: center; margin-bottom: 30px; 
        }
        .p-name { font-weight: bold; font-size: 1.7rem; color: #FFF; }
        .p-score { font-size: 3.2rem; color: #FFF; font-weight: 900; }
        
        .tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .tog-btn { 
            padding: 22px; font-size: 1.2rem; 
            border-radius: 12px; border: 3px solid #444; 
            background: #000; color: #777; 
            cursor: pointer; text-transform: uppercase; 
            font-weight: bold; text-align: center;
        }
        .tog-btn.active { 
            border-color: #FFF; color: #FFF; 
            background: var(--accent); 
        }

        #decree-display { line-height: 1.8; color: #FFF; font-size: 1.8rem; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Master Name</span>
            <input type="text" id="p0-name" value="Dominus">
            <span class="label">Slave Name</span>
            <input type="text" id="p1-name" value="Subject">
            <span class="label">Total Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" onclick="startSession()">Commence Session</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-header" style="text-align:center; color:var(--accent); margin-bottom:20px; font-weight:900; letter-spacing: 4px; font-size: 2rem;"></div>
        
        <div class="score-row">
            <div class="p-block"><div class="label">MASTER</div><div id="disp-master" class="p-name"></div><div id="score-master" class="p-score">0</div></div>
            <div class="p-block"><div class="label">SLAVE</div><div id="disp-slave" class="p-name"></div><div id="score-slave" class="p-score">0</div></div>
        </div>
        
        <div id="round-config">
             <div class="box-section">
                 <span class="label" id="config-title">ARSENAL AUTHORIZATION</span>
                 <div id="toggle-grid" class="tog-grid"></div>
             </div>
             <button class="btn" onclick="generateDecree()">Issue Decree</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-display"></div></div>
            <div style="display:flex; gap:20px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolveRound(false)">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolveRound(true)">SUCCESS</button>
            </div>
        </div>
    </div>

    <div id="step-4" style="display:none;">
        <h1>SESSION COMPLETE</h1>
        <button class="btn" onclick="location.reload()">Reset Vault</button>
    </div>
</div>

<script>
    const state = {
        curr: 1, 
        total: 30,
        players: [
            {n:"", role:"Master", score:0, g:"M"},
            {n:"", role:"Slave", score:0, g:"F"}
        ],
        vault: {
            "The Shackles": ["Handcuffs", "Rope Ties", "Leg Irons"],
            "The Silence": ["Ball Gag", "Cleave Gag", "Tape"],
            "The Shadows": ["Blindfold", "Hood", "Sleep Mask"],
            "The Discipline": ["Cane", "Paddle", "Whip"],
            "The Senses": ["Ice", "Feather", "Wand"],
            "The Pleasure": ["Vibrator", "Stimulator"]
        },
        activeRoundCats: [] // Categories authorized for the current round
    };

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = parseInt(document.getElementById('round-total').value);
        // Default: All categories enabled for first round
        state.activeRoundCats = Object.keys(state.vault); 
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-3').style.display = 'block';
        renderRound();
    }

    function renderRound() {
        if(state.curr > state.total) {
            document.getElementById('step-3').style.display = 'none';
            document.getElementById('step-4').style.display = 'block';
            return;
        }

        const master = state.players.find(p => p.role === "Master");
        const slave = state.players.find(p => p.role === "Slave");

        document.getElementById('round-header').innerText = `ROUND ${state.curr} / ${state.total}`;
        document.getElementById('disp-master').innerText = master.n;
        document.getElementById('disp-slave').innerText = slave.n;
        document.getElementById('score-master').innerText = master.score;
        document.getElementById('score-slave').innerText = slave.score;
        document.getElementById('config-title').innerText = `${master.n.toUpperCase()}: AUTHORIZE ARSENAL`;

        // Render Toggles
        const grid = document.getElementById('toggle-grid');
        grid.innerHTML = '';
        Object.keys(state.vault).forEach(cat => {
            const btn = document.createElement('div');
            btn.className = `tog-btn ${state.activeRoundCats.includes(cat) ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                if(state.activeRoundCats.includes(cat)) {
                    state.activeRoundCats = state.activeRoundCats.filter(c => c !== cat);
                } else {
                    state.activeRoundCats.push(cat);
                }
                renderRound();
            };
            grid.appendChild(btn);
        });
    }

    function generateDecree() {
        if(state.activeRoundCats.length === 0) {
            alert("The Master must authorize at least one category for the Decree.");
            return;
        }

        const master = state.players.find(p => p.role === "Master");
        const slave = state.players.find(p => p.role === "Slave");
        
        const selectedCat = state.activeRoundCats[Math.floor(Math.random() * state.activeRoundCats.length)];
        const itemList = state.vault[selectedCat];
        const selectedItem = itemList[Math.floor(Math.random() * itemList.length)];

        document.getElementById('decree-display').innerHTML = `
            <span style="color:var(--accent); text-transform:uppercase; letter-spacing:2px;">${selectedCat} PROTOCOL</span><br><br>
            ${master.n} shall apply <strong>${selectedItem}</strong> to ${slave.n}.
        `;

        document.getElementById('round-config').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
    }

    function resolveRound(success) {
        if(success) {
            // Success: Slave points and role swap
            state.players.find(p => p.role === "Slave").score++;
            state.players.forEach(p => p.role = (p.role === "Master" ? "Slave" : "Master"));
        } else {
            // Fail: Master keeps control and gets a point
            state.players.find(p => p.role === "Master").score++;
        }

        state.curr++;
        // Reset authorized categories for the new round
        state.activeRoundCats = Object.keys(state.vault); 
        
        document.getElementById('round-config').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderRound();
    }
</script>
</body>
</html>
