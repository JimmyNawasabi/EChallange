<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGNTY: v26.0</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #28a745; --gold: #ffd700; --warning: #ffae00;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 1000px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 10px 0; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .p-setup { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .p-setup.active-dom { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .p-setup.active-sub { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 86, 179, 0.2); }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 2px; }
        
        #inventory-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .inv-section { background: #050505; padding: 10px; border: 1px solid #333; border-radius: 8px; border-left: 3px solid var(--accent); }

        .theme-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .theme-btn { padding: 10px; background: #111; border: 1px solid #333; border-radius: 4px; font-size: 0.65rem; text-align: center; cursor: pointer; color: #555; font-weight: bold; text-transform: uppercase; }
        .theme-btn.active { border-color: var(--gold); color: var(--gold); background: #1a1500; }

        #decree-text { background: #050505; padding: 30px; border-radius: 10px; border-left: 5px solid var(--gold); font-size: 1.1rem; line-height: 1.8; margin: 20px 0; color: #eee; }
        #timer { font-size: 5rem; color: var(--crimson); font-family: monospace; text-align: center; }
        .btn-main { background: var(--accent); color: white; padding: 18px; width: 100%; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        .safety-bar { display: flex; gap: 10px; margin-top: 15px; }
        .card { flex: 1; padding: 12px; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; border: none; }
        .card-yellow { background: var(--warning); color: #000; }
        .card-red { background: var(--crimson); color: #fff; }

        input[type="text"] { width: 100%; padding: 8px; background: #000; color: white; border: 1px solid #333; border-radius: 4px; margin-top: 5px; box-sizing: border-box; }
        .chip { background:#222; padding:2px 6px; border-radius:3px; font-size:0.65rem; display:inline-flex; align-items:center; gap:4px; margin:2px; border: 1px solid #444; }
        .del-item { color: var(--crimson); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-screen">
        <div class="setup-grid">
            <div class="p-setup">
                <span class="label">Player One</span>
                <input type="text" id="p1-name" value="Master">
            </div>
            <div class="p-setup">
                <span class="label">Player Two</span>
                <input type="text" id="p2-name" value="Slave">
            </div>
        </div>

        <span class="label">Hardware Arsenal (Shadow Category Included)</span>
        <div id="inventory-list"></div>
        <button class="btn-main" style="margin-top:20px;" onclick="startSession()">Initialize Protocol</button>
    </div>

    <div id="play-screen" style="display:none;">
        <div id="round-disp" style="text-align:center; color:var(--accent); margin-bottom:10px; letter-spacing: 2px; font-weight:bold;"></div>
        
        <div style="display:flex; gap:15px; margin-bottom:20px;">
            <div id="disp-box-0" class="p-setup active-dom" style="flex:1; text-align:center;">
                <span class="label" id="role-0">DOMINANT</span>
                <div id="disp-name-0" style="font-weight:bold; font-size: 1.2rem;"></div>
                <div id="score-0" style="font-size: 0.8rem; margin-top:5px; color: #888;">Score: 0</div>
            </div>
            <div id="disp-box-1" class="p-setup active-sub" style="flex:1; text-align:center;">
                <span class="label" id="role-1">SUBMISSIVE</span>
                <div id="disp-name-1" style="font-weight:bold; font-size: 1.2rem;"></div>
                <div id="score-1" style="font-size: 0.8rem; margin-top:5px; color: #888;">Score: 0</div>
            </div>
        </div>

        <div id="theme-control">
            <span class="label" style="text-align:center;">Toggle Active Decree Themes</span>
            <div class="theme-selector" id="theme-selector"></div>
            <button class="btn-main" onclick="issueDecree()">Generate Decree</button>
        </div>
        
        <div id="decree-panel" style="display:none;">
            <div id="timer">00:00</div>
            <button class="btn-main" id="start-t-btn" style="background:var(--gold); color:black; margin-bottom:10px;" onclick="startCountdown()">Commence Phase</button>
            <div id="decree-text"></div>
            <div class="safety-bar">
                <button class="card card-yellow" onclick="safetyProtocol('yellow')">Yellow Card</button>
                <button class="card card-red" onclick="safetyProtocol('red')">Red Card (Reset)</button>
            </div>
            <div id="post-commence" style="display:none; gap:10px; margin-top:15px;">
                <button class="btn-main" style="background:#1a1a1a; flex:1;" onclick="endRound(false)">Failure (-1 Pt)</button>
                <button class="btn-main" style="background:var(--success); flex:1;" onclick="endRound(true)">Success (+1 Pt & Reverse)</button>
            </div>
        </div>
    </div>
</div>

<script>
const REQUIRED_CATS = ["Restraints", "Impact", "Gags", "Shadow", "Sensory", "Ache", "Stillness", "Quietude"];
const THEMES = ["Self Bondage", "Truth", "Dare", "Soft and Sexy", "Escape", "Shibari", "Physical Challenge", "Tease and Denial"];

const DEFAULTS = {
    "Restraints": ["Rope", "Cuffs"], "Impact": ["Paddle", "Cane"], "Gags": ["Ball Gag", "Tape"],
    "Shadow": ["Blindfold", "Hood"], "Sensory": ["Wax", "Ice"], "Ache": ["Clamps", "Weights"],
    "Stillness": ["Posture Collar"], "Quietude": ["Muzzle"]
};

let state = {
    currRound: 1, history: [],
    players: [
        { name: "", score: 0 },
        { name: "", score: 0 }
    ],
    domIdx: 0, // Current Dominant index
    inv: JSON.parse(localStorage.getItem('sov_inv_v26')) || DEFAULTS,
    activeThemes: [...THEMES],
    timer: null, activeTime: 0
};

// Ensure Shadow and all cats exist
REQUIRED_CATS.forEach(c => { if(!state.inv[c]) state.inv[c] = DEFAULTS[c] || []; });

function save() { localStorage.setItem('sov_inv_v26', JSON.stringify(state.inv)); }

function renderInventory() {
    const list = document.getElementById('inventory-list');
    list.innerHTML = '';
    REQUIRED_CATS.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'inv-section';
        div.innerHTML = `
            <span style="font-size:0.6rem; color:var(--accent); font-weight:bold;">${cat.toUpperCase()}</span>
            <div style="margin:5px 0;">${state.inv[cat].map((it, idx) => `<span class="chip">${it} <span class="del-item" onclick="removeItem('${cat}',${idx})">×</span></span>`).join('')}</div>
            <div style="display:flex; gap:5px;"><input type="text" id="add-${cat}" placeholder="Add..."><button onclick="addItem('${cat}')" style="background:var(--accent); color:white; border:none; padding:0 8px;">+</button></div>
        `;
        list.appendChild(div);
    });
}

function renderThemes() {
    const sel = document.getElementById('theme-selector');
    sel.innerHTML = THEMES.map(t => `<div class="theme-btn ${state.activeThemes.includes(t) ? 'active' : ''}" onclick="toggleTheme('${t}')">${t}</div>`).join('');
}

function toggleTheme(t) {
    if(state.activeThemes.includes(t)) state.activeThemes = state.activeThemes.filter(x => x !== t);
    else state.activeThemes.push(t);
    renderThemes();
}

function addItem(cat) { const v = document.getElementById(`add-${cat}`).value; if(v){state.inv[cat].push(v); save(); renderInventory();} }
function removeItem(cat, idx) { state.inv[cat].splice(idx, 1); save(); renderInventory(); }

function startSession() {
    state.players[0].name = document.getElementById('p1-name').value;
    state.players[1].name = document.getElementById('p2-name').value;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'block';
    renderThemes();
    updateUI();
}

function updateUI() {
    const subIdx = 1 - state.domIdx;
    document.getElementById('round-disp').innerText = `PHASE ${state.currRound}`;
    
    // UI assignments
    document.getElementById('disp-name-0').innerText = state.players[0].name;
    document.getElementById('score-0').innerText = `Score: ${state.players[0].score}`;
    document.getElementById('disp-name-1').innerText = state.players[1].name;
    document.getElementById('score-1').innerText = `Score: ${state.players[1].score}`;

    // Highlight Roles
    document.getElementById('role-0').innerText = (state.domIdx === 0) ? "DOMINANT" : "SUBMISSIVE";
    document.getElementById('role-1').innerText = (state.domIdx === 1) ? "DOMINANT" : "SUBMISSIVE";
    
    document.getElementById('disp-box-0').className = `p-setup ${(state.domIdx === 0) ? 'active-dom' : 'active-sub'}`;
    document.getElementById('disp-box-1').className = `p-setup ${(state.domIdx === 1) ? 'active-dom' : 'active-sub'}`;
}

function issueDecree() {
    if(!state.activeThemes.length) return alert("Select a theme.");
    let pool = state.activeThemes.filter(t => !state.history.includes(t));
    if(!pool.length) { state.history = []; pool = state.activeThemes; }
    
    const theme = pool[Math.floor(Math.random() * pool.length)];
    state.history.push(theme);
    
    const d = state.players[state.domIdx].name; 
    const s = state.players[1 - state.domIdx].name;
    const r = (arr) => arr[Math.floor(Math.random()*arr.length)];
    const tool = (cat) => (state.inv[cat] && state.inv[cat].length) ? r(state.inv[cat]) : `[${cat}]`;
    
    let text = ""; let time = 600;

    switch(theme) {
        case "Self Bondage":
            text = `${s}, apply the **${tool('Shadow')}** now. In total darkness, use the **${tool('Restraints')}** to bind your ankles tightly together. Reach behind your back and secure your wrists. Using a secondary line, cinch your wrists to your ankles into a **strict, arched hogtie**. You must remain in this arch, blind and bound, for the duration.`;
            time = 900; break;
        case "Tease and Denial":
            text = `${s} is blindfolded with the **${tool('Shadow')}**. ${d} will use the **${tool('Ache')}** on ${s}'s genitals while simultaneously tracing the **${tool('Sensory')}** across their chest. ${s} is forbidden from making any sound or reaching climax. For every gasp, ${d} will deliver ${r([10,20])} heavy strikes with the **${tool('Impact')}**.`;
            time = 1200; break;
        case "Shibari":
            text = `${d} will construct a detailed **${r(['Chest Harness','Futomomo','Spider-web Tie'])}** on ${s} using the **${tool('Restraints')}**. ${s} must be blindfolded with the **${tool('Shadow')}**. The rope must be bitten deep into the skin. ${s} must describe the exact physical pressure of every knot.`;
            time = 1500; break;
        case "Escape":
            text = `${s} is fully sensory-deprived with the **${tool('Shadow')}** and the **${tool('Gags')}**. ${d} will bind ${s}'s wrists to their ankles with **${tool('Restraints')}**. Struggle free before the timer ends. If the blindfold is displaced before release, it is a Failure.`;
            time = 1200; break;
        case "Physical Challenge":
            text = `${s}, wearing the **${tool('Shadow')}**, must maintain a **${r(['Deep Squat','Wall-Sit'])}**. ${d} will deliver random strikes with the **${tool('Impact')}**. Flinching resets the timer.`;
            time = 720; break;
        case "Soft and Sexy":
            text = `${s} is placed in the **${tool('Shadow')}**. In darkness, ${d} will use **${tool('Sensory')}** (wax/ice) to write a word on ${s}'s inner thigh. Identify it correctly or face the **${tool('Ache')}**.`;
            time = 600; break;
        case "Truth":
            text = `**The Blind Interrogation**. ${s} is blindfolded with the **${tool('Shadow')}**. ${d} will ask 5 explicit questions. Dishonesty results in 10 strikes of the **${tool('Impact')}**.`;
            time = 600; break;
        case "Dare":
            text = `${s} must be gagged with the **${tool('Gags')}** and blindfolded with the **${tool('Shadow')}**. Led through the room by the **${tool('Restraints')}**. No resistance allowed.`;
            time = 450; break;
    }

    document.getElementById('decree-text').innerHTML = `<strong>PROTOCOL: ${theme.toUpperCase()}</strong><br><br>${text}`;
    document.getElementById('timer').innerText = formatTime(time);
    state.activeTime = time;
    document.getElementById('theme-control').style.display = 'none';
    document.getElementById('decree-panel').style.display = 'block';
    document.getElementById('post-commence').style.display = 'none';
    document.getElementById('start-t-btn').style.display = 'block';
}

function safetyProtocol(type) {
    if(type === 'red') {
        clearInterval(state.timer);
        alert("PROTOCOL HALTED.");
        document.getElementById('theme-control').style.display = 'block';
        document.getElementById('decree-panel').style.display = 'none';
    } else {
        alert("YELLOW CARD: Ease intensity immediately.");
    }
}

function startCountdown() {
    document.getElementById('start-t-btn').style.display = 'none';
    document.getElementById('post-commence').style.display = 'flex';
    let t = state.activeTime;
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        t--; document.getElementById('timer').innerText = formatTime(t);
        if(t <= 0) { clearInterval(state.timer); alert("Phase Complete."); }
    }, 1000);
}

function endRound(success) {
    const subIdx = 1 - state.domIdx;
    
    if(success) {
        state.players[subIdx].score += 1;
        state.domIdx = subIdx; // REVERSE ROLES: Sub becomes Dom
        alert("SUCCESS: Point awarded. Roles have been reversed.");
    } else {
        state.players[subIdx].score -= 1;
        // Roles stay the same (state.domIdx remains)
        alert("FAILURE: Point deducted. Roles remain the same.");
    }
    
    state.currRound++;
    clearInterval(state.timer);
    document.getElementById('theme-control').style.display = 'block';
    document.getElementById('decree-panel').style.display = 'none';
    updateUI();
}

function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
renderInventory();
</script>
</body>
</html>
