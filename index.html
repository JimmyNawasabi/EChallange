<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Competitive Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b;
            --yellow: #ffd700; --red: #ff4500;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 30px; border: 2px solid #333; box-shadow: 0 0 50px #000; position: relative; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin: 0; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 4px; }
        .box-section { background: #1f1f1f; padding: 20px; margin-bottom: 15px; border-radius: 20px; border: 1px solid #333; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 10px; background: #000; color: white; font-size: 1rem; box-sizing: border-box; }
        .gender-grid { display: flex; gap: 8px; margin-top: 10px; }
        .g-btn { flex: 1; padding: 10px; background: #111; border: 1px solid #444; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 12px; font-size: 1rem; letter-spacing: 2px; }
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tog-btn { padding: 10px; font-size: 0.65rem; border-radius: 8px; border: 1px solid #333; background: #111; color: #555; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1608; }
        .timer-big { font-size: 3.5rem; text-align: center; font-weight: bold; color: var(--accent); margin: 10px 0; font-variant-numeric: tabular-nums; }
        .step { display: none; }
        .active { display: block !important; }
        .decree-text { line-height: 1.8; text-align: left; font-size: 0.95rem; color: #eee; border-left: 3px solid var(--accent); padding-left: 15px; }
        
        /* Persistent Card Visuals */
        .card-inventory { display: flex; justify-content: center; gap: 5px; min-height: 25px; margin-top: 5px; }
        .inv-card { width: 15px; height: 22px; border-radius: 3px; display: inline-block; border: 1px solid rgba(255,255,255,0.2); }
        .inv-yellow { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
        .inv-red { background: var(--red); box-shadow: 0 0 5px var(--red); }

        .card-zone { display: flex; gap: 10px; margin-top: 15px; }
        .card-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; text-align: center; text-transform: uppercase; font-size: 0.7rem; border: none; opacity: 0.3; pointer-events: none; transition: 0.3s; }
        .card-btn.available { opacity: 1; pointer-events: auto; }
        .yellow-btn { background: var(--yellow); color: #000; }
        .red-btn { background: var(--red); color: #fff; }
        
        .outcome-zone { display: flex; gap: 10px; margin-top: 20px; }
        .btn-fail { background: #444; color: white; flex: 1; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; }
        .btn-success { background: var(--success); color: white; flex: 1; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; }
        
        .score-display { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .player-score { text-align: center; flex: 1; }
        .score-num { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        .role-tag { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">Competitive Command Protocol</div>

    <div id="screen-1" class="step active">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p1-name" placeholder="Name">
            <div class="gender-grid"><button class="g-btn active" onclick="setG(0,'M',this)">Male</button><button class="g-btn" onclick="setG(0,'F',this)">Female</button><button class="g-btn" onclick="setG(0,'NB',this)">NB</button></div>
        </div>
        <div class="box-section">
            <span class="label">Player 2</span>
            <input type="text" id="p2-name" placeholder="Name">
            <div class="gender-grid"><button class="g-btn" onclick="setG(1,'M',this)">Male</button><button class="g-btn active" onclick="setG(1,'F',this)">Female</button><button class="g-btn" onclick="setG(1,'NB',this)">NB</button></div>
        </div>
        <div class="box-section"><span class="label">Session Length (Rounds)</span><input type="number" id="rounds-total" value="10"></div>
        <button class="btn" onclick="initGame()">Initialize Sovereign Struggle</button>
    </div>

    <div id="screen-2" class="step">
        <div class="score-display">
            <div class="player-score" id="p1-card-area">
                <div class="role-tag" id="p1-role">Master</div>
                <div id="p1-label" style="font-weight:bold; font-size: 0.9rem;">Name</div>
                <div class="score-num" id="p1-points">0</div>
                <div class="card-inventory" id="p1-inv"></div>
            </div>
            <div style="align-self:center; color:#444; font-weight: 900; padding: 0 10px;">VS</div>
            <div class="player-score" id="p2-card-area">
                <div class="role-tag" id="p2-role">Slave</div>
                <div id="p2-label" style="font-weight:bold; font-size: 0.9rem;">Name</div>
                <div class="score-num" id="p2-points">0</div>
                <div class="card-inventory" id="p2-inv"></div>
            </div>
        </div>

        <div id="status-bar" style="text-align:center; font-size: 0.8rem; color: var(--accent); font-weight: bold; margin-bottom:10px;">ROUND 1</div>

        <div id="pre-round-ui">
            <div class="box-section">
                <span class="label">Select Protocol Modes</span>
                <div class="toggle-grid" id="category-mount"></div>
            </div>
            <button class="btn" onclick="actionGenerate()">Generate Decree</button>
        </div>

        <div id="active-round-ui" style="display:none;">
            <div class="box-section" id="decree-display" class="decree-text"></div>
            
            <span class="label" style="text-align:center; margin-top: 10px;">Active Master Penalties</span>
            <div class="card-zone">
                <button id="yellow-btn" class="card-btn yellow-btn" onclick="useCard('yellow')">Yellow Card</button>
                <button id="red-btn" class="card-btn red-btn" onclick="useCard('red')">Red Card</button>
            </div>

            <div class="timer-big" id="timer-text">10:00</div>

            <div class="outcome-zone">
                <button class="btn-fail" onclick="handleOutcome(false)">FAILED (Stay Slave)</button>
                <button class="btn-success" onclick="handleOutcome(true)">SUCCESS (Swap Roles)</button>
            </div>
        </div>
    </div>

    <div id="screen-3" class="step">
        <div class="box-section" style="text-align:center;">
            <h2 id="winner-name" style="color:var(--accent); text-transform:uppercase;">Winner</h2>
            <p id="winner-stat"></p>
        </div>
        <button class="btn" onclick="location.reload()">Reset Protocol</button>
    </div>
</div>

<script>
    const state = {
        p: [
            { n: "", g: "M", score: 0, role: "Master", cards: [] },
            { n: "", g: "F", score: 0, role: "Slave", cards: [] }
        ],
        curRound: 1,
        totalRounds: 10,
        cats: {
            "The Solitary Bind": { active: true }, "The Hidden Truths": { active: true },
            "The Wicked Gamble": { active: true }, "The Geometric Cage": { active: true },
            "The Agony of Nearness": { active: true }, "The Flesh Endurance": { active: true },
            "The Desperate Struggle": { active: true }, "The Velveteen Command": { active: true }
        }
    };

    const library = {
        "The Solitary Bind": ["{Subject} must use the rope to secure {S_POSS} own ankles to {S_POSS} throat in a strict frogtie. {S_PRON} must remain perfectly still as {Master} inspects the knots."],
        "The Hidden Truths": ["{Master} commands {Subject} to reveal {S_POSS} most shameful submissive secret. If {Master} deems the truth insufficient, {S_PRON} must perform 20 pushups while bound."],
        "The Wicked Gamble": ["{Subject} must guess which tool {Master} is holding behind {M_POSS} back. If wrong, 10 strikes of the flogger are delivered."],
        "The Geometric Cage": ["{Master} will bind {Subject} in a 'Box Tie', pulling {S_POSS} elbows together behind {S_POSS} back until {S_POSS} chest is fully arched and exposed."],
        "The Agony of Nearness": ["{Master} will edge {Subject} 3 times. {Subject} is not allowed to make a single sound. If {S_PRON} moans, the count resets."],
        "The Flesh Endurance": ["{Subject} must hold a wall-sit while balancing an object on {S_POSS} head for 3 minutes."],
        "The Desperate Struggle": ["{Master} binds {Subject}'s wrists to {S_POSS} ankles. {Subject} has 4 minutes to hop/roll across the room and back."],
        "The Velveteen Command": ["{Master} will use silk or soft touch to tease {Subject}. {Subject} must recite a poem of devotion."]
    };

    function setG(i, v, e) {
        state.p[i].g = v;
        e.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        e.classList.add('active');
    }

    function initGame() {
        state.p[0].n = document.getElementById('p1-name').value || "Player 1";
        state.p[1].n = document.getElementById('p2-name').value || "Player 2";
        state.totalRounds = parseInt(document.getElementById('rounds-total').value);
        
        // Randomly assign initial cards
        if (Math.random() > 0.5) {
            state.p[0].cards = ['yellow'];
            state.p[1].cards = ['red'];
        } else {
            state.p[0].cards = ['red'];
            state.p[1].cards = ['yellow'];
        }

        document.getElementById('p1-label').innerText = state.p[0].n;
        document.getElementById('p2-label').innerText = state.p[1].n;
        
        renderToggles();
        updateUI();
        nav(2);
    }

    function useCard(type) {
        const mIdx = state.p[0].role === "Master" ? 0 : 1;
        const sIdx = mIdx === 0 ? 1 : 0;
        
        const cardIndex = state.p[mIdx].cards.indexOf(type);
        if (cardIndex > -1) {
            state.p[mIdx].cards.splice(cardIndex, 1);
            state.p[sIdx].cards.push(type); // Transfer to the other player
            alert(`${type.toUpperCase()} CARD ISSUED! Penalty applied. Card transferred to ${state.p[sIdx].n}.`);
            updateUI();
        }
    }

    function updateUI() {
        const mIdx = state.p[0].role === "Master" ? 0 : 1;
        
        document.getElementById('p1-points').innerText = state.p[0].score;
        document.getElementById('p2-points').innerText = state.p[1].score;
        document.getElementById('p1-role').innerText = state.p[0].role;
        document.getElementById('p2-role').innerText = state.p[1].role;
        
        // Inventory display
        ['p1', 'p2'].forEach((prefix, idx) => {
            const inv = document.getElementById(`${prefix}-inv`);
            inv.innerHTML = '';
            state.p[idx].cards.forEach(c => {
                inv.innerHTML += `<div class="inv-card inv-${c}"></div>`;
            });
        });

        // Master Penalty Buttons
        const yBtn = document.getElementById('yellow-btn');
        const rBtn = document.getElementById('red-btn');
        
        yBtn.classList.toggle('available', state.p[mIdx].cards.includes('yellow'));
        rBtn.classList.toggle('available', state.p[mIdx].cards.includes('red'));

        document.getElementById('p1-role').style.color = state.p[0].role === "Master" ? "var(--accent)" : "#888";
        document.getElementById('p2-role').style.color = state.p[1].role === "Master" ? "var(--accent)" : "#888";
    }

    function handleOutcome(success) {
        clearInterval(state.int);
        const mIdx = state.p[0].role === "Master" ? 0 : 1;
        const sIdx = mIdx === 0 ? 1 : 0;

        if (success) {
            state.p[sIdx].score += 1;
            state.p[mIdx].role = "Slave";
            state.p[sIdx].role = "Master";
            alert(`${state.p[sIdx].n} succeeded! Roles are now REVERSED.`);
        } else {
            state.p[mIdx].score += 1;
            alert(`${state.p[sIdx].n} failed. ${state.p[mIdx].n} retains sovereignty.`);
        }

        updateUI();
        
        if (state.curRound >= state.totalRounds) {
            endGame();
        } else {
            state.curRound++;
            document.getElementById('status-bar').innerText = `ROUND ${state.curRound}`;
            document.getElementById('pre-round-ui').style.display = 'block';
            document.getElementById('active-round-ui').style.display = 'none';
        }
    }

    function actionGenerate() {
        const activeCats = Object.keys(state.cats).filter(k => state.cats[k].active);
        const cat = activeCats[Math.floor(Math.random() * activeCats.length)];
        const template = library[cat][0];
        
        const mIdx = state.p[0].role === "Master" ? 0 : 1;
        const sIdx = mIdx === 0 ? 1 : 0;

        const sG = { M: { p: 'he', o: 'him', s: 'his' }, F: { p: 'she', o: 'her', s: 'her' }, NB: { p: 'they', o: 'them', s: 'their' } }[state.p[sIdx].g];
        const mG = { M: { p: 'he', o: 'him', s: 'his' }, F: { p: 'she', o: 'her', s: 'her' }, NB: { p: 'they', o: 'them', s: 'their' } }[state.p[mIdx].g];

        let p = template.replace(/{Master}/g, state.p[mIdx].n).replace(/{Subject}/g, state.p[sIdx].n)
            .replace(/{S_PRON}/g, sG.p).replace(/{S_OBJ}/g, sG.o).replace(/{S_POSS}/g, sG.s)
            .replace(/{M_POSS}/g, mG.s);

        document.getElementById('decree-display').innerHTML = `<span class="label">${cat}</span>${p}`;
        document.getElementById('pre-round-ui').style.display = 'none';
        document.getElementById('active-round-ui').style.display = 'block';
        startTimer();
    }

    function startTimer() {
        let v = 600;
        state.int = setInterval(() => {
            v--;
            document.getElementById('timer-text').innerText = `${Math.floor(v / 60)}:${(v % 60 < 10 ? '0' : '') + v % 60}`;
            if (v <= 0) handleOutcome(false);
        }, 1000);
    }

    function renderToggles() {
        const mn = document.getElementById('category-mount'); mn.innerHTML = '';
        for (let k in state.cats) {
            mn.innerHTML += `<button class="tog-btn ${state.cats[k].active ? 'active' : ''}" onclick="state.cats['${k}'].active=!state.cats['${k}'].active; this.classList.toggle('active')">${k}</button>`;
        }
    }

    function nav(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${n}`).classList.add('active');
    }

    function endGame() {
        nav(3);
        const winner = state.p[0].score > state.p[1].score ? state.p[0] : state.p[1];
        const isTie = state.p[0].score === state.p[1].score;
        document.getElementById('winner-name').innerText = isTie ? "Stalemate" : `${winner.n} Wins`;
        document.getElementById('winner-stat').innerText = isTie ? "The struggle ends in equal power." : `Ultimate Sovereignty achieved with ${winner.score} points.`;
    }
</script>
</body>
</html>
