
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit: Sovereignty</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --safe-green: #2e7d32; --veto: #4a4a4a;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 18px; }
        .container { max-width: 700px; width: 100%; background: var(--card-bg); padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        .step { display: none; }
        .active { display: block !important; }

        .box { background: #fffcf9; border: 1px solid #f0e6d2; padding: 25px; margin-bottom: 25px; border-radius: 25px; line-height: 1.8; position: relative; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.5px; }

        /* ENSURING INPUT STABILITY */
        .input-group { margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 15px; border: 1px solid #eee; }
        input[type="text"], select, input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-top: 5px; font-size: 1rem; font-family: inherit; display: block; box-sizing: border-box; }
        
        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .tag { background: #f9f4eb; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; color: #7b6a4a; border: 1px solid #e2d1b3; transition: 0.2s; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }
        
        .badge { display: inline-block; padding: 6px 18px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: white; }
        .b-truth { background: #5d6d7e; } .b-dare { background: #af601a; } .b-escape { background: #c0392b; }
        .b-edging { background: #884ea0; } .b-physical { background: #1e8449; }
        
        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1rem; margin-bottom: 10px; transition: 0.3s; }
        .timer-display { font-size: 5rem; text-align: center; color: var(--crimson); font-weight: 100; margin: 20px 0; font-family: monospace; }
        .intensity-pill { position: absolute; top: 15px; right: 15px; font-size: 0.6rem; padding: 4px 10px; border-radius: 50px; border: 1px solid var(--accent); color: var(--accent); text-transform: uppercase; font-weight: 800; }
        
        b { color: var(--crimson); text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">Sovereignty Edition</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Rounds to Ascension</span>
            <input type="number" id="maxRounds" value="6">
            
            <div class="input-group">
                <span class="label">Primary Authority (Player 1)</span>
                <input type="text" id="p1_name" placeholder="Name (Starts as Master)">
                <select id="p1_gender">
                    <option value="male body">Male Body</option>
                    <option value="female body">Female Body</option>
                </select>
            </div>

            <div class="input-group">
                <span class="label">The Subject (Player 2)</span>
                <input type="text" id="p2_name" placeholder="Name (Starts as Slave)">
                <select id="p2_gender">
                    <option value="male body">Male Body</option>
                    <option value="female body">Female Body</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="goToStep(2)">Curate Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Active Inventory</span>
            <p style="font-size: 0.7rem; color: #888; margin-top: -5px;">Select gear available for this session.</p>
            <div id="inv-container"></div>
        </div>
        <button class="btn" onclick="goToStep(3)">Commence Ceremony</button>
    </div>

    <div id="step3" class="step">
        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center; font-size: 0.9rem;">---</div>
            <div class="box" style="text-align:left; min-height: 150px;">
                <div id="intensity-display" class="intensity-pill">---</div>
                <div id="badge-container"></div>
                <div id="task-text">Press the button below to manifest a decree.</div>
            </div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Decree</button>
            <div id="pre-start-controls" style="display:none;">
                <button class="btn" style="background: var(--safe-green);" onclick="startT()">Begin Execution</button>
                <button class="btn" style="background: var(--veto); font-size:0.8rem;" onclick="generate()">Reroll Decree</button>
            </div>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <button class="btn" onclick="resolveTurn(true)">Merit Achieved (Swap Roles)</button>
            <button class="btn" style="background:#888;" onclick="resolveTurn(false)">Task Failed (Maintain Roles)</button>
        </div>
    </div>
</div>

<script>
    const gearPool = {
        "Blindfolds": ["Pillow Case", "Gas Mask", "Bandage", "Tape", "Cloth", "Sleep Mask", "Silk Scarf", "Hood"],
        "Gags": ["Gas Mask", "Tape", "Pallet Wrap", "Cloth", "Panties", "Bandage", "Rope", "Ring Gag", "Ball Gag", "Hood"],
        "Restraints": ["Leather Cuffs", "Tape", "Pallet Wrap", "String", "Belt", "Ribbon", "Rope", "Handcuffs"],
        "Sensation": ["Anal Hook", "Pussy Hook", "E-stim Machine", "Anal Dildo", "Insertable", "Dildo", "Butt Plug", "Paddle", "Vibrator", "Cane", "Needle", "Sharpies", "Tape", "Candle", "Clamps"]
    };

    let activeInv = {};
    let players = []; 
    let currentRound = 1;
    let masterIdx = 0; // Player 1 starts as Master
    let slaveIdx = 1;  // Player 2 starts as Slave
    let timer, timeLeft;

    function initGear() {
        for (let cat in gearPool) {
            activeInv[cat] = gearPool[cat].map(i => ({ n: i, on: true }));
        }
    }
    initGear();

    function getMethod(item, intensity) {
        item = item.toLowerCase();
        if (item === "pillow case") return "Drape the fabric entirely over the Slave's head. Secure it loosely at the neck to ensure total darkness and muffled sensory input.";
        if (item === "gas mask") return "Seal the mask against the Slave's face, tightening the head straps until the seal is firm and breathing is audible through the filter.";
        if (item === "tape") return `Apply horizontally across the ${item.includes('gag') ? 'lips' : 'eyes'}, pressing the edges deep into the skin to prevent any ${item.includes('gag') ? 'sound' : 'light'} escaping.`;
        if (item === "pallet wrap") return "Circle the head three times, binding the mouth closed and ensuring the plastic clings tightly to the jawline.";
        if (item.includes("hook")) return `Apply sterile lubricant. Slowly slide the curve into the ${item.includes('anal') ? 'rectum' : 'genitals'} until the base is flush with the skin, allowing the weight to hang.`;
        if (item === "rope" || item === "string") return `Loop the material twice around the wrists. Knot it with a ${intensity === 'tight' ? 'binding double-knot' : 'secure but soft square-knot'}.`;
        if (item === "leather cuffs") return `Lock the hardware around the limbs, cinching it to the ${intensity === 'tight' ? 'tightest comfortable notch' : 'middle notch'}.`;
        return `Apply the ${item} with ${intensity} focus, ensuring the Slave feels the full weight and texture of the object.`;
    }

    function renderInv() {
        const container = document.getElementById('inv-container');
        container.innerHTML = '';
        for (let cat in activeInv) {
            let section = document.createElement('div');
            section.innerHTML = `<span class="label">${cat}</span><div class="tag-row" id="tags-${cat}"></div>`;
            container.appendChild(section);
            activeInv[cat].forEach(item => {
                let tag = document.createElement('div');
                tag.className = `tag ${item.on ? 'on' : ''}`;
                tag.innerText = item.n;
                tag.onclick = () => { item.on = !item.on; renderInv(); };
                section.querySelector(`#tags-${cat}`).appendChild(tag);
            });
        }
    }

    function goToStep(n) {
        if (n === 2) {
            players = [
                {n: document.getElementById('p1_name').value || "Player 1", g: document.getElementById('p1_gender').value},
                {n: document.getElementById('p2_name').value || "Player 2", g: document.getElementById('p2_gender').value}
            ];
            renderInv();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        if (n === 3) updateHeader();
    }

    function updateHeader() {
        document.getElementById('round-header').innerHTML = `ROUND ${currentRound} <br> <b>Master: ${players[masterIdx].n}</b> | Slave: ${players[slaveIdx].n}`;
    }

    const tasks = {
        truth: { label: "Truth", time: 120, templates: ["Master shall [DESC-VIS]. In this darkness, Master will [DESC-GAG]. Slave must attempt to confess a secret through the binding."] },
        dare: { label: "Dare", time: 300, templates: ["Master must [DESC-REST] and then [DESC-VIS]. Once blind and bound, Master will [DESC-SENS] on the Slave's [BODY]."] },
        escape: { label: "Escape", time: 480, templates: ["Master must [DESC-REST] with maximum tension and [DESC-VIS]. Slave has until the clock ends to struggle free."] },
        edging: { label: "Edging", time: 360, templates: ["Master will [DESC-REST] and then use [DESC-SENS] to tease the Slave's [BODY] to the absolute brink of climax 3 times."] }
    };

    function generate() {
        let k = Object.keys(tasks)[Math.floor(Math.random()*Object.keys(tasks).length)];
        let intensity = ["soft", "firm", "tight"][Math.floor(Math.random()*3)];
        let template = tasks[k].templates[0];
        
        const pick = (c) => {
            let p = activeInv[c].filter(i=>i.on);
            return p.length ? p[Math.floor(Math.random()*p.length)].n : "gear";
        };

        let v = pick('Blindfolds'), g = pick('Gags'), r = pick('Restraints'), s = pick('Sensation');

        let res = template.replace(/\[DESC-VIS\]/g, `apply the <b>${v}</b>: ${getMethod(v, intensity)}`)
                          .replace(/\[DESC-GAG\]/g, `apply the <b>${g}</b>: ${getMethod(g, intensity)}`)
                          .replace(/\[DESC-REST\]/g, `apply the <b>${r}</b>: ${getMethod(r, intensity)}`)
                          .replace(/\[DESC-SENS\]/g, `apply the <b>${s}</b>: ${getMethod(s, intensity)}`)
                          .replace(/\[BODY\]/g, players[slaveIdx].g);

        document.getElementById('intensity-display').innerText = `Intensity: ${intensity}`;
        document.getElementById('badge-container').innerHTML = `<span class="badge b-${k}">${tasks[k].label}</span>`;
        document.getElementById('task-text').innerHTML = res;
        timeLeft = tasks[k].time;
        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('pre-start-controls').style.display = 'block';
    }

    function startT() {
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) { clearInterval(timer); resolveTurn(false); }
        }, 1000);
    }

    function resolveTurn(success) {
        clearInterval(timer);
        if (success) {
            // Swap Indices
            let temp = masterIdx;
            masterIdx = slaveIdx;
            slaveIdx = temp;
            alert("Merit Recognized. Roles have been swapped.");
        } else {
            alert("The Slave has failed. Authority remains unchanged.");
        }
        currentRound++;
        if (currentRound > parseInt(document.getElementById('maxRounds').value)) {
            document.body.innerHTML = `<div class="container" style="text-align:center;"><h1>Session Complete</h1><button class="btn" onclick="location.reload()">Reset</button></div>`;
        } else {
            updateHeader();
            document.getElementById('active-round').style.display = 'none';
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('gen-btn').style.display = 'block';
            document.getElementById('pre-start-controls').style.display = 'none';
            document.getElementById('task-text').innerHTML = "The air settles... Prepare for the next decree.";
        }
    }
</script>
</body>
</html>
