<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: High-Contrast</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --off: #2a2a2a;
        }

        /* Forced Arial & Smoothing */
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: Arial, Helvetica, sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center;
        }

        .container { 
            max-width: 580px; 
            width: 100%; 
            background: var(--card); 
            padding: 40px; 
            border-radius: 40px; 
            border: 2px solid #222; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            margin-top: 10px;
        }
        
        h1 { 
            font-weight: bold; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 12px; 
            color: var(--accent); 
            margin-bottom: 5px; 
            font-size: 2.4rem; 
        }

        .subtitle { 
            text-align: center; 
            font-size: 0.9rem; 
            color: #666; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
        }
        
        /* Larger, smoother text for instructions */
        .box { 
            background: #1f1f1f; 
            padding: 30px; 
            margin-bottom: 30px; 
            border-radius: 30px; 
            border: 1px solid #333; 
            font-size: 1.3rem; /* Increased size */
            line-height: 1.8;
            color: #eee;
        }

        .label { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            font-weight: bold; 
            color: var(--accent); 
            display: block; 
            margin-bottom: 15px; 
            letter-spacing: 2px;
        }

        input, select { 
            width: 100%; 
            padding: 20px; 
            border: 1px solid #444; 
            border-radius: 18px; 
            background: #000; 
            color: white; 
            font-size: 1.2rem; 
            margin-bottom: 15px;
            font-family: Arial, sans-serif;
        }
        
        .btn { 
            background: var(--crimson); 
            color: white; 
            border: none; 
            padding: 25px; 
            width: 100%; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; 
            border-radius: 25px; 
            font-size: 1.3rem; 
            letter-spacing: 3px; 
            transition: 0.2s; 
        }

        .btn:active { transform: scale(0.95); opacity: 0.9; }
        .btn-sec { background: var(--off); margin-top: 12px; color: #aaa; font-size: 1.1rem; }

        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .t-btn { 
            padding: 22px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            background: #111; 
            color: #777; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            font-family: Arial, sans-serif;
        }

        .t-btn.on { background: var(--accent); color: #000; border-color: var(--accent); }
        .t-btn.gear-on { background: var(--crimson); color: white; border-color: var(--crimson); }

        .tag { 
            background: #000; 
            padding: 15px 22px; 
            border-radius: 18px; 
            font-size: 1rem; 
            cursor: pointer; 
            border: 1px solid #333; 
            color: #999; 
        }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }

        .timer-big { 
            font-size: 6.5rem; 
            text-align: center; 
            color: #fff; 
            font-weight: bold; 
            margin: 20px 0; 
            font-family: Arial, sans-serif;
        }

        .instruction-highlight { 
            color: var(--accent); 
            font-weight: bold; 
            font-size: 1.4rem;
            text-transform: uppercase;
        }
        
        .step { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">Command Interface</div>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-alarm" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Session Registry</span>
            <input type="text" id="p1_n" placeholder="Master Name">
            <input type="text" id="p2_n" placeholder="Subject Name">
            <span class="label" style="margin-top:20px;">Protocol Rounds</span>
            <input type="number" id="max_r" value="10">
        </div>
        <button class="btn" onclick="vibrate(50); playSnd('click'); nav(2);">Access Vault</button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Arsenal Management</span>
            <div id="vault-inject"></div>
        </div>
        <button class="btn" onclick="vibrate(50); playSnd('click'); nav(3);">Confirm Protocol</button>
    </div>

    <div id="step3" class="step">
        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center; color:var(--accent); font-size: 1.3rem; margin-bottom:25px;">ROUND 1</div>
            <div class="box"><span class="label">Choose Trials</span><div class="toggle-grid" id="trial-toggles"></div></div>
            <div class="box"><span class="label">Choose Gear Categories</span><div class="toggle-grid" id="gear-toggles"></div></div>
            <button class="btn" onclick="vibrate(100); playSnd('click'); generateDecree();">Generate Decree</button>
        </div>

        <div id="active-round" style="display:none;">
            <div class="box"><div id="active-trial-text" style="text-align:center;"></div></div>
            <div class="timer-big" id="clock">00:00</div>
            <button class="btn" style="background:var(--success);" onclick="vibrate(200); playSnd('success'); finish(true);">Success</button>
            <button class="btn btn-sec" onclick="finish(false);">Failure</button>
        </div>
    </div>
</div>

<script>
    let players = [], curR = 1, maxR = 10, masterIdx = 0, timer, timeLeft;
    const defaultVault = {
        "Blindfolds": ["Tape", "Gas Mask", "Sleep Mask", "Hood"],
        "Gags": ["Tape", "Ball Gag", "Pallet Wrap", "Panties", "Sock Gag"],
        "Restraints": ["Rope", "Leather Cuffs", "Zip Ties", "Duct Tape"],
        "Sensation": ["Whip", "Ice", "Vibrator", "Clamps", "Cane", "Hot Wax"]
    };

    let trials = [
        { n: "Solitary Constraint", t: 600, d: "Subject must secure their own limbs with <b>[REST]</b>. Once bound, Master applies <b>[VIS]</b> and <b>[GAG]</b>.", on: true },
        { n: "Void Deprivation", t: 450, d: "Complete deprivation with <b>[VIS]</b> and <b>[GAG]</b>. Master uses <b>[SENS]</b> in the darkness.", on: true },
        { n: "The Statue", t: 600, d: "Subject is bound in <b>[REST]</b>. They must remain motionless while Master explores them with <b>[SENS]</b>.", on: true },
        { n: "The Inquisitor", t: 450, d: "Subject answers questions while wearing <b>[VIS]</b>. Incorrect or slow answers earn the <b>[SENS]</b>.", on: true }
    ];

    let gearCats = { "Blindfolds": true, "Gags": true, "Restraints": true, "Sensation": true };
    let vault = JSON.parse(localStorage.getItem('sov_arial_vault')) || null;
    if(!vault) {
        vault = {};
        for(let c in defaultVault) vault[c] = defaultVault[c].map(n => ({n, on: true}));
    }

    function playSnd(id) { document.getElementById('snd-'+id).play(); }
    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    function nav(n) {
        if(n === 2) {
            players = [{n: document.getElementById('p1_n').value || "Master"}, {n: document.getElementById('p2_n').value || "Subject"}];
            maxR = parseInt(document.getElementById('max_r').value);
            renderVault();
        }
        if(n === 3) renderCommandCenter();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    function renderVault() {
        const cont = document.getElementById('vault-inject'); cont.innerHTML = '';
        for(let c in vault) {
            let div = document.createElement('div');
            div.innerHTML = `<span class="label">${c}</span><div class="tag-cloud" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;"></div>`;
            cont.appendChild(div);
            vault[c].forEach((item, i) => {
                let t = document.createElement('div'); t.className = `tag ${item.on ? 'on' : ''}`;
                t.innerHTML = item.n;
                t.onclick = () => { item.on = !item.on; localStorage.setItem('sov_arial_vault', JSON.stringify(vault)); renderVault(); vibrate(20); };
                div.querySelector('.tag-cloud').appendChild(t);
            });
        }
    }

    function renderCommandCenter() {
        document.getElementById('round-header').innerText = `ROUND ${curR} | Master: ${players[masterIdx].n}`;
        const tGrid = document.getElementById('trial-toggles'); tGrid.innerHTML = '';
        trials.forEach((t, i) => {
            let b = document.createElement('button'); b.className = `t-btn ${t.on ? 'on' : ''}`;
            b.innerText = t.n; b.onclick = () => { t.on = !t.on; b.classList.toggle('on'); vibrate(30); };
            tGrid.appendChild(b);
        });
        const gGrid = document.getElementById('gear-toggles'); gGrid.innerHTML = '';
        for(let c in gearCats) {
            let b = document.createElement('button'); b.className = `t-btn ${gearCats[c] ? 'gear-on' : ''}`;
            b.innerText = c; b.onclick = () => { gearCats[c] = !gearCats[c]; b.classList.toggle('gear-on'); vibrate(30); };
            gGrid.appendChild(b);
        }
    }

    function generateDecree() {
        let activeTrials = trials.filter(t => t.on);
        if(!activeTrials.length) return alert("Select a Trial.");
        let t = activeTrials[Math.floor(Math.random() * activeTrials.length)];
        const pick = (c) => { 
            if(!gearCats[c]) return `<span style="opacity:0.3; font-size:1rem;">[SKIP ${c}]</span>`;
            let p = vault[c].filter(i=>i.on); 
            return `<span class="instruction-highlight">${p.length ? p[Math.floor(Math.random()*p.length)].n : c}</span>`; 
        };
        let text = t.d.replace('[REST]', pick('Restraints')).replace('[SENS]', pick('Sensation')).replace('[VIS]', pick('Blindfolds')).replace('[GAG]', pick('Gags'));
        document.getElementById('active-trial-text').innerHTML = `<strong>${t.n.toUpperCase()}</strong><br><br>${text}`;
        timeLeft = t.t;
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        startClock();
    }

    function startClock() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(timeLeft === 10) { playSnd('alarm'); vibrate([100, 100, 100]); }
            if(timeLeft <= 0) { vibrate([500, 200, 500]); finish(false); }
        }, 1000);
    }

    function finish(win) {
        clearInterval(timer);
        curR++;
        if(curR > maxR) { alert("Protocol Concluded."); location.reload(); }
        else {
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('active-round').style.display = 'none';
            renderCommandCenter();
        }
    }
</script>
</body>
</html>
