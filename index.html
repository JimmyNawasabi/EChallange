<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Judicial Economy</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #008000; --gold: #ffd700;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 0.85rem; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 20px; border-radius: 20px; border: 3px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 15px 0;}
        
        .box-section { background: #000; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; position: relative; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 2px; }
        
        input, select { width: 100%; padding: 10px; border: 1px solid var(--accent); border-radius: 4px; background: #000; color: white; margin-bottom: 10px; }
        
        /* Arsenal Styles */
        .item-grid { display: flex; flex-wrap: wrap; gap: 5px; margin: 5px 0; }
        .chip { padding: 4px 10px; border: 1px solid #444; border-radius: 4px; font-size: 0.7rem; cursor: pointer; background: #0a0a0a; color: #666; }
        .chip.active { border-color: var(--accent); color: #fff; background: #001a35; }

        /* Card Mechanics */
        .inventory-cards { display: flex; justify-content: center; gap: 10px; min-height: 50px; margin-top: 10px; }
        .card-obj { width: 35px; height: 50px; border-radius: 4px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .card-obj:hover { transform: scale(1.1); }
        .c-yellow { background: var(--gold); color: #000; }
        .c-red { background: var(--crimson); color: #fff; }

        .btn { background: var(--accent); color: white; border: 1px solid #FFF; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 8px; margin-top: 10px; }
        .score-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .player-box { flex: 1; background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: center; }
        .player-box.active-dom { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 86, 179, 0.3); }

        #timer-box { font-size: 3rem; font-weight: 100; color: var(--crimson); text-align: center; }
        #decree-text { font-size: 1.1rem; line-height: 1.6; color: #ccc; min-height: 100px; padding: 20px; border: 1px solid #222; margin: 10px 0; border-radius: 8px;}
    </style>
</head>

        </div>

    </div>
