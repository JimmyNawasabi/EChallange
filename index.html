<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGNTY: v29.0</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #28a745; --gold: #ffd700; --warning: #ffae00;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 1000px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 10px 0; }
        
        .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .p-box { background: #080808; padding: 20px; border-radius: 10px; border: 2px solid #333; text-align: center; transition: 0.3s; }
        .active-dom { border-color: var(--gold) !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .active-sub { border-color: var(--accent) !important; box-shadow: 0 0 20px rgba(0, 86, 179, 0.2); }
        
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 5px; letter-spacing: 2px; }
        
        .gen-toggle { display: flex; gap: 5px; margin-top: 10px; justify-content: center; }
        .gen-btn { flex: 1; padding: 8px; border: 1px solid #333; background: #000; color: #555; cursor: pointer; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .gen-btn.active { border-color: var(--accent); color: white; background: #001a35; }

        #inventory-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .inv-section { background: #050505; padding: 10px; border: 1px solid #333; border-radius: 8px; border-left: 3px solid var(--accent); }

        .theme-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .theme-btn { padding: 10px; background: #111; border: 1px solid #333; border-radius: 4px; font-size: 0.65rem; text-align: center; cursor: pointer; color: #555; font-weight: bold; text-transform: uppercase; }
        .theme-btn.active { border-color: var(--gold); color: var(--gold); background: #1a1500; }

        #decree-text { background: #050505; padding: 30px; border-radius: 10px; border-left: 5px solid var(--gold); font-size: 1.1rem; line-height: 1.8; margin: 20px 0; color: #eee; }
        #timer { font-size: 5rem; color: var(--crimson); font-family: monospace; text-align: center; margin: 10px 0; }
        .btn-main { background: var(--accent); color: white; padding: 18px; width: 100%; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        #history-log { margin-top: 30px; border-top: 1px solid #222; padding-top: 15px; font-size: 0.8rem; color: #666; }
        .history-entry { margin-bottom: 5px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 3px 0; }

        .safety-bar { display: flex; gap: 10px; margin-top: 15px; }
        .card { flex: 1; padding: 15px; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; border: none; }
        .card-yellow { background: var(--warning); color: #000; }
        .card-red { background: var(--crimson); color: #fff; }

        input[type="text"] { width: 100%; padding: 10px; background: #000; color: white; border: 1px solid #333; border-radius: 4px; box-sizing: border-box; }
        .chip { background:#222; padding:2px 6px; border-radius:3px; font-size:0.65rem; display:inline-flex; align-items:center; gap:4px; margin:2px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-screen">
        <div class="p-grid">
            <div class="p-box">
                <span class="label">Player One</span>
                <input type="text" id="p1-name" value="Master">
                <div class="gen-toggle">
                    <button class="gen-btn active" id="p1-m" onclick="toggleSetupGen(1,'M')">MALE</button>
                    <button class="gen-btn" id="p1-f" onclick="toggleSetupGen(1,'F')">FEMALE</button>
                </div>
            </div>
            <div class="p-box">
                <span class="label">Player Two</span>
                <input type="text" id="p2-name" value="Slave">
                <div class="gen-toggle">
                    <button class="gen-btn" id="p2-m" onclick="toggleSetupGen(2,'M')">MALE</button>
                    <button class="gen-btn active" id="p2-f" onclick="toggleSetupGen(2,'F')">FEMALE</button>
                </div>
            </div>
        </div>
        <div id="inventory-list"></div>
        <button class="btn-main" style="margin-top:20px;" onclick="startSession()">LOCK PROTOCOLS</button>
    </div>

    <div id="play-screen" style="display:none;">
        <div id="phase-label" style="text-align:center; color:var(--accent); letter-spacing: 3px; margin-bottom: 15px; font-weight:bold;">PHASE 1</div>
        <div class="p-grid">
            <div id="dom-card" class="p-box active-dom">
                <span class="label" style="color:var(--gold)">DOMINANT</span>
                <div id="dom-display" style="font-size: 1.4rem; font-weight: bold;"></div>
                <div id="dom-score" style="color: #666; font-size: 0.8rem; margin-top:5px;">Points: 0</div>
            </div>
            <div id="sub-card" class="p-box active-sub">
                <span class="label" style="color:var(--accent)">SUBMISSIVE</span>
                <div id="sub-display" style="font-size: 1.4rem; font-weight: bold;"></div>
                <div id="sub-score" style="color: #666; font-size: 0.8rem; margin-top:5px;">Points: 0</div>
            </div>
        </div>
        <div id="control-area">
            <div class="theme-selector" id="theme-selector"></div>
            <button class="btn-main" onclick="generateDecree()">GENERATE DECREE</button>
        </div>
        <div id="decree-area" style="display:none;">
            <div id="timer">00:00</div>
            <button class="btn-main" id="commence-btn" style="background:var(--gold); color:black;" onclick="runTimer()">COMMENCE PHASE</button>
            <div id="decree-text"></div>
            <div class="safety-bar">
                <button class="card card-yellow" onclick="alert('YELLOW: Reduce intensity.')">YELLOW</button>
                <button class="card card-red" onclick="location.reload()">RED (EXIT)</button>
            </div>
            <div id="resolution-buttons" style="display:none; gap:10px; margin-top:15px;">
                <button class="btn-main" style="background:#1a1a1a; flex:1;" onclick="resolve(false)">FAILURE (-1 PT)</button>
                <button class="btn-main" style="background:var(--success); flex:1;" onclick="resolve(true)">SUCCESS (+1 PT & SWAP)</button>
            </div>
        </div>
        <div id="history-log"><strong>HISTORY LOG:</strong><div id="history-inner"></div></div>
    </div>
</div>

<script>
const CATS = ["Restraints", "Impact", "Gags", "Shadow", "Sensory", "Ache", "Stillness", "Quietude"];
const THEMES = ["Self Bondage", "Truth", "Dare", "Soft and Sexy", "Escape", "Shibari", "Physical Challenge", "Tease and Denial"];

let session = {
    round: 1,
    dom: { name: "", gender: "M", score: 0 },
    sub: { name: "", gender: "F", score: 0 },
    inv: JSON.parse(localStorage.getItem('sov_v29_inv')) || {
        "Restraints":["Rope"], "Impact":["Paddle"], "Gags":["Ball Gag"], 
        "Shadow":["Blindfold", "Hood"], "Sensory":["Wax"], "Ache":["Clamps"], 
        "Stillness":["Collar"], "Quietude":["Muzzle"]
    },
    activeThemes: [...THEMES],
    timer: null, history: []
};

// Force Shadow
CATS.forEach(c => { if(!session.inv[c]) session.inv[c] = ["Standard " + c]; });

function toggleSetupGen(p, g) {
    if(p === 1) session.dom.gender = g; else session.sub.gender = g;
    const btns = event.target.parentNode.querySelectorAll('.gen-btn');
    btns.forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function renderInv() {
    document.getElementById('inventory-list').innerHTML = CATS.map(c => `
        <div class="inv-section"><span class="label">${c}</span>
        <div id="items-${c}">${session.inv[c].map((it, i) => `<span class="chip">${it} <span onclick="removeItem('${c}',${i})" style="color:red;cursor:pointer">×</span></span>`).join('')}</div>
        <input type="text" placeholder="+" onkeydown="if(event.key==='Enter'){addItem('${c}',this.value);this.value=''}"></div>
    `).join('');
}
function addItem(c,v){ if(v){session.inv[c].push(v); save(); renderInv();}}
function removeItem(c,i){ session.inv[c].splice(i,1); save(); renderInv();}
function save(){ localStorage.setItem('sov_v29_inv', JSON.stringify(session.inv)); }

function startSession() {
    session.dom.name = document.getElementById('p1-name').value;
    session.sub.name = document.getElementById('p2-name').value;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'block';
    renderThemes();
    updateUI();
}

function renderThemes() {
    document.getElementById('theme-selector').innerHTML = THEMES.map(t => `
        <div class="theme-btn ${session.activeThemes.includes(t)?'active':''}" onclick="toggleTheme('${t}')">${t}</div>
    `).join('');
}
function toggleTheme(t){
    if(session.activeThemes.includes(t)) session.activeThemes = session.activeThemes.filter(x=>x!==t);
    else session.activeThemes.push(t);
    renderThemes();
}

function updateUI() {
    document.getElementById('phase-label').innerText = `PHASE ${session.round}`;
    document.getElementById('dom-display').innerText = `${session.dom.name} (${session.dom.gender})`;
    document.getElementById('dom-score').innerText = `Points: ${session.dom.score}`;
    document.getElementById('sub-display').innerText = `${session.sub.name} (${session.sub.gender})`;
    document.getElementById('sub-score').innerText = `Points: ${session.sub.score}`;
    
    let histHtml = session.history.map(h => `<div class="history-entry"><span>Phase ${h.r}: ${h.d} > ${h.s}</span><span>[${h.res}]</span></div>`).join('');
    document.getElementById('history-inner').innerHTML = histHtml;
}

function generateDecree() {
    const theme = session.activeThemes[Math.floor(Math.random()*session.activeThemes.length)];
    const r = (arr) => arr[Math.floor(Math.random()*arr.length)];
    const tool = (c) => r(session.inv[c]);
    
    const d = session.dom.name; const s = session.sub.name;
    const isM = session.sub.gender === 'M';
    const subObj = isM ? 'him' : 'her';
    const subPoss = isM ? 'his' : 'her';
    const subSelf = isM ? 'himself' : 'herself';

    let text = ""; let time = 600;

    switch(theme) {
        case "Self Bondage":
            text = `${s}, apply the **${tool('Shadow')}** now. Bind ${subPoss} ankles with **${tool('Restraints')}**. Reach back and secure ${subPoss} wrists, cinching ${subObj} into a strict hogtie. ${d} will inspect the tension and ensure ${s} cannot move.`;
            time = 900; break;
        case "Tease and Denial":
            text = `${s} is blindfolded with the **${tool('Shadow')}**. ${d} will use **${tool('Ache')}** and **${tool('Sensory')}**. If ${s} moans, ${d} strikes ${subObj} with the **${tool('Impact')}**. ${s} must thank ${d} for every strike.`;
            time = 1200; break;
        case "Truth":
            text = `${s} is to be blindfolded with the **${tool('Shadow')}** and forced to kneel. ${d} will ask 5 questions. For every hesitation, ${d} will apply the **${tool('Ache')}** to ${subPoss} most sensitive areas. ${s} must remain perfectly still.`;
            time = 600; break;
        case "Physical Challenge":
            text = `${s}, wearing the **${tool('Shadow')}**, must maintain a deep squat. ${d} will deliver random strikes with the **${tool('Impact')}** to ${subPoss} buttocks. If ${s} flinches or breaks form, the timer resets.`;
            time = 720; break;
        case "Escape":
            text = `${s} is to be blindfolded with the **${tool('Shadow')}**, gagged with the **${tool('Gags')}**, and bound with **${tool('Restraints')}**. ${s} must attempt to free ${subSelf} before the timer ends. If the blindfold is displaced, ${s} fails.`;
            time = 1200; break;
        default:
            text = `${s}, ${d} demands total silence. Apply the **${tool('Shadow')}**. Use the **${tool('Restraints')}** on ${subObj}. Wait for the **${tool('Impact')}**.`;
            time = 600;
    }

    document.getElementById('decree-text').innerHTML = `<strong>PROTOCOL: ${theme.toUpperCase()}</strong><br><br>${text}`;
    document.getElementById('timer').innerText = formatT(time);
    session.currentTime = time;
    document.getElementById('control-area').style.display = 'none';
    document.getElementById('decree-area').style.display = 'block';
    document.getElementById('resolution-buttons').style.display = 'none';
    document.getElementById('commence-btn').style.display = 'block';
}

function runTimer() {
    document.getElementById('commence-btn').style.display = 'none';
    document.getElementById('resolution-buttons').style.display = 'flex';
    let t = session.currentTime;
    clearInterval(session.timer);
    session.timer = setInterval(() => {
        t--; document.getElementById('timer').innerText = formatT(t);
        if(t <= 0) clearInterval(session.timer);
    }, 1000);
}

function resolve(success) {
    clearInterval(session.timer);
    session.history.unshift({ r: session.round, d: session.dom.name, s: session.sub.name, res: success ? "SUCCESS" : "FAIL" });
    
    if(success) {
        session.sub.score += 1;
        let temp = {...session.dom};
        session.dom = {...session.sub};
        session.sub = temp;
    } else {
        session.sub.score -= 1;
    }
    
    session.round++;
    document.getElementById('control-area').style.display = 'block';
    document.getElementById('decree-area').style.display = 'none';
    updateUI();
}

function formatT(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
renderInv();
</script>
</body>
</html>
