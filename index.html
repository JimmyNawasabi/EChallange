\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGNTY: Randomization Engine</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #008000; --gold: #ffd700; --safety: #ff4500;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 15px 0;}
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .p-setup { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 2px; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 5px; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        .arsenal-box { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: 15px; }
        .cat-toggle-row { display: flex; align-items: center; justify-content: space-between; background: #080808; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; }
        .cat-name { font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .item-grid { display: flex; flex-wrap: wrap; gap: 6px; margin: 5px 0 10px 0; }
        .chip { padding: 4px 10px; border: 1px solid #333; background: #0a0a0a; color: #555; cursor: pointer; border-radius: 4px; font-size: 0.65rem; }
        .chip.active { border-color: var(--accent); color: white; background: #001a35; }
        
        .btn-main { background: var(--accent); color: white; padding: 20px; width: 100%; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; margin-top: 10px; letter-spacing: 2px; }
        .btn-commence { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 10px; cursor: pointer; text-transform: uppercase;}
        .btn-veto { background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px;}
        .btn-safeword { background: var(--safety); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; }

        .p-box { flex: 1; padding: 15px; background: #080808; border: 1px solid #222; border-radius: 12px; text-align: center; }
        .p-box.active-dom { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,86,179,0.3); }

        #decree-panel { display: none; margin-top: 20px; text-align: center; }
        #decree-text { background: #000; padding: 30px; border-radius: 15px; border: 1px solid #333; font-size: 1.1rem; line-height: 1.8; margin-bottom: 20px; text-align: left; border-left: 5px solid var(--accent); }
        #timer { font-size: 4rem; color: var(--crimson); font-weight: 100; font-family: monospace; letter-spacing: 8px; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-screen">
        <div class="setup-grid">
            <div class="p-setup">
                <span class="label">Dominant</span>
                <input type="text" id="name0" value="Master">
            </div>
            <div class="p-setup">
                <span class="label">Submissive</span>
                <input type="text" id="name1" value="Slave">
            </div>
        </div>
        
        <div class="arsenal-box">
            <span class="label">Category Configuration & Inventory</span>
            <div id="arsenal-list"></div>
        </div>

        <button class="btn-main" onclick="startSession()">Commence Protocol</button>
    </div>

    <div id="play-screen" style="display:none;">
        <div id="round-disp" style="text-align:center; color:var(--accent); margin-bottom:10px; letter-spacing: 2px;"></div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div id="box0" class="p-box">
                <div class="label">DOMINANT</div>
                <div id="disp-name0" style="font-weight:bold;"></div>
                <div id="score0" style="font-size:1.5rem; color:var(--accent);">0</div>
            </div>
            <div id="box1" class="p-box">
                <div class="label">SUBMISSIVE</div>
                <div id="disp-name1" style="font-weight:bold;"></div>
                <div id="score1" style="font-size:1.5rem; color:var(--accent);">0</div>
            </div>
        </div>

        <div id="command-center"><button class="btn-main" onclick="issueDecree()">Generate Decree</button></div>
        
        <div id="decree-panel">
            <span id="intensity-display" style="color:var(--gold); font-size:0.8rem; letter-spacing:2px; display:block; margin-bottom:10px;"></span>
            <div id="timer">00:00</div>
            <div id="pre-commence-controls">
                <button class="btn-commence" onclick="startCountdown()">Commence Protocol</button>
                <button class="btn-veto" onclick="triggerVeto()">Master's Veto (Purge Decree)</button>
            </div>
            <div id="decree-text"></div>
            <div id="completion-controls" style="display:none; flex-direction:column; gap:10px;">
                <div style="display:flex; gap:10px;">
                    <button class="btn-main" style="background:#1a1a1a; flex:1;" onclick="endRound(false)">Failure</button>
                    <button class="btn-main" style="background:var(--success); flex:1;" onclick="endRound(true)">Success</button>
                </div>
                <button class="btn-safeword" onclick="triggerSafeword()">SAFEWORD (End Task / -5 Points)</button>
            </div>
        </div>
    </div>
</div>

<script>
const HARDWARE = { 
    "Stillness":{"items":["Rope","Cuffs","Chain"], "time": 900, "enabled": true}, 
    "Impact":{"items":["Cane","Paddle","Flogger"], "time": 480, "enabled": true}, 
    "Quietude":{"items":["Ball Gag","Tape","Ring Gag"], "time": 600, "enabled": true}, 
    "Ache":{"items":["Internal Plug","Vibrator","Clamps"], "time": 720, "enabled": true},
    "Shadow":{"items":["Blindfold","Hood","Blackout Mask"], "time": 600, "enabled": true},
    "Sensory":{"items":["Hot Wax","Ice cubes","Wheel"], "time": 300, "enabled": true}
};

// Simplified descriptive templates for logic verification
const TEMPLATES = {
    "Stillness": ["{dom} is to secure {sub}’s wrists behind the back tightly using {item}. Once bound, anchor to the ankles and pull {sub} into a strict hogtie position."],
    "Impact": ["{sub} is to bend over fully, exposing the target area. {dom} will deliver 30 measured, rhythmic strikes with {item}. {sub} must count each strike out loud."],
    "Quietude": ["{dom} will inspect {sub}'s mouth before applying {item} firmly. Straps notched to the tightest setting. {sub} must breathe only through the nose."],
    "Ache": ["{dom} will prepare {sub} for {item}. {sub} is to accept the internal depth slowly and remain in a deep squat. Climax is forbidden."],
    "Shadow": ["{dom} will apply {item} ensuring total darkness. {sub} is led to the center and left standing. {dom} circles in total silence."],
    "Sensory": ["{sub} is blindfolded. {dom} uses {item} to create a path of sensation across the torso. Focus on the transition between comfort and intensity."]
};

let game = {
    currRound: 1, lastCategory: "",
    p: [{name:"", score:0}, {name:"", score:0}],
    h: HARDWARE, activePool: JSON.parse(JSON.stringify(TEMPLATES)),
    timer: null, activeTime: 0
};

function init() {
    const cont = document.getElementById('arsenal-list');
    cont.innerHTML = '';
    Object.keys(game.h).forEach(cat => {
        let div = document.createElement('div');
        div.className = 'cat-toggle-row';
        div.innerHTML = `<span class="cat-name">${cat}</span>
            <label class="switch"><input type="checkbox" id="tog-${cat}" ${game.h[cat].enabled?'checked':''} onchange="toggleCat('${cat}')"><span class="slider"></span></label>`;
        cont.appendChild(div);
        
        let itemDiv = document.createElement('div');
        itemDiv.className = 'item-grid';
        itemDiv.innerHTML = game.h[cat].items.map(i => `<div class="chip active">${i}</div>`).join('');
        cont.appendChild(itemDiv);
    });
}

function toggleCat(cat) { game.h[cat].enabled = document.getElementById(`tog-${cat}`).checked; }

function startSession() {
    game.p[0].name = document.getElementById('name0').value; 
    game.p[1].name = document.getElementById('name1').value;
    document.getElementById('setup-screen').style.display = 'none'; 
    document.getElementById('play-screen').style.display = 'block';
    refresh();
}

function refresh() {
    document.getElementById('round-disp').innerText = `PHASE ${game.currRound}`;
    game.p.forEach((p, i) => {
        document.getElementById(`disp-name${i}`).innerText = p.name.toUpperCase();
        document.getElementById(`score${i}`).innerText = p.score;
        document.getElementById(`box${i}`).className = `p-box ${i===0?'active-dom':''}`;
    });
}

function issueDecree() {
    // 1. Get enabled categories that are NOT the last category used
    let validCats = Object.keys(game.h).filter(c => game.h[c].enabled && c !== game.lastCategory);
    
    // Safety: If only one category is enabled, we have to allow it
    if (validCats.length === 0) validCats = Object.keys(game.h).filter(c => game.h[c].enabled);
    
    let chosenCat = validCats[Math.floor(Math.random() * validCats.length)];
    game.lastCategory = chosenCat; // Store for next round

    let pool = game.activePool[chosenCat];
    let templateIdx = Math.floor(Math.random() * pool.length);
    let raw = pool[templateIdx];
    let item = game.h[chosenCat].items[Math.floor(Math.random()*game.h[chosenCat].items.length)];
    
    game.activeTime = game.h[chosenCat].time;
    document.getElementById('intensity-display').innerText = `${chosenCat.toUpperCase()} PROTOCOL: ${Math.floor(game.activeTime/60)} MIN`;
    document.getElementById('timer').innerText = formatTime(game.activeTime);
    document.getElementById('decree-text').innerHTML = raw.replace(/{item}/g, `<strong>${item}</strong>`).replace(/{dom}/g, game.p[0].name).replace(/{sub}/g, game.p[1].name);
    
    document.getElementById('command-center').style.display = 'none';
    document.getElementById('decree-panel').style.display = 'block';
    document.getElementById('pre-commence-controls').style.display = 'block';
    document.getElementById('completion-controls').style.display = 'none';
}

function triggerVeto() { issueDecree(); }

function startCountdown() {
    document.getElementById('pre-commence-controls').style.display = 'none';
    document.getElementById('completion-controls').style.display = 'flex';
    let t = game.activeTime;
    clearInterval(game.timer);
    game.timer = setInterval(() => {
        t--; document.getElementById('timer').innerText = formatTime(t);
        if(t <= 0) { clearInterval(game.timer); }
    }, 1000);
}

function triggerSafeword() {
    game.p[1].score = Math.max(0, game.p[1].score - 5);
    clearInterval(game.timer);
    document.getElementById('command-center').style.display = 'block';
    document.getElementById('decree-panel').style.display = 'none';
    refresh();
}

function endRound(win) {
    if(win) game.p[1].score++;
    game.currRound++;
    game.p.reverse(); // Role swap logic preserved
    clearInterval(game.timer);
    document.getElementById('command-center').style.display = 'block';
    document.getElementById('decree-panel').style.display = 'none';
    refresh();
}

function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

init();
</script>
</body>
</html>
