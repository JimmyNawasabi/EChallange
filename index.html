<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Audited Protocol</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #008000; --gold: #ffd700;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; display: flex; justify-content: center; 
            font-size: 0.85rem; 
        }

        .container { 
            max-width: 900px; width: 100%; background: var(--card); 
            padding: 20px; border-radius: 20px; border: 3px solid var(--accent); 
            box-shadow: 0 0 50px #000; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 15px 0;}

        .box-section { background: #000; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; }
        
        .label { font-size: 0.8rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 2px; }

        input { width: 100%; padding: 10px; border: 1px solid var(--accent); border-radius: 4px; background: #000; color: white; font-size: 1rem; box-sizing: border-box; }
        
        .btn { background: var(--accent); color: white; border: 1px solid #FFF; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 8px; font-size: 0.9rem; margin-top: 10px; transition: all 0.3s;}
        .btn:hover { background: #004494; box-shadow: 0 0 15px var(--accent); }

        .score-row { display: flex; justify-content: space-between; padding: 15px; background: #0a0a0a; border: 1px solid var(--accent); border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .p-score { font-size: 2.5rem; font-weight: 200; color: var(--accent); }

        .tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tog-btn { padding: 10px; border: 1px solid #333; background: #000; color: #555; cursor: pointer; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; text-align: center; }
        .tog-btn.active { border-color: var(--accent); color: #FFF; background: #001a35; }

        #timer-box { font-size: 3rem; font-weight: 100; color: var(--crimson); text-align: center; margin-bottom: 10px; letter-spacing: 5px; }
        .safe-word { background: transparent !important; border: 1px solid var(--crimson) !important; color: var(--crimson) !important; margin-top: 25px !important; }
        
        #decree-text { font-size: 1rem; line-height: 1.6; text-align: justify; color: #ccc; }
        #decree-text strong { color: #fff; }

        .grand-display { border: 2px solid var(--gold); padding: 25px; background: linear-gradient(to bottom, #1a1a00, #000); text-align: center; display: none; }
        .card-zone { display: flex; justify-content: center; gap: 10px; margin-top: 8px; }
        .card { width: 35px; height: 50px; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0.2; font-size: 0.7rem; }
        .card.active { opacity: 1; border-color: #fff; box-shadow: 0 0 8px currentColor; }
        .card-y { background: var(--gold); color: #000; }
        .card-r { background: var(--crimson); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-view">
        <div class="box-section">
            <span class="label">Primary Authority</span>
            <input type="text" id="p0-name" value="Master">
            <div class="tog-grid" style="margin-top:10px;">
                <button type="button" id="p0-m" class="tog-btn active" onclick="setGender(0,'M')">Male</button>
                <button type="button" id="p0-f" class="tog-btn" onclick="setGender(0,'F')">Female</button>
            </div>
            <br>
            <span class="label">Subject Participant</span>
            <input type="text" id="p1-name" value="Slave">
            <div class="tog-grid" style="margin-top:10px;">
                <button type="button" id="p1-m" class="tog-btn" onclick="setGender(1,'M')">Male</button>
                <button type="button" id="p1-f" class="tog-btn active" onclick="setGender(1,'F')">Female</button>
            </div>
            <br>
            <span class="label">Session Rounds</span>
            <input type="number" id="max-rounds" value="10">
        </div>
        <div class="box-section">
            <span class="label">Vault Configuration (The Arsenal)</span>
            <div id="inv-setup" class="tog-grid"></div>
        </div>
        <button class="btn" onclick="beginSession()">Initialize Protocol</button>
    </div>

    <div id="game-view" style="display:none;">
        <div id="round-header" style="text-align:center; color:var(--accent); font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 3px;"></div>
        <div class="score-row">
            <div style="flex:1;"><div class="label">DOMINANT</div><div id="dom-display" style="font-size:1.1rem"></div><div class="card-zone" id="dom-cards"></div></div>
            <div style="flex:1;"><div class="label">SUBMISSIVE</div><div id="sub-display" style="font-size:1.1rem"></div><div id="sub-score" class="p-score">0</div><div class="card-zone" id="sub-cards"></div></div>
        </div>
        <div id="action-panel">
            <div class="box-section">
                <span class="label">Protocol Filters</span>
                <div id="decree-grid" class="tog-grid"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Issue Command</button>
        </div>
        <div id="decree-active" style="display:none;">
            <div id="timer-box">00:00</div>
            <div class="box-section"><div id="decree-text"></div></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#1a1a1a; flex:1;" onclick="finalize(false)">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="finalize(true)">SUCCESS</button>
            </div>
            <button class="btn safe-word" onclick="triggerSafeWord()">FORFEIT: SAFE WORD (-5)</button>
        </div>
    </div>

    <div id="grand-view" class="grand-display">
        <h1 style="color:var(--gold); border:none;">GRAND DECREE</h1>
        <p id="winner-announcement" style="font-size:1.2rem;"></p>
        <div id="grand-options" style="text-align:left; line-height:1.6;"></div>
    </div>
</div>

<script>
const state = {
    round: 1, total: 10, timer: null, timeLeft: 0,
    players: [{n:"", role:"Master", score:0, g:"M", cards:[]}, {n:"", role:"Slave", score:0, g:"F", cards:[]}],
    hardware: {
        "The Quietude": ["Ball Gag", "Ring Gag", "Medical Tape", "Spider Gag"],
        "The Stillness": ["Hogtie Rope", "Steel Cuffs", "Spreader Bar", "Zip Ties"],
        "The Shadows": ["Leather Hood", "Silk Scarf", "Sleep Mask"],
        "The Percussion": ["Heavy Flogger", "Cane", "Glass Paddle", "Riding Crop"],
        "The Intrusion": ["Weighted Anal Plug", "Vibrator", "Glass Dildo"],
        "The Nuance": ["Ice Blocks", "Clothespins", "Hot Wax", "Wartenberg Wheel"]
    },
    protocols: ["Self-Bondage", "Truth", "Dare", "Soft & Sexy", "Escape", "Shibari", "Physical Challenge", "The Infinite Ache"]
};

function init() {
    const inv = document.getElementById('inv-setup');
    Object.keys(state.hardware).forEach(h => {
        const b = document.createElement('div'); b.className = 'tog-btn active'; b.innerText = h;
        b.onclick = () => b.classList.toggle('active'); inv.appendChild(b);
    });
    const dec = document.getElementById('decree-grid');
    state.protocols.forEach(p => {
        const b = document.createElement('div'); b.className = 'tog-btn active'; b.innerText = p;
        b.onclick = () => b.classList.toggle('active'); dec.appendChild(b);
    });
}

function setGender(p, g) { state.players[p].g = g; document.getElementById(`p${p}-m`).classList.toggle('active', g === 'M'); document.getElementById(`p${p}-f`).classList.toggle('active', g === 'F'); }

function beginSession() {
    state.players[0].n = document.getElementById('p0-name').value;
    state.players[1].n = document.getElementById('p1-name').value;
    state.total = parseInt(document.getElementById('max-rounds').value);
    const roll = Math.random() > 0.5;
    state.players[0].cards = [roll ? 'Y' : 'R'];
    state.players[1].cards = [!roll ? 'Y' : 'R'];
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('game-view').style.display = 'block';
    render();
}

function render() {
    const dom = state.players.find(p => p.role === "Master");
    const sub = state.players.find(p => p.role === "Slave");
    document.getElementById('round-header').innerText = `PROTOCOL: ${state.round} / ${state.total}`;
    document.getElementById('dom-display').innerText = dom.n.toUpperCase();
    document.getElementById('sub-display').innerText = sub.n.toUpperCase();
    document.getElementById('sub-score').innerText = sub.score;
    renderCards('dom-cards', dom); renderCards('sub-cards', sub);
}

function renderCards(id, p) {
    const z = document.getElementById(id); z.innerHTML = '';
    p.cards.forEach(c => { const d = document.createElement('div'); d.className = `card active card-${c.toLowerCase()}`; d.innerText = c; z.appendChild(d); });
}

function generateDecree() {
    const activeProtocols = Array.from(document.querySelectorAll('#decree-grid .tog-btn.active')).map(b => b.innerText);
    const cat = activeProtocols[Math.floor(Math.random() * activeProtocols.length)];
    const getI = (k) => state.hardware[k][Math.floor(Math.random()*state.hardware[k].length)];
    const dom = state.players.find(p => p.role === "Master").n;
    const sub = state.players.find(p => p.role === "Slave").n;

    const db = {
        "Self-Bondage": `${sub} must use <strong>The Stillness</strong> (${getI('The Stillness')}) to secure their own ankles, then apply <strong>The Quietude</strong> (${getI('The Quietude')}). Kneel and wait for ${dom} to secure your wrists behind you.`,
        "The Infinite Ache": `This protocol focuses on <strong>Strict Denial</strong>. ${dom} will use <strong>The Intrusion</strong> (${getI('The Intrusion')}) to bring ${sub} to the absolute edge. At the point of no return, <strong>The Nuance</strong> (${getI('The Nuance')}) is applied to shock the senses. <strong>No climax is permitted for either party.</strong>`,
        "Physical Challenge": `${sub} holds a stress position using <strong>The Stillness</strong>. ${dom} applies 15 strokes of <strong>The Percussion</strong> (${getI('The Percussion')}), alternating with <strong>The Nuance</strong> (${getI('The Nuance')}) to keep the skin hypersensitive.`,
        "Shibari": `${dom} executes a complex floor bind using <strong>The Stillness</strong>. Once immobile, ${sub} is masked with <strong>The Shadows</strong> (${getI('The Shadows')}) and left in total isolation until the timer expires.`,
        "Truth": `${sub} is bound. ${dom} asks a question. Silence or a lie results in <strong>The Percussion</strong>. Honesty is rewarded with a brief moment of <strong>The Nuance</strong>.`,
        "Soft & Sexy": `${dom} uses <strong>The Shadows</strong> to blindfold ${sub}. Use <strong>The Nuance</strong> to trace the body before <strong>The Intrusion</strong> is used for prolonged, low-intensity teasing.`,
        "Escape": `${dom} binds ${sub} with <strong>The Stillness</strong>. You have the timer to escape. Failure results in a -1 point penalty.`,
        "Dare": `${sub} must endure 2 minutes of <strong>The Intrusion</strong> while ${dom} applies <strong>The Nuance</strong> to the neck and chest. Absolute silence is required.`
    };

    document.getElementById('decree-text').innerHTML = `<strong>${cat.toUpperCase()}</strong><br><br>${db[cat]}`;
    document.getElementById('action-panel').style.display = 'none';
    document.getElementById('decree-active').style.display = 'block';
    startTimer(cat === "Shibari" ? 300 : 180);
}

function startTimer(s) {
    state.timeLeft = s;
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        state.timeLeft--;
        const m = Math.floor(state.timeLeft/60); const sec = state.timeLeft%60;
        document.getElementById('timer-box').innerText = `${m}:${sec.toString().padStart(2,'0')}`;
        if(state.timeLeft <= 0) finalize(false);
    }, 1000);
}

function finalize(success) {
    clearInterval(state.timer);
    if(success) state.players.find(p => p.role === "Slave").score++;
    if(state.round >= state.total) return showGrand();
    state.players.forEach(p => p.role = (p.role === "Master" ? "Slave" : "Master"));
    state.round++;
    document.getElementById('action-panel').style.display = 'block';
    document.getElementById('decree-active').style.display = 'none';
    render();
}

function triggerSafeWord() {
    const s = state.players.find(p => p.role === "Slave");
    if(s.score < 1) return alert("System Lock: Insufficient points.");
    s.score -= 5; finalize(false);
}

function showGrand() {
    document.getElementById('game-view').style.display = 'none';
    document.getElementById('grand-view').style.display = 'block';
    const winner = state.players[0].score > state.players[1].score ? state.players[0] : state.players[1];
    document.getElementById('winner-announcement').innerText = `${winner.n.toUpperCase()} HAS ACHIEVED SOVEREIGNTY.`;
    document.getElementById('grand-options').innerHTML = `
        <div class="box-section"><strong>I. THE RITUAL OF CLIMAX:</strong> The winner chooses the roles. The submissive is placed in <strong>The Stillness</strong> and <strong>The Quietude</strong>. The session involves 45 minutes of heavy impact and internal work. <strong>The Master may climax only at the end of this ritual.</strong></div>
        <div class="box-section"><strong>II. THE TOTAL ECLIPSE:</strong> 60 minutes of total sensory deprivation for the loser using <strong>The Shadows</strong> and <strong>The Quietude</strong>, while the winner uses <strong>The Nuance</strong> and <strong>The Percussion</strong> at their whim.</div>
    `;
}
init();
</script>
</body>
</html>
