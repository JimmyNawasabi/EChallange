<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --yellow: #ffd700; 
            --red: #ee3333; --safe-green: #2e7d32; --blue: #1a5276;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 19px; }
        .container { max-width: 650px; width: 100%; background: var(--card-bg); padding: 35px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { text-align: center; font-size: 0.85rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }

        .step { display: none; }
        .active { display: block; }

        .box { background: #fffcf9; border: 2px solid #f5f2ed; padding: 25px; margin-bottom: 25px; border-radius: 30px; }
        .inner-box { background: #ffffff; border: 1px solid #eee; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: 1000; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1px; }

        input[type="text"], select, input[type="number"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; outline: none; display: block; }
        
        .tag-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .tag { background: #f8f5f0; padding: 8px 15px; border-radius: 50px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-weight: bold; border: 1px solid #e8e4db; }
        .tag span { color: var(--crimson); cursor: pointer; font-size: 1.2rem; }

        .badge { display: inline-block; padding: 6px 18px; border-radius: 50px; font-size: 0.75rem; font-weight: 1000; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: white; }
        .b-truth { background: #5d6d7e; } .b-dare { background: #af601a; } .b-escape { background: #c0392b; }
        .b-edging { background: #884ea0; } .b-physical { background: #1e8449; } .b-self { background: #2e4053; }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 25px; font-size: 1.1rem; }
        .btn-add { background: var(--accent); width: 80px; padding: 10px; border-radius: 12px; font-size: 0.8rem; }
        .timer-display { font-size: 6rem; text-align: center; color: var(--crimson); font-weight: bold; margin: 20px 0; letter-spacing: -3px; }
        .time-label { text-align: center; font-size: 0.8rem; text-transform: uppercase; color: #888; margin-top: -15px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">Timed Trials of Dominance</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Game Duration</span>
            <input type="number" id="maxRounds" value="6">
            <div class="inner-box">
                <span class="label">Slave Config</span>
                <input type="text" id="p1" placeholder="Name">
                <select id="g1"><option value="Male body">Male Body</option><option value="Female body">Female Body</option></select>
            </div>
            <div class="inner-box">
                <span class="label">Master Config</span>
                <input type="text" id="p2" placeholder="Name">
                <select id="g2"><option value="Male body">Male Body</option><option value="Female body">Female Body</option></select>
            </div>
        </div>
        <button class="btn" onclick="nav(2)">Define Gear ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Vision (Blindfolds)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-vis"><button class="btn btn-add" onclick="addItem('vis')">Add</button></div><div id="list-vis" class="tag-row"></div>
            <span class="label">Mouth (Gags)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-speech"><button class="btn btn-add" onclick="addItem('speech')">Add</button></div><div id="list-speech" class="tag-row"></div>
            <span class="label">Restraints (Ropes/Cuffs)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-rest"><button class="btn btn-add" onclick="addItem('rest')">Add</button></div><div id="list-rest" class="tag-row"></div>
            <span class="label">Sensation (Toys/Wands)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-sens"><button class="btn btn-add" onclick="addItem('sens')">Add</button></div><div id="list-sens" class="tag-row"></div>
        </div>
        <button class="btn" onclick="nav(3)">Enter Session</button>
    </div>

    <div id="step3" class="step">
        <div id="pre-round">
            <div id="challenge-display" class="box" style="text-align:center;">
                <div id="badge-container"></div>
                <div id="task-text" style="font-size: 1.1rem; line-height: 1.6; color: #444;">Ready for Master's decree...</div>
            </div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Decree</button>
            <button class="btn" id="start-btn" style="display:none; background: var(--safe-green);" onclick="startT()">Start Trial</button>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <div class="time-label" id="time-intensity">Intensity: Moderate</div>
            <button class="btn" onclick="resolveTurn(true)">Submission Successful</button>
            <button class="btn" style="background:#888; margin-top: 15px;" onclick="resolveTurn(false)">Submission Failed</button>
        </div>
    </div>
</div>

<script>
    let inv = { vis: [], speech: [], rest: [], sens: [] };
    let players = [], currentRound = 1, totalRounds = 6, subIdx = 0, timer, timeLeft;

    const taskData = {
        truth: { class: "b-truth", time: 90, tasks: [
            "CONFESSION: Admit the one thought that makes you feel most powerless while [REST].",
            "REVELATION: Detail exactly how your [BODY] feels when [VIS] and [SPEECH] are applied simultaneously.",
            "INTERROGATION: If Master used [SENS] for one hour, what would you say to make them stop?"
        ]},
        dare: { class: "b-dare", time: 180, tasks: [
            "SUBMISSION: Crawl to Master and worship their feet while [SPEECH] and [REST] are active.",
            "EXPOSURE: Remain a human statue while Master explores your [BODY] with [SENS]. No movement.",
            "SERVICE: Serve Master a drink while [VIS] and [REST] bind your hands behind you."
        ]},
        escape: { class: "b-escape", time: 480, tasks: [
            "FREEDOM TRIAL: Escape from the current [REST] while [VIS] and [SPEECH] are applied. Total silence required.",
            "BLIND STRUGGLE: Shed a secondary layer of [REST] added by Master. You have 8 minutes.",
            "SENSORY ESCAPE: Wriggle out of [REST] while Master uses [SENS] to break your concentration."
        ]},
        edging: { class: "b-edging", time: 300, tasks: [
            "THE BRINK: Master uses [SENS] until you reach 99%. You must stay there for the duration without release.",
            "RAPID DENIAL: Endure the highest setting of [SENS] while [REST]. If you climax, you fail.",
            "SENSORY FOCUS: Focus entirely on [SENS]. Master will push you to the brink 3 times during the 5 minutes."
        ]},
        physical: { class: "b-physical", time: 240, tasks: [
            "STRESS POSITION: Hold a deep kneeling posture while [REST] and [VIS] are active. No shifting allowed.",
            "CORE ENDURANCE: Perform slow leg lifts while ankles are in [REST] and [SPEECH] is applied.",
            "BALANCE TRIAL: Maintain a wall-sit while Master applies [SENS] to your [BODY]."
        ]},
        selfbondage: { class: "b-self", time: 150, tasks: [
            "AUTO-RESTRAINT: Bind your own limbs as tightly as possible with [REST] and present yourself for inspection.",
            "SELF-DENIAL: Apply [SENS] to your own [BODY] until Master commands you to stop.",
            "SENSORY WRAP: Apply [VIS] and [SPEECH] to yourself while kneeling, ensuring zero gaps or light."
        ]}
    };

    function nav(n) {
        if(n===2) players = [{n:document.getElementById('p1').value||"Slave", g:document.getElementById('g1').value, wins:0},{n:document.getElementById('p2').value||"Master", g:document.getElementById('g2').value, wins:0}];
        if(n===3 && (inv.vis.length===0 || inv.rest.length===0)) { alert("Fill gear first!"); return; }
        document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    function addItem(c) {
        let v = document.getElementById('in-'+c).value;
        if(v) { inv[c].push(v); document.getElementById('in-'+c).value=''; renderInv(); }
    }

    function renderInv() {
        ['vis','speech','rest','sens'].forEach(c=>{
            document.getElementById('list-'+c).innerHTML = inv[c].map((it,idx)=>`<div class="tag">${it}<span onclick="inv['${c}'].splice(${idx},1);renderInv()">×</span></div>`).join('');
        });
    }

    function generate() {
        const categories = Object.keys(taskData);
        const catKey = categories[Math.floor(Math.random()*categories.length)];
        const category = taskData[catKey];
        const slave = players[subIdx], master = players[subIdx===0?1:0];
        
        let task = category.tasks[Math.floor(Math.random()*category.tasks.length)];
        task = task.replace("[VIS]", `<b>${inv.vis[Math.floor(Math.random()*inv.vis.length)]}</b>`);
        task = task.replace("[SPEECH]", `<b>${inv.speech[Math.floor(Math.random()*inv.speech.length)]}</b>`);
        task = task.replace("[REST]", `<b>${inv.rest[Math.floor(Math.random()*inv.rest.length)]}</b>`);
        task = task.replace("[SENS]", `<b>${inv.sens[Math.floor(Math.random()*inv.sens.length)]}</b>`);
        task = task.replace("[BODY]", `<b>${slave.g}</b>`);

        document.getElementById('badge-container').innerHTML = `<span class="badge ${category.class}">${catKey}</span>`;
        document.getElementById('task-text').innerHTML = task;
        
        timeLeft = category.time;
        document.getElementById('time-intensity').innerText = timeLeft > 300 ? "Intensity: Extreme" : (timeLeft > 180 ? "Intensity: High" : "Intensity: Moderate");
        document.getElementById('gen-btn').style.display='none';
        document.getElementById('start-btn').style.display='block';
    }

    function startT() {
        document.getElementById('pre-round').style.display='none';
        document.getElementById('active-round').style.display='block';
        timer = setInterval(()=>{
            timeLeft--;
            document.getElementById('clock').innerText=`${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            if(timeLeft<=0){ clearInterval(timer); resolveTurn(false); }
        }, 1000);
    }

    function resolveTurn(win) {
        clearInterval(timer);
        const masterIdx = (subIdx === 0 ? 1 : 0);
        if(win) { players[subIdx].wins++; subIdx = masterIdx; alert("Success! Role Reversal."); }
        else { players[masterIdx].wins++; alert("Failure. Comply with Master."); }
        
        currentRound++;
        if(currentRound > parseInt(document.getElementById('maxRounds').value)) {
            let winIdx = players[0].wins > players[1].wins ? 0 : 1;
            document.body.innerHTML = `<div class="container" style="text-align:center;"><h1>Champion: ${players[winIdx].n}</h1><button class="btn" onclick="location.reload()">Reset</button></div>`;
        } else {
            document.getElementById('active-round').style.display='none';
            document.getElementById('pre-round').style.display='block';
            document.getElementById('gen-btn').style.display='block';
            document.getElementById('start-btn').style.display='none';
        }
    }
</script>
</body>
</html>
