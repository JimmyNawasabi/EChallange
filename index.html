<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit: Sovereignty</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --safe-green: #2e7d32; --veto: #4a4a4a;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 18px; }
        .container { max-width: 650px; width: 100%; background: var(--card-bg); padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        .step { display: none; }
        .active { display: block !important; }

        .box { background: #fffcf9; border: 2px solid #f5f2ed; padding: 25px; margin-bottom: 25px; border-radius: 25px; line-height: 1.6; }
        .inner-box { background: #ffffff; border: 1px solid #eee; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.5px; }

        input[type="text"], select, input[type="number"] { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; outline: none; font-family: inherit; }
        
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tgl-btn { background: #f0f0f0; padding: 12px 8px; border-radius: 12px; text-align: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: 0.2s; color: #999; text-transform: uppercase; }
        .tgl-btn.on { background: var(--crimson); color: white; border-color: var(--accent); }

        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag { background: #eee; padding: 5px 12px; border-radius: 50px; font-size: 0.75rem; cursor: pointer; color: #888; border: 1px solid transparent; transition: 0.15s; }
        .tag.on { background: #fff; border-color: var(--accent); color: var(--text); font-weight: bold; }
        
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .toggle-all { font-size: 0.6rem; color: var(--accent); cursor: pointer; text-decoration: underline; text-transform: uppercase; font-weight: bold; }

        .badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 1000; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: white; }
        .b-truth { background: #5d6d7e; } .b-dare { background: #af601a; } .b-escape { background: #c0392b; }
        .b-edging { background: #884ea0; } .b-physical { background: #1e8449; } .b-selfbondage { background: #2e4053; }
        
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 20px; font-size: 1rem; margin-bottom: 10px; }
        .timer-display { font-size: 4.5rem; text-align: center; color: var(--crimson); font-weight: bold; margin: 15px 0; }
        
        b { color: var(--crimson); border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">Sovereignty Edition</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Total Rounds</span>
            <input type="number" id="maxRounds" value="6">
            <div class="inner-box">
                <span class="label">Slave</span>
                <input type="text" id="p1" placeholder="Name">
                <select id="g1"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
            <div class="inner-box">
                <span class="label">Master</span>
                <input type="text" id="p2" placeholder="Name">
                <select id="g2"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
        </div>
        <button class="btn" onclick="goToStep(2)">Configure Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <div id="inv-container"></div>
        </div>
        <button class="btn" onclick="goToStep(3)">Start Session</button>
    </div>

    <div id="step3" class="step">
        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center; font-size: 1rem;">Round 1</div>
            <div class="inner-box">
                <span class="label">Active Categories</span>
                <div class="toggle-grid">
                    <div class="tgl-btn on" data-cat="truth">Truth</div>
                    <div class="tgl-btn on" data-cat="dare">Dare</div>
                    <div class="tgl-btn on" data-cat="escape">Escape</div>
                    <div class="tgl-btn on" data-cat="edging">Edging</div>
                    <div class="tgl-btn on" data-cat="physical">Physical</div>
                </div>
            </div>
            <div class="box" style="text-align:left;">
                <div id="badge-container"></div>
                <div id="task-text" style="font-size: 1.1rem;">Awaiting command...</div>
            </div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Decree</button>
            <div id="pre-start-controls" style="display:none;">
                <button class="btn" style="background: var(--safe-green);" onclick="startT()">Start Clock</button>
                <button class="btn" style="background: var(--veto); font-size:0.8rem;" onclick="generate()">Veto</button>
            </div>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <button class="btn" onclick="resolveTurn(true)">Success (Swap)</button>
            <button class="btn" style="background:#888;" onclick="resolveTurn(false)">Failure (Keep)</button>
        </div>
    </div>
</div>

<script>
    // THE FULL UNIFIED LIST
    const gear = {
        "Blindfolds": ["Bandage", "Tape", "Cloth", "Gas Mask", "Pillow Case", "Blindfold", "Sleep Mask", "Silk Scarf", "Hood"],
        "Gags": ["Tape", "Pallet Wrap", "Cloth", "Panties", "Bandage", "Rope", "Ring Gag", "Gas Mask", "Hood", "Ball Gag", "Cleave Gag", "Muzzle"],
        "Restraints": ["Leather Cuffs", "Tape", "Pallet Wrap", "String", "Belt", "Ribbon", "Rope", "Handcuffs", "Ankle Cuffs", "Leather Straps"],
        "Sensation": ["Insertable", "Dildo", "Anal Hook", "Pussy Hook", "Butt Plug", "Anal Dildo", "E-stim Machine", "Paddle", "Vibrator", "Cane", "Needle", "Sharpies", "Tape", "Candle", "Feather", "Ice Cube", "Clamps", "Flogger"]
    };

    let activeInv = {};
    let players = [], currentRound = 1, subIdx = 0, timer, timeLeft;

    // HIGH-DETAIL VERB ENGINE
    const getVerb = (item) => {
        item = item.toLowerCase();
        if (item.includes("tape") || item.includes("wrap")) return "tightly wrap and secure";
        if (item.includes("bandage") || item.includes("scarf") || item.includes("cloth")) return "wrap and knot";
        if (item.includes("hook") || item.includes("plug") || item.includes("insert") || item.includes("dildo")) return "carefully lubricate and insert";
        if (item.includes("cuffs") || item.includes("belt") || item.includes("strap")) return "cinch and lock";
        if (item.includes("rope") || item.includes("string") || item.includes("ribbon")) return "tie securely with multiple knots";
        if (item.includes("mask") || item.includes("hood") || item.includes("gag")) return "place and fasten";
        return "apply";
    };

    const getAction = (item) => {
        item = item.toLowerCase();
        if (item.includes("paddle") || item.includes("cane") || item.includes("flogger")) return "deliver rhythmic strikes to the";
        if (item.includes("needle") || item.includes("sharpie")) return "trace and mark patterns across the";
        if (item.includes("ice") || item.includes("feather") || item.includes("candle")) return "slowly trail and drip across the";
        if (item.includes("vibrator") || item.includes("e-stim")) return "place on a high setting against the";
        if (item.includes("clamps")) return "firmly pinch and attach to the";
        return "focus the use of the item on the";
    };

    function boot() {
        for (let cat in gear) { activeInv[cat] = gear[cat].map(i => ({ n: i, on: true })); }
        document.querySelectorAll('.tgl-btn').forEach(b => b.onclick = () => b.classList.toggle('on'));
    }
    boot();

    function renderInv() {
        const container = document.getElementById('inv-container');
        container.innerHTML = '';
        for (let cat in activeInv) {
            let section = document.createElement('div');
            section.innerHTML = `<div class="cat-header"><span class="label">${cat}</span><span class="toggle-all" onclick="toggleAll('${cat}')">All</span></div><div class="tag-row" id="tags-${cat}"></div>`;
            container.appendChild(section);
            activeInv[cat].forEach(item => {
                let tag = document.createElement('div');
                tag.className = `tag ${item.on ? 'on' : ''}`;
                tag.innerText = item.n;
                tag.onclick = () => { item.on = !item.on; renderInv(); };
                section.querySelector(`#tags-${cat}`).appendChild(tag);
            });
        }
    }

    function toggleAll(cat) {
        let allOn = activeInv[cat].every(i => i.on);
        activeInv[cat].forEach(i => i.on = !allOn);
        renderInv();
    }

    function goToStep(n) {
        if (n === 2) {
            players = [{n: document.getElementById('p1').value || "Slave", g: document.getElementById('g1').value, wins: 0},
                       {n: document.getElementById('p2').value || "Master", g: document.getElementById('g2').value, wins: 0}];
            renderInv();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        if (n === 3) updateIdentity();
    }

    const tasks = {
        truth: { label: "Truth", time: 120, templates: [
            "While Slave is blindfolded with <b>[VIS]</b>, Master must <b>[VERB-GAG] [GAG]</b>. Slave must then confess a secret while the gag is in place.",
            "Master shall <b>[VERB-REST] [REST]</b> around the Slave's wrists. Slave must answer: 'What is the most shameful thing you enjoy while bound?'"
        ]},
        dare: { label: "Dare", time: 240, templates: [
            "Master must <b>[VERB-REST] [REST]</b> to bind the Slave's ankles. Once secure, Master will <b>[SENS-ACT] [SENS]</b> on the Slave's <b>[BODY]</b> for 2 minutes.",
            "Master will <b>[VERB-VIS] [VIS]</b> over the Slave's eyes. Then, Master must <b>[VERB-GAG] [GAG]</b> and command the Slave to perform a submissive task blindly."
        ]},
        escape: { label: "Escape", time: 480, templates: [
            "Master must <b>[VERB-REST] [REST]</b> around the Slave's hands and <b>[VERB-VIS] [VIS]</b> over their eyes. Slave has the duration of the clock to struggle free.",
            "Master will <b>[VERB-REST] [REST]</b> to tether the Slave to a fixed object. Master will then <b>[VERB-GAG] [GAG]</b>. Slave must escape before the timer ends."
        ]},
        edging: { label: "Edging", time: 360, templates: [
            "Master must <b>[VERB-REST] [REST]</b> to secure the Slave's limbs. Master will then <b>[SENS-ACT] [SENS]</b> to bring the Slave to the brink of climax 3 times.",
            "Slave is to be blindfolded with <b>[VIS]</b>. Master will <b>[VERB-SENS] [SENS]</b> and use it to tease the Slave's <b>[BODY]</b> until they beg for mercy."
        ]},
        physical: { label: "Physical", time: 300, templates: [
            "Master will <b>[VERB-REST] [REST]</b> to bind the Slave's hands behind their back. Slave must hold a deep squat while Master <b>[VERB-VIS] [VIS]</b>.",
            "Master must <b>[VERB-GAG] [GAG]</b>. Slave must then hold a plank position. If the Slave's body touches the floor, the round is a failure."
        ]}
    };

    function updateIdentity() {
        let mIdx = (subIdx === 0 ? 1 : 0);
        document.getElementById('round-header').innerText = `Round ${currentRound} (Master: ${players[mIdx].n} | Slave: ${players[subIdx].n})`;
    }

    function generate() {
        let cats = Array.from(document.querySelectorAll('.tgl-btn.on')).map(b => b.getAttribute('data-cat'));
        let k = cats[Math.floor(Math.random()*cats.length)];
        let template = tasks[k].templates[Math.floor(Math.random()*tasks[k].templates.length)];
        
        const pick = (c) => {
            let p = activeInv[c].filter(i=>i.on);
            return p.length ? p[Math.floor(Math.random()*p.length)].n : "gear";
        };

        let v = pick('Blindfolds'), g = pick('Gags'), r = pick('Restraints'), s = pick('Sensation');

        let res = template.replace(/\[VIS\]/g, v).replace(/\[GAG\]/g, g).replace(/\[REST\]/g, r).replace(/\[SENS\]/g, s)
                  .replace(/\[VERB-VIS\]/g, getVerb(v)).replace(/\[VERB-GAG\]/g, getVerb(g))
                  .replace(/\[VERB-REST\]/g, getVerb(r)).replace(/\[VERB-SENS\]/g, getVerb(s))
                  .replace(/\[SENS-ACT\]/g, getAction(s)).replace(/\[BODY\]/g, players[subIdx].g);

        document.getElementById('badge-container').innerHTML = `<span class="badge b-${k}">${tasks[k].label}</span>`;
        document.getElementById('task-text').innerHTML = res;
        timeLeft = tasks[k].time;
        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('pre-start-controls').style.display = 'block';
    }

    function startT() {
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) { clearInterval(timer); resolveTurn(false); }
        }, 1000);
    }

    function resolveTurn(success) {
        clearInterval(timer);
        if (success) { players[subIdx].wins++; subIdx = (subIdx === 0 ? 1 : 0); }
        else { players[subIdx === 0 ? 1 : 0].wins++; }
        currentRound++;
        if (currentRound > parseInt(document.getElementById('maxRounds').value)) {
            document.body.innerHTML = `<div class="container" style="text-align:center;"><h1>Finis</h1><button class="btn" onclick="location.reload()">New Session</button></div>`;
        } else {
            updateIdentity();
            document.getElementById('active-round').style.display = 'none';
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('gen-btn').style.display = 'block';
            document.getElementById('pre-start-controls').style.display = 'none';
            document.getElementById('task-text').innerText = "Awaiting command...";
        }
    }
</script>
</body>
</html>
