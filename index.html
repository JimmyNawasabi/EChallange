<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Intercept Build</title>
    <style>
        :root { 
            --accent: #0056b3; 
            --bg: #000000; 
            --card: #121212; 
            --text: #FFFFFF; 
            --crimson: #d00000; 
            --success: #008000; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; 
            display: flex; justify-content: center; 
            font-size: 1.35rem; 
        }

        .container { 
            max-width: 750px; width: 100%; 
            background: var(--card); 
            padding: 35px; 
            border-radius: 25px; 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 70px #000; 
        }
        
        h1 { 
            text-align: center; text-transform: uppercase; 
            letter-spacing: 10px; color: var(--text); 
            margin-bottom: 35px; font-size: 3.5rem; 
            border-bottom: 6px solid var(--accent);
            padding-bottom: 15px;
        }

        .box-section { 
            background: #000000; 
            padding: 30px; 
            margin-bottom: 25px; 
            border-radius: 15px; 
            border: 3px solid #333; 
        }
        
        .label { 
            font-size: 1.3rem; 
            text-transform: uppercase; font-weight: bold; 
            color: var(--accent); display: block; 
            margin-bottom: 15px; letter-spacing: 2px; 
        }

        input[type="text"], input[type="number"], select { 
            width: 100%; padding: 22px; 
            border: 3px solid var(--accent); 
            border-radius: 10px; background: #000; 
            color: white; box-sizing: border-box; 
            margin-bottom: 20px; font-size: 1.6rem; 
        }
        
        .btn { 
            background: var(--accent); color: white; 
            border: 3px solid #FFF; padding: 25px; 
            width: 100%; cursor: pointer; 
            text-transform: uppercase; font-weight: bold; 
            border-radius: 15px; margin-top: 15px; 
            font-size: 1.6rem; 
        }
        
        .score-row { 
            display: flex; justify-content: space-between; 
            padding: 25px; background: #000; 
            border-radius: 20px; border: 4px solid var(--accent); 
            text-align: center; margin-bottom: 30px; 
        }
        .p-name { font-weight: bold; font-size: 1.6rem; color: #FFF; margin-bottom: 10px; }
        .p-score { font-size: 3rem; color: #FFF; font-weight: 900; }
        
        .tog-btn { 
            padding: 20px; font-size: 1.2rem; 
            border-radius: 12px; border: 3px solid #444; 
            background: #000; color: #777; 
            cursor: pointer; text-transform: uppercase; 
            font-weight: bold; transition: 0.2s; 
            text-align: center;
        }
        .tog-btn.active { 
            border-color: #FFF; color: #FFF; 
            background: var(--accent); 
        }

        .m-btn { 
            border-radius: 12px; padding: 20px; 
            font-size: 1.1rem; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; 
            opacity: 0.2; pointer-events: none; border: 3px solid #FFF; 
        }
        .m-btn.active-card { opacity: 1; pointer-events: auto; }
        .r-card { background: var(--crimson); color: #FFF; }

        #decree-display { line-height: 1.8; color: #FFF; font-size: 1.6rem; font-weight: 600; }
        
        .item-chip { 
            display: inline-flex; align-items: center; 
            background: #1a1a1a; padding: 12px 22px; 
            border-radius: 40px; margin: 8px; 
            font-size: 1.4rem; border: 3px solid var(--accent); 
        }
        .tag { font-size: 0.9rem; font-weight: 900; background: #FFF; color: #000; padding: 4px 10px; border-radius: 6px; margin-left: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p0-name" value="Dominus">
            <span class="label">Player 2</span>
            <input type="text" id="p1-name" value="Subject">
            <span class="label">Total Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" onclick="showStep(2)">Configure Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="inventory-editor"></div>
        <button class="btn" style="background:var(--success);" onclick="startSession()">Start Session</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-ui" style="text-align:center; color:var(--accent); margin-bottom:20px; font-weight:900; letter-spacing: 4px; font-size: 1.8rem;"></div>
        
        <div class="score-row">
            <div class="p-block"><div class="label">MASTER</div><div id="n0" class="p-name"></div><div id="s0" class="p-score">0</div></div>
            <div class="p-block"><div class="label">SLAVE</div><div id="n1" class="p-name"></div><div id="s1" class="p-score">0</div></div>
        </div>
        
        <div id="round-setup">
             <div class="box-section">
                 <span class="label">Master: Authorize Arsenal for this Decree</span>
                 <div id="toggle-grid" style="display:grid; grid-template-columns: 1fr; gap:15px;"></div>
             </div>
             <button class="btn" onclick="generate()">Issue Decree</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-display"></div></div>
            <div style="display:flex; gap:20px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve('fail')">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve('success')">SUCCESS</button>
            </div>
            <button id="r-btn" class="m-btn r-card" style="width:100%; margin-top:20px;" onclick="generate()">Red Card: Reroll</button>
        </div>
    </div>

    <div id="step-4" style="display:none;">
        <h1>FINALE</h1>
        <button class="btn" onclick="location.reload()">New Session</button>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30,
        players: [
            {n:"", g:"M", role:"Master", score:0},
            {n:"", g:"F", role:"Slave", score:0}
        ],
        vault: JSON.parse(localStorage.getItem('sov_v10_intercept')) || {
            "The Shackles": [{n:"Handcuffs", a:true, t:"U"}],
            "The Silence": [{n:"Ball Gag", a:true, t:"U"}],
            "The Shadows": [{n:"Blindfold", a:true, t:"U"}],
            "The Discipline": [{n:"Whip", a:true, t:"U"}],
            "The Senses": [{n:"Ice", a:true, t:"U"}],
            "The Pleasure": [{n:"Vibrator", a:true, t:"F"}]
        },
        roundExcluded: []
    };

    function showStep(n) {
        document.querySelectorAll('[id^="step-"]').forEach(s => s.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if (n === 2) renderInventory();
    }

    function renderInventory() {
        const container = document.getElementById('inventory-editor');
        container.innerHTML = '<h2 style="text-align:center;">VAULT</h2>';
        for (let cat in state.vault) {
            container.innerHTML += `<div class="box-section"><span class="label">${cat}</span><div id="items-${cat}"></div></div>`;
            const itemBox = document.getElementById(`items-${cat}`);
            state.vault[cat].forEach(item => {
                itemBox.innerHTML += `<span class="item-chip">${item.n} <span class="tag">${item.t}</span></span>`;
            });
        }
    }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = document.getElementById('round-total').value;
        showStep(3); renderRound();
    }

    function renderRound() {
        if(state.curr > state.total) return showStep(4);
        document.getElementById('round-ui').innerText = `ROUND ${state.curr} / ${state.total}`;
        document.getElementById('n0').innerText = state.players.find(p=>p.role==='Master').n;
        document.getElementById('n1').innerText = state.players.find(p=>p.role==='Slave').n;
        document.getElementById('s0').innerText = state.players.find(p=>p.role==='Master').score;
        document.getElementById('s1').innerText = state.players.find(p=>p.role==='Slave').score;

        const grid = document.getElementById('toggle-grid');
        grid.innerHTML = '';
        Object.keys(state.vault).forEach(cat => {
            const isActive = !state.roundExcluded.includes(cat);
            const btn = document.createElement('div');
            btn.className = `tog-btn ${isActive ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                if(isActive) state.roundExcluded.push(cat);
                else state.roundExcluded = state.roundExcluded.filter(c => c !== cat);
                renderRound();
            };
            grid.appendChild(btn);
        });
    }

    function generate() {
        const availableCats = Object.keys(state.vault).filter(c => !state.roundExcluded.includes(c));
        if(availableCats.length === 0) return alert("Master must authorize at least one category.");
        
        const cat = availableCats[Math.floor(Math.random()*availableCats.length)];
        const sub = state.players.find(p => p.role === 'Slave');
        const dom = state.players.find(p => p.role === 'Master');
        const items = state.vault[cat].filter(i => i.t === 'U' || i.t === sub.g);
        
        const item = items[Math.floor(Math.random()*items.length)];
        document.getElementById('decree-display').innerHTML = `<strong>${cat} Protocol</strong><br><br>${dom.n} shall utilize ${item.n} upon ${sub.n}.`;
        
        document.getElementById('round-setup').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
        document.getElementById('r-btn').style.opacity = '1';
        document.getElementById('r-btn').style.pointerEvents = 'auto';
    }

    function resolve(res) {
        if(res === 'success') {
            state.players.forEach(p => p.role = p.role === 'Master' ? 'Slave' : 'Master');
            state.players.find(p => p.role === 'Master').score++; 
        }
        state.curr++;
        state.roundExcluded = [];
        document.getElementById('round-setup').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderRound();
    }
</script>
</body>
</html>
