<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --yellow: #ffd700; 
            --red: #ee3333; --safe-green: #2e7d32;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 19px; }
        .container { max-width: 650px; width: 100%; background: var(--card-bg); padding: 35px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { text-align: center; font-size: 0.85rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }

        .step { display: none; }
        .active { display: block; }

        .box { background: #fffcf9; border: 2px solid #f5f2ed; padding: 25px; margin-bottom: 25px; border-radius: 30px; }
        .inner-box { background: #ffffff; border: 1px solid #eee; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: 1000; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1px; }

        input[type="text"], select, input[type="number"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; outline: none; display: block; }
        
        .trophy-row { display: flex; justify-content: space-between; background: #1a1a1a; color: var(--accent); padding: 12px 25px; border-radius: 60px; margin-bottom: 25px; font-size: 0.8rem; font-weight: bold; }

        .tag-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .tag { background: #f8f5f0; padding: 8px 15px; border-radius: 50px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-weight: bold; border: 1px solid #e8e4db; }
        .tag span { color: var(--crimson); cursor: pointer; font-size: 1.2rem; }

        .card-dock { display: flex; gap: 20px; margin-bottom: 30px; }
        .card-ui { flex: 1; padding: 20px 5px; border-radius: 25px; font-weight: bold; text-align: center; cursor: pointer; opacity: 0.1; pointer-events: none; transition: 0.4s; font-size: 0.8rem; }
        .card-ui.held { opacity: 1; pointer-events: auto; transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .c-yellow { background: var(--yellow); color: #222; }
        .c-red { background: var(--red); color: white; }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 25px; font-size: 1.1rem; }
        .btn-add { background: var(--accent); width: 80px; padding: 10px; border-radius: 12px; font-size: 0.8rem; }

        .timer-display { font-size: 6rem; text-align: center; color: var(--crimson); font-weight: bold; margin: 20px 0; letter-spacing: -3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">A Slave's Path to Ascension</div>
    
    <div id="trophy-display" class="trophy-row" style="display:none;">
        <span id="p1Score">S: 0 Wins</span>
        <span>🏆 THE TALLY 🏆</span>
        <span id="p2Score">M: 0 Wins</span>
    </div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Game Duration</span>
            <input type="number" id="maxRounds" value="6" placeholder="Total Rounds">
            
            <div class="inner-box">
                <span class="label">Initial Slave</span>
                <input type="text" id="p1" placeholder="Slave Name">
                <span class="label">Body Type</span>
                <select id="g1">
                    <option value="Male body">Male Body</option>
                    <option value="Female body">Female Body</option>
                    <option value="Neutral body">Neutral Body</option>
                </select>
            </div>

            <div class="inner-box">
                <span class="label">Initial Master</span>
                <input type="text" id="p2" placeholder="Master Name">
                <span class="label">Body Type</span>
                <select id="g2">
                    <option value="Male body">Male Body</option>
                    <option value="Female body">Female Body</option>
                    <option value="Neutral body">Neutral Body</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="nav(2)">Inventory of Control ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Vision (Blindfolds, Hoods)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-vis"><button class="btn btn-add" onclick="addItem('vis')">Add</button></div>
            <div id="list-vis" class="tag-row"></div>

            <span class="label">Mouth (Gags, Tape)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-speech"><button class="btn btn-add" onclick="addItem('speech')">Add</button></div>
            <div id="list-speech" class="tag-row"></div>

            <span class="label">Restraints (Ropes, Cuffs)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-rest"><button class="btn btn-add" onclick="addItem('rest')">Add</button></div>
            <div id="list-rest" class="tag-row"></div>

            <span class="label">Sensation (Wands, Ice, Wax)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-sens"><button class="btn btn-add" onclick="addItem('sens')">Add</button></div>
            <div id="list-sens" class="tag-row"></div>
        </div>
        <button class="btn" onclick="nav(3)">Enter Session</button>
    </div>

    <div id="step3" class="step">
        <div class="card-dock">
            <div id="card-y" class="card-ui c-yellow" onclick="useCard('yellow')">YELLOW<br>(Reversal)</div>
            <div id="card-r" class="card-ui c-red" onclick="useCard('red')">RED<br>(Pass)</div>
        </div>

        <div id="pre-round">
            <div id="challenge-text" class="box" style="font-size: 1.1rem; line-height: 1.5; border-color: var(--accent);">Awaiting command...</div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Decree</button>
            <button class="btn" id="start-btn" style="display:none; background: var(--safe-green);" onclick="startT()">Start Timer</button>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <button class="btn" onclick="resolveTurn(true)">Success: Reversal</button>
            <button class="btn" style="background:#888; margin-top: 15px;" onclick="resolveTurn(false)">Fail: Stay Slave</button>
        </div>
    </div>
</div>

<script>
    let inv = { vis: [], speech: [], rest: [], sens: [] };
    let players = [], currentRound = 1, totalRounds = 6, subIdx = 0, timer, timeLeft, cardOwnerIdx = 0;

    function nav(n) {
        if(n===2) {
            players = [
                {n:document.getElementById('p1').value||"Slave", g:document.getElementById('g1').value, wins:0},
                {n:document.getElementById('p2').value||"Master", g:document.getElementById('g2').value, wins:0}
            ];
            totalRounds = parseInt(document.getElementById('maxRounds').value);
        }
        if(n===3 && inv.rest.length === 0) { alert("Add restraints!"); return; }
        document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
        if(n===3) document.getElementById('trophy-display').style.display='flex';
        updateStatus();
    }

    function addItem(c) {
        let val = document.getElementById('in-'+c).value;
        if(val) { inv[c].push(val); document.getElementById('in-'+c).value=''; renderInv(); }
    }

    function renderInv() {
        ['vis','speech','rest','sens'].forEach(c=>{
            document.getElementById('list-'+c).innerHTML = inv[c].map((it,idx)=>`<div class="tag">${it}<span onclick="inv['${c}'].splice(${idx},1);renderInv()">×</span></div>`).join('');
        });
    }

    function updateStatus() {
        document.getElementById('p1Score').innerText = `${players[0].n}: ${players[0].wins}`;
        document.getElementById('p2Score').innerText = `${players[1].n}: ${players[1].wins}`;
        document.getElementById('card-y').classList.toggle('held', cardOwnerIdx === subIdx);
        document.getElementById('card-r').classList.toggle('held', cardOwnerIdx === subIdx);
    }

    function useCard(t) {
        if(cardOwnerIdx !== subIdx) return;
        if(t==='yellow') { subIdx = subIdx===0?1:0; cardOwnerIdx=subIdx; generate(); }
        else { cardOwnerIdx = subIdx===0?1:0; resolveTurn(false, true); }
        updateStatus();
    }

    function generate() {
        const slave = players[subIdx], master = players[subIdx===0?1:0];
        const v = inv.vis.length ? `blinded by <b>${inv.vis[Math.floor(Math.random()*inv.vis.length)]}</b>` : "eyes uncovered";
        const sp = inv.speech.length ? `silenced with <b>${inv.speech[Math.floor(Math.random()*inv.speech.length)]}</b>` : "unplugged";
        const r = `bound in <b>${inv.rest[Math.floor(Math.random()*inv.rest.length)]}</b>`;
        const s = inv.sens.length ? `<b>${inv.sens[Math.floor(Math.random()*inv.sens.length)]}</b>` : "Master's hands";

        const tasks = [
            `<b>TEASE & EDGE:</b> Master ${master.n} secures the ${slave.g} of Slave ${slave.n} with ${r}. While ${v}, use ${s} to bring the slave to the brink. Climax = Failure. Resistance = Mastery & Reversal.`,
            `<b>HUMAN STATUE:</b> Slave ${slave.n} must keep their ${slave.g} perfectly still while ${r} and ${sp}. Master ${master.n} will use ${s} for 5 minutes. Any sound resets the clock.`,
            `<b>SENSORY FOCUS:</b> Master ${master.n} applies ${r} to the ${slave.g} of ${slave.n}. While ${v} and ${sp}, the slave must correctly identify 3 applications of ${s}. Success earns role reversal.`,
            `<b>THE ESCAPIST:</b> ${master.n} binds the ${slave.g} of Slave ${slave.n} tightly in ${r} and ${v}. The slave has 4 minutes to struggle free and take the Master's seat.`
        ];
        
        document.getElementById('challenge-text').innerHTML = tasks[Math.floor(Math.random()*tasks.length)];
        timeLeft = 300; document.getElementById('gen-btn').style.display='none'; document.getElementById('start-btn').style.display='block';
    }

    function startT() {
        document.getElementById('pre-round').style.display='none'; document.getElementById('active-round').style.display='block';
        timer = setInterval(()=>{
            timeLeft--; document.getElementById('clock').innerText=`${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            if(timeLeft<=0){ clearInterval(timer); resolveTurn(false); }
        }, 1000);
    }

    function resolveTurn(win, skip=false) {
        clearInterval(timer);
        const prevMasterIdx = (subIdx === 0 ? 1 : 0);
        if(win) { 
            players[subIdx].wins++; 
            subIdx = prevMasterIdx; // Sub becomes Master
            cardOwnerIdx = subIdx; 
            alert("Victory! You have ascended to Master."); 
        } else { 
            players[prevMasterIdx].wins++; 
            if(!skip) alert("Failure. You remain the Slave."); 
        }
        
        currentRound++;
        if(currentRound > totalRounds) {
            let winIdx = players[0].wins > players[1].wins ? 0 : 1;
            document.body.innerHTML = `<div class="container" style="text-align:center;"><h1>Ultimate Master: ${players[winIdx].n}</h1><p>The session is over.</p><button class="btn" onclick="location.reload()">Start Over</button></div>`;
        } else {
            document.getElementById('active-round').style.display='none'; document.getElementById('pre-round').style.display='block';
            document.getElementById('gen-btn').style.display='block'; document.getElementById('start-btn').style.display='none';
            updateStatus();
        }
    }
</script>
</body>
</html>
