<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Arsenal Restored</title>
    <style>
        :root { 
            --accent: #0056b3; 
            --bg: #000000; 
            --card: #121212; 
            --text: #FFFFFF; 
            --crimson: #d00000; 
            --success: #008000; 
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; display: flex; justify-content: center; 
            font-size: 1.35rem; 
        }

        .container { 
            max-width: 750px; width: 100%; background: var(--card); 
            padding: 35px; border-radius: 25px; border: 4px solid var(--accent); 
            box-shadow: 0 0 70px #000; 
        }
        
        h1 { 
            text-align: center; text-transform: uppercase; letter-spacing: 10px; 
            margin-bottom: 35px; font-size: 3.5rem; border-bottom: 6px solid var(--accent); 
            padding-bottom: 15px;
        }

        .box-section { 
            background: #000; padding: 25px; margin-bottom: 25px; 
            border-radius: 15px; border: 3px solid #333; 
        }
        
        .label { 
            font-size: 1.4rem; text-transform: uppercase; font-weight: bold; 
            color: var(--accent); display: block; margin-bottom: 15px; 
        }

        input, select { 
            width: 100%; padding: 20px; border: 3px solid var(--accent); 
            border-radius: 10px; background: #000; color: white; 
            box-sizing: border-box; margin-bottom: 15px; font-size: 1.5rem; 
        }
        
        .btn { 
            background: var(--accent); color: white; border: 3px solid #FFF; 
            padding: 22px; width: 100%; cursor: pointer; text-transform: uppercase; 
            font-weight: bold; border-radius: 15px; font-size: 1.6rem; 
        }

        /* Inventory Chips */
        .chip { 
            display: inline-flex; align-items: center; background: #1a1a1a; 
            padding: 10px 15px; border-radius: 30px; margin: 5px; 
            border: 2px solid var(--accent); font-size: 1.2rem;
        }
        .tag { font-size: 0.8rem; background: #FFF; color: #000; padding: 2px 6px; border-radius: 5px; margin-left: 10px; }
        .del { color: var(--crimson); margin-left: 15px; cursor: pointer; font-weight: 900; }

        .score-row { 
            display: flex; justify-content: space-between; padding: 20px; 
            background: #000; border: 4px solid var(--accent); border-radius: 20px; 
            text-align: center; margin-bottom: 25px;
        }
        .p-score { font-size: 3rem; font-weight: 900; }

        .tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tog-btn { 
            padding: 20px; border: 3px solid #444; background: #000; color: #777; 
            cursor: pointer; text-transform: uppercase; font-weight: bold; text-align: center; border-radius: 12px;
        }
        .tog-btn.active { border-color: #FFF; color: #FFF; background: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title">SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Master Name</span>
            <input type="text" id="p0-name" value="Dominus">
            <span class="label">Slave Name</span>
            <input type="text" id="p1-name" value="Subject">
            <span class="label">Total Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" onclick="goToStep(2)">Configure Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="vault-editor"></div>
        <button class="btn" style="background:var(--success);" onclick="goToStep(3)">Start Session</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-header" style="text-align:center; color:var(--accent); font-weight:900; font-size: 2rem; margin-bottom: 20px;"></div>
        
        <div class="score-row">
            <div><div class="label">MASTER</div><div id="m-name" style="font-size:1.5rem;"></div><div id="m-score" class="p-score">0</div></div>
            <div><div class="label">SLAVE</div><div id="s-name" style="font-size:1.5rem;"></div><div id="s-score" class="p-score">0</div></div>
        </div>

        <div id="master-panel">
            <div class="box-section">
                <span class="label">Authorize Categories for this Decree</span>
                <div id="toggle-grid" class="tog-grid"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Issue Decree</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-text" style="text-align:center; font-size: 1.8rem; line-height: 1.6;"></div></div>
            <div style="display:flex; gap:15px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve(false)">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve(true)">SUCCESS</button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30,
        players: [{n:"", role:"Master", score:0, g:"M"}, {n:"", role:"Slave", score:0, g:"F"}],
        vault: {
            "The Shackles": [{n:"Handcuffs", t:"U"}],
            "The Silence": [{n:"Ball Gag", t:"U"}],
            "The Shadows": [{n:"Blindfold", t:"U"}],
            "The Discipline": [{n:"Paddle", t:"U"}],
            "The Senses": [{n:"Ice", t:"U"}],
            "The Pleasure": [{n:"Vibrator", t:"F"}]
        },
        activeCats: []
    };

    function goToStep(n) {
        document.querySelectorAll('[id^="step-"]').forEach(s => s.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if(n === 2) renderVaultEditor();
        if(n === 3) startSession();
    }

    function renderVaultEditor() {
        const editor = document.getElementById('vault-editor');
        editor.innerHTML = '<h2 style="text-align:center;">VAULT CONFIGURATION</h2>';
        for(let cat in state.vault) {
            let itemHtml = state.vault[cat].map((it, idx) => `
                <span class="chip">${it.n} <span class="tag">${it.t}</span>
                <span class="del" onclick="removeItem('${cat}', ${idx})">×</span></span>
            `).join('');
            
            editor.innerHTML += `
                <div class="box-section">
                    <span class="label">${cat}</span>
                    <div style="margin-bottom:15px;">${itemHtml}</div>
                    <div style="display:grid; grid-template-columns: 2fr 1fr 80px; gap:10px;">
                        <input type="text" id="add-n-${cat}" placeholder="Item name...">
                        <select id="add-t-${cat}"><option value="U">U</option><option value="M">M</option><option value="F">F</option></select>
                        <button class="btn" style="padding:0;" onclick="addItem('${cat}')">+</button>
                    </div>
                </div>`;
        }
    }

    function addItem(cat) {
        const n = document.getElementById(`add-n-${cat}`).value;
        const t = document.getElementById(`add-t-${cat}`).value;
        if(n) { state.vault[cat].push({n, t}); renderVaultEditor(); }
    }

    function removeItem(cat, idx) { state.vault[cat].splice(idx, 1); renderVaultEditor(); }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = parseInt(document.getElementById('round-total').value);
        state.activeCats = Object.keys(state.vault);
        renderRound();
    }

    function renderRound() {
        if(state.curr > state.total) { alert("Session Complete"); location.reload(); return; }
        
        const master = state.players.find(p => p.role === "Master");
        const slave = state.players.find(p => p.role === "Slave");
        
        document.getElementById('round-header').innerText = `ROUND ${state.curr} / ${state.total}`;
        document.getElementById('m-name').innerText = master.n;
        document.getElementById('s-name').innerText = slave.n;
        document.getElementById('m-score').innerText = master.score;
        document.getElementById('s-score').innerText = slave.score;

        const grid = document.getElementById('toggle-grid');
        grid.innerHTML = '';
        Object.keys(state.vault).forEach(cat => {
            const btn = document.createElement('div');
            btn.className = `tog-btn ${state.activeCats.includes(cat) ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                if(state.activeCats.includes(cat)) state.activeCats = state.activeCats.filter(c => c !== cat);
                else state.activeCats.push(cat);
                renderRound();
            };
            grid.appendChild(btn);
        });
    }

    function generateDecree() {
        if(state.activeCats.length === 0) return alert("Select a category.");
        const cat = state.activeCats[Math.floor(Math.random() * state.activeCats.length)];
        const sub = state.players.find(p => p.role === "Slave");
        const dom = state.players.find(p => p.role === "Master");
        
        // Filter by sub gender
        const items = state.vault[cat].filter(i => i.t === 'U' || i.t === sub.g);
        if(items.length === 0) return alert("No items available for this category/gender.");

        const item = items[Math.floor(Math.random() * items.length)];
        document.getElementById('decree-text').innerHTML = `<span style="color:var(--accent);">${cat} Protocol</span><br><br>${dom.n} shall apply ${item.n} to ${sub.n}.`;
        
        document.getElementById('master-panel').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
    }

    function resolve(success) {
        if(success) {
            state.players.find(p => p.role === "Slave").score++;
            state.players.forEach(p => p.role = (p.role === "Master" ? "Slave" : "Master"));
        } else {
            state.players.find(p => p.role === "Master").score++;
        }
        state.curr++;
        state.activeCats = Object.keys(state.vault); // Reset for next Master
        document.getElementById('master-panel').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderRound();
    }
</script>
</body>
</html>
