<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #28a745; --gold: #ffd700;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 1000px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 10px 0; }
        
        /* SETUP */
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .p-setup { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; letter-spacing: 2px; }
        
        /* INVENTORY */
        .manager-box { background: #050505; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-top: 10px; }
        .chip { padding: 4px 10px; background: #222; border-radius: 4px; font-size: 0.7rem; margin: 2px; display: inline-flex; align-items: center; gap: 5px; }
        .del-item { color: var(--crimson); cursor: pointer; }

        /* THEME TOGGLES (PLAY SCREEN) */
        .theme-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .theme-toggle { padding: 10px; background: #111; border: 1px solid #333; border-radius: 5px; font-size: 0.65rem; text-align: center; cursor: pointer; color: #666; font-weight: bold; text-transform: uppercase; }
        .theme-toggle.active { border-color: var(--gold); color: var(--gold); background: #1a1500; }

        /* PLAY STATE */
        #decree-text { background: #050505; padding: 30px; border-radius: 10px; border-left: 5px solid var(--gold); font-size: 1.1rem; line-height: 1.8; margin: 20px 0; color: #eee; }
        #timer { font-size: 5rem; color: var(--crimson); font-family: monospace; text-align: center; }
        .btn-main { background: var(--accent); color: white; padding: 20px; width: 100%; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .btn-commence { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px;}
        
        input[type="text"] { width: 100%; padding: 10px; background: #000; color: white; border: 1px solid #333; border-radius: 5px; margin-top: 5px; box-sizing: border-box; }
        .gen-btn { flex: 1; padding: 10px; border: 1px solid #333; background: #000; color: #444; cursor: pointer; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .gen-btn.active { border-color: var(--accent); color: white; background: #001a35; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-screen">
        <div class="setup-grid">
            <div class="p-setup">
                <span class="label">Dominant</span>
                <input type="text" id="name0" value="Master">
                <div class="gender-select" style="display:flex; gap:5px; margin-top:10px;">
                    <button class="gen-btn active" id="p0m" onclick="setGender(0,'M')">Male</button>
                    <button class="gen-btn" id="p0f" onclick="setGender(0,'F')">Female</button>
                </div>
            </div>
            <div class="p-setup">
                <span class="label">Submissive</span>

                <div class="gender-select" style="display:flex; gap:5px; margin-top:10px;">
                    <button class="gen-btn" id="p1m" onclick="setGender(1,'M')">Male</button>
                    <button class="gen-btn active" id="p1f" onclick="setGender(1,'F')">Female</button>
                </div>
            </div>
        </div>

        <div class="manager-box">
            <span class="label">Hardware Arsenal (Add/Remove Tools)</span>
            <div id="inventory-list"></div>
        </div>

        <button class="btn-main" style="margin-top:20px;" onclick="startSession()">Initialize Sovereign Protocol</button>
    </div>

    <div id="play-screen" style="display:none;">
        <div id="round-disp" style="text-align:center; color:var(--accent); margin-bottom:10px; letter-spacing: 2px;"></div>
        
        <span class="label" style="text-align:center; display:block;">Active Decree Protocols (Toggle to Include)</span>
        <div class="theme-selector" id="theme-selector"></div>

        <div id="command-center"><button class="btn-main" onclick="issueDecree()">Generate Random Decree</button></div>
        
        <div id="decree-panel" style="display:none;">
            <div id="timer">00:00</div>
            <button class="btn-commence" id="start-t-btn" onclick="startCountdown()">Commence Phase</button>
            <div id="decree-text"></div>
            <div id="post-commence" style="display:none; gap:10px;">
                <button class="btn-main" style="background:#1a1a1a; flex:1;" onclick="endRound(false)">Forfeit</button>
                <button class="btn-main" style="background:var(--success); flex:1;" onclick="endRound(true)">Success</button>
            </div>
        </div>
    </div>
</div>

<script>
const DEFAULT_INV = {
    "Restraints": ["Nylon Rope", "Hemp Rope", "Steel Cuffs", "Zip Ties", "Leather Straps"],

    inv: JSON.parse(localStorage.getItem('sov_inv_v21')) || DEFAULT_INV,
    activeThemes: [...THEMES],
    timer: null
};

function save() { localStorage.setItem('sov_inv_v21', JSON.stringify(state.inv)); }

function renderSetup() {
    const list = document.getElementById('inventory-list');
    list.innerHTML = '';
    Object.keys(state.inv).forEach(cat => {
        const div = document.createElement('div');
        div.style.marginBottom = "10px";
        div.innerHTML = `
            <span style="font-size:0.6rem; color:var(--accent);">${cat.toUpperCase()}</span>
            <div class="chip-container">${state.inv[cat].map((it, idx) => `
                <span class="chip">${it} <span class="del-item" onclick="removeItem('${cat}', ${idx})">×</span></span>
            `).join('')}</div>
            <div style="display:flex; gap:5px;"><input type="text" id="add-${cat}" placeholder="Add tool..."><button onclick="addItem('${cat}')" style="background:var(--accent); border:none; color:white; padding:0 10px;">+</button></div>
        `;
        list.appendChild(div);
    });
}

function renderThemes() {
    const sel = document.getElementById('theme-selector');
    sel.innerHTML = THEMES.map(t => `
        <div class="theme-toggle ${state.activeThemes.includes(t) ? 'active' : ''}" onclick="toggleTheme('${t}')">${t}</div>
    `).join('');
}

function toggleTheme(t) {
    if(state.activeThemes.includes(t)) state.activeThemes = state.activeThemes.filter(x => x !== t);
    else state.activeThemes.push(t);
    renderThemes();
}

function addItem(cat) { const v = document.getElementById(`add-${cat}`).value; if(v){state.inv[cat].push(v); save(); renderSetup();} }
function removeItem(cat, idx) { state.inv[cat].splice(idx, 1); save(); renderSetup(); }
function setGender(p, g) { state.p[p].gender = g; document.querySelectorAll(`.p-setup:nth-child(${p+1}) .gen-btn`).forEach(b => b.classList.remove('active')); event.target.classList.add('active'); }

function startSession() {
    state.p[0].name = document.getElementById('name0').value;
    state.p[1].name = document.getElementById('name1').value;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'block';
    renderThemes();
    updateUI();
}

function updateUI() {
    document.getElementById('round-disp').innerText = `PHASE ${state.currRound}`;
    document.getElementById('disp-name0').innerText = state.p[0].name.toUpperCase();
    document.getElementById('score0').innerText = state.p[0].score;
    document.getElementById('disp-name1').innerText = state.p[1].name.toUpperCase();
    document.getElementById('score1').innerText = state.p[1].score;
}

// DECREE ENGINE

        const area = r(["clitoris", "head of the penis", "inner labia", "prostate"]);
        text = `**The Threshold Ordeal**. ${s} is to be spread-eagled. ${d} will use the **${tool('Sensory')}** and the **${tool('Ache')}** on the ${area} simultaneously. ${s} is forbidden from climaxing. When ${s} reaches the 'edge', ${d} will deliver 3 heavy strikes with the **${tool('Impact')}** and demand a detailed thank you. Repeat until the timer expires.`;
        time = 1200;
    }
    else if(theme === "Shibari") {
        const pattern = r(["Diamond Harness", "Takate Kote", "Karada Chest tie", "Crotch Rope Ladder"]);
        text = `**Artful Restriction**. Using the **${tool('Restraints')}**, ${d} will construct a detailed **${pattern}** on ${s}. The rope must be bitten deep into the ${r(['skin of the shoulders', 'flesh of the thighs', 'crease of the waist'])}. ${s} must describe the sensation of every wrap in high detail as it is tightened.`;

    }

        time = 300;

    document.getElementById('decree-text').innerHTML = `<strong>PROTOCOL: ${theme.toUpperCase()}</strong><br><br>${text}`;
    document.getElementById('timer').innerText = formatTime(time);
    state.activeTime = time;
    document.getElementById('command-center').style.display = 'none';
    document.getElementById('decree-panel').style.display = 'block';
    document.getElementById('post-commence').style.display = 'none';
    document.getElementById('start-t-btn').style.display = 'block';
}

function startCountdown() {
    document.getElementById('start-t-btn').style.display = 'none';
    document.getElementById('post-commence').style.display = 'flex';
    let t = state.activeTime;
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        t--; document.getElementById('timer').innerText = formatTime(t);
        if(t <= 0) { clearInterval(state.timer); alert("Phase Complete."); }
    }, 1000);
}

function endRound(win) {
    if(win) state.p[1].score++; else state.p[1].score--;
    state.currRound++; state.p.reverse();
    clearInterval(state.timer);
    document.getElementById('command-center').style.display = 'block';
    document.getElementById('decree-panel').style.display = 'none';
    updateUI();
}

function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

renderSetup();
</script>
</body>
</html>
