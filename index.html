<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Gender-Locked Arsenal Build</title>
    <style>
        :root { --accent: #d4af37; --bg: #0a0a0a; --card: #161616; --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --warning: #b38f00; --veto-blue: #004a7c; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 6px; color: var(--accent); margin-bottom: 25px; font-size: 2.4rem; }
        .box-section { background: #1f1f1f; padding: 20px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; }
        
        .label { font-size: 0.85rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.2px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 15px; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; margin-bottom: 12px; font-size: 1.2rem; }
        
        .gender-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .g-btn { flex: 1; padding: 14px; background: #111; border: 1px solid #444; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.85rem; font-weight: bold; transition: 0.2s; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 10px; margin-top: 6px; transition: 0.2s; font-size: 1.2rem; }
        .btn:active { transform: scale(0.98); }
        .tog-btn { padding: 10px; font-size: 0.8rem; border-radius: 6px; border: 1px solid #444; background: #111; color: #555; cursor: pointer; text-transform: uppercase; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1608; }
        
        .item-chip { display: inline-flex; align-items: center; background: #333; padding: 8px 15px; border-radius: 25px; margin: 5px; font-size: 1rem; border: 1px solid #444; cursor: pointer; }
        .item-chip.off { opacity: 0.3; text-decoration: line-through; background: #111; }
        .tag { font-size: 0.6rem; font-weight: bold; background: var(--accent); color: black; padding: 2px 5px; border-radius: 4px; margin-left: 8px; }
        .remove-x { margin-left: 12px; color: var(--crimson); font-weight: bold; font-size: 1.3rem; }
        
        .score-row { display: flex; justify-content: space-between; padding: 15px; background: #000; border-radius: 12px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        .role-tag { font-size: 0.75rem; font-weight: bold; color: #444; margin-bottom: 5px; }
        .master-glow { color: var(--accent) !important; text-shadow: 0 0 5px var(--accent); }
        .p-name { font-weight: bold; font-size: 1.2rem; }
        .p-score { font-size: 1.8rem; color: var(--accent); }
        
        .management-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; border-top: 1px solid #333; padding-top: 18px; }
        .m-btn { border-radius: 8px; padding: 15px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); opacity: 0.3; pointer-events: none; }
        .m-btn.active-card { opacity: 1; pointer-events: auto; box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .y-card { background: var(--warning); color: #000; }
        .r-card { background: var(--crimson); color: #fff; }
        .v-card { background: var(--veto-blue); color: #fff; opacity: 1; pointer-events: auto; }
        .s-card { background: #fff; color: #000; border: 2px solid var(--crimson); opacity: 1; pointer-events: auto; }

        #decree-display { line-height: 1.6; color: #ddd; min-height: 100px; font-size: 1.2rem; }
        .grand-decree-text { font-size: 1.1rem; line-height: 1.8; color: #eee; background: #000; padding: 20px; border-radius: 10px; border: 1px solid var(--accent); text-align: justify; font-style: italic; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p0-name" value="Dominus">
            <div class="gender-grid" id="p0-genders">
                <button class="g-btn active" onclick="updateGender(0,'M',this)">Male</button>
                <button class="g-btn" onclick="updateGender(0,'F',this)">Female</button>
                <button class="g-btn" onclick="updateGender(0,'NB',this)">NB</button>
            </div>

            <span class="label">Player 2</span>
            <input type="text" id="p1-name" value="Subject">
            <div class="gender-grid" id="p1-genders">
                <button class="g-btn" onclick="updateGender(1,'M',this)">Male</button>
                <button class="g-btn active" onclick="updateGender(1,'F',this)">Female</button>
                <button class="g-btn" onclick="updateGender(1,'NB',this)">NB</button>
            </div>

            <span class="label">Global Controls</span>
            <span class="label" style="color:#666; font-size:0.7rem;">Safeword</span>
            <input type="text" id="safeword-in" value="RED">
            <span class="label" style="color:#666; font-size:0.7rem;">Total Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" style="width:100%" onclick="showStep(2)">Configure Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="inventory-editor"></div>
        <button class="btn" style="background:var(--success); width:100%; margin-top:20px;" onclick="startSession()">Finalize & Start</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-ui" style="text-align:center; font-size:0.85rem; color:var(--accent); margin-bottom:10px; font-weight:bold;"></div>
        <div class="score-row">
            <div class="p-block">
                <div id="r0" class="role-tag">MASTER</div>
                <div id="n0" class="p-name"></div>
                <div id="s0" class="p-score">0</div>
                <div id="inv0" style="font-size:1.2rem;"></div>
            </div>
            <div class="p-block">
                <div id="r1" class="role-tag">SLAVE</div>
                <div id="n1" class="p-name"></div>
                <div id="s1" class="p-score">0</div>
                <div id="inv1" style="font-size:1.2rem;"></div>
            </div>
        </div>
        
        <div id="game-controls">
             <div class="box-section">
                 <span class="label">Active Protocols</span>
                 <div id="proto-mount" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;"></div>
             </div>
             <button class="btn" style="width:100%" onclick="generate()">Command Decree</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-display"></div></div>
            <div style="display:flex; gap:12px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve('fail')">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve('success')">SUCCESS</button>
            </div>
            
            <div class="management-grid">
                <button id="y-btn" class="m-btn y-card" onclick="useYellow()">Yellow Card</button>
                <button id="r-btn" class="m-btn r-card" onclick="useRed()">Red Card</button>
                <button class="m-btn v-card" onclick="veto()">Veto</button>
                <button class="m-btn s-card" id="sw-btn" onclick="safeword()"></button>
            </div>
        </div>
    </div>

    <div id="step-4" style="display:none;">
        <h2 style="color:var(--accent); text-align:center; letter-spacing:3px;">THE GRAND DECREE</h2>
        <div class="box-section"><div id="grand-decree-display" class="grand-decree-text"></div></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <button class="btn" style="background:#222; font-size:1rem;" onclick="generateGrandDecree()">Reshape Fate</button>
            <button class="btn" style="background:var(--success); font-size:1rem;" onclick="finalizeRoles()">Finalize Winner Role</button>
        </div>
        <div id="final-role-selector" style="display:none; margin-top:20px;" class="box-section">
            <span class="label" style="text-align:center;">Select Final Path</span>
            <div style="display:flex; gap:12px; margin-top:10px;">
                <button class="btn" style="flex:1; background:var(--accent); color:black;" id="win-as-dom" onclick="endGame('Master')"></button>
                <button class="btn" style="flex:1; background:#444;" id="win-as-sub" onclick="endGame('Slave')"></button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30, winner: null,
        players: [
            {n:"", g:"M", role:"Master", score:0, hasYellow:false, hasRed:false},
            {n:"", g:"F", role:"Slave", score:0, hasYellow:false, hasRed:false}
        ],
        // Updated vault structure with gender tags (t: 'M', 'F', or 'U')
        vault: JSON.parse(localStorage.getItem('sov_audited_v3')) || {
            "Restraints": [{n:"Heavy Rope", a:true, t:"U"}],
            "Gags": [{n:"Ball Gag", a:true, t:"U"}],
            "Impact": [{n:"Leather Flogger", a:true, t:"U"}],
            "Sensory": [{n:"Silk Blindfold", a:true, t:"U"}],
            "Toys": [{n:"Vibrator", a:true, t:"U"}]
        },
        protocols: { 
            "The Solitary Bind": true, "The Wicked Gamble": true, 
            "The Veiled Confession": true, "The Silk Labyrinth": true, 
            "The Threshold of Agony": true, "The Flesh Endurance": true, 
            "The Great Unshackling": true, "The Velvet Command": true 
        }
    };

    function updateGender(playerIdx, gender, btn) {
        state.players[playerIdx].g = gender;
        const container = btn.parentElement;
        Array.from(container.children).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showStep(n) {
        document.querySelectorAll('[id^="step-"]').forEach(s => s.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if (n === 2) renderInventory();
    }

    function renderInventory() {
        const container = document.getElementById('inventory-editor');
        container.innerHTML = '<h3 style="color:var(--accent);text-align:center;font-size:1.1rem;margin-bottom:15px;">ARSENAL MANAGEMENT</h3>';
        for (let category in state.vault) {
            let section = document.createElement('div');
            section.className = 'box-section';
            let html = `<span class="label">${category}</span><div>`;
            state.vault[category].forEach((item, idx) => {
                html += `<span class="item-chip ${item.a ? '' : 'off'}" onclick="toggleItem('${category}',${idx})">
                            ${item.n} <span class="tag">${item.t}</span>
                            <span class="remove-x" onclick="removeItem('${category}',${idx}); event.stopPropagation()">×</span>
                         </span>`;
            });
            html += `</div>
                    <div style="display:grid; grid-template-columns: 2fr 1fr 60px; gap:8px; margin-top:12px;">
                        <input type="text" id="input-${category}" placeholder="Add..." style="margin:0; padding:10px; font-size:1rem;">
                        <select id="tag-${category}" style="margin:0; padding:10px; font-size:1rem;">
                            <option value="U">Unisex</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                        </select>
                        <button class="btn" style="width:100%; padding:0; margin:0; font-size:0.8rem;" onclick="addItem('${category}')">ADD</button>
                    </div>`;
            section.innerHTML = html;
            container.appendChild(section);
        }
    }

    function toggleItem(cat, idx) { state.vault[cat][idx].a = !state.vault[cat][idx].a; renderInventory(); }
    function removeItem(cat, idx) { state.vault[cat].splice(idx, 1); renderInventory(); }
    function addItem(cat) {
        const input = document.getElementById('input-' + cat);
        const tag = document.getElementById('tag-' + cat).value;
        if (input.value.trim()) {
            state.vault[cat].push({ n: input.value.trim(), a: true, t: tag });
            input.value = '';
            renderInventory();
        }
    }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = parseInt(document.getElementById('round-total').value);
        document.getElementById('sw-btn').innerText = "SW: " + document.getElementById('safeword-in').value;
        state.players[Math.floor(Math.random()*2)].hasYellow = true;
        state.players[Math.floor(Math.random()*2)].hasRed = true;
        localStorage.setItem('sov_audited_v3', JSON.stringify(state.vault));
        showStep(3); 
        renderGame();
    }

    function renderGame() {
        if(state.curr > state.total) return triggerFinale();
        document.getElementById('round-ui').innerText = `ROUND ${state.curr} / ${state.total}`;
        state.players.forEach((p, i) => {
            document.getElementById('n' + i).innerText = p.n;
            document.getElementById('s' + i).innerText = p.score;
            document.getElementById('r' + i).innerText = p.role;
            document.getElementById('r' + i).className = 'role-tag ' + (p.role === 'Master' ? 'master-glow' : '');
            document.getElementById('inv' + i).innerHTML = (p.hasYellow ? '🟡 ' : '') + (p.hasRed ? '🔴' : '');
        });
        const pm = document.getElementById('proto-mount'); 
        pm.innerHTML = '';
        for(let k in state.protocols) { 
            pm.innerHTML += `<button class="tog-btn ${state.protocols[k]?'active':''}" onclick="state.protocols['${k}']=!state.protocols['${k}']; renderGame()">${k}</button>`; 
        }
    }

    function generate() {
        const ap = Object.keys(state.protocols).filter(k=>state.protocols[k]);
        if (ap.length === 0) return alert("Activate at least one Protocol!");
        const protocolName = ap[Math.floor(Math.random()*ap.length)];
        const cats = { "The Solitary Bind":"Restraints", "The Wicked Gamble":"Impact", "The Veiled Confession":"Gags", "The Silk Labyrinth":"Restraints", "The Threshold of Agony":"Toys", "The Flesh Endurance":"Sensory", "The Great Unshackling":"Restraints", "The Velvet Command":"Sensory" };
        
        const m = state.players.find(x=>x.role==='Master');
        const s = state.players.find(x=>x.role==='Slave');
        
        // GENDER FILTER LOGIC
        const activeItems = state.vault[cats[protocolName]].filter(i => {
            const isComp = (i.t === 'U' || i.t === s.g);
            return i.a && isComp;
        });

        if(activeItems.length === 0) return alert(`No ${s.g} or Unisex items active in ${cats[protocolName]} for ${s.n}!`);
        
        const item = activeItems[Math.floor(Math.random()*activeItems.length)];
        
        document.getElementById('decree-display').innerHTML = `<strong>${protocolName}</strong><br><br>${m.n} shall utilize <strong>${item.n}</strong> upon ${s.n}. Complete to swap roles.`;
        document.getElementById('game-controls').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
        document.getElementById('y-btn').classList.toggle('active-card', state.players[0].hasYellow || state.players[1].hasYellow);
        document.getElementById('r-btn').classList.toggle('active-card', state.players[0].hasRed || state.players[1].hasRed);
    }

    function useYellow() { if(confirm("Swap roles and transfer card?")) { state.players.forEach(p => p.role = (p.role === 'Master' ? 'Slave' : 'Master')); transferCard('hasYellow'); renderGame(); generate(); } }
    function useRed() { if(confirm("Restart round and transfer card?")) { transferCard('hasRed'); generate(); } }

    function transferCard(key) {
        const owner = state.players.find(p => p[key]);
        const receiver = state.players.find(p => !p[key]);
        if(owner && receiver) { owner[key] = false; receiver[key] = true; }
    }

    function veto() { if(confirm("Veto decree?")) { document.getElementById('game-controls').style.display = 'block'; document.getElementById('decree-view').style.display = 'none'; } }
    
    function safeword() {
        const penalty = Math.floor(Math.random() * 5) + 1;
        if(confirm("Safeword? Slave loses " + penalty + " points.")) {
            state.players.find(p => p.role === 'Slave').score -= penalty;
            resolve('fail');
        }
    }

    function resolve(result) {
        if (result === 'success') {
            state.players.find(p => p.role === 'Slave').score++;
            state.players.forEach(p => p.role = (p.role === 'Master' ? 'Slave' : 'Master'));
        } else {
            state.players.find(p => p.role === 'Master').score++;
        }
        state.curr++;
        document.getElementById('game-controls').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderGame();
    }

    function triggerFinale() { 
        state.winner = state.players[0].score > state.players[1].score ? state.players[0] : state.players[1]; 
        showStep(4); 
        generateGrandDecree(); 
    }

    function generateGrandDecree() {
        document.getElementById('grand-decree-display').innerHTML = `The Session has concluded. ${state.winner.n} claims absolute dominion. The Conquered must yield to the Victor's whim.`;
    }

    function finalizeRoles() {
        document.getElementById('final-role-selector').style.display = 'block';
        document.getElementById('win-as-dom').innerText = `${state.winner.n} (MASTER)`;
        document.getElementById('win-as-sub').innerText = `${state.winner.n} (SLAVE)`;
    }

    function endGame(role) { alert(`Finality reached. ${state.winner.n} is the permanent ${role}.`); location.reload(); }
</script>
</body>
</html>
