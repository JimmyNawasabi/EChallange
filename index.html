<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit: Ascension</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --yellow: #ffd700; 
            --red: #ee3333; --safe-green: #2e7d32; --veto: #4a4a4a; --black: #000000;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 18px; }
        .container { max-width: 650px; width: 100%; background: var(--card-bg); padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        .step { display: none; }
        .active { display: block; }

        .box { background: #fffcf9; border: 2px solid #f5f2ed; padding: 20px; margin-bottom: 25px; border-radius: 25px; }
        .inner-box { background: #ffffff; border: 1px solid #eee; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.5px; }

        input[type="text"], select, input[type="number"], textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; outline: none; display: block; font-family: inherit; }
        
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tgl-btn { background: #f0f0f0; padding: 8px; border-radius: 10px; text-align: center; font-size: 0.65rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: 0.2s; color: #999; text-transform: uppercase; }
        .tgl-btn.on { background: var(--crimson); color: white; border-color: var(--accent); }

        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag { background: #fdfbf7; padding: 6px 12px; border-radius: 50px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; font-weight: bold; border: 1px solid #e8e4db; }
        .tag span { color: var(--crimson); cursor: pointer; font-size: 1.1rem; }

        .badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 1000; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: white; }
        .b-truth { background: #5d6d7e; } .b-dare { background: #af601a; } .b-escape { background: #c0392b; }
        .b-edging { background: #884ea0; } .b-physical { background: #1e8449; } .b-selfbondage { background: #2e4053; }
        .b-manual { background: var(--black); }

        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 20px; font-size: 1rem; margin-bottom: 10px; }
        .btn-secondary { background: var(--accent); font-size: 0.85rem; padding: 12px; }
        .btn-veto { background: var(--veto); font-size: 0.8rem; padding: 10px; border-radius: 15px; }
        
        .timer-display { font-size: 5rem; text-align: center; color: var(--crimson); font-weight: bold; margin: 15px 0; }
        #manual-entry-area { display: none; margin-top: 15px; border-top: 2px dashed #eee; padding-top: 15px; }
        
        .final-screen { text-align: center; }
        .punishment-text { color: var(--crimson); font-weight: bold; font-style: italic; font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">Ascension Edition</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Total Rounds</span>
            <input type="number" id="maxRounds" value="6">
            
            <div class="inner-box">
                <span class="label">Participant One (Starts as Slave)</span>
                <input type="text" id="p1" placeholder="Name">
                <select id="g1"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
            <div class="inner-box">
                <span class="label">Participant Two (Starts as Master)</span>
                <input type="text" id="p2" placeholder="Name">
                <select id="g2"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
        </div>
        <button class="btn" onclick="nav(2)">Define Inventory ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Vision (Blindfolds)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-vis"><button class="btn btn-add" style="width:70px" onclick="addItem('vis')">+</button></div><div id="list-vis" class="tag-row"></div>
            
            <span class="label">Mouth (Gags)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-speech"><button class="btn btn-add" style="width:70px" onclick="addItem('speech')">+</button></div><div id="list-speech" class="tag-row"></div>
            
            <span class="label">Restraints (Cuffs/Rope)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-rest"><button class="btn btn-add" style="width:70px" onclick="addItem('rest')">+</button></div><div id="list-rest" class="tag-row"></div>
            
            <span class="label">Sensation (Toys)</span>
            <div style="display:flex; gap:10px;"><input type="text" id="in-sens"><button class="btn btn-add" style="width:70px" onclick="addItem('sens')">+</button></div><div id="list-sens" class="tag-row"></div>
        </div>
        <button class="btn" onclick="nav(3)">Enter Session</button>
    </div>

    <div id="step3" class="step">
        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center; font-size: 1rem;">Round 1 / 6</div>
            
            <div class="inner-box">
                <span class="label">Master's Choice: Toggle Active Categories</span>
                <div class="toggle-grid" id="round-toggles">
                    <div class="tgl-btn on" data-cat="truth">Truth</div>
                    <div class="tgl-btn on" data-cat="dare">Dare</div>
                    <div class="tgl-btn on" data-cat="escape">Escape</div>
                    <div class="tgl-btn on" data-cat="edging">Edging</div>
                    <div class="tgl-btn on" data-cat="physical">Phys</div>
                    <div class="tgl-btn on" data-cat
