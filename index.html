<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Judicial Economy</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000; --card: #121212; 
            --text: #FFF; --crimson: #d00000; --success: #008000; --gold: #ffd700;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 0.85rem; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 20px; border-radius: 20px; border: 3px solid var(--accent); box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin: 15px 0;}
        .box-section { background: #000; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; position: relative; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 2px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--accent); border-radius: 4px; background: #000; color: white; margin-bottom: 10px; }
        .item-grid { display: flex; flex-wrap: wrap; gap: 5px; margin: 5px 0; }
        .chip { padding: 4px 10px; border: 1px solid #444; border-radius: 4px; font-size: 0.7rem; cursor: pointer; background: #0a0a0a; color: #666; }
        .chip.active { border-color: var(--accent); color: #fff; background: #001a35; }
        .inventory-cards { display: flex; justify-content: center; gap: 10px; min-height: 50px; margin-top: 10px; }
        .card-obj { width: 35px; height: 50px; border-radius: 4px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .c-yellow { background: var(--gold); color: #000; }
        .c-red { background: var(--crimson); color: #fff; }
        .btn { background: var(--accent); color: white; border: 1px solid #FFF; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 8px; margin-top: 10px; }
        .score-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .player-box { flex: 1; background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: center; }
        .player-box.active-dom { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 86, 179, 0.3); }
        #timer-box { font-size: 3rem; font-weight: 100; color: var(--crimson); text-align: center; }
        #decree-text { font-size: 1.1rem; line-height: 1.6; color: #ccc; min-height: 100px; padding: 20px; border: 1px solid #222; margin: 10px 0; border-radius: 8px; text-align: center;}
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="setup-view">
        <div class="box-section">
            <span class="label">Participants</span>
            <input type="text" id="p0-name" value="Master">
            <input type="text" id="p1-name" value="Slave">
        </div>
        <div class="box-section">
            <span class="label">Arsenal Configuration</span>
            <div id="arsenal-container"></div>
        </div>
        <button class="btn" onclick="begin()">Initialize Protocol</button>
    </div>

    <div id="game-view" style="display:none;">
        <div id="round-info" style="text-align:center; color:var(--accent); letter-spacing: 2px; margin-bottom: 10px;"></div>
        <div class="score-row">
            <div id="box-0" class="player-box">
                <div class="label" id="role-0"></div>
                <div id="name-0" style="font-weight:bold;"></div>
                <div id="score-0" style="font-size:1.5rem; color:var(--accent);">0</div>
                <div id="inv-0" class="inventory-cards"></div>
            </div>
            <div id="box-1" class="player-box">
                <div class="label" id="role-1"></div>
                <div id="name-1" style="font-weight:bold;"></div>
                <div id="score-1" style="font-size:1.5rem; color:var(--accent);">0</div>
                <div id="inv-1" class="inventory-cards"></div>
            </div>
        </div>
        
        <div id="action-panel">
            <button class="btn" onclick="issueCommand()">ISSUE DECREE</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div id="timer-box">03:00</div>
            <div id="decree-text"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#1a1a1a; flex:1;" onclick="finishRound(false)">Fail</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="finishRound(true)">Success</button>
            </div>
        </div>
    </div>
</div>

<script>
const DEFAULT_H = {
    "Quietude": ["Ball Gag", "Tape"],
    "Stillness": ["Rope", "Cuffs"],
    "Shadows": ["Blindfold", "Hood"],
    "Impact": ["Flogger", "Cane"],
    "Ache": ["Vibrator", "Plug"]
};

let state = {
    round: 1, timer: null,
    players: [
        {id:0, name:"", role:"Master", score:0, cards:[]},
        {id:1, name:"", role:"Slave", score:0, cards:[]}
    ],
    h: JSON.parse(localStorage.getItem('sov_h_v5')) || DEFAULT_H,
    activeH: {},
    db: [
        "{sub} is to be silenced with {item} for the duration of this phase.",
        "{sub} must be rendered immobile using {item}. {dom} will inspect the bind.",
        "{dom} will use {item} to strike {sub} 20 times. Absolute stillness required.",
        "{sub} will accept {item} internally. {dom} controls the frequency.",
        "{dom} uses {item} to explore {sub}'s most sensitive nerves. Silence is mandatory."
    ]
};

function init() {
    const cont = document.getElementById('arsenal-container');
    Object.keys(state.h).forEach(c => {
        state.activeH[c] = [...state.h[c]];
        let d = document.createElement('div');
        d.innerHTML = `<span class="label">${c}</span><div class="item-grid" id="g-${c}"></div>
        <div style="display:flex; gap:5px;"><input type="text" id="in-${c}" placeholder="Add..."><button onclick="add('${c}')">+</button></div>`;
        cont.appendChild(d);
        renderH(c);
    });
}

function renderH(c) {
    const g = document.getElementById(`g-${c}`);
    g.innerHTML = state.h[c].map(i => `<div class="chip ${state.activeH[c].includes(i)?'active':''}" onclick="tog('${c}','${i}')">${i}</div>`).join('');
}

function tog(c,i) {
    let a = state.activeH[c];
    a.includes(i) ? a.splice(a.indexOf(i),1) : a.push(i);
    renderH(c);
}

function add(c) {
    let v = document.getElementById(`in-${c}`).value;
    if(v) { state.h[c].push(v); state.activeH[c].push(v); localStorage.setItem('sov_h_v5', JSON.stringify(state.h)); renderH(c); }
}

function begin() {
    state.players[0].name = document.getElementById('p0-name').value;
    state.players[1].name = document.getElementById('p1-name').value;
    if(Math.random() > 0.5) { state.players[0].cards = ['Y']; state.players[1].cards = ['R']; } 
    else { state.players[0].cards = ['R']; state.players[1].cards = ['Y']; }
    document.getElementById('setup-view').style.display='none';
    document.getElementById('game-view').style.display='block';
    refresh();
}

function refresh() {
    document.getElementById('round-info').innerText = `PHASE ${state.round}`;
    state.players.forEach((p, i) => {
        document.getElementById(`name-${i}`).innerText = p.name.toUpperCase();
        document.getElementById(`role-${i}`).innerText = p.role;
        document.getElementById(`score-${i}`).innerText = p.score;
        document.getElementById(`box-${i}`).className = `player-box ${p.role==='Master'?'active-dom':''}`;
        const inv = document.getElementById(`inv-${i}`);
        inv.innerHTML = p.cards.map(c => `<div class="card-obj c-${c==='Y'?'yellow':'red'}" onclick="useCard(${i},'${c}')">${c}</div>`).join('');
    });
}

function issueCommand() {
    const dom = state.players.find(p => p.role === 'Master');
    const sub = state.players.find(p => p.role === 'Slave');
    
    // Pick all available items across all active categories
    let allItems = [];
    Object.keys(state.activeH).forEach(cat => {
        allItems = allItems.concat(state.activeH[cat]);
    });

    let raw = state.db[Math.floor(Math.random()*state.db.length)];
    let selectedItem = allItems[Math.floor(Math.random()*allItems.length)] || "the appropriate tool";
    
    let txt = raw.replace(/{item}/g, `<strong>${selectedItem}</strong>`)
                 .replace(/{dom}/g, dom.name)
                 .replace(/{sub}/g, sub.name);

    document.getElementById('decree-text').innerHTML = txt;
    document.getElementById('action-panel').style.display='none';
    document.getElementById('decree-view').style.display='block';
    
    startTimer(180);
}

function startTimer(seconds) {
    let t = seconds;
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        t--;
        document.getElementById('timer-box').innerText = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
        if(t <= 0) finishRound(false);
    }, 1000);
}

function useCard(pIdx, type) {
    const other = pIdx === 0 ? 1 : 0;
    if(type === 'Y') {
        alert(`${state.players[pIdx].name} triggers YELLOW CARD: Role Swap.`);
        state.players[other].cards.push('Y');
        state.players[pIdx].cards = state.players[pIdx].cards.filter(c => c !== 'Y');
    } else {
        alert(`${state.players[pIdx].name} triggers RED CARD: Round Forfeited.`);
        state.players[other].cards.push('R');
        state.players[pIdx].cards = state.players[pIdx].cards.filter(c => c !== 'R');
        state.round++;
    }
    swap();
}

function finishRound(success) {
    if(success) state.players.find(p => p.role === 'Slave').score++;
    state.round++;
    swap();
}

function swap() {
    clearInterval(state.timer);
    state.players.forEach(p => p.role = p.role === 'Master' ? 'Slave' : 'Master');
    document.getElementById('action-panel').style.display='block';
    document.getElementById('decree-view').style.display='none';
    refresh();
}

init();
</script>
</body>
</html>
