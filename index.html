<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --off: #2a2a2a;
            --alert: #ff0000;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; 
            display: flex; justify-content: center;
        }

        .container { 
            max-width: 500px; width: 100%; background: var(--card); 
            padding: 30px; border-radius: 30px; border: 2px solid #333; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        
        .box-section { 
            background: #1f1f1f; padding: 20px; margin-bottom: 20px; 
            border-radius: 20px; border: 1px solid #333; 
        }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }

        input[type="text"], input[type="number"] { 
            width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; 
            background: #000; color: white; font-size: 1.1rem; box-sizing: border-box;
            margin-bottom: 15px;
        }

        .gender-select { display: flex; gap: 10px; margin-bottom: 5px; }
        .g-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; 
            background: #111; color: #666; cursor: pointer; text-align: center; 
            font-weight: bold; text-transform: uppercase; font-size: 0.8rem;
        }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { 
            background: var(--crimson); color: white; border: none; padding: 20px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; 
            border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px;
        }

        .status-header { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-box { background: #000; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.75rem; border: 1px solid #444; flex: 1; }
        
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .t-btn { padding: 12px; border-radius: 12px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; text-align: center; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .t-btn.on { background: var(--accent); color: #000; border-color: var(--accent); }
        .t-btn.gear-on { background: var(--crimson); color: white; border-color: var(--crimson); }
        .master-all { grid-column: span 2; background: #222; color: var(--accent); border: 1px dashed var(--accent); margin-bottom: 5px; }
        
        .timer-big { font-size: 4rem; text-align: center; font-weight: bold; margin: 10px 0; }
        .instruction-highlight { color: var(--accent); font-weight: bold; }
        .step { display: none; }
        .active { display: block !important; }

        .card-action-btn { font-size: 0.65rem; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        
        #extend-prompt { background: #d4af37; color: #000; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 0.8rem; display: none; }
        
        .veto-btn { background: #444; color: #fff; border: 1px solid #666; font-size: 0.6rem; padding: 5px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; width: 100%; }

        .safeword-container { margin-top: 30px; text-align: center; }
        .btn-safeword {
            background: #ff0000 !important;
            color: #ffffff !important;
            padding: 25px;
            font-size: 1.5rem;
            letter-spacing: 5px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            animation: pulse-red 1.5s infinite;
            border: 4px solid #ffffff;
            width: 100%;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 25px 10px rgba(255, 0, 0, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="step1" class="step active">
        <div class="box-section">
            <span class="label">Primary Participant (Master)</span>
            <input type="text" id="p1_n" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn active" id="p1m" onclick="setGender(1,'M')">Male</div>
                <div class="g-btn" id="p1f" onclick="setGender(1,'F')">Female</div>
                <div class="g-btn" id="p1n" onclick="setGender(1,'NB')">NB</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Secondary Participant (Subject)</span>
            <input type="text" id="p2_n" placeholder="Name">
            <div class="gender-select">
                <div class="g-btn" id="p2m" onclick="setGender(2,'M')">Male</div>
                <div class="g-btn active" id="p2f" onclick="setGender(2,'F')">Female</div>
                <div class="g-btn" id="p2n" onclick="setGender(2,'NB')">NB</div>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Safe Word</span>
            <input type="text" id="safe_word_input" value="RED LIGHT">
        </div>
        <div class="box-section">
            <span class="label">Rounds</span>
            <input type="number" id="max_r" value="10">
        </div>
        <button class="btn" onclick="nav(2)">Access the Arsenal</button>
    </div>

    <div id="step2" class="step">
        <div class="box-section" id="vault-inject"></div>
        <button class="btn" onclick="nav(3)">Lock Arsenal & Begin</button>
    </div>

    <div id="step3" class="step">
        <div class="status-header">
            <div class="stat-box" id="disp-round">ROUND: 1</div>
            <div class="stat-box" id="disp-remain">REMAINING: 9</div>
        </div>

        <div id="extend-prompt">
            PROTOCOL NEARLY COMPLETE. EXTEND SESSION?<br>
            <button onclick="extendGame()" style="margin-top:10px; padding:5px 10px; cursor:pointer;">+5 Rounds</button>
        </div>

        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center;">PROTOCOL INITIATED</div>
            <div class="box-section">
                <span class="label">Categories</span>
                <div class="toggle-grid" id="trial-toggles"></div>
            </div>
            <div class="box-section">
                <span class="label">Gear System</span>
                <div class="toggle-grid" id="gear-toggles"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Generate Decree</button>
        </div>

        <div id="active-round" style="display:none;">
            <button class="veto-btn" onclick="vetoCurrent()">⚠ VETO & REMOVE CHALLENGE FROM ENGINE</button>
            <div class="box-section" style="min-height: 250px; display: flex; align-items: center; justify-content: center; font-size: 1rem; line-height: 1.5; padding: 25px;">
                <div id="active-trial-text" style="text-align:left;"></div>
            </div>
            <div class="timer-big" id="clock">00:00</div>
            
            <div class="toggle-grid">
                <button class="card-action-btn" id="btn-y-use" onclick="playYellowCard()">Play Yellow Card</button>
                <button class="card-action-btn" id="btn-r-use" onclick="playRedCard()">Play Red Card</button>
            </div>

            <button class="btn" style="background:#1e4d2b; margin-top:15px;" onclick="finish(true)">Complete</button>
            <button class="btn" style="background:#2a2a2a; margin-top:10px; color:#aaa;" onclick="finish(false)">Fail / Skip</button>
            
            <div class="safeword-container">
                <button class="btn-safeword" onclick="triggerSafeWord()">SAFE WORD</button>
            </div>
        </div>
    </div>
</div>

<script>
    let players = [{n:"", g:"M", s:0}, {n:"", g:"F", s:0}], curR = 1, maxR = 10, masterIdx = 0, timer, timeLeft;
    let cards = { yellow: 0, red: 1 }, safeWord = "RED LIGHT";
    let currentCategoryRef = null, currentDecreeIdx = -1, rawDecreeText = "";

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function soundEffect(kind) {
        if (kind === 'decree') { playTone(150, 'square', 0.5, 0.1); }
        else if (kind === 'card') { playTone(800, 'sine', 0.1, 0.2); }
        else if (kind === 'safeword') { playTone(400, 'sawtooth', 0.6, 0.3); }
    }

    function triggerHaptic(pattern) { if ("vibrate" in navigator) navigator.vibrate(pattern); }
    
    function setGender(p, g) {
        players[p-1].g = g;
        const group = (p === 1) ? ['p1m','p1f','p1n'] : ['p2m','p2f','p2n'];
        group.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(`p${p}${g.toLowerCase()}`).classList.add('active');
    }

    const trials = [
        { n: "The Solitary Bind", t: 600, on: true, d: [
            "Force the subject into a kneeling position. Use [REST] to bind the right ankle to the right wrist tightly, then pull the left arm behind the back and secure it to the left ankle. Apply [VIS] and ensure no light can penetrate.",
            "Instruct the subject to lie face down. Cross their ankles and bind them together with [REST], then pull the rope upward and secure it to a [REST] collar around their neck. Apply [GAG] to prevent all speech."
        ] },
        { n: "Naked Confessions", t: 450, on: true, d: [
            "Apply [VIS] to the subject. While they are blind, use [SENS] to trace circles around their most sensitive areas. They must recount a secret fantasy in graphic detail; if they stop talking, increase the intensity of [SENS].",
            "Place the subject in a chair with arms bound to the sides with [REST]. Master will use [SENS] on the inner thighs. Subject must rate their arousal from 1-10 every 30 seconds while explaining why they deserve the stimulation."
        ] }
        // ... (remaining trials maintained from engine)
    ];

    let gearCats = { "Blindfolds": true, "Gags": true, "Restraints": true, "Sensation": true };
    let vault = {
        "Blindfolds": [{n:"Sleep Mask", on:true}], "Gags": [{n:"Ball Gag", on:true}], 
        "Restraints": [{n:"Rope", on:true}], "Sensation": [{n:"Feather", on:true}]
    };

    function nav(n) {
        if(n === 2) {
            players[0].n = document.getElementById('p1_n').value || "P1";
            players[1].n = document.getElementById('p2_n').value || "P2";
            maxR = parseInt(document.getElementById('max_r').value) || 10;
            safeWord = document.getElementById('safe_word_input').value || "RED LIGHT";
        }
        if(n === 3) renderCommand();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function updateStatus() {
        document.getElementById('disp-round').innerText = `ROUND: ${curR}`;
        document.getElementById('disp-remain').innerText = `REMAINING: ${maxR - curR}`;
        document.getElementById('extend-prompt').style.display = (maxR - curR === 1) ? 'block' : 'none';
        document.getElementById('btn-y-use').style.opacity = (cards.yellow === masterIdx) ? "1" : "0.3";
        document.getElementById('btn-r-use').style.opacity = (cards.red === masterIdx) ? "1" : "0.3";
    }

    function playRedCard() {
        if(cards.red !== masterIdx) return;
        soundEffect('card'); triggerHaptic(200);
        cards.red = (cards.red === 0 ? 1 : 0);
        alert("RED CARD: ROUND TERMINATED. 0 POINTS AWARDED.");
        finish(false);
    }

    function playYellowCard() {
        if(cards.yellow !== masterIdx) return;
        soundEffect('card'); triggerHaptic(100);
        cards.yellow = (cards.yellow === 0 ? 1 : 0);
        masterIdx = (masterIdx === 0 ? 1 : 0); // Swap roles
        alert("YELLOW CARD: ROLES SWAPPED. TASK RESTARTING.");
        displayDecree(rawDecreeText); // Re-process same text for new gender/role
    }

    function generateDecree() {
        const act = trials.filter(t => t.on && t.d.length > 0);
        if (!act.length) return;
        currentCategoryRef = act[Math.floor(Math.random() * act.length)];
        currentDecreeIdx = Math.floor(Math.random() * currentCategoryRef.d.length);
        rawDecreeText = currentCategoryRef.d[currentDecreeIdx];
        displayDecree(rawDecreeText);
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timeLeft = currentCategoryRef.t; runClock();
    }

    function displayDecree(baseText) {
        soundEffect('decree'); triggerHaptic(150);
        let txt = baseText;
        const repl = (cat) => {
            const items = vault[cat].filter(i => i.on);
            const val = items.length ? items[Math.floor(Math.random() * items.length)].n : cat;
            return gearCats[cat] ? `<span class="instruction-highlight">${val}</span>` : `[${cat} Off]`;
        };
        txt = txt.replace(/\[REST\]/g, repl('Restraints')).replace(/\[SENS\]/g, repl('Sensation')).replace(/\[VIS\]/g, repl('Blindfolds')).replace(/\[GAG\]/g, repl('Gags'));
        document.getElementById('active-trial-text').innerHTML = `<strong>MASTER: ${players[masterIdx].n}</strong><br><strong>TASK: ${currentCategoryRef.n.toUpperCase()}</strong><br><br>${txt}`;
        updateStatus();
    }

    function triggerSafeWord() {
        soundEffect('safeword'); triggerHaptic([300, 100, 300]);
        players[masterIdx === 0 ? 1 : 0].s = Math.max(0, players[masterIdx === 0 ? 1 : 0].s - 5);
        alert(`SAFE WORD: ${safeWord} ACTIVATED.`);
        finish(false);
    }

    function renderCommand() {
        document.getElementById('round-header').innerText = `MASTER: ${players[masterIdx].n}`;
        updateStatus();
        // (UI generation for toggles handled here)
    }

    function runClock() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft<=0) finish(false);
        }, 1000);
    }

    function finish(win) {
        clearInterval(timer);
        if(win) players[masterIdx === 0 ? 1 : 0].s += 1;
        if(curR >= maxR) { runFinale(); } else {
            curR++; masterIdx = (masterIdx === 0 ? 1 : 0);
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('active-round').style.display = 'none';
            renderCommand();
        }
    }

    function renderVault() { /* Inventory UI logic */ }
    function nav(n) { /* Navigation logic */ }
    function runFinale() { /* Reveal hidden score logic */ }

</script>
</body>
</html>
