<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit: Sovereignty</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --safe-green: #2e7d32; --veto: #4a4a4a;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 18px; }
        .container { max-width: 700px; width: 100%; background: var(--card-bg); padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        .step { display: none; }
        .active { display: block !important; }

        .box { background: #fffcf9; border: 1px solid #f0e6d2; padding: 30px; margin-bottom: 25px; border-radius: 25px; line-height: 1.8; position: relative; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.5px; }

        input[type="text"], select, input[type="number"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 15px; font-size: 1rem; font-family: inherit; }
        
        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .tag { background: #f9f4eb; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; color: #7b6a4a; border: 1px solid #e2d1b3; transition: 0.2s; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }
        
        .badge { display: inline-block; padding: 6px 18px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: white; }
        .b-truth { background: #5d6d7e; } .b-dare { background: #af601a; } .b-escape { background: #c0392b; }
        .b-edging { background: #884ea0; } .b-physical { background: #1e8449; }
        
        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1rem; margin-bottom: 10px; transition: 0.3s; }
        .btn:hover { letter-spacing: 2px; background: #5a1212; }
        
        .timer-display { font-size: 5rem; text-align: center; color: var(--crimson); font-weight: 100; margin: 20px 0; font-family: monospace; }
        .intensity-pill { position: absolute; top: 15px; right: 15px; font-size: 0.6rem; padding: 4px 10px; border-radius: 50px; border: 1px solid var(--accent); color: var(--accent); text-transform: uppercase; font-weight: 800; }
        
        b { color: var(--crimson); text-decoration: underline; }
        i { color: #666; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">Sovereignty Edition</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Session Config</span>
            <input type="number" id="maxRounds" value="6" title="Rounds">
            <input type="text" id="p1" placeholder="Slave Name">
            <select id="g1"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            <input type="text" id="p2" placeholder="Master Name">
        </div>
        <button class="btn" onclick="goToStep(2)">Curate Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <span class="label">Inventory Selection</span>
            <div id="inv-container"></div>
        </div>
        <button class="btn" onclick="goToStep(3)">Commence Ceremony</button>
    </div>

    <div id="step3" class="step">
        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center;">Round 1</div>
            <div class="box" style="text-align:left;">
                <div id="intensity-display" class="intensity-pill">---</div>
                <div id="badge-container"></div>
                <div id="task-text">Press the button to receive your decree.</div>
            </div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Decree</button>
            <div id="pre-start-controls" style="display:none;">
                <button class="btn" style="background: var(--safe-green);" onclick="startT()">Start Clock</button>
                <button class="btn" style="background: var(--veto); font-size:0.8rem;" onclick="generate()">Reroll Decree</button>
            </div>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <button class="btn" onclick="resolveTurn(true)">Success (Role Swap)</button>
            <button class="btn" style="background:#888;" onclick="resolveTurn(false)">Failure (No Swap)</button>
        </div>
    </div>
</div>

<script>
    const gear = {
        "Blindfolds": ["Pillow Case", "Gas Mask", "Bandage", "Tape", "Cloth", "Sleep Mask", "Silk Scarf", "Hood"],
        "Gags": ["Gas Mask", "Tape", "Pallet Wrap", "Cloth", "Panties", "Bandage", "Rope", "Ring Gag", "Ball Gag", "Hood"],
        "Restraints": ["Leather Cuffs", "Tape", "Pallet Wrap", "String", "Belt", "Ribbon", "Rope", "Handcuffs"],
        "Sensation": ["Anal Hook", "Pussy Hook", "E-stim Machine", "Anal Dildo", "Insertable", "Dildo", "Butt Plug", "Paddle", "Vibrator", "Cane", "Needle", "Sharpies", "Candle", "Clamps"]
    };

    let activeInv = {};
    let players = [], currentRound = 1, subIdx = 0, timer, timeLeft;

    // ELABORATE METHOD ENGINE
    const getApplicationMethod = (item, intensity) => {
        item = item.toLowerCase();
        let desc = "";

        // VISUAL INHIBITORS
        if (item === "pillow case") desc = "Drape the fabric entirely over the Slave's head. If possible, secure it loosely around the neck with a soft tie, ensuring the excess fabric hangs heavy to block all light.";
        else if (item === "gas mask") desc = "Fit the mask over the Slave's face, cinching the rubber straps until the seal is airtight against the skin, creating a claustrophobic sensory vacuum.";
        else if (item === "tape") desc = "Apply three horizontal strips across the eyes, pressing the edges firmly into the temples to ensure zero light leakage.";
        else if (item === "bandage" || item === "cloth" || item === "silk scarf") desc = `Fold the material into a thick 3-inch band. Wrap it twice around the head and knot it ${intensity === 'tight' ? 'firmly at the base of the skull' : 'softly over the ears'}.`;
        
        // GAGS
        else if (item === "pallet wrap" || item === "tape") desc = `Force the Slave to open wide, then wrap the ${item} around the circumference of the head three times, covering the mouth entirely to muffle all sound.`;
        else if (item === "panties" || item === "cloth") desc = "Stuff the fabric deep into the oral cavity until the jaws are stretched, then secure it in place by tying a secondary binding over the lips.";
        else if (item === "ring gag" || item === "ball gag") desc = "Insert the bit and pull the buckle to the third hole, forcing the Slave's mouth into a permanent, straining 'O' shape.";

        // RESTRAINTS
        else if (item === "leather cuffs" || item === "handcuffs") desc = `Cinch the hardware around the wrists. ${intensity === 'tight' ? 'Ensure there is no gap between the skin and the lining' : 'Leave exactly one finger-width of space for slight movement'}.`;
        else if (item === "rope" || item === "string") desc = `Execute a figure-eight wrap around the wrists. Cross the binds four times and finish with a double-knot, ensuring the hands are held ${intensity === 'tight' ? 'crushed together' : 'loosely adjacent'}.`;
        else if (item === "belt") desc = "Loop the leather around the limbs and pull until the Slave's movement is completely restricted by the weight of the strap.";

        // SENSATION
        else if (item.includes("hook")) desc = `Lubricate the metal thoroughly. Slowly introduce the curve into the ${item.includes('anal') ? 'rectum' : 'genitals'} until the weight of the hook hangs naturally, pulling the skin taut.`;
        else if (item === "e-stim machine") desc = "Affix the pads to the sensitive areas of the inner thighs. Start at zero and slowly rotate the dial until the Slave's muscles begin to twitch visibly.";
        else if (item === "paddle" || item === "cane") desc = `Deliver ${intensity === 'tight' ? 'forceful, stinging' : 'measured, rhythmic'} strikes, aiming for the fleshy parts of the seat, waiting for the skin to flush a deep crimson.`;
        else if (item === "clamps") desc = "Depress the springs and attach them to the most sensitive points. Once attached, tug the chain gently to remind the Slave of their presence.";
        
        else desc = `Apply the ${item} with focus and intent, ensuring the Slave is fully aware of its weight and texture.`;

        return desc;
    };

    function boot() {
        for (let cat in gear) { activeInv[cat] = gear[cat].map(i => ({ n: i, on: true })); }
    }
    boot();

    function renderInv() {
        const container = document.getElementById('inv-container');
        container.innerHTML = '';
        for (let cat in activeInv) {
            let section = document.createElement('div');
            section.innerHTML = `<span class="label">${cat}</span><div class="tag-row" id="tags-${cat}"></div>`;
            container.appendChild(section);
            activeInv[cat].forEach(item => {
                let tag = document.createElement('div');
                tag.className = `tag ${item.on ? 'on' : ''}`;
                tag.innerText = item.n;
                tag.onclick = () => { item.on = !item.on; renderInv(); };
                section.querySelector(`#tags-${cat}`).appendChild(tag);
            });
        }
    }

    function goToStep(n) {
        if (n === 2) {
            players = [{n: document.getElementById('p1').value || "Slave", g: document.getElementById('g1').value, wins: 0},
                       {n: document.getElementById('p2').value || "Master", g: document.getElementById('p2').value || "Master", wins: 0}];
            renderInv();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        if (n === 3) updateIdentity();
    }

    const tasks = {
        truth: { label: "Truth", time: 120, templates: [
            "<b>The Sensory Confession:</b> Master shall first <b>[DESC-VIS]</b>. Once the Slave is in total darkness, Master will <b>[DESC-GAG]</b>. Slave must then attempt to confess their deepest submissive urge through the binding.",
            "<b>The Exposed Inquiry:</b> Master will <b>[DESC-REST]</b>. While the Slave is unable to move, Master will whisper a question. Slave must answer truthfully or face a round of sensation."
        ]},
        dare: { label: "Dare", time: 300, templates: [
            "<b>The Bound Statue:</b> Master must <b>[DESC-REST]</b> and then <b>[DESC-VIS]</b>. Once the Slave is blind and bound, Master will <b>[DESC-SENS]</b>. Slave must remain perfectly still for the duration of the clock.",
            "<b>The Muffled Service:</b> Master will <b>[DESC-GAG]</b> and <b>[DESC-REST]</b>. Slave must then spend the round performing a menial task (like tidying or posing) exactly as Master commands, without a single sound."
        ]},
        escape: { label: "Escape", time: 480, templates: [
            "<b>The Great Release:</b> Master must <b>[DESC-REST]</b> using maximum tension. Master will then <b>[DESC-VIS]</b>. Slave is given the full duration of the timer to struggle out of the bindings. If they fail, Master wins the round.",
            "<b>The Weighted Struggle:</b> Master will <b>[DESC-SENS]</b> to provide a distraction, then <b>[DESC-REST]</b>. Slave must escape the restraints while the sensation item remains in place."
        ]},
        edging: { label: "Edging", time: 400, templates: [
            "<b>The Brink of Sovereignty:</b> Master will <b>[DESC-REST]</b> the Slave's limbs. Master will then use <b>[DESC-SENS]</b> to bring the Slave to the absolute peak of climax, only to stop and command 'Still' until the feeling subsides. Repeat 3 times.",
            "<b>Blind Denial:</b> Master shall <b>[DESC-VIS]</b>. Using <b>[DESC-SENS]</b>, Master will tease the Slave's <b>[BODY]</b>. Slave is forbidden from touching themselves or reaching climax."
        ]},
        physical: { label: "Physical", time: 300, templates: [
            "<b>The Burden of Mercy:</b> Master will <b>[DESC-REST]</b> the Slave's hands behind their back and <b>[DESC-GAG]</b>. Slave must hold a kneeling 'stress position' (back straight, heels under seat) for the entire round.",
            "<b>The Blind Balance:</b> Master shall <b>[DESC-VIS]</b> and <b>[DESC-REST]</b> the Slave's ankles together. Slave must balance on one knee without toppling."
        ]}
    };

    function updateIdentity() {
        let mName = (subIdx === 0 ? players[1].n : players[0].n);
        document.getElementById('round-header').innerText = `Round ${currentRound} | Master: ${mName} | Slave: ${players[subIdx].n}`;
    }

    function generate() {
        let cats = Array.from(document.querySelectorAll('.tgl-btn.on')).map(b => b.getAttribute('data-cat'));
        if (!cats.length) cats = ["truth", "dare", "escape", "edging", "physical"];
        
        let k = cats[Math.floor(Math.random()*cats.length)];
        let intensity = ["soft", "firm", "tight"][Math.floor(Math.random()*3)];
        let template = tasks[k].templates[Math.floor(Math.random()*tasks[k].templates.length)];
        
        const pick = (c) => {
            let p = activeInv[c].filter(i=>i.on);
            return p.length ? p[Math.floor(Math.random()*p.length)].n : "the selected item";
        };

        let v = pick('Blindfolds'), g = pick('Gags'), r = pick('Restraints'), s = pick('Sensation');

        let res = template.replace(/\[DESC-VIS\]/g, `apply the <b>${v}</b>: ${getApplicationMethod(v, intensity)}`)
                          .replace(/\[DESC-GAG\]/g, `apply the <b>${g}</b>: ${getApplicationMethod(g, intensity)}`)
                          .replace(/\[DESC-REST\]/g, `apply the <b>${r}</b>: ${getApplicationMethod(r, intensity)}`)
                          .replace(/\[DESC-SENS\]/g, `apply the <b>${s}</b>: ${getApplicationMethod(s, intensity)}`)
                          .replace(/\[BODY\]/g, players[subIdx].g);

        document.getElementById('intensity-display').innerText = `Intensity: ${intensity}`;
        document.getElementById('badge-container').innerHTML = `<span class="badge b-${k}">${tasks[k].label}</span>`;
        document.getElementById('task-text').innerHTML = res;
        timeLeft = tasks[k].time;
        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('pre-start-controls').style.display = 'block';
    }

    function startT() {
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) { clearInterval(timer); resolveTurn(false); }
        }, 1000);
    }

    function resolveTurn(success) {
        clearInterval(timer);
        if (success) { subIdx = (subIdx === 0 ? 1 : 0); }
        currentRound++;
        if (currentRound > parseInt(document.getElementById('maxRounds').value)) {
            document.body.innerHTML = `<div class="container" style="text-align:center;"><h1>Session Concluded</h1><button class="btn" onclick="location.reload()">Return to Foyer</button></div>`;
        } else {
            updateIdentity();
            document.getElementById('active-round').style.display = 'none';
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('gen-btn').style.display = 'block';
            document.getElementById('pre-start-controls').style.display = 'none';
            document.getElementById('task-text').innerHTML = "<i>The air thickens as the next decree prepares to manifest...</i>";
        }
    }
</script>
</body>
</html>
