<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Constant Exchange</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000000; --card: #121212; 
            --text: #FFFFFF; --crimson: #d00000; --success: #008000; 
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; display: flex; justify-content: center; 
            font-size: 1.35rem; 
        }

        .container { 
            max-width: 800px; width: 100%; background: var(--card); 
            padding: 35px; border-radius: 25px; border: 4px solid var(--accent); 
            box-shadow: 0 0 70px #000; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 10px; font-size: 3.5rem; border-bottom: 6px solid var(--accent); padding-bottom: 15px; margin-top:0;}

        .box-section { background: #000; padding: 25px; margin-bottom: 25px; border-radius: 15px; border: 3px solid #333; }
        
        .label { font-size: 1.4rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }

        input, select { width: 100%; padding: 20px; border: 3px solid var(--accent); border-radius: 10px; background: #000; color: white; font-size: 1.5rem; box-sizing: border-box; }
        
        .btn { background: var(--accent); color: white; border: 3px solid #FFF; padding: 22px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1.6rem; margin-top: 10px;}

        .gender-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .g-btn { flex: 1; padding: 18px; background: #222; border: 2px solid #444; color: #777; cursor: pointer; border-radius: 10px; font-size: 1.3rem; text-transform: uppercase; font-weight: bold;}
        .g-btn.active { background: var(--accent); color: white; border-color: white; }

        .chip { display: inline-flex; align-items: center; background: #1a1a1a; padding: 10px 15px; border-radius: 30px; margin: 5px; border: 2px solid var(--accent); font-size: 1.1rem; }
        .tag { font-size: 0.8rem; background: #FFF; color: #000; padding: 2px 6px; border-radius: 5px; margin-left: 10px; }
        .del { color: var(--crimson); margin-left: 12px; cursor: pointer; font-weight: 900; }

        .score-row { display: flex; justify-content: space-between; padding: 20px; background: #111; border: 4px solid var(--accent); border-radius: 20px; text-align: center; margin-bottom: 25px; }
        .p-score { font-size: 4rem; font-weight: 900; color: var(--accent); }

        .tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tog-btn { padding: 18px; border: 3px solid #444; background: #000; color: #777; cursor: pointer; border-radius: 12px; font-size: 0.9rem; text-transform: uppercase; font-weight: bold;}
        .tog-btn.active { border-color: #FFF; color: #FFF; background: var(--accent); }

        #timer-box { font-size: 4.5rem; font-weight: 900; color: var(--crimson); text-align: center; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p0-name" value="Dominus">
            <div class="gender-grid">
                <button type="button" id="p0-m" class="g-btn active" onclick="setGender(0,'M')">Male</button>
                <button type="button" id="p0-f" class="g-btn" onclick="setGender(0,'F')">Female</button>
            </div>
            <span class="label">Player 2</span>
            <input type="text" id="p1-name" value="Subject">
            <div class="gender-grid">
                <button type="button" id="p1-m" class="g-btn" onclick="setGender(1,'M')">Male</button>
                <button type="button" id="p1-f" class="g-btn active" onclick="setGender(1,'F')">Female</button>
            </div>
            <span class="label">Session Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" onclick="goToStep(2)">Configure Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="vault-editor" style="max-height: 500px; overflow-y: auto;"></div>
        <button class="btn" style="background:var(--success);" onclick="goToStep(3)">Start Round 1</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-header" style="text-align:center; color:var(--accent); font-weight:900; font-size: 2rem; margin-bottom: 15px;"></div>
        <div class="score-row">
            <div style="flex:1;"><div class="label" id="m-role-label">MASTER</div><div id="m-name" style="font-size:1.4rem;"></div></div>
            <div style="flex:1;"><div class="label" id="s-role-label">SLAVE</div><div id="s-name" style="font-size:1.4rem;"></div><div id="s-score" class="p-score">0</div></div>
        </div>
        <div id="master-panel">
            <div class="box-section"><div id="toggle-grid" class="tog-grid"></div></div>
            <button class="btn" onclick="generateDecree()">Authorize & Issue</button>
        </div>
        <div id="decree-view" style="display:none;">
            <div id="timer-box">00:00</div>
            <div class="box-section"><div id="decree-text" style="text-align:center; font-size: 1.5rem; line-height: 1.6;"></div></div>
            <div style="display:flex; gap:15px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve(false)">FAILURE</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve(true)">SUCCESS</button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30, timer: null, timeLeft: 0,
        players: [{n:"", role:"Master", score:0, g:"M"}, {n:"", role:"Slave", score:0, g:"F"}],
        vault: {
            "The Solitary Anchor": [{n:"Self-locking Cuffs", t:"U"}],
            "The Veiled Confession": [{n:"Blindfold", t:"U"}],
            "The Gauntlet of Will": [{n:"Clothespins", t:"U"}],
            "The Velvet Mercy": [{n:"Feather", t:"U"}],
            "The Kinetic Struggle": [{n:"Zip Ties", t:"U"}],
            "The Geometric Web": [{n:"Rope", t:"U"}],
            "The Flesh Endurance": [{n:"Weight", t:"U"}],
            "The Sovereign’s Decree": [{n:"Cane", t:"U"}]
        },
        activeCats: []
    };

    function setGender(pIdx, g) {
        state.players[pIdx].g = g;
        document.getElementById(`p${pIdx}-m`).classList.toggle('active', g === 'M');
        document.getElementById(`p${pIdx}-f`).classList.toggle('active', g === 'F');
    }

    function goToStep(n) {
        document.querySelectorAll('[id^="step-"]').forEach(s => s.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if(n === 2) renderVaultEditor();
        if(n === 3) startSession();
    }

    function renderVaultEditor() {
        const editor = document.getElementById('vault-editor');
        editor.innerHTML = '<h2 style="text-align:center; color:var(--accent);">VAULT CONFIGURATION</h2>';
        for(let cat in state.vault) {
            let itemHtml = state.vault[cat].map((it, idx) => `
                <span class="chip">${it.n} <span class="tag">${it.t}</span>
                <span class="del" onclick="removeItem('${cat}', ${idx})">×</span></span>`).join('');
            editor.innerHTML += `
                <div class="box-section">
                    <span class="label">${cat}</span>
                    <div style="margin-bottom:10px;">${itemHtml}</div>
                    <div style="display:grid; grid-template-columns: 2fr 1fr 80px; gap:10px;">
                        <input type="text" id="add-n-${cat}" placeholder="New Gear">
                        <select id="add-t-${cat}"><option value="U">U</option><option value="M">M</option><option value="F">F</option></select>
                        <button class="btn" style="margin:0;" onclick="addItem('${cat}')">+</button>
                    </div>
                </div>`;
        }
    }

    function addItem(cat) {
        const nInput = document.getElementById(`add-n-${cat}`);
        const t = document.getElementById(`add-t-${cat}`).value;
        if(nInput.value) { state.vault[cat].push({n: nInput.value, t}); nInput.value = ''; renderVaultEditor(); }
    }

    function removeItem(cat, idx) { state.vault[cat].splice(idx, 1); renderVaultEditor(); }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = parseInt(document.getElementById('round-total').value);
        state.activeCats = Object.keys(state.vault);
        renderRound();
    }

    function renderRound() {
        if(state.curr > state.total) { alert("Session Complete."); location.reload(); return; }
        const m = state.players.find(p => p.role === "Master");
        const s = state.players.find(p => p.role === "Slave");
        
        document.getElementById('round-header').innerText = `ROUND ${state.curr} / ${state.total}`;
        document.getElementById('m-name').innerText = m.n; 
        document.getElementById('s-name').innerText = s.n;
        document.getElementById('s-score').innerText = s.score;
        
        const grid = document.getElementById('toggle-grid'); grid.innerHTML = '';
        Object.keys(state.vault).forEach(cat => {
            const btn = document.createElement('div'); btn.className = `tog-btn ${state.activeCats.includes(cat) ? 'active' : ''}`;
            btn.innerText = cat; btn.onclick = () => {
                state.activeCats = state.activeCats.includes(cat) ? state.activeCats.filter(c => c !== cat) : [...state.activeCats, cat];
                renderRound();
            };
            grid.appendChild(btn);
        });
    }

    function generateDecree() {
        if(state.activeCats.length === 0) return alert("Authorize a Protocol.");
        const cat = state.activeCats[Math.floor(Math.random() * state.activeCats.length)];
        const sub = state.players.find(p => p.role === "Slave");
        const dom = state.players.find(p => p.role === "Master");
        const items = state.vault[cat].filter(i => i.t === 'U' || i.t === sub.g);
        if(items.length === 0) return alert("No items match sub gender.");
        const item = items[Math.floor(Math.random() * items.length)];

        document.getElementById('decree-text').innerHTML = `<strong>${cat} Protocol</strong><br><br>${dom.n} shall utilize ${item.n} upon ${sub.n}. Compliance is mandatory.`;
        document.getElementById('master-panel').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
        startTimer(120);
    }

    function startTimer(sec) {
        state.timeLeft = sec;
        clearInterval(state.timer);
        state.timer = setInterval(() => {
            state.timeLeft--;
            const m = Math.floor(state.timeLeft / 60); const s = state.timeLeft % 60;
            document.getElementById('timer-box').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(state.timeLeft <= 0) { clearInterval(state.timer); resolve(false); }
        }, 1000);
    }

    function resolve(success) {
        clearInterval(state.timer);
        // Point awarded to whoever was just the Slave IF they succeeded
        if(success) { state.players.find(p => p.role === "Slave").score++; }
        
        // ROLE REVERSAL: Mandatory regardless of success/fail
        state.players.forEach(p => p.role = (p.role === "Master" ? "Slave" : "Master"));
        
        state.curr++; 
        state.activeCats = Object.keys(state.vault); // Reset toggles for the new Master
        document.getElementById('master-panel').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderRound();
    }
</script>
</body>
</html>
