<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --off: #2a2a2a;
            --alert: #ff0000;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; 
            display: flex; justify-content: center;
        }

        .container { 
            max-width: 500px; width: 100%; background: var(--card); 
            padding: 30px; border-radius: 30px; border: 2px solid #333; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        
        .box-section { 
            background: #1f1f1f; padding: 20px; margin-bottom: 20px; 
            border-radius: 20px; border: 1px solid #333; 
        }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }

        input[type="text"], input[type="number"] { 
            width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; 
            background: #000; color: white; font-size: 1.1rem; box-sizing: border-box;
            margin-bottom: 15px;
        }

        .gender-select { display: flex; gap: 10px; margin-bottom: 5px; }
        .g-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; 
            background: #111; color: #666; cursor: pointer; text-align: center; 
            font-weight: bold; text-transform: uppercase; font-size: 0.8rem;
        }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { 
            background: var(--crimson); color: white; border: none; padding: 20px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; 
            border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px;
        }

        .status-header { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-box { background: #000; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.75rem; border: 1px solid #444; flex: 1; }
        
        .timer-big { font-size: 4rem; text-align: center; font-weight: bold; margin: 10px 0; }
        .instruction-highlight { color: var(--accent); font-weight: bold; }
        .step { display: none; }
        .active { display: block !important; }

        .card-action-btn { font-size: 0.65rem; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        
        /* SAFE WORD PROMINENCE */
        .btn-safeword {
            background: #ff0000;
            color: #ffffff;
            padding: 25px;
            font-size: 1.3rem;
            letter-spacing: 5px;
            border-radius: 15px;
            border: 4px solid #fff;
            width: 100%;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
            50% { transform: scale(1.02); box-shadow: 0 0 25px rgba(255, 0, 0, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="step1" class="step active">
        <div class="box-section">
            <span class="label">Primary Participant (Master)</span>
            <input type="text" id="p1_n" placeholder="Name">
        </div>
        <div class="box-section">
            <span class="label">Secondary Participant (Subject)</span>
            <input type="text" id="p2_n" placeholder="Name">
        </div>
        <div class="box-section">
            <span class="label">Safe Word</span>
            <input type="text" id="safe_word_input" value="RED LIGHT">
        </div>
        <div class="box-section">
            <span class="label">Rounds</span>
            <input type="number" id="max_r" value="10">
        </div>
        <button class="btn" onclick="nav(2)">Access the Arsenal</button>
    </div>

    <div id="step2" class="step">
        <div class="box-section" id="vault-inject"></div>
        <button class="btn" onclick="nav(3)">Lock Arsenal & Begin</button>
    </div>

    <div id="step3" class="step">
        <div class="status-header">
            <div class="stat-box" id="disp-round">ROUND: 1</div>
            <div class="stat-box" id="disp-remain">REMAINING: 9</div>
        </div>

        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center;">PROTOCOL INITIATED</div>
            <button class="btn" onclick="generateDecree()">Generate Decree</button>
        </div>

        <div id="active-round" style="display:none;">
            <div class="box-section" id="active-trial-text" style="min-height: 250px; font-size: 1rem; line-height: 1.5; padding: 25px;"></div>
            <div class="timer-big" id="clock">00:00</div>
            
            <div class="toggle-grid">
                <button class="card-action-btn" id="btn-y-use" onclick="triggerCard('yellow')">Play Yellow Card</button>
                <button class="card-action-btn" id="btn-r-use" onclick="triggerCard('red')">Play Red Card</button>
            </div>

            <button class="btn" style="background:#1e4d2b; margin-top:15px;" onclick="finish(true)">Complete</button>
            <button class="btn-safeword" onclick="triggerSafeWord()">SAFE WORD</button>
        </div>
    </div>
</div>

<script>
    let players = [{n:"", s:0}, {n:"", s:0}], curR = 1, maxR = 10, masterIdx = 0, timer, timeLeft;
    let cards = { yellow: 0, red: 1 }, safeWord = "RED LIGHT";

    // AUDIO SYSTEM
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function soundEffect(kind) {
        if (kind === 'decree') {
            playTone(150, 'square', 0.5, 0.1);
        } else if (kind === 'card') {
            playTone(800, 'sine', 0.1, 0.2);
        } else if (kind === 'safeword') {
            playTone(400, 'sawtooth', 0.2, 0.3);
            playTone(300, 'sawtooth', 0.4, 0.3);
        }
    }

    function triggerHaptic(pattern) {
        if ("vibrate" in navigator) navigator.vibrate(pattern);
    }

    function triggerCard(type) {
        if(cards[type] !== masterIdx) return;
        soundEffect('card');
        triggerHaptic(50);
        cards[type] = (cards[type] === 0 ? 1 : 0);
        alert(`${type.toUpperCase()} Card Played.`);
        updateStatus();
    }

    function triggerSafeWord() {
        soundEffect('safeword');
        triggerHaptic([300, 100, 300]);
        alert(`SAFE WORD: ${safeWord} ACTIVATED.`);
        finish(false);
    }

    function generateDecree() {
        soundEffect('decree');
        triggerHaptic(150);
        // Basic display logic
        document.getElementById('active-trial-text').innerHTML = `<strong>DECREE GENERATED</strong><br><br>The subject must surrender to the Master's current whim for the duration of the timer.`;
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timeLeft = 600; runClock();
    }

    function runClock() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft<=0) finish(false);
        }, 1000);
    }

    function finish(win) {
        clearInterval(timer);
        if(win) players[masterIdx === 0 ? 1 : 0].s += 1;
        if(curR >= maxR) {
            document.getElementById('active-round').innerHTML = `<h2>FINALE REACHED</h2><button class="btn" onclick="location.reload()">Reset Protocol</button>`;
        } else {
            curR++; masterIdx = (masterIdx === 0 ? 1 : 0);
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('active-round').style.display = 'none';
            updateStatus();
        }
    }

    function updateStatus() {
        document.getElementById('disp-round').innerText = `ROUND: ${curR}`;
        document.getElementById('disp-remain').innerText = `REMAINING: ${maxR - curR}`;
        document.getElementById('btn-y-use').style.opacity = (cards.yellow === masterIdx) ? "1" : "0.3";
        document.getElementById('btn-r-use').style.opacity = (cards.red === masterIdx) ? "1" : "0.3";
    }

    function nav(n) {
        if(n === 2) {
            players[0].n = document.getElementById('p1_n').value || "P1";
            players[1].n = document.getElementById('p2_n').value || "P2";
            maxR = parseInt(document.getElementById('max_r').value) || 10;
            safeWord = document.getElementById('safe_word_input').value || "RED LIGHT";
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        if(n === 3) updateStatus();
    }
</script>
</body>
</html>
