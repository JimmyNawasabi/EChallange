<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery & Merit: Sovereignty</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --yellow: #ffd700; 
            --red: #ee3333; --safe-green: #2e7d32; --veto: #4a4a4a; --black: #000000;
        }
        
        body { background: var(--soft-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; font-size: 18px; }
        .container { max-width: 650px; width: 100%; background: var(--card-bg); padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); margin-top: 20px; }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 5px; font-size: 1.6rem; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #a18e8e; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }

        .step { display: none; }
        .active { display: block !important; }

        .box { background: #fffcf9; border: 2px solid #f5f2ed; padding: 20px; margin-bottom: 25px; border-radius: 25px; }
        .inner-box { background: #ffffff; border: 1px solid #eee; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.5px; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #fefefe; border-radius: 15px; border: 1px solid #eee; font-size: 0.8rem; }
        .role-indicator { font-weight: 900; color: var(--crimson); text-transform: uppercase; letter-spacing: 1px; }
        .score-pill { background: #eee; padding: 4px 10px; border-radius: 50px; font-weight: bold; color: #666; }

        input[type="text"], select, input[type="number"], textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; outline: none; display: block; font-family: inherit; }
        
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tgl-btn { background: #f0f0f0; padding: 8px; border-radius: 10px; text-align: center; font-size: 0.65rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: 0.2s; color: #999; text-transform: uppercase; }
        .tgl-btn.on { background: var(--crimson); color: white; border-color: var(--accent); }

        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag { background: #eee; padding: 6px 12px; border-radius: 50px; font-size: 0.8rem; display: flex; align-items: center; border: 2px solid transparent; cursor: pointer; color: #777; transition: 0.2s; }
        .tag.on { background: #fff; border-color: var(--accent); color: var(--text); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tag span { color: var(--crimson); margin-left: 8px; font-weight: 900; font-size: 1rem; }

        .badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 1000; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: white; }
        .b-truth { background: #5d6d7e; } .b-dare { background: #af601a; } .b-escape { background: #c0392b; }
        .b-edging { background: #884ea0; } .b-physical { background: #1e8449; } .b-selfbondage { background: #2e4053; }
        
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 20px; font-size: 1rem; margin-bottom: 10px; }
        .btn-add { background: var(--accent); width: 60px; color: white; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
        
        .timer-display { font-size: 5rem; text-align: center; color: var(--crimson); font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mastery & Merit</h1>
    <div class="subtitle">Sovereignty Edition</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Total Rounds</span>
            <input type="number" id="maxRounds" value="6">
            
            <div class="inner-box">
                <span class="label">Participant One (Slave)</span>
                <input type="text" id="p1" placeholder="Name">
                <span class="label">Anatomy</span>
                <select id="g1"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
            
            <div class="inner-box">
                <span class="label">Participant Two (Master)</span>
                <input type="text" id="p2" placeholder="Name">
                <span class="label">Anatomy</span>
                <select id="g2"><option value="male body">Male Body</option><option value="female body">Female Body</option></select>
            </div>
        </div>
        <button class="btn" onclick="goToStep(2)">Inventory Checklist ></button>
    </div>

    <div id="step2" class="step">
        <div class="box">
            <p style="font-size: 0.8rem; color: #888; margin-top: 0; text-align: center;">Tap items to include them in the session.</p>
            
            <span class="label">Vision</span>
            <div style="display:flex; gap:10px; margin-bottom: 10px;"><input type="text" id="in-vis" placeholder="Custom item..."><button class="btn-add" onclick="addItem('vis')">+</button></div>
            <div id="list-vis" class="tag-row"></div>
            
            <span class="label">Mouth</span>
            <div style="display:flex; gap:10px; margin-bottom: 10px;"><input type="text" id="in-speech" placeholder="Custom item..."><button class="btn-add" onclick="addItem('speech')">+</button></div>
            <div id="list-speech" class="tag-row"></div>
            
            <span class="label">Restraints</span>
            <div style="display:flex; gap:10px; margin-bottom: 10px;"><input type="text" id="in-rest" placeholder="Custom item..."><button class="btn-add" onclick="addItem('rest')">+</button></div>
            <div id="list-rest" class="tag-row"></div>
            
            <span class="label">Sensation</span>
            <div style="display:flex; gap:10px; margin-bottom: 10px;"><input type="text" id="in-sens" placeholder="Custom item..."><button class="btn-add" onclick="addItem('sens')">+</button></div>
            <div id="list-sens" class="tag-row"></div>
        </div>
        <button class="btn" onclick="goToStep(3)">Enter Session</button>
    </div>

    <div id="step3" class="step">
        <div class="status-bar">
            <div><span class="label" style="margin:0">Master</span><div id="master-name" class="role-indicator">---</div></div>
            <div id="scoreboard"><span class="score-pill" id="score-p1"></span> <span class="score-pill" id="score-p2"></span></div>
            <div style="text-align:right;"><span class="label" style="margin:0">Slave</span><div id="slave-name" class="role-indicator">---</div></div>
        </div>

        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center; font-size: 1rem;">Round 1</div>
            <div class="inner-box">
                <span class="label">Active Categories</span>
                <div class="toggle-grid">
                    <div class="tgl-btn on" data-cat="truth" onclick="this.classList.toggle('on')">Truth</div>
                    <div class="tgl-btn on" data-cat="dare" onclick="this.classList.toggle('on')">Dare</div>
                    <div class="tgl-btn on" data-cat="escape" onclick="this.classList.toggle('on')">Escape</div>
                    <div class="tgl-btn on" data-cat="edging" onclick="this.classList.toggle('on')">Edging</div>
                    <div class="tgl-btn on" data-cat="physical" onclick="this.classList.toggle('on')">Phys</div>
                    <div class="tgl-btn on" data-cat="selfbondage" onclick="this.classList.toggle('on')">Self</div>
                </div>
            </div>
            <div class="box" style="text-align:center;"><div id="badge-container"></div><div id="task-text">Awaiting Decree...</div></div>
            <button class="btn" id="gen-btn" onclick="generate()">Generate Decree</button>
            <button class="btn" id="start-btn" style="display:none; background: var(--safe-green);" onclick="startT()">Start Clock</button>
        </div>

        <div id="active-round" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <button class="btn" onclick="resolveTurn(true)">Success (Swap)</button>
            <button class="btn" style="background:#888;" onclick="resolveTurn(false)">Failure (Keep)</button>
        </div>
    </div>
</div>

<script>
    let rawInv = {
        vis: [{n:"Blindfold", on:true}, {n:"Sleep Mask", on:true}],
        speech: [{n:"Ball Gag", on:true}, {n:"Medical Tape", on:true}],
        rest: [{n:"Rope", on:true}, {n:"Handcuffs", on:true}, {n:"Ankle Cuffs", on:true}],
        sens: [{n:"Feather", on:true}, {n:"Ice Cube", on:true}, {n:"Vibrator", on:true}]
    };

    let players = [], currentRound = 1, subIdx = 0, timer, timeLeft;

    const taskData = {
        truth: { class: "b-truth", time: 90, tasks: ["CONFESSION: Admit a desire while [REST] is applied.", "FEELING: Describe the sensation of [VIS] on your [BODY]."] },
        dare: { class: "b-dare", time: 180, tasks: ["SERVICE: Serve Master while [SPEECH] and [REST] are active.", "STATUE: Endure [SENS] on your [BODY] without moving."] },
        escape: { class: "b-escape", time: 420, tasks: ["FREEDOM: Escape from [REST] while [VIS] is applied.", "TRIAL: Escape [REST] while Master uses [SENS] to distract you."] },
        edging: { class: "b-edging", time: 300, tasks: ["LIMITS: Master uses [SENS] to hold you at the edge. No release.", "DENIAL: Endure [SENS] while [REST]."] },
        physical: { class: "b-physical", time: 200, tasks: ["STRESS: Hold a deep kneeling pose while [REST] and [VIS] are active.", "CORE: Perform leg lifts while [REST] binds ankles."] },
        selfbondage: { class: "b-selfbondage", time: 150, tasks: ["AUTO: Bind your own limbs with [REST] as tightly as possible.", "SENSORY: Secure [VIS] and [SPEECH] on yourself."] }
    };

    function goToStep(n) {
        if (n === 2) {
            players = [
                {n: document.getElementById('p1').value || "Slave", g: document.getElementById('g1').value, wins: 0},
                {n: document.getElementById('p2').value || "Master", g: document.getElementById('g2').value, wins: 0}
            ];
            renderInv();
        }
        if (n === 3) {
            let activeVis = rawInv.vis.filter(i => i.on);
            let activeRest = rawInv.rest.filter(i => i.on);
            if (!activeVis.length || !activeRest.length) return alert("Select at least 1 Vision and 1 Restraint item!");
            updateIdentity();
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function addItem(c) {
        let val = document.getElementById('in-' + c).value;
        if (val) { rawInv[c].push({n: val, on: true}); document.getElementById('in-' + c).value = ''; renderInv(); }
    }

    function toggleItem(c, idx) {
        rawInv[c][idx].on = !rawInv[c][idx].on;
        renderInv();
    }

    function renderInv() {
        ['vis','speech','rest','sens'].forEach(c => {
            document.getElementById('list-' + c).innerHTML = rawInv[c].map((it, idx) => `
                <div class="tag ${it.on?'on':''}" onclick="toggleItem('${c}', ${idx})">${it.n}${it.on?'':'<span>+</span>'}</div>
            `).join('');
        });
    }

    function updateIdentity() {
        let masterIdx = (subIdx === 0 ? 1 : 0);
        document.getElementById('master-name').innerText = players[masterIdx].n;
        document.getElementById('slave-name').innerText = players[subIdx].n;
        document.getElementById('score-p1').innerText = `${players[0].n}: ${players[0].wins}`;
        document.getElementById('score-p2').innerText = `${players[1].n}: ${players[1].wins}`;
        document.getElementById('round-header').innerText = `Round ${currentRound} / ${document.getElementById('maxRounds').value}`;
    }

    function generate() {
        let activeCats = Array.from(document.querySelectorAll('.tgl-btn.on')).map(b => b.getAttribute('data-cat'));
        if (!activeCats.length) return alert("Select a category!");
        
        let catKey = activeCats[Math.floor(Math.random() * activeCats.length)];
        let cat = taskData[catKey];
        let task = cat.tasks[Math.floor(Math.random() * cat.tasks.length)];

        const getRand = (type) => {
            let pool = rawInv[type].filter(i => i.on);
            return pool.length ? `<b>${pool[Math.floor(Math.random()*pool.length)].n}</b>` : "<i>[Not Selected]</i>";
        };

        task = task.replace(/\[VIS\]/g, getRand('vis'))
                   .replace(/\[SPEECH\]/g, getRand('speech'))
                   .replace(/\[REST\]/g, getRand('rest'))
                   .replace(/\[SENS\]/g, getRand('sens'))
                   .replace(/\[BODY\]/g, `<b>${players[subIdx].g}</b>`);

        document.getElementById('badge-container').innerHTML = `<span class="badge b-${catKey}">${catKey}</span>`;
        document.getElementById('task-text').innerHTML = task;
        timeLeft = cat.time;
        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('start-btn').style.display = 'block';
    }

    function startT() {
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            if (timeLeft <= 0) { clearInterval(timer); resolveTurn(false); }
        }, 1000);
    }

    function resolveTurn(success) {
        clearInterval(timer);
        if (success) { players[subIdx].wins++; subIdx = (subIdx === 0 ? 1 : 0); alert("Swap!"); }
        else { players[subIdx === 0 ? 1 : 0].wins++; alert("Master stays!"); }
        
        currentRound++;
        if (currentRound > parseInt(document.getElementById('maxRounds').value)) finalize();
        else { updateIdentity(); resetUI(); }
    }

    function resetUI() {
        document.getElementById('active-round').style.display = 'none';
        document.getElementById('pre-round').style.display = 'block';
        document.getElementById('gen-btn').style.display = 'block';
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('task-text').innerText = "Awaiting Decree...";
        document.getElementById('badge-container').innerHTML = "";
    }

    function finalize() {
        let winIdx = players[0].wins > players[1].wins ? 0 : 1;
        document.body.innerHTML = `<div class="container" style="text-align:center;"><h1>Ascension</h1><div class="box"><span class="label">Victor</span><div style="font-size:2rem;color:var(--crimson);font-weight:bold;">${players[winIdx].n}</div></div><button class="btn" onclick="location.reload()">Reset</button></div>`;
    }
</script>
</body>
</html>
