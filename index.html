<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Extreme Escape</title>
    <style>
        :root { --red: #8b0000; --gold: #d4af37; --bg: #0d0d0d; --panel: #1a1a1a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--panel); border: 2px solid #333; padding: 30px; border-radius: 8px; box-shadow: 0 0 20px #000; }
        h1 { color: var(--red); text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        .step { display: none; }
        .active { display: block; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 300px; overflow-y: auto; background: #000; padding: 15px; border: 1px solid #333; }
        .card-zone { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .card { width: 100px; height: 140px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; cursor: pointer; color: #000; font-size: 0.9em; transition: 0.2s; }
        .yellow { background: #ffd700; border: 3px solid #b8860b; }
        .red { background: #ff4500; border: 3px solid #8b0000; }
        .disabled { opacity: 0.1; pointer-events: none; filter: grayscale(1); }
        .btn { background: var(--red); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn:hover { background: #a00; }
        .challenge-box { background: #000; border-left: 5px solid var(--red); padding: 20px; margin: 20px 0; font-size: 1.1em; line-height: 1.5; }
        .timer { font-size: 4em; color: var(--red); text-align: center; font-family: monospace; margin: 10px 0; }
        .role-banner { text-align: center; background: #222; padding: 10px; color: var(--gold); font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bound & Brave</h1>

    <div id="step1" class="step active">
        <div class="input-group">
            <label>How many players?</label>
            <select id="playerCount" onchange="generatePlayerInputs()">
                <option value="2">2 Players</option>
                <option value="3">3 Players</option>
                <option value="4">4 Players</option>
            </select>
        </div>
        <div id="playerNamesArea">
            </div>
        <button class="btn" onclick="goToStep(2)">Confirm Names & Continue</button>
    </div>

    <div id="step2" class="step">
        <label>Select Your Available Gear:</label>
        <div class="inventory-grid" id="invList"></div>
        <button class="btn" onclick="goToStep(3)">Lock Gear & Start Game</button>
    </div>

    <div id="step3" class="step">
        <div class="role-banner" id="roleText"></div>
        
        <div class="card-zone">
            <div id="yCard" class="card yellow" onclick="cardAction('yellow')">YELLOW CARD<br>Swap Roles</div>
            <div id="rCard" class="card red" onclick="cardAction('red')">RED CARD<br>Skip Task</div>
        </div>

        <div id="prepArea">
            <div class="challenge-box" id="taskText">Press Generate to receive your first restraint instructions.</div>
            <button class="btn" id="genBtn" onclick="makeChallenge()">Generate Challenge</button>
            <button class="btn" id="readyBtn" style="display:none;" onclick="startTheClock()">Restraints Applied: Start Escape</button>
        </div>

        <div id="escapeArea" style="display:none;">
            <div class="timer" id="timerDisplay">00:00</div>
            <button class="btn" onclick="finish(true)">I Escaped!</button>
            <button class="btn" style="background:#444;" onclick="finish(false)">Failure</button>
        </div>

        <button class="btn" style="background:#222; margin-top:30px;" onclick="rotate()">Rotate Roles / Next Round</button>
    </div>
</div>

<script>
    let players = [];
    let subIdx = 0;
    let domIdx = 1;
    let gear = ["Rope", "Tape", "Pallet Wrap", "Bandages", "Floggers", "Cane", "Dildo", "Butt Plug", "Ball Gag", "Over-the-mouth Gag", "Tape Gag", "Wrap Around Gag", "Mouth Stuffed", "Open Mouth Gag", "Cloth Blindfold", "Tape Blindfold", "Leather Blindfold", "Straight Jacket", "Spreader Bar"];
    let selectedGear = [];
    let gameTimer;
    let secondsLeft;
    let cardOwner = { yellow: 0, red: 0 }; 

    function generatePlayerInputs() {
        const count = document.getElementById('playerCount').value;
        const area = document.getElementById('playerNamesArea');
        area.innerHTML = "";
        for(let i=0; i<count; i++) {
            area.innerHTML += `
                <div class="input-group">
                    <label>Player ${i+1} Name & Body Type</label>
                    <input type="text" id="name${i}" placeholder="Enter Name">
                    <select id="gen${i}"><option value="Male">Male</option><option value="Female">Female</option><option value="Any">Neutral</option></select>
                </div>`;
        }
    }
    generatePlayerInputs(); // Init

    function goToStep(s) {
        if(s === 2) {
            const count = document.getElementById('playerCount').value;
            players = [];
            for(let i=0; i<count; i++) {
                let n = document.getElementById(`name${i}`).value || `Player ${i+1}`;
                players.push({ name: n, gender: document.getElementById(`gen${i}`).value });
            }
            const list = document.getElementById('invList');
            list.innerHTML = "";
            gear.forEach(g => { list.innerHTML += `<label><input type="checkbox" value="${g}" checked> ${g}</label>`; });
        }
        if(s === 3) {
            document.querySelectorAll('#invList input:checked').forEach(i => selectedGear.push(i.value));
            updateHeader();
        }
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');
    }

    function updateHeader() {
        document.getElementById('roleText').innerHTML = `DOM: ${players[domIdx].name} | SUB: ${players[subIdx].name}`;
        document.getElementById('yCard').className = `card yellow ${cardOwner.yellow !== subIdx ? 'disabled' : ''}`;
        document.getElementById('rCard').className = `card red ${cardOwner.red !== subIdx ? 'disabled' : ''}`;
    }

    function makeChallenge() {
        const sGen = players[subIdx].gender;
        const db = [
            { g: "Male", r: ["Tape", "Ball Gag"], t: 300, txt: "THE SILENT BOX: Ball gag in, then 4 layers of tape. Hands taped behind back. Kneel and remain still." },
            { g: "Female", r: ["Rope", "Dildo"], t: 400, txt: "THE SITTING TASK: Dildo secured to a stool. Sub bound in a chest harness with arms pinned. Must remain seated." },
            { g: "Any", r: ["Pallet Wrap", "Tape"], t: 600, txt: "THE COCOON: Pallet wrap from neck to ankles. Hands taped to sides. Must wriggle 10 feet to the finish." },
            { g: "Any", r: ["Straight Jacket", "Spreader Bar"], t: 500, txt: "TOTAL RESTRICTION: Jacket on, spreader bar on ankles. Must stand and balance for 5 minutes." },
            { g: "Any", r: ["Rope", "Butt Plug"], t: 300, txt: "INTERNAL TETHER: Plug in. Rope tether from plug to a wrist cuff. Don't let the rope go taut." }
        ];
        const valid = db.filter(x => (x.g === "Any" || x.g === sGen) && x.r.every(item => selectedGear.includes(item)));
        const pick = valid[Math.floor(Math.random()*valid.length)] || {txt: "Dom's Choice: Use any 2 items to bind the sub for 5 minutes.", t: 300};
        
        document.getElementById('taskText').innerHTML = `<strong>RESTRAINT:</strong><br>${pick.txt}<br><br><strong>TIME:</strong> ${Math.floor(pick.t/60)}m`;
        secondsLeft = pick.t;
        document.getElementById('genBtn').style.display = 'none';
        document.getElementById('readyBtn').style.display = 'block';
    }

    function cardAction(type) {
        if(type === 'yellow') {
            alert("ROLES SWAPPED!");
            [subIdx, domIdx] = [domIdx, subIdx];
            cardOwner.yellow = domIdx;
        } else {
            alert("TASK SKIPPED!");
            cardOwner.red = domIdx;
            makeChallenge();
        }
        updateHeader();
    }

    function startTheClock() {
        document.getElementById('prepArea').style.display = 'none';
        document.getElementById('escapeArea').style.display = 'block';
        gameTimer = setInterval(() => {
            secondsLeft--;
            let m = Math.floor(secondsLeft/60);
            let s = secondsLeft%60;
            document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':''}${s}`;
            if(secondsLeft <= 0) finish(false);
        }, 1000);
    }

    function finish(win) {
        clearInterval(gameTimer);
        alert(win ? "SUB ESCAPED! Reward time." : "TIME EXPIRED! Punishment time.");
        document.getElementById('escapeArea').style.display = 'none';
        document.getElementById('prepArea').style.display = 'block';
        document.getElementById('genBtn').style.display = 'block';
        document.getElementById('readyBtn').style.display = 'none';
    }

    function rotate() {
        subIdx = (subIdx + 1) % players.length;
        domIdx = (subIdx + 1) % players.length;
        if(subIdx === domIdx) domIdx = (domIdx + 1) % players.length;
        updateHeader();
        alert("New Round! Sub is now " + players[subIdx].name);
    }
</script>
</body>
</html>
