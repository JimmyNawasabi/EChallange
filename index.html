<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Full Arsenal</title>
    <style>
        :root { --crimson: #7b1a1a; --gold: #c5a059; --bg: #fdfaf5; --card: #ffffff; }
        body { background: var(--bg); font-family: 'Georgia', serif; margin: 0; padding: 20px; display: flex; justify-content: center; color: #2c2c2c; }
        .container { max-width: 800px; width: 100%; background: var(--card); padding: 30px; border-radius: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid var(--gold); }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 3px; font-style: italic; }
        .step { display: none; }
        .active { display: block; }
        .box { background: #fffcf9; border: 1px solid #f0e6d2; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .label { font-size: 0.75rem; font-weight: bold; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        
        /* INVENTORY SYSTEM */
        .add-area { display: flex; gap: 10px; margin-bottom: 15px; }
        .add-area input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .add-btn { background: var(--crimson); color: white; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #fff; border: 1px solid #ddd; padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; cursor: pointer; position: relative; display: flex; align-items: center; gap: 8px; }
        .tag.selected { background: var(--crimson); color: white; border-color: var(--crimson); }
        .delete-x { color: #999; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .tag.selected .delete-x { color: #ffcccc; }

        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; margin-top: 10px; font-size: 1rem; }
        .timer { font-size: 4rem; text-align: center; color: var(--crimson); font-family: monospace; margin: 20px 0; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>Down to get dirty</h1>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Session Parameters</span>
            <input type="number" id="rounds" value="10" placeholder="Rounds">
            <input type="text" id="p1" placeholder="Master Name" style="margin-top:10px;">
            <input type="text" id="p2" placeholder="Subject Name" style="margin-top:10px;">
        </div>
        <button class="btn" onclick="toStep(2)">Manage Permanent Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div class="box" id="vault-content">
            </div>
        <button class="btn" onclick="toStep(3)">Commence Ceremony</button>
        <button class="btn" style="background:#888; margin-top:10px;" onclick="clearVault()">Factory Reset Arsenal</button>
    </div>

    <div id="step3" class="step">
        <div id="game-ui">
            <div id="round-header" style="text-align:center; font-weight:bold; color:var(--crimson);"></div>
            <div id="choice-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;"></div>
            
            <div id="task-view" style="display:none; margin-top:20px;">
                <div class="box" id="task-text"></div>
                <button class="btn" style="background:#2e7d32;" onclick="startClock()">Start Timer</button>
                <button class="btn" style="background:#888;" onclick="backToChoices()">Choose Different Trial</button>
            </div>
        </div>

        <div id="timer-ui" style="display:none;">
            <div class="timer" id="countdown">00:00</div>
            <button class="btn" onclick="finishRound(true)">Task Successful (+1)</button>
            <button class="btn" style="background:#888;" onclick="finishRound(false)">Task Failed (+0)</button>
        </div>
    </div>
</div>

<script>
    // THE FULL ITEM DATABASE
    const defaultArsenal = {
        "Blindfolds": ["Tape", "Gas Mask", "Pillow Case", "Sleep Mask", "Hood", "Black Silk Tie"],
        "Gags": ["Tape", "Ball Gag", "Pallet Wrap", "Panties", "Sock Gag", "Bit Gag", "Cleave Gag"],
        "Restraints": ["Rope", "Leather Cuffs", "Zip Ties", "Pallet Wrap", "Duct Tape", "Chain", "Spreader Bar"],
        "Sensation": ["Whip", "Ice", "Vibrator", "Clamps", "Cane", "Hot Wax", "Feather", "Crops"]
    };

    // LOAD FROM STORAGE OR USE DEFAULTS
    let vault = JSON.parse(localStorage.getItem('dirty_sovereign_vault')) || defaultArsenal;
    let selectedItems = JSON.parse(localStorage.getItem('dirty_sovereign_selected')) || JSON.parse(JSON.stringify(vault));

    let gameState = { players: [], curRound: 1, totalRounds: 10, masterIdx: 0, timer: null, time: 0 };

    function save() {
        localStorage.setItem('dirty_sovereign_vault', JSON.stringify(vault));
        localStorage.setItem('dirty_sovereign_selected', JSON.stringify(selectedItems));
    }

    function clearVault() { localStorage.clear(); location.reload(); }

    function renderVault() {
        const container = document.getElementById('vault-content');
        container.innerHTML = '<span class="label" style="text-align:center; font-size:1rem;">Master Arsenal (Saved Automatically)</span>';
        
        for (let cat in vault) {
            let div = document.createElement('div');
            div.style.marginBottom = "25px";
            div.innerHTML = `
                <span class="label">${cat}</span>
                <div class="add-area">
                    <input type="text" id="input-${cat}" placeholder="Add new ${cat} item...">
                    <button class="add-btn" onclick="addItem('${cat}')">ADD</button>
                </div>
                <div class="tag-cloud" id="tags-${cat}"></div>
            `;
            container.appendChild(div);

            let cloud = div.querySelector('.tag-cloud');
            vault[cat].forEach(item => {
                let isSel = selectedItems[cat].includes(item);
                let tag = document.createElement('div');
                tag.className = `tag ${isSel ? 'selected' : ''}`;
                tag.innerHTML = `${item} <span class="delete-x" onclick="deleteItem('${cat}', '${item}'); event.stopPropagation();">×</span>`;
                tag.onclick = () => toggleItem(cat, item);
                cloud.appendChild(tag);
            });
        }
    }

    function addItem(cat) {
        let val = document.getElementById('input-' + cat).value.trim();
        if(val) {
            if(!vault[cat].includes(val)) vault[cat].push(val);
            if(!selectedItems[cat].includes(val)) selectedItems[cat].push(val);
            save(); renderVault();
        }
    }

    function toggleItem(cat, item) {
        let idx = selectedItems[cat].indexOf(item);
        if(idx > -1) selectedItems[cat].splice(idx, 1);
        else selectedItems[cat].push(item);
        save(); renderVault();
    }

    function deleteItem(cat, item) {
        vault[cat] = vault[cat].filter(i => i !== item);
        selectedItems[cat] = selectedItems[cat].filter(i => i !== item);
        save(); renderVault();
    }

    function toStep(n) {
        if(n === 2) {
            gameState.totalRounds = document.getElementById('rounds').value;
            gameState.players = [
                {name: document.getElementById('p1').value || "Master", score: 0},
                {name: document.getElementById('p2').value || "Subject", score: 0}
            ];
            renderVault();
        }
        if(n === 3) startSession();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    const trials = [
        { n: "The Bound Statue", t: 600, d: "Master uses <b>[REST]</b> to secure the Subject. Apply <b>[SENS]</b> to their body while they remain motionless." },
        { n: "Void Deprivation", t: 400, d: "Seal the <b>[VIS]</b> and <b>[GAG]</b>. Master will use <b>[SENS]</b> in a slow, unpredictable rhythm." },
        { n: "Escape Trial", t: 300, d: "Bind the Subject with <b>[REST]</b>. They must struggle free before the timer expires or face a penalty." },
        { n: "Peak & Hold", t: 480, d: "Using <b>[SENS]</b>, Master brings the Subject to the brink of climax 3 times. Release is forbidden." }
    ];

    function startSession() {
        document.getElementById('round-header').innerText = `ROUND ${gameState.curRound} | Master: ${gameState.players[gameState.masterIdx].name}`;
        let grid = document.getElementById('choice-grid');
        grid.innerHTML = '';
        trials.forEach((trial, i) => {
            let b = document.createElement('button');
            b.className = 'btn'; b.style.marginTop = '0';
            b.innerText = trial.n;
            b.onclick = () => showTrial(i);
            grid.appendChild(b);
        });
    }

    function showTrial(idx) {
        let trial = trials[idx];
        const pick = (c) => {
            let p = selectedItems[c];
            return p.length ? p[Math.floor(Math.random()*p.length)] : "Basic Item";
        }
        let text = trial.d.replace('[REST]', pick('Restraints'))
                         .replace('[SENS]', pick('Sensation'))
                         .replace('[VIS]', pick('Blindfolds'))
                         .replace('[GAG]', pick('Gags'));
        
        document.getElementById('task-text').innerHTML = `<strong>${trial.n}</strong><br><br>${text}`;
        gameState.time = trial.t;
        document.getElementById('choice-grid').style.display = 'none';
        document.getElementById('task-view').style.display = 'block';
    }

    function backToChoices() {
        document.getElementById('choice-grid').style.display = 'grid';
        document.getElementById('task-view').style.display = 'none';
    }

    function startClock() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('timer-ui').style.display = 'block';
        gameState.timer = setInterval(() => {
            gameState.time--;
            let m = Math.floor(gameState.time / 60), s = gameState.time % 60;
            document.getElementById('countdown').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(gameState.time <= 0) finishRound(false);
        }, 1000);
    }

    function finishRound(win) {
        clearInterval(gameState.timer);
        if(win) {
            let subIdx = gameState.masterIdx === 0 ? 1 : 0;
            gameState.players[subIdx].score++;
            gameState.masterIdx = subIdx; // Swap roles
        }
        gameState.curRound++;
        if(gameState.curRound > gameState.totalRounds) {
            alert("Game Over! Final Scores: " + gameState.players[0].name + ": " + gameState.players[0].score + " | " + gameState.players[1].name + ": " + gameState.players[1].score);
            location.reload();
        } else {
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('timer-ui').style.display = 'none';
            backToChoices();
            startSession();
        }
    }
</script>
</body>
</html>
