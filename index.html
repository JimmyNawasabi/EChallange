<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Down to get dirty: Sovereign</title>
    <style>
        :root { 
            --accent: #c5a059; --soft-bg: #fdfaf5; --card-bg: #ffffff;
            --text: #2c2c2c; --crimson: #7b1a1a; --gold: #f1c40f; 
        }
        body { background: var(--soft-bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; background: var(--card-bg); padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.2); }
        h1 { color: var(--crimson); text-align: center; text-transform: uppercase; letter-spacing: 4px; font-style: italic; }
        .step { display: none; }
        .active { display: block !important; }
        
        /* INVENTORY STYLES */
        .inv-section { background: #fffcf9; border: 1px solid #f0e6d2; padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        .category-header { font-size: 0.75rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .add-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .add-input-group input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
        .plus-btn { background: var(--crimson); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }
        .tag .remove { color: #aaa; font-weight: bold; font-size: 1rem; }
        .tag.on .remove { color: white; }

        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; margin-top: 10px; }
        .timer-display { font-size: 4rem; text-align: center; color: var(--crimson); font-family: monospace; margin: 20px 0; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>Down to get dirty</h1>

    <div id="step1" class="step active">
        <div class="inv-section">
            <span class="category-header">Setup Session</span>
            <input type="number" id="rounds" value="10" placeholder="Number of Rounds">
            <input type="text" id="p1" placeholder="Player 1 Name" style="margin-top:10px;">
            <input type="text" id="p2" placeholder="Player 2 Name" style="margin-top:10px;">
        </div>
        <button class="btn" onclick="nav(2)">Open Sovereign Arsenal ></button>
    </div>

    <div id="step2" class="step">
        <div id="vault-root"></div>
        <button class="btn" onclick="nav(3)">Commence Ceremony</button>
        <button class="btn" style="background:#888; margin-top:5px;" onclick="factoryReset()">Reset to Default Items</button>
    </div>

    <div id="step3" class="step">
        <div style="text-align:center; font-weight:bold; color:var(--crimson);" id="score-line"></div>
        <div id="round-view">
            <div id="choice-buttons" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;"></div>
            <div id="task-display" style="display:none; margin-top:20px;">
                <div class="inv-section" id="task-body"></div>
                <button class="btn" style="background:green;" onclick="startTimer()">Accept Decree</button>
                <button class="btn" style="background:#888;" onclick="resetRound()">Change Choice</button>
            </div>
        </div>
        <div id="timer-view" style="display:none;">
            <div class="timer-display" id="clock">00:00</div>
            <button class="btn" onclick="endRound(true)">Task Completed (+1)</button>
            <button class="btn" style="background:#888;" onclick="endRound(false)">Task Failed (+0)</button>
        </div>
    </div>
</div>

<script>
    let state = {
        players: [],
        curRound: 1,
        totalRounds: 10,
        masterIdx: 0,
        timeLeft: 0,
        timer: null,
        // PRE-LOADED FULL LIST
        inventory: JSON.parse(localStorage.getItem('dirty_vault')) || {
            "Blindfolds": ["Tape", "Gas Mask", "Pillow Case", "Sleep Mask", "Hood", "Black Silk"],
            "Gags": ["Tape", "Ball Gag", "Pallet Wrap", "Panties", "Sock Gag", "Bit Gag"],
            "Restraints": ["Rope", "Leather Cuffs", "Zip Ties", "Pallet Wrap", "Duct Tape", "Chain"],
            "Sensation": ["Whip", "Ice", "Vibrator", "Clamps", "Cane", "Hot Wax", "Feather"]
        },
        activeItems: JSON.parse(localStorage.getItem('dirty_active')) || {}
    };

    // Initialize active states if first time
    if(Object.keys(state.activeItems).length === 0) {
        for(let cat in state.inventory) state.activeItems[cat] = [...state.inventory[cat]];
    }

    function save() {
        localStorage.setItem('dirty_vault', JSON.stringify(state.inventory));
        localStorage.setItem('dirty_active', JSON.stringify(state.activeItems));
    }

    function factoryReset() {
        localStorage.clear();
        location.reload();
    }

    function renderVault() {
        const root = document.getElementById('vault-root');
        root.innerHTML = '<span class="category-header" style="text-align:center; font-size:1rem; margin-bottom:20px;">Master Arsenal Control</span>';
        
        for (let cat in state.inventory) {
            let section = document.createElement('div');
            section.className = 'inv-section';
            section.innerHTML = `
                <span class="category-header">${cat}</span>
                <div class="add-input-group">
                    <input type="text" id="in-${cat}" placeholder="Add custom ${cat}...">
                    <button class="plus-btn" onclick="addNew('${cat}')">ADD</button>
                </div>
                <div class="tag-cloud" id="cloud-${cat}"></div>
            `;
            root.appendChild(section);
            
            let cloud = section.querySelector('.tag-cloud');
            state.inventory[cat].forEach(item => {
                let isOn = state.activeItems[cat].includes(item);
                let tag = document.createElement('div');
                tag.className = `tag ${isOn ? 'on' : ''}`;
                tag.innerHTML = `${item} <span class="remove" onclick="deleteItem('${cat}', '${item}'); event.stopPropagation();">×</span>`;
                tag.onclick = () => toggleItem(cat, item);
                cloud.appendChild(tag);
            });
        }
    }

    function addNew(cat) {
        let val = document.getElementById(`in-${cat}`).value.trim();
        if(val && !state.inventory[cat].includes(val)) {
            state.inventory[cat].push(val);
            state.activeItems[cat].push(val);
            save(); renderVault();
        }
    }

    function toggleItem(cat, item) {
        let idx = state.activeItems[cat].indexOf(item);
        if(idx > -1) state.activeItems[cat].splice(idx, 1);
        else state.activeItems[cat].push(item);
        save(); renderVault();
    }

    function deleteItem(cat, item) {
        state.inventory[cat] = state.inventory[cat].filter(i => i !== item);
        state.activeItems[cat] = state.activeItems[cat].filter(i => i !== item);
        save(); renderVault();
    }

    function nav(n) {
        if(n === 2) {
            state.totalRounds = document.getElementById('rounds').value;
            state.players = [
                {name: document.getElementById('p1').value || "P1", score: 0},
                {name: document.getElementById('p2').value || "P2", score: 0}
            ];
            renderVault();
        }
        if(n === 3) setupGame();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    const tasks = [
        { n: "Total Restraint", t: 600, d: "Master uses <b>[REST]</b> to pin the Slave. Use <b>[SENS]</b> to explore their [BODY] while they are helpless." },
        { n: "Sensory Void", t: 400, d: "Apply <b>[VIS]</b> and <b>[GAG]</b>. In total darkness and silence, Master will use <b>[SENS]</b> relentlessly." },
        { n: "The Edge", t: 480, d: "Master uses <b>[SENS]</b>. Slave must be brought to the peak 3 times. Release is only by Master's decree." },
        { n: "Escape Trial", t: 300, d: "Master binds Slave with <b>[REST]</b> and <b>[VIS]</b>. Slave has until the clock hits zero to break free." }
    ];

    function setupGame() {
        document.getElementById('score-line').innerText = `${state.players[0].name}: ${state.players[0].score} | ${state.players[1].name}: ${state.players[1].score}`;
        let btns = document.getElementById('choice-buttons');
        btns.innerHTML = '';
        tasks.forEach((task, i) => {
            let b = document.createElement('button');
            b.className = 'btn';
            b.style.marginTop = '0';
            b.innerText = task.n;
            b.onclick = () => showTask(i);
            btns.appendChild(b);
        });
    }

    function showTask(idx) {
        let t = tasks[idx];
        const r = (c) => {
            let pool = state.activeItems[c];
            return pool[Math.floor(Math.random()*pool.length)] || "Standard Gear";
        };
        let bodyText = t.d.replace('[REST]', r('Restraints'))
                        .replace('[SENS]', r('Sensation'))
                        .replace('[VIS]', r('Blindfolds'))
                        .replace('[GAG]', r('Gags'))
                        .replace('[BODY]', "Body");
        
        document.getElementById('task-body').innerHTML = `<strong>${t.n}</strong><br><br>${bodyText}`;
        state.timeLeft = t.t;
        document.getElementById('choice-buttons').style.display = 'none';
        document.getElementById('task-display').style.display = 'block';
    }

    function resetRound() {
        document.getElementById('choice-buttons').style.display = 'grid';
        document.getElementById('task-display').style.display = 'none';
    }

    function startTimer() {
        document.getElementById('round-view').style.display = 'none';
        document.getElementById('timer-view').style.display = 'block';
        state.timer = setInterval(() => {
            state.timeLeft--;
            let m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(state.timeLeft <= 0) endRound(false);
        }, 1000);
    }

    function endRound(success) {
        clearInterval(state.timer);
        if(success) {
            let slaveIdx = state.masterIdx === 0 ? 1 : 0;
            state.players[slaveIdx].score++;
            state.masterIdx = slaveIdx; // Swap
        }
        state.curRound++;
        if(state.curRound > state.totalRounds) {
            document.getElementById('step3').innerHTML = "<h1>CEREMONY COMPLETE</h1><div class='inv-section'>Final Scores recorded. Proceed to Final Decree.</div>";
        } else {
            document.getElementById('round-view').style.display = 'block';
            document.getElementById('timer-view').style.display = 'none';
            resetRound();
            setupGame();
        }
    }
</script>
</body>
</html>
