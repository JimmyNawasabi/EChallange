<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Multiplayer Extreme</title>
    <style>
        :root { --gold: #d4af37; --blood: #8b0000; --dark: #0a0a0a; --grey: #222; }
        body { background: var(--dark); color: #eee; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: #111; border: 2px solid var(--grey); padding: 25px; border-radius: 10px; box-shadow: 0 0 30px #000; }
        h1 { color: var(--blood); text-align: center; text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid var(--blood); padding-bottom: 10px; }
        .setup-section { background: #1a1a1a; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .player-entry { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #222; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; font-size: 0.85em; margin: 15px 0; }
        .card-zone { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .card { width: 100px; height: 130px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; text-align: center; cursor: pointer; color: #000; font-size: 0.8em; }
        .yellow { background: #ffd700; border: 3px solid #b8860b; }
        .red { background: #ff4500; border: 3px solid #8b0000; }
        .card.disabled { opacity: 0.1; pointer-events: none; }
        .challenge-box { background: #000; border-left: 5px solid var(--blood); padding: 20px; margin: 20px 0; font-size: 1.1em; border-radius: 0 5px 5px 0; }
        .timer-display { font-size: 4em; color: var(--blood); font-weight: bold; margin: 10px 0; text-align: center; }
        .btn { background: var(--blood); color: white; border: 1px solid var(--gold); padding: 15px; text-transform: uppercase; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 5px; }
        .btn:hover { background: #b00; }
        .hidden { display: none; }
        input, select { background: #000; color: #fff; border: 1px solid #444; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bound & Brave: Extreme</h1>

    <div id="step-1">
        <h3>How many players are participating?</h3>
        <select id="playerCount" style="width: 100%; font-size: 1.2em;" onchange="showPlayerNaming()">
            <option value="">Select...</option>
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
            <option value="4">4 Players</option>
            <option value="5">5 Players</option>
        </select>
    </div>

    <div id="step-2" class="hidden">
        <h3>Player Details</h3>
        <div id="playerInputs"></div>
        <button class="btn" onclick="showInventory()">Next: Select Gear</button>
    </div>

    <div id="step-3" class="hidden">
        <h3>Inventory Check</h3>
        <p>Uncheck items you do not have available:</p>
        <div class="inventory-grid" id="inventory-list"></div>
        <button class="btn" onclick="initGame()">Start Game</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="roleDisplay" style="color: var(--gold); font-size: 1.3em; margin-bottom: 10px; text-align: center;"></div>
        
        <div class="card-zone">
            <div id="yellowCard" class="card yellow" onclick="useCard('yellow')">YELLOW CARD<br>Role Swap</div>
            <div id="redCard" class="card red" onclick="useCard('red')">RED CARD<br>Pass Task</div>
        </div>

        <div id="prep-phase">
            <div class="challenge-box" id="challengeText">Click "Generate" for the first trial.</div>
            <button class="btn" id="genBtn" onclick="generateChallenge()">Generate Challenge</button>
            <button class="btn hidden" id="startBtn" onclick="startEscape()">Bound & Ready: Start Timer</button>
        </div>

        <div id="escape-phase" class="hidden">
            <div class="timer-display" id="timer">00:00</div>
            <button class="btn" onclick="endRound(true)">Escape Successful</button>
            <button class="btn" style="background: #333;" onclick="endRound(false)">Failure</button>
        </div>

        <button class="btn" style="background:#222; margin-top:30px;" onclick="nextRotation()">Next Round / Rotate Roles</button>
    </div>
</div>

<script>
    let players = [];
    let activeInv = [];
    let subIdx = 0;
    let domIdx = 1;
    let cardHolders = { yellow: 0, red: 0 }; 
    let timerInt;
    let timeLeft;

    const gear = ["Rope", "Tape", "Pallet Wrap", "Bandages", "Floggers", "Cane", "Dildo", "Butt Plug", "Ball Gag", "Over-the-mouth Gag", "Tape Gag", "Wrap Around Gag", "Mouth Stuffed", "Open Mouth Gag", "Cloth Blindfold", "Tape Blindfold", "Leather Blindfold", "Straight Jacket", "Spreader Bar"];

    function showPlayerNaming() {
        const count = document.getElementById('playerCount').value;
        if(!count) return;
        const container = document.getElementById('playerInputs');
        container.innerHTML = "";
        for(let i=1; i<=count; i++) {
            container.innerHTML += `
                <div class="player-entry">
                    <input type="text" id="name${i}" placeholder="Player ${i} Name">
                    <select id="gender${i}">
                        <option value="Male">Male Body</option>
                        <option value="Female">Female Body</option>
                        <option value="Any">Neutral</option>
                    </select>
                </div>`;
        }
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    function showInventory() {
        const count = document.getElementById('playerCount').value;
        players = [];
        for(let i=1; i<=count; i++) {
            players.push({
                name: document.getElementById(`name${i}`).value || `Player ${i}`,
                gender: document.getElementById(`gender${i}`).value
            });
        }
        const invList = document.getElementById('inventory-list');
        gear.forEach(item => {
            invList.innerHTML += `<label><input type="checkbox" value="${item}" checked> ${item}</label>`;
        });
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
    }

    function initGame() {
        document.querySelectorAll('#inventory-list input:checked').forEach(i => activeInv.push(i.value));
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        updateRoles();
    }

    function updateRoles() {
        const dom = players[domIdx];
        const sub = players[subIdx];
        document.getElementById('roleDisplay').innerHTML = `DOM: <b>${dom.name}</b><br>SUB: <b>${sub.name}</b>`;
        document.getElementById('yellowCard').className = `card yellow ${cardHolders.yellow !== subIdx ? 'disabled' : ''}`;
        document.getElementById('redCard').className = `card red ${cardHolders.red !== subIdx ? 'disabled' : ''}`;
    }

    function generateChallenge() {
        // Sample pool - in actual use you'd add all 75 logic here
        const subGen = players[subIdx].gender;
        const tasks = [
            { req: ["Tape", "Ball Gag"], time: 300, text: `(Gender: ${subGen}) MOUTH SEALED: Insert Ball Gag, then 3 layers of tape. Arms tied behind with Tape.` },
            { req: ["Pallet Wrap", "Straight Jacket"], time: 600, text: `(Any) THE ASYLUM TUBE: Put on Straight Jacket, then wrap entire torso in 10 layers of Pallet Wrap.` },
            { req: ["Rope", "Spreader Bar"], time: 450, text: `(Any) THE SPREAD: Ankle spreader bar applied. Rope tether from bar to a collar. Hands tied to the bar.` },
            { req: ["Dildo", "Tape"], time: 360, text: `(Female) THE INTERNAL TASK: Dildo taped to a chair. Sub must remain seated while arms are taped to sides.` },
            { req: ["Butt Plug", "Cane"], time: 300, text: `(Male) THE MARKED MAN: Insert plug. 6 cane strikes. Then hands tied to ankles in front.` }
        ];

        const valid = tasks.filter(t => t.req.every(r => activeInv.includes(r)));
        const task = valid[Math.floor(Math.random()*valid.length)] || {text: "Standard Rope Bondage: Dom's Choice.", time: 300};
        
        document.getElementById('challengeText').innerHTML = `<strong>RESTRAINT & TASK:</strong><br>${task.text}<br><br><strong>LIMIT:</strong> ${task.time}s`;
        timeLeft = task.time;
        document.getElementById('genBtn').classList.add('hidden');
        document.getElementById('startBtn').classList.remove('hidden');
    }

    function useCard(type) {
        if(type === 'yellow') {
            alert("YELLOW CARD! Roles swap immediately.");
            [subIdx, domIdx] = [domIdx, subIdx];
            cardHolders.yellow = domIdx; // Pass to new Sub
        } else {
            alert("RED CARD! Challenge skipped. Pass card to Dom.");
            cardHolders.red = domIdx;
            generateChallenge();
        }
        updateRoles();
    }

    function startEscape() {
        document.getElementById('prep-phase').classList.add('hidden');
        document.getElementById('escape-phase').classList.remove('hidden');
        timerInt = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) endRound(false);
        }, 1000);
    }

    function endRound(success) {
        clearInterval(timerInt);
        alert(success ? "SUCCESS! Reward granted." : "FAILURE! Punishment enforced.");
        document.getElementById('escape-phase').classList.add('hidden');
        document.getElementById('prep-phase').classList.remove('hidden');
        document.getElementById('genBtn').classList.remove('hidden');
        document.getElementById('startBtn').classList.add('hidden');
    }

    function nextRotation() {
        subIdx = (subIdx + 1) % players.length;
        domIdx = (subIdx + 1) % players.length;
        updateRoles();
        alert("Roles Rotated. New Sub: " + players[subIdx].name);
    }
</script>
</body>
</html>
