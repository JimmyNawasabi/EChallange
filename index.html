                "Apply [VIS]. Ask the Subject a deeply personal question. If they hesitate for more than three seconds, apply a sharp strike with [SENS].",
                "Apply [GAG]. The Subject must hum a song of your choosing. Every time they pause for breath, tap them firmly with [SENS].",
                "Bind the Subject with [REST] and apply [VIS]. Command them to count backwards from 100 by 7s. Any mistake earns a strike from [SENS].",
                "Apply [VIS]. Whisper an embarrassing command. The Subject must repeat it out loud perfectly. If they stumble, use [SENS].",
                "Secure the Subject with [REST]. Apply [GAG]. Ask yes/no questions. They must nod for yes, shake for no. Wrong answers earn [SENS].",
                "Apply [VIS]. The Subject must confess a secret they have never told you. If you deem it uninteresting or fake, apply a heavy strike with [SENS].",
                "Apply [GAG] and [VIS]. Tap [SENS] against their thigh 5 times. Remove the gag. They must state exactly how many times you tapped. If wrong, double the taps.",
                "Bind the Subject with [REST]. Command them to verbally praise you continuously for two minutes. Any break in speech results in [SENS].",
                "Apply [VIS]. Ask the Subject to describe, in explicit detail, the sensation of [SENS] on their skin as you slowly drag it across their chest.",
                "Apply [GAG]. Ask the Subject a question they want to say 'No' to. They must force themselves to nod 'Yes'. If they resist, use [REST] to bind them tighter.",
                "Apply [VIS]. Command the Subject to recite the alphabet backwards. For every letter they get wrong, apply [SENS] to their inner thigh.",
                "Secure the Subject with [REST] and apply [VIS]. Whisper their name close to their ear. They must not react. If they shiver or sigh, use [SENS].",
                "Apply [GAG]. Command the Subject to look you directly in the eyes without blinking. If they blink, trail [SENS] down their cheek.",
                "Apply [VIS]. The Subject must recount their worst fear in detail. While they speak, lightly trace [SENS] across their most sensitive areas.",
                "Bind the Subject with [REST]. Ask them to rate their current level of arousal/fear from 1-10. Whatever the number, strike them that many times with [SENS].",
                "Apply [GAG] and [VIS]. Trace a shape on their back with [SENS]. Remove the gag. If they guess the shape wrong, trace it again, but harder.",
                "Apply [VIS]. Command the Subject to beg for [SENS]. They must convince you they truly want it before you apply it.",
                "Secure the Subject with [REST]. Ask them a question about your relationship. A brutally honest answer earns soft touches; a lie earns sharp [SENS].",
                "Apply [GAG]. The Subject must moan into the gag as loudly as possible. If they are too quiet, apply a harsh strike with [SENS].",
                "Apply [VIS]. Command the Subject to describe their favorite part of your body. Interrupt them randomly with sharp taps from [SENS].",
                "Bind the Subject with [REST]. Play a game of 'Simon Says'. If they obey a command without 'Simon Says', apply [SENS].",
                "Apply [GAG] and [VIS]. Leave the room and close the door loudly. Wait 30 seconds, sneak back in, and apply a sudden strike with [SENS].",
                "Apply [VIS]. Command the Subject to spell their full name. For every vowel, apply a heavy strike with [SENS].",
                "Secure the Subject with [REST]. Ask them to explain why they deserve to be bound. If their reasoning is weak, tighten the [REST].",
                "Apply [GAG]. Command the Subject to take deep, slow breaths. If their breathing becomes erratic, use [SENS] to snap them back to focus.",
                "Apply [VIS]. Whisper a trigger word. Every time you say it during the round, they must flinch. If they forget, use [SENS].",
                "Bind the Subject with [REST] and apply [VIS]. The Subject must correctly guess which body part you are going to touch next. If wrong, strike it with [SENS].",
                "Apply [GAG]. Ask the Subject to remember a specific date. They must hum the number of the month. If wrong, use [SENS].",
                "Apply [VIS]. Command the Subject to insult themselves. If they don't sound sincere, apply [SENS] and make them start over.",
                "Secure the Subject with [REST]. The Subject must ask permission to swallow. If they swallow without asking, apply [SENS] to their throat.",
                "Apply [GAG] and [VIS]. Command the Subject to imagine [SENS] striking them. Wait a full minute before actually making impact.",
                "Apply [VIS]. The Subject must describe the room they are in perfectly from memory. Every missed detail earns a tap with [SENS].",
                "Bind the Subject with [REST]. Ask them to apologize for a past mistake. The apology must be lengthy and detailed. Interrupt with [SENS].",
                "Apply [GAG]. Command the Subject to hold back any vocalizations. Use [SENS] aggressively. If they make a sound through the gag, intensify it.",
                "Apply [VIS]. Tell the Subject a short story. They must repeat it back perfectly. For every missed word, apply [SENS].",
                "Secure the Subject with [REST] and apply [VIS]. Whisper contradictory commands (e.g., 'relax' while striking them with [SENS]). Punish confusion.",
                "Apply [GAG]. The Subject must communicate their desire to stop using only their eyes. Stare them down until they break eye contact.",
                "Apply [VIS]. Command the Subject to count every single time you touch them with [SENS]. Remove the blindfold. If the count is wrong, double the strikes.",
                "Bind the Subject with [REST]. Ask the Subject what their limit is. Once stated, bring them exactly to the edge of it using [SENS] and hold them there.",
                "Apply [GAG] and [VIS]. The Subject must nod their head to a rhythm you tap on their shoulder. If they lose the beat, use [SENS].",
                "Apply [VIS]. The Subject must list 5 reasons why they submitted to you today. If they pause for too long, strike their thigh with [SENS].",
                "Secure the Subject with [REST]. Command them to stay absolutely silent. Bait them by asking questions. If they answer, apply [SENS].",
                "Apply [GAG]. Instruct the Subject to show gratitude through their posture. If they slouch or look away, use [SENS] to correct them.",
                "Apply [VIS]. Describe in detail a painful act you are going to perform, but then do something incredibly gentle instead. Watch their reaction.",
                "Bind the Subject with [REST]. The Subject must verbally guide you on where to strike them with [SENS]. If they hesitate, you choose the worst spot.",
                "Apply [GAG] and [VIS]. Humiliate the Subject by describing their bound, helpless state to them in detail. Trace their jaw with [SENS].",
                "Apply [VIS]. Ask the Subject an impossible math question. While they struggle to calculate it, apply rapid, distracting strikes with [SENS].",
                "Secure the Subject with [REST]. Command them to say 'Thank You' after every strike of [SENS]. If they forget, the strike doesn't count.",
                "Apply [GAG]. Use [SENS] to evoke a strong reaction. If they try to pull away, use [REST] to bind them tighter to the surface.",
                "Apply [VIS]. The Subject must confess a fantasy they have been too afraid to share. Listen closely, and use [SENS] to encourage them to finish."
            ]
        }
    ];

    let gearCats = { "Blindfolds": true, "Gags": true, "Restraints": true, "Sensation": true };

    function playSnd(id) { document.getElementById('snd-'+id).play(); }
    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    function nav(n) {
        if(n === 2) {
            players = [{n: document.getElementById('p1_n').value || "P1"}, {n: document.getElementById('p2_n').value || "P2"}];
            maxR = parseInt(document.getElementById('max_r').value);
            renderVault();
        }
        if(n === 3) renderCommandCenter();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }

    // VAULT ENGINE
    function renderVault() {
        const cont = document.getElementById('vault-inject'); cont.innerHTML = '';
        for(let c in vault) {
            let section = document.createElement('div');
            section.innerHTML = `<span class="label">${c}</span><div class="add-row"><input type="text" class="add-input" id="in-${c}" placeholder="New ${c}..."><button class="add-btn" onclick="addItem('${c}')">+</button></div><div class="tag-cloud" id="cloud-${c}"></div>`;
            cont.appendChild(section);
            vault[c].forEach((item, i) => {
                let t = document.createElement('div'); t.className = `tag ${item.on ? 'on' : ''}`;
                t.innerHTML = `<span>${item.n}</span><span class="del-x" onclick="removeItem('${c}', ${i}); event.stopPropagation();">×</span>`;
                t.onclick = () => { item.on = !item.on; saveVault(); renderVault(); vibrate(20); };
                document.getElementById(`cloud-${c}`).appendChild(t);
            });
        }
    }

    function addItem(c) {
        let input = document.getElementById(`in-${c}`);
        let val = input.value.trim();
        if(val) { vault[c].push({n: val, on: true}); input.value = ''; saveVault(); renderVault(); vibrate(40); }
    }

    function removeItem(c, i) { vault[c].splice(i, 1); saveVault(); renderVault(); vibrate([30, 30]); }
    function saveVault() { localStorage.setItem('sov_vault_v6', JSON.stringify(vault)); }

    // COMMAND CENTER
    function renderCommandCenter() {
        document.getElementById('round-header').innerText = `ROUND ${curR} | Master: ${players[masterIdx].n}`;
        const tGrid = document.getElementById('trial-toggles'); tGrid.innerHTML = '';
        trials.forEach((t, i) => {
            let b = document.createElement('button'); b.className = `t-btn ${t.on ? 'on' : ''}`;
            b.innerText = t.n; b.onclick = () => { t.on = !t.on; b.classList.toggle('on'); vibrate(30); };
            tGrid.appendChild(b);
        });
        const gGrid = document.getElementById('gear-toggles'); gGrid.innerHTML = '';
        for(let c in gearCats) {
            let b = document.createElement('button'); b.className = `t-btn ${gearCats[c] ? 'gear-on' : ''}`;
            b.innerText = c; b.onclick = () => { gearCats[c] = !gearCats[c]; b.classList.toggle('gear-on'); vibrate(30); };
            gGrid.appendChild(b);
        }
    }

    // UPDATED LOGIC TO PULL FROM THE 200+ STRINGS
    function generateDecree() {
        let activeTrials = trials.filter(t => t.on);
        if(!activeTrials.length) return alert("Select at least one Trial.");
        
        // Pick a random trial category
        let t = activeTrials[Math.floor(Math.random() * activeTrials.length)];
        // Pick a random detailed instruction from the 50 in that category
        let selectedDesc = t.d[Math.floor(Math.random() * t.d.length)];
        
        const pick = (c) => { 
            if(!gearCats[c]) return `<span style="opacity:0.3; font-size:1rem;">[SKIP ${c}]</span>`;
            let items = vault[c].filter(i => i.on);
            return `<span class="instruction-highlight">${items.length ? items[Math.floor(Math.random()*items.length)].n : c}</span>`; 
        };
        
        // Replace all instances of the tags globally
        let text = selectedDesc.replace(/\[REST\]/g, pick('Restraints')).replace(/\[SENS\]/g, pick('Sensation')).replace(/\[VIS\]/g, pick('Blindfolds')).replace(/\[GAG\]/g, pick('Gags'));
        
        document.getElementById('active-trial-text').innerHTML = `<strong>${t.n.toUpperCase()}</strong><br><br>${text}`;
        timeLeft = t.t;
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        startClock();
    }

    function startClock() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(timeLeft === 10) { playSnd('alarm'); vibrate([100, 100, 100]); }
            if(timeLeft <= 0) { clearInterval(timer); vibrate([500, 200, 500]); finish(false); }
        }, 1000);
    }

    function finish(win) {
        clearInterval(timer);
        masterIdx = (masterIdx === 0 ? 1 : 0);
        curR++;
        if(curR > maxR) { alert("Protocol Concluded."); location.reload(); }
        else {
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('active-round').style.display = 'none';
            renderCommandCenter();
        }
    }
</script>
</body>
