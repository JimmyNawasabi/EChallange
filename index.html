<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: Final Logic Hardened</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b;
            --yellow: #ffd700; --red: #ff4500;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 30px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 8px; color: var(--accent); margin: 0; }
        .box-section { background: #1f1f1f; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #333; }
        .label { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; }
        .btn { background: var(--crimson); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 12px; margin-top: 10px; letter-spacing: 2px; }
        .gender-grid { display: flex; gap: 8px; margin-top: 8px; }
        .g-btn { flex: 1; padding: 10px; background: #111; border: 1px solid #444; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tog-btn { padding: 12px 8px; font-size: 0.65rem; border-radius: 8px; border: 1px solid #333; background: #111; color: #555; cursor: pointer; text-transform: uppercase; font-weight: bold; line-height: 1.2; }
        .tog-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1608; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #000; border-radius: 20px; border: 1px solid #222; }
        .p-block { text-align: center; flex: 1; }
        .role-tag { font-size: 0.6rem; font-weight: 900; color: #444; letter-spacing: 2px; }
        .master-glow { color: var(--accent) !important; text-shadow: 0 0 10px var(--accent); }
        .score-num { font-size: 2rem; font-weight: bold; margin: 5px 0; }
        .card-dock { display: flex; justify-content: center; gap: 5px; height: 25px; }
        .mini-card { width: 15px; height: 22px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }
        .card-y { background: var(--yellow); }
        .card-r { background: var(--red); }
        .decree-box { font-size: 1.1rem; line-height: 1.8; color: #eee; border-left: 5px solid var(--accent); padding-left: 20px; margin: 20px 0; background: rgba(255,255,255,0.03); padding-top: 15px; padding-bottom: 15px; }
        .step { display: none; }
        .active { display: block !important; }
        #vault-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; display: none; padding: 30px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div id="vault-overlay">
    <h2 style="color:var(--accent); text-align:center;">ARSENAL VAULT</h2>
    <div id="vault-editor-content"></div>
    <button class="btn" onclick="closeVault()">Save & Return</button>
</div>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="screen-setup" class="step active">
        <div class="box-section">
            <span class="label">Primary Identity (Initial Master)</span>
            <input type="text" id="p0-name-in" placeholder="Name...">
            <div class="gender-grid">
                <button class="g-btn active" onclick="setG(0,'M',this)">Male</button>
                <button class="g-btn" onclick="setG(0,'F',this)">Female</button>
                <button class="g-btn" onclick="setG(0,'NB',this)">NB</button>
            </div>
        </div>
        <div class="box-section">
            <span class="label">Secondary Identity (Initial Slave)</span>
            <input type="text" id="p1-name-in" placeholder="Name...">
            <div class="gender-grid">
                <button class="g-btn" onclick="setG(1,'M',this)">Male</button>
                <button class="g-btn active" onclick="setG(1,'F',this)">Female</button>
                <button class="g-btn" onclick="setG(1,'NB',this)">NB</button>
            </div>
        </div>
        <button class="btn" onclick="startSession()">Initialize Identities</button>
    </div>

    <div id="screen-game" class="step">
        <div class="score-row">
            <div class="p-block">
                <div id="p0-role" class="role-tag">MASTER</div>
                <div id="p0-name-ui" style="font-weight:bold;">-</div>
                <div id="p0-score" class="score-num">0</div>
                <div id="p0-cards" class="card-dock"></div>
            </div>
            <div class="p-block">
                <div id="p1-role" class="role-tag">SLAVE</div>
                <div id="p1-name-ui" style="font-weight:bold;">-</div>
                <div id="p1-score" class="score-num">0</div>
                <div id="p1-cards" class="card-dock"></div>
            </div>
        </div>

        <div id="master-controls">
            <div class="box-section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span class="label">Include Arsenal Sets</span>
                    <button onclick="openVault()" style="background:none; border:1px solid var(--accent); color:var(--accent); font-size:0.55rem; padding:3px 6px; cursor:pointer; border-radius:4px; font-weight:bold;">Edit Vault</button>
                </div>
                <div class="toggle-grid" id="arsenal-mount"></div>

                <span class="label">Active Protocols</span>
                <div class="toggle-grid" id="protocol-mount"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Command Decree</button>
        </div>

        <div id="active-round-view" style="display:none;">
            <div class="box-section">
                <div id="decree-display" class="decree-box"></div>
                <div style="display:flex; gap:10px;">
                    <button class="tog-btn" style="flex:1.2; border-color:var(--crimson); color:var(--crimson);" onclick="vetoCurrent()">Veto Activity</button>
                    <button id="y-btn" class="tog-btn" style="flex:1; background:var(--yellow); color:black;" onclick="triggerCard('yellow')">Yellow Card</button>
                    <button id="r-btn" class="tog-btn" style="flex:1; background:var(--red); color:white;" onclick="triggerCard('red')">Red Card</button>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#333; flex:1;" onclick="roundResolve(false)">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="roundResolve(true)">SUCCESS</button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        players: [{ n: "", g: "M", role: "Master", score: 0, cards: ['yellow'] }, { n: "", g: "F", role: "Slave", score: 0, cards: ['red'] }],
        vault: JSON.parse(localStorage.getItem('sov_v8_vault')) || {
            "Restraints": { items: ["Rope", "Handcuffs"], active: true },
            "Sensory": { items: ["Blindfold", "Hood"], active: true },
            "Discipline": { items: ["Flogger", "Cane"], active: true },
            "Oral": { items: ["Ball Gag"], active: true }
        },
        protocols: {
            "The Solitary Bind": { label: "Self Bondage", active: true, prompts: ["{S} must take the {T} and secure {SP} own wrists tightly behind {SP} back. {S} must then loop the length to {SP} ankles, pulling {SP} body into a forced arch."] },
            "The Wicked Gamble": { label: "Dare", active: true, prompts: ["{M} dictates a gamble: {S} must remain still while {M} uses the {T} to create a precarious situation. Flinching results in a card penalty."] },
            "The Veiled Confession": { label: "Truth", active: true, prompts: ["Bound by the {T}, {S} must reveal a deep, hidden truth. Every moment of hesitation results in a tighter adjustment of the tools."] },
            "The Silk Labyrinth": { label: "Shibari", active: true, prompts: ["{M} is to perform a formal Takate Kote on {S} using the {T}, ensuring the chest is fully exposed and shoulders are pulled back."] },
            "The Threshold of Agony": { label: "Edging/Denial", active: true, prompts: ["{M} will use the {T} to bring {S} to the peak of release three times, only to deny it by commanding absolute 'Stillness'."] },
            "The Flesh Endurance": { label: "Physical Challenge", active: true, prompts: ["{S} must hold a rigid plank while the {T} is balanced across {SP} lower back. If it falls, the task begins anew."] },
            "The Great Unshackling": { label: "Escape", active: true, prompts: ["{M} secures {S} using the {T} in a complex knot. {S} has three minutes to escape using only body tension. Failure results in forfeit."] },
            "The Velvet Command": { label: "Soft & Sexy", active: true, prompts: ["{M} will use the {T} to trace every curve of {S}'s body. {S} must describe exactly how the touch feels in submissive detail."] }
        }
    };

    function setG(i, v, b) { state.players[i].g = v; b.parentElement.querySelectorAll('.g-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); }
    
    function startSession() {
        state.players[0].n = document.getElementById('p0-name-in').value || "Master";
        state.players[1].n = document.getElementById('p1-name-in').value || "Slave";
        document.getElementById('screen-setup').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        updateUI();
    }

    function updateUI() {
        state.players.forEach((p, i) => {
            document.getElementById(`p${i}-name-ui`).innerText = p.n;
            document.getElementById(`p${i}-score`).innerText = p.score;
            const rt = document.getElementById(`p${i}-role`);
            rt.innerText = p.role; rt.className = 'role-tag' + (p.role === 'Master' ? ' master-glow' : '');
            document.getElementById(`p${i}-cards`).innerHTML = p.cards.map(c => `<div class="mini-card card-${c[0]}"></div>`).join('');
        });

        const vMount = document.getElementById('arsenal-mount'); vMount.innerHTML = '';
        for (let k in state.vault) {
            vMount.innerHTML += `<button class="tog-btn ${state.vault[k].active?'active':''}" onclick="state.vault['${k}'].active=!state.vault['${k}'].active; updateUI()">${k}</button>`;
        }

        const pMount = document.getElementById('protocol-mount'); pMount.innerHTML = '';
        for (let k in state.protocols) {
            pMount.innerHTML += `<button class="tog-btn ${state.protocols[k].active?'active':''}" onclick="state.protocols['${k}'].active=!state.protocols['${k}'].active; updateUI()">${k}<br><span style="opacity:0.5; font-size:0.5rem;">[${state.protocols[k].label}]</span></button>`;
        }

        const mIdx = state.players.findIndex(p => p.role === 'Master');
        document.getElementById('y-btn').style.opacity = state.players[mIdx].cards.includes('yellow') ? "1" : "0.2";
        document.getElementById('r-btn').style.opacity = state.players[mIdx].cards.includes('red') ? "1" : "0.2";
    }

    function generateDecree() {
        const actP = Object.keys(state.protocols).filter(k => state.protocols[k].active);
        const actV = Object.keys(state.vault).filter(k => state.vault[k].active && state.vault[k].items.length > 0);
        if(!actP.length || !actV.length) return alert("Enable at least one Protocol and one Arsenal set.");
        
        state.currentCat = actP[Math.floor(Math.random() * actP.length)];
        const pool = state.protocols[state.currentCat].prompts;
        state.currentIdx = Math.floor(Math.random() * pool.length);
        
        const setKey = actV[Math.floor(Math.random() * actV.length)];
        const tool = state.vault[setKey].items[Math.floor(Math.random() * state.vault[setKey].items.length)];

        renderDecree(pool[state.currentIdx], tool);
    }

    function renderDecree(template, tool) {
        const mIdx = state.players.findIndex(p => p.role === 'Master');
        const sIdx = mIdx === 0 ? 1 : 0;
        const sub = state.players[sIdx];
        const gM = { M: { p: 'he', o: 'him', s: 'his' }, F: { p: 'she', o: 'her', s: 'her' }, NB: { p: 'they', o: 'them', s: 'their' } }[sub.g];
        
        const text = template.replace(/{M}/g, state.players[mIdx].n).replace(/{S}/g, sub.n).replace(/{SP}/g, gM.s).replace(/{T}/g, `<strong>${tool}</strong>`);
        document.getElementById('decree-display').innerHTML = `<small style="color:var(--accent)">PROTOCOL: ${state.currentCat}</small><br><br>${text}`;
        document.getElementById('master-controls').style.display = 'none';
        document.getElementById('active-round-view').style.display = 'block';
    }

    function vetoCurrent() {
        state.protocols[state.currentCat].prompts.splice(state.currentIdx, 1);
        if(state.protocols[state.currentCat].prompts.length === 0) state.protocols[state.currentCat].prompts.push("Reset game to refill library.");
        generateDecree();
    }

    function triggerCard(c) {
        const mIdx = state.players.findIndex(p => p.role === 'Master');
        const sIdx = mIdx === 0 ? 1 : 0;
        const ci = state.players[mIdx].cards.indexOf(c);
        if(ci > -1) { state.players[mIdx].cards.splice(ci, 1); state.players[sIdx].cards.push(c); updateUI(); }
    }

    function roundResolve(success) {
        const mIdx = state.players.findIndex(p => p.role === 'Master');
        const sIdx = mIdx === 0 ? 1 : 0;
        if(success) {
            state.players[sIdx].score++;
            const p0r = state.players[0].role;
            state.players[0].role = (p0r === 'Master' ? 'Slave' : 'Master');
            state.players[1].role = (p0r === 'Master' ? 'Master' : 'Slave');
        } else state.players[mIdx].score++;
        document.getElementById('master-controls').style.display = 'block';
        document.getElementById('active-round-view').style.display = 'none';
        updateUI();
    }

    function openVault() {
        const m = document.getElementById('vault-editor-content'); m.innerHTML = '';
        for(let c in state.vault) m.innerHTML += `<div class="box-section"><span class="label">${c}</span><div>${state.vault[c].items.map((t,i) => `<span>${t} <button onclick="state.vault['${c}'].items.splice(${i},1); openVault()">✕</button></span>`).join(' ')}</div><input type="text" id="v-${c}"><button onclick="vAdd('${c}')">Add</button></div>`;
        document.getElementById('vault-overlay').style.display = 'block';
    }
    function vAdd(c) { const v = document.getElementById(`v-${c}`).value; if(v){ state.vault[c].items.push(v); openVault(); } }
    function closeVault() { localStorage.setItem('sov_v8_vault', JSON.stringify(state.vault)); document.getElementById('vault-overlay').style.display = 'none'; updateUI(); }
</script>
</body>
</html>
