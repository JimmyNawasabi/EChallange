<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: High-Vibe Audited Build</title>
    <style>
        :root { --accent: #d4af37; --bg: #0a0a0a; --card: #161616; --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --warning: #b38f00; --veto-blue: #004a7c; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 6px; color: var(--accent); margin-bottom: 25px; font-size: 2.4rem; }
        .box-section { background: #1f1f1f; padding: 20px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; }
        
        .label { font-size: 0.85rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; letter-spacing: 1.2px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 15px; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; margin-bottom: 12px; font-size: 1.2rem; }
        
        .gender-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .g-btn { flex: 1; padding: 14px; background: #111; border: 1px solid #444; color: #666; cursor: pointer; border-radius: 8px; font-size: 0.85rem; font-weight: bold; }
        .g-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 10px; margin-top: 6px; font-size: 1.2rem; }
        
        .item-chip { display: inline-flex; align-items: center; background: #333; padding: 8px 15px; border-radius: 25px; margin: 5px; font-size: 1rem; border: 1px solid #444; }
        .item-chip.off { opacity: 0.3; text-decoration: line-through; background: #111; }
        .tag { font-size: 0.65rem; font-weight: bold; background: var(--accent); color: black; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .remove-x { margin-left: 12px; color: var(--crimson); font-weight: bold; cursor: pointer; }
        
        .score-row { display: flex; justify-content: space-between; padding: 15px; background: #000; border-radius: 12px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        .p-name { font-weight: bold; font-size: 1.2rem; }
        .p-score { font-size: 1.8rem; color: var(--accent); }
        
        .m-btn { border-radius: 8px; padding: 15px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; cursor: pointer; opacity: 0.3; pointer-events: none; border: 1px solid #333; }
        .m-btn.active-card { opacity: 1; pointer-events: auto; }
        .y-card { background: var(--warning); color: #000; }
        .r-card { background: var(--crimson); color: #fff; }

        #decree-display { line-height: 1.6; color: #ddd; font-size: 1.2rem; }
        .grand-decree-text { font-size: 1.1rem; line-height: 1.8; color: #eee; background: #000; padding: 20px; border-radius: 10px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Player 1</span>
            <input type="text" id="p0-name" value="Dominus">
            <div class="gender-grid" id="p0-genders">
                <button class="g-btn active" onclick="updateGender(0,'M',this)">Male</button>
                <button class="g-btn" onclick="updateGender(0,'F',this)">Female</button>
                <button class="g-btn" onclick="updateGender(0,'NB',this)">NB</button>
            </div>
            <span class="label">Player 2</span>
            <input type="text" id="p1-name" value="Subject">
            <div class="gender-grid" id="p1-genders">
                <button class="g-btn" onclick="updateGender(1,'M',this)">Male</button>
                <button class="g-btn active" onclick="updateGender(1,'F',this)">Female</button>
                <button class="g-btn" onclick="updateGender(1,'NB',this)">NB</button>
            </div>
            <span class="label">Total Rounds</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" style="width:100%" onclick="showStep(2)">Configure Arsenal</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="inventory-editor"></div>
        <button class="btn" style="background:var(--success); width:100%" onclick="startSession()">Start Session</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-ui" style="text-align:center; color:var(--accent); margin-bottom:10px; font-weight:bold;"></div>
        <div class="score-row">
            <div class="p-block"><div id="r0" class="role-tag">MASTER</div><div id="n0" class="p-name"></div><div id="s0" class="p-score">0</div><div id="inv0"></div></div>
            <div class="p-block"><div id="r1" class="role-tag">SLAVE</div><div id="n1" class="p-name"></div><div id="s1" class="p-score">0</div><div id="inv1"></div></div>
        </div>
        <div id="game-controls">
             <div class="box-section"><span class="label">Active Protocols</span><div id="proto-mount" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;"></div></div>
             <button class="btn" style="width:100%" onclick="generate()">Command Decree</button>
        </div>
        <div id="decree-view" style="display:none;">
            <div class="box-section"><div id="decree-display"></div></div>
            <div style="display:flex; gap:12px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve('fail')">FAIL</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve('success')">SUCCESS</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px;">
                <button id="y-btn" class="m-btn y-card" onclick="useYellow()">Yellow Card</button>
                <button id="r-btn" class="m-btn r-card" onclick="useRed()">Red Card</button>
            </div>
        </div>
    </div>

    <div id="step-4" style="display:none;">
        <h2 style="color:var(--accent); text-align:center;">THE GRAND DECREE</h2>
        <div class="box-section"><div id="grand-decree-display" class="grand-decree-text"></div></div>
        <button class="btn" style="width:100%; background:var(--success);" onclick="location.reload()">New Session</button>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30,
        players: [
            {n:"", g:"M", role:"Master", score:0, hasYellow:false, hasRed:false},
            {n:"", g:"F", role:"Slave", score:0, hasYellow:false, hasRed:false}
        ],
        vault: JSON.parse(localStorage.getItem('sov_v5_final')) || {
            "The Shackles": [{n:"Handcuffs", a:true, t:"U"}],
            "The Silence": [{n:"Ball Gag", a:true, t:"U"}],
            "The Shadows": [{n:"Silk Scarf", a:true, t:"U"}],
            "The Discipline": [{n:"Leather Whip", a:true, t:"U"}],
            "The Senses": [{n:"Ice Cube", a:true, t:"U"}],
            "The Pleasure": [{n:"Magic Wand", a:true, t:"F"}]
        },
        protocols: { 
            "The Solitary Bind": true, "The Wicked Gamble": true, 
            "The Veiled Confession": true, "The Silk Labyrinth": true, 
            "The Threshold of Agony": true, "The Flesh Endurance": true 
        }
    };

    const protoMap = {
        "The Solitary Bind": "The Shackles",
        "The Wicked Gamble": "The Discipline",
        "The Veiled Confession": "The Silence",
        "The Silk Labyrinth": "The Shadows",
        "The Threshold of Agony": "The Pleasure",
        "The Flesh Endurance": "The Senses"
    };

    function updateGender(pIdx, g, btn) {
        state.players[pIdx].g = g;
        Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showStep(n) {
        document.querySelectorAll('[id^="step-"]').forEach(s => s.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if (n === 2) renderInventory();
    }

    function renderInventory() {
        const container = document.getElementById('inventory-editor');
        container.innerHTML = '<h3 style="color:var(--accent); text-align:center;">ARSENAL VAULT</h3>';
        for (let cat in state.vault) {
            let section = document.createElement('div');
            section.className = 'box-section';
            let chips = state.vault[cat].map((item, idx) => `
                <span class="item-chip ${item.a ? '' : 'off'}" onclick="toggleItem('${cat}',${idx})">
                    ${item.n} <span class="tag">${item.t}</span>
                    <span class="remove-x" onclick="removeItem('${cat}',${idx}); event.stopPropagation()">×</span>
                </span>`).join('');
            section.innerHTML = `
                <span class="label">${cat}</span>
                <div>${chips}</div>
                <div style="display:grid; grid-template-columns: 2fr 1fr 60px; gap:8px; margin-top:12px;">
                    <input type="text" id="in-${cat.replace(/\s/g,'')}" placeholder="Add gear...">
                    <select id="tag-${cat.replace(/\s/g,'')}"><option value="U">U</option><option value="M">M</option><option value="F">F</option></select>
                    <button class="btn" style="padding:0; margin:0;" onclick="addItem('${cat}')">+</button>
                </div>`;
            container.appendChild(section);
        }
    }

    function toggleItem(cat, idx) { state.vault[cat][idx].a = !state.vault[cat][idx].a; renderInventory(); }
    function removeItem(cat, idx) { state.vault[cat].splice(idx, 1); renderInventory(); }
    function addItem(cat) {
        const id = cat.replace(/\s/g,'');
        const n = document.getElementById('in-'+id).value;
        const t = document.getElementById('tag-'+id).value;
        if(n) { state.vault[cat].push({n, a:true, t}); renderInventory(); }
    }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = parseInt(document.getElementById('round-total').value);
        state.players[0].hasYellow = true; state.players[1].hasRed = true;
        localStorage.setItem('sov_v5_final', JSON.stringify(state.vault));
        showStep(3); renderGame();
    }

    function renderGame() {
        if(state.curr > state.total) return showStep(4);
        document.getElementById('round-ui').innerText = `ROUND ${state.curr} / ${state.total}`;
        state.players.forEach((p, i) => {
            document.getElementById('n'+i).innerText = p.n;
            document.getElementById('s'+i).innerText = p.score;
            document.getElementById('r'+i).innerText = p.role;
            document.getElementById('inv'+i).innerHTML = (p.hasYellow ? '🟡 ' : '') + (p.hasRed ? '🔴' : '');
        });
        const pm = document.getElementById('proto-mount'); pm.innerHTML = '';
        Object.keys(state.protocols).forEach(k => {
            pm.innerHTML += `<button class="tog-btn ${state.protocols[k]?'active':''}" style="padding:10px; border-radius:5px; margin:2px;" onclick="state.protocols['${k}']=!state.protocols['${k}']; renderGame()">${k}</button>`;
        });
    }

    function generate() {
        const ap = Object.keys(state.protocols).filter(k => state.protocols[k]);
        const pName = ap[Math.floor(Math.random()*ap.length)];
        const sub = state.players.find(p => p.role === 'Slave');
        const dom = state.players.find(p => p.role === 'Master');
        const items = state.vault[protoMap[pName]].filter(i => i.a && (i.t === 'U' || i.t === sub.g));
        
        if(items.length === 0) return alert(`No ${sub.g} compatible items in ${protoMap[pName]}!`);
        
        const item = items[Math.floor(Math.random()*items.length)];
        document.getElementById('decree-display').innerHTML = `<strong>${pName}</strong><br><br>${dom.n} shall apply <strong>${item.n}</strong> to ${sub.n}. Success results in a role swap.`;
        document.getElementById('game-controls').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
        document.getElementById('y-btn').classList.toggle('active-card', state.players.some(p => p.hasYellow));
        document.getElementById('r-btn').classList.toggle('active-card', state.players.some(p => p.hasRed));
    }

    function useYellow() { if(confirm("Swap roles?")) { state.players.forEach(p => p.role = p.role==='Master'?'Slave':'Master'); renderGame(); generate(); } }
    function useRed() { if(confirm("Reroll decree?")) { generate(); } }

    function resolve(res) {
        const s = state.players.find(p => p.role === 'Slave');
        const m = state.players.find(p => p.role === 'Master');
        if(res === 'success') { s.score++; state.players.forEach(p => p.role = p.role==='Master'?'Slave':'Master'); }
        else { m.score++; }
        state.curr++;
        document.getElementById('game-controls').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderGame();
    }
</script>
</body>
</html>
