<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGNTY: The Complete Archive</title>
    <style>
        :root { 
            --accent: #0056b3; --bg: #000000; --card: #121212; 
            --text: #FFFFFF; --crimson: #d00000; --success: #008000; 
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 10px; display: flex; justify-content: center; 
            font-size: 1.35rem; 
        }

        .container { 
            max-width: 800px; width: 100%; background: var(--card); 
            padding: 35px; border-radius: 25px; border: 4px solid var(--accent); 
            box-shadow: 0 0 70px #000; 
        }
        
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 10px; font-size: 3.5rem; border-bottom: 6px solid var(--accent); padding-bottom: 15px; margin-top: 0;}

        .box-section { background: #000; padding: 25px; margin-bottom: 25px; border-radius: 15px; border: 3px solid #333; }
        
        .label { font-size: 1.4rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 15px; }

        input, select { width: 100%; padding: 20px; border: 3px solid var(--accent); border-radius: 10px; background: #000; color: white; font-size: 1.5rem; }
        
        .btn { background: var(--accent); color: white; border: 3px solid #FFF; padding: 22px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1.6rem; }

        .gender-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .g-btn { flex: 1; padding: 15px; background: #222; border: 2px solid #444; color: #777; cursor: pointer; border-radius: 10px; font-size: 1.2rem; }
        .g-btn.active { background: var(--accent); color: white; border-color: white; }

        .score-row { display: flex; justify-content: space-between; padding: 20px; background: #000; border: 4px solid var(--accent); border-radius: 20px; text-align: center; margin-bottom: 25px; }
        .p-score { font-size: 3.5rem; font-weight: 900; }

        .tog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tog-btn { padding: 15px; border: 3px solid #444; background: #000; color: #777; cursor: pointer; border-radius: 12px; font-size: 1rem; text-transform: uppercase; font-weight: bold;}
        .tog-btn.active { border-color: #FFF; color: #FFF; background: var(--accent); }

        #timer-box { font-size: 4.5rem; font-weight: 900; color: var(--crimson); text-align: center; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        .timer-warning { animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        #decree-text { text-align: left; font-size: 1.5rem; line-height: 1.6; border-left: 5px solid var(--accent); padding-left: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>

    <div id="step-1">
        <div class="box-section">
            <span class="label">Primary Dominant</span>
            <input type="text" id="p0-name" value="Dominus">
            <div class="gender-grid"><button class="g-btn active" onclick="setGender(0,'M',this)">Male</button><button class="g-btn" onclick="setGender(0,'F',this)">Female</button></div>
            <span class="label">Initial Subject</span>
            <input type="text" id="p1-name" value="Subject">
            <div class="gender-grid"><button class="g-btn" onclick="setGender(1,'M',this)">Male</button><button class="g-btn active" onclick="setGender(1,'F',this)">Female</button></div>
            <span class="label">Session Length (Rounds)</span>
            <input type="number" id="round-total" value="30">
        </div>
        <button class="btn" onclick="goToStep(3)">Start Master Session</button>
    </div>

    <div id="step-3" style="display:none;">
        <div id="round-header" style="text-align:center; color:var(--accent); font-weight:900; font-size: 2rem; margin-bottom: 20px;"></div>
        <div class="score-row">
            <div><div class="label">MASTER</div><div id="m-name"></div><div id="m-score" class="p-score">0</div></div>
            <div><div class="label">SLAVE</div><div id="s-name"></div><div id="s-score" class="p-score">0</div></div>
        </div>
        
        <div id="master-panel">
            <div class="box-section">
                <span class="label">Authorize Protocols for this Decree</span>
                <div id="toggle-grid" class="tog-grid"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Generate Decree</button>
        </div>

        <div id="decree-view" style="display:none;">
            <div id="timer-box">00:00</div>
            <div class="box-section"><div id="decree-text"></div></div>
            <div style="display:flex; gap:15px;">
                <button class="btn" style="background:#333; flex:1;" onclick="resolve(false)">FAILURE</button>
                <button class="btn" style="background:var(--success); flex:1;" onclick="resolve(true)">SUCCESS</button>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        curr: 1, total: 30, timer: null, timeLeft: 0,
        players: [{n:"", role:"Master", score:0, g:"M"}, {n:"", role:"Slave", score:0, g:"F"}],
        activeCats: [
            "The Solitary Anchor", "The Veiled Confession", "The Gauntlet of Will", 
            "The Velvet Mercy", "The Kinetic Struggle", "The Geometric Web", 
            "The Flesh Endurance", "The Sovereign’s Decree"
        ],
        complexity: {
            "The Solitary Anchor": 300, "The Veiled Confession": 120, "The Gauntlet of Will": 180, 
            "The Velvet Mercy": 90, "The Kinetic Struggle": 240, "The Geometric Web": 300, 
            "The Flesh Endurance": 180, "The Sovereign’s Decree": 150
        }
    };

    const library = {
        verbs: ["secure", "apply", "execute", "bind", "tighten", "administer", "position", "trace", "challenge"],
        descriptors: ["meticulously", "firmly", "with gentle authority", "relentlessly", "under strict watch"],
        body: ["wrists", "ankles", "inner thighs", "torso", "neck", "sensory zones", "pressure points"]
    };

    const themes = {
        "The Solitary Anchor": "Subject must utilize [GEAR] to bind themselves in a [POS] position. The Master will inspect the knots for integrity.",
        "The Veiled Confession": "While [GEAR] is applied, the Subject must truthfully answer: [TOPIC]. Any hesitation results in immediate failure.",
        "The Gauntlet of Will": "A dare: The Subject must endure [TIME] of [GEAR] application to their [BODY] without making a sound.",
        "The Velvet Mercy": "Sensual protocol: Use [GEAR] to trace the Subject's [BODY] with [DESC] intent. Focus on arousal over discipline.",
        "The Kinetic Struggle": "Subject is bound with [GEAR]. They have the duration of the timer to successfully escape or submit to a penalty.",
        "The Geometric Web": "A shibari pattern: Master must create a [PATTERN] using rope, securing the [BODY] to emphasize vulnerability.",
        "The Flesh Endurance": "A physical test: Subject must maintain a [POS] stance while [GEAR] is applied [DESC] for the full duration.",
        "The Sovereign’s Decree": "Master’s Choice: Utilize [GEAR] in a custom scenario focusing on [DESC] control of the Subject's [BODY]."
    };

    // Placeholder data for randomization to ensure 50+ variations per category
    const gearList = ["Rope", "Cuffs", "Cane", "Ice", "Wand", "Blindfold", "Gag", "Paddle", "Clamps"];
    const posList = ["kneeling", "bent over", "spread-eagle", "fetal", "standing tall"];

    function setGender(p, g, btn) { state.players[p].g = g; Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    function goToStep(n) {
        document.querySelectorAll('[id^="step-"]').forEach(s => s.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if(n === 3) startSession();
    }

    function startSession() {
        state.players[0].n = document.getElementById('p0-name').value;
        state.players[1].n = document.getElementById('p1-name').value;
        state.total = parseInt(document.getElementById('round-total').value);
        renderRound();
    }

    function renderRound() {
        if(state.curr > state.total) { alert("Session Complete"); location.reload(); return; }
        const m = state.players.find(p => p.role === "Master");
        const s = state.players.find(p => p.role === "Slave");
        document.getElementById('round-header').innerText = `DECREE ${state.curr} / ${state.total}`;
        document.getElementById('m-name').innerText = m.n; document.getElementById('s-name').innerText = s.n;
        document.getElementById('m-score').innerText = m.score; document.getElementById('s-score').innerText = s.score;
        
        const grid = document.getElementById('toggle-grid'); grid.innerHTML = '';
        Object.keys(themes).forEach(cat => {
            const btn = document.createElement('div'); btn.className = `tog-btn ${state.activeCats.includes(cat) ? 'active' : ''}`;
            btn.innerText = cat; btn.onclick = () => {
                state.activeCats = state.activeCats.includes(cat) ? state.activeCats.filter(c => c !== cat) : [...state.activeCats, cat];
                renderRound();
            };
            grid.appendChild(btn);
        });
    }

    function generateDecree() {
        if(state.activeCats.length === 0) return alert("Authorize a Protocol first.");
        const cat = state.activeCats[Math.floor(Math.random() * state.activeCats.length)];
        const sub = state.players.find(p => p.role === "Slave");
        const dom = state.players.find(p => p.role === "Master");

        let text = themes[cat];
        text = text.replace("[GEAR]", gearList[Math.floor(Math.random()*gearList.length)]);
        text = text.replace("[POS]", posList[Math.floor(Math.random()*posList.length)]);
        text = text.replace("[BODY]", library.body[Math.floor(Math.random()*library.body.length)]);
        text = text.replace("[DESC]", library.descriptors[Math.floor(Math.random()*library.descriptors.length)]);
        text = text.replace("[TIME]", "2 minutes");

        document.getElementById('decree-text').innerHTML = `<strong>${cat.toUpperCase()}</strong><br><br>${text}`;
        document.getElementById('master-panel').style.display = 'none';
        document.getElementById('decree-view').style.display = 'block';
        startTimer(state.complexity[cat]);
    }

    function startTimer(seconds) {
        state.timeLeft = seconds;
        const display = document.getElementById('timer-box');
        display.classList.remove('timer-warning');
        clearInterval(state.timer);
        state.timer = setInterval(() => {
            state.timeLeft--;
            let mins = Math.floor(state.timeLeft / 60);
            let secs = state.timeLeft % 60;
            display.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if(state.timeLeft <= 15) display.classList.add('timer-warning');
            if(state.timeLeft <= 0) { clearInterval(state.timer); resolve(false); }
        }, 1000);
    }

    function resolve(success) {
        clearInterval(state.timer);
        if(success) {
            state.players.find(p => p.role === "Slave").score++;
            state.players.forEach(p => p.role = (p.role === "Master" ? "Slave" : "Master"));
        } else {
            state.players.find(p => p.role === "Master").score++;
        }
        state.curr++;
        document.getElementById('master-panel').style.display = 'block';
        document.getElementById('decree-view').style.display = 'none';
        renderRound();
    }
</script>
</body>
</html>
