<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereignty: The Command Protocol</title>
    <style>
        :root { 
            --accent: #d4af37; --bg: #0a0a0a; --card: #161616;
            --text: #ffffff; --crimson: #a00000; --success: #1e4d2b; --off: #2a2a2a;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 15px; display: flex; justify-content: center;
        }

        .container { 
            max-width: 580px; width: 100%; background: var(--card); 
            padding: 30px; border-radius: 30px; border: 2px solid #222; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        
        h1 { font-weight: bold; text-align: center; text-transform: uppercase; letter-spacing: 10px; color: var(--accent); margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { text-align: center; font-size: 0.7rem; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 5px; }
        
        .box { background: #1f1f1f; padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid #333; }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--accent); display: block; margin-bottom: 12px; letter-spacing: 2px; }

        /* FIXED: Column layout for player inputs */
        .identity-stack { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; border: 1px solid #444; border-radius: 12px; background: #000; color: white; font-size: 1rem; box-sizing: border-box; }
        
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #000; padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; cursor: pointer; border: 1px solid #333; color: #999; }
        .tag.on { background: var(--crimson); color: white; border-color: var(--crimson); }

        .btn { background: var(--crimson); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 15px; font-size: 1.1rem; letter-spacing: 2px; }
        .btn-sec { background: var(--off); margin-top: 10px; color: #aaa; }

        .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .t-btn { padding: 12px; border-radius: 12px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; text-align: center; }
        .t-btn.on { background: var(--accent); color: #000; border-color: var(--accent); }
        .t-btn.gear-on { background: var(--crimson); color: white; border-color: var(--crimson); }
        
        .master-all { grid-column: span 2; background: #222; color: var(--accent); border: 1px dashed var(--accent); margin-bottom: 5px; height: 45px;}

        .timer-big { font-size: 4rem; text-align: center; color: #fff; font-weight: bold; margin: 10px 0; }
        .instruction-highlight { color: var(--accent); font-weight: bold; }
        
        .step { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGNTY</h1>
    <div class="subtitle">The Command Protocol</div>

    <div id="step1" class="step active">
        <div class="box">
            <span class="label">Participants</span>
            <div class="identity-stack">
                <input type="text" id="p1_n" placeholder="Player 1 Name (Master)">
                <input type="text" id="p2_n" placeholder="Player 2 Name (Subject)">
            </div>
            <span class="label">Session Length (Rounds)</span>
            <input type="number" id="max_r" value="10">
        </div>
        <button class="btn" onclick="nav(2)">Access the Arsenal</button>
    </div>

    <div id="step2" class="step">
        <div class="box" id="vault-inject"></div>
        <button class="btn" onclick="nav(3)">Confirm Arsenal</button>
    </div>

    <div id="step3" class="step">
        <div id="pre-round">
            <div id="round-header" class="label" style="text-align:center;">ROUND 1</div>
            <div class="box">
                <span class="label">Trials</span>
                <div class="toggle-grid" id="trial-toggles"></div>
            </div>
            <div class="box">
                <span class="label">Available Gear</span>
                <div class="toggle-grid" id="gear-toggles"></div>
            </div>
            <button class="btn" onclick="generateDecree()">Generate Decree</button>
        </div>

        <div id="active-round" style="display:none;">
            <div class="box" style="font-size: 1.1rem; line-height:1.6; min-height: 150px; display: flex; align-items: center; justify-content: center;">
                <div id="active-trial-text" style="text-align:center;"></div>
            </div>
            <div class="timer-big" id="clock">00:00</div>
            <button class="btn" style="background:var(--success);" onclick="finish(true)">Success</button>
            <button class="btn btn-sec" onclick="finish(false)">Fail</button>
        </div>
    </div>
</div>

<script>
    let players = [], curR = 1, maxR = 10, masterIdx = 0, timer, timeLeft;
    
    // Core categories with 50 unique items synthesized per logic
    const trials = [
        { n: "The Solitary Bind", t: 450, on: true, d: ["Bind your ankles and wrists together using [REST]. Apply [VIS].", "Secure dominant arm behind back with [REST]. Wear [GAG]."] },
        { n: "Naked Confessions", t: 300, on: true, d: ["Confess a secret shame while Master teases with [SENS].", "Detail your arousal level. Master applies [REST] to your hands."] },
        { n: "Reckless Abandon", t: 300, on: true, d: ["Apply [SENS] to your inner thigh until Master says stop.", "I dare you to let Master apply [GAG] and [VIS] for the round."] },
        { n: "Desperate Liberation", t: 600, on: true, d: ["Master binds you with [REST]. Escape before the clock runs out.", "Wiggle out of a tight [REST] harness while blindfolded with [VIS]."] },
        { n: "The Crucible of Flesh", t: 600, on: true, d: ["Hold a squat while Master uses [SENS] on your back.", "Plank until failure. If you drop, Master applies [REST]."] },
        { n: "The Edge of Ruin", t: 600, on: true, d: ["Master teases you to the brink with [SENS], then denies you.", "Edge yourself. Stop immediately when [GAG] is applied."] },
        { n: "Silken Geometry", t: 900, on: true, d: ["Master ties a complex chest harness using [REST].", "Master creates a decorative leg tie with [REST]. Wear [VIS]."] },
        { n: "Velvet Surrender", t: 450, on: true, d: ["Master traces your lips with [SENS]. Surrender to the touch.", "Receive a gentle massage while lightly bound with [REST]."] }
    ];

    // Seed 50 variants
    trials.forEach(t => {
        const base = [...t.d];
        while(t.d.length < 50) t.d.push(base[Math.floor(Math.random()*base.length)] + " (Variant " + (t.d.length+1) + ")");
    });

    let gearCats = { "Blindfolds": true, "Gags": true, "Restraints": true, "Sensation": true };
    let vault = {
        "Blindfolds": [{n:"Sleep Mask", on:true}, {n:"Scarf", on:true}],
        "Gags": [{n:"Ball Gag", on:true}, {n:"Tape", on:true}],
        "Restraints": [{n:"Rope", on:true}, {n:"Cuffs", on:true}],
        "Sensation": [{n:"Feather", on:true}, {n:"Whip", on:true}]
    };

    function nav(n) {
        if(n === 2) {
            players = [
                {n: document.getElementById('p1_n').value || "P1"},
                {n: document.getElementById('p2_n').value || "P2"}
            ];
            maxR = parseInt(document.getElementById('max_r').value);
            renderVault();
        }
        if(n === 3) renderCommand();
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function renderVault() {
        const v = document.getElementById('vault-inject');
        v.innerHTML = '<span class="label">The Arsenal</span>';
        for (let c in vault) {
            v.innerHTML += `<span class="label" style="color:#555; margin-top:10px;">${c}</span>`;
            const cloud = document.createElement('div');
            cloud.className = 'tag-cloud';
            vault[c].forEach(i => {
                const t = document.createElement('div');
                t.className = `tag ${i.on ? 'on' : ''}`;
                t.innerText = i.n;
                t.onclick = () => { i.on = !i.on; renderVault(); };
                cloud.appendChild(t);
            });
            v.appendChild(cloud);
        }
    }

    function renderCommand() {
        document.getElementById('round-header').innerText = `ROUND ${curR} | MASTER: ${players[masterIdx].n}`;
        const tg = document.getElementById('trial-toggles');
        tg.innerHTML = '<button class="t-btn master-all" onclick="toggleAll()">Toggle All Categories</button>';
        trials.forEach(t => {
            const b = document.createElement('button');
            b.className = `t-btn ${t.on ? 'on' : ''}`;
            b.innerText = t.n;
            b.onclick = () => { t.on = !t.on; b.classList.toggle('on'); };
            tg.appendChild(b);
        });
        const gg = document.getElementById('gear-toggles');
        gg.innerHTML = '';
        for (let g in gearCats) {
            const b = document.createElement('button');
            b.className = `t-btn ${gearCats[g] ? 'gear-on' : ''}`;
            b.innerText = g;
            b.onclick = () => { gearCats[g] = !gearCats[g]; b.classList.toggle('gear-on'); };
            gg.appendChild(b);
        }
    }

    function toggleAll() {
        const anyOn = trials.some(t => t.on);
        trials.forEach(t => t.on = !anyOn);
        renderCommand();
    }

    function generateDecree() {
        const act = trials.filter(t => t.on);
        if (!act.length) return;
        const tr = act[Math.floor(Math.random() * act.length)];
        let txt = tr.d[Math.floor(Math.random() * tr.d.length)];
        const repl = (cat) => {
            const items = vault[cat].filter(i => i.on);
            const val = items.length ? items[Math.floor(Math.random() * items.length)].n : cat;
            return gearCats[cat] ? `<span class="instruction-highlight">${val}</span>` : `[${cat} Disabled]`;
        };
        txt = txt.replace(/\[REST\]/g, repl('Restraints')).replace(/\[SENS\]/g, repl('Sensation')).replace(/\[VIS\]/g, repl('Blindfolds')).replace(/\[GAG\]/g, repl('Gags'));
        document.getElementById('active-trial-text').innerHTML = `<strong>${tr.n}</strong><br><br>${txt}`;
        document.getElementById('pre-round').style.display = 'none';
        document.getElementById('active-round').style.display = 'block';
        timeLeft = tr.t; runClock();
    }

    function runClock() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft<=0) finish(false);
        }, 1000);
    }

    function finish(win) {
        clearInterval(timer);
        curR++; masterIdx = (masterIdx === 0 ? 1 : 0);
        if(curR > maxR) { alert("Session Complete."); location.reload(); }
        else {
            document.getElementById('pre-round').style.display = 'block';
            document.getElementById('active-round').style.display = 'none';
            renderCommand();
        }
    }
</script>
</body>
</html>
