<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bound & Brave: Extreme Escape Engine</title>
    <style>
        :root {
            --gold: #d4af37;
            --blood: #8b0000;
            --dark: #0a0a0a;
            --grey: #222;
        }

        body {
            background: var(--dark);
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: #111;
            border: 2px solid var(--grey);
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border-radius: 10px;
        }

        h1 {
            color: var(--blood);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 2px solid var(--blood);
            padding-bottom: 10px;
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .player-card {
            background: #1a1a1a;
            padding: 15px;
            border: 1px solid #333;
        }

        .inventory-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            font-size: 0.8em;
            background: #050505;
            padding: 15px;
            margin: 20px 0;
        }

        .card-zone {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            width: 110px;
            height: 150px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            color: #000;
            padding: 10px;
        }

        .yellow { background: #ffd700; border: 3px solid #b8860b; }
        .red { background: #ff4500; border: 3px solid #8b0000; }
        .card.disabled { opacity: 0.1; cursor: not-allowed; pointer-events: none; }

        .challenge-box {
            background: #000;
            border-left: 5px solid var(--blood);
            padding: 25px;
            margin: 20px 0;
            min-height: 120px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .timer-display {
            font-size: 3.5em;
            color: var(--blood);
            font-weight: bold;
            margin: 10px 0;
        }

        .btn {
            background: var(--blood);
            color: white;
            border: 1px solid var(--gold);
            padding: 15px 25px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .btn:hover { background: #b00; }
        .btn-secondary { background: #333; border: 1px solid #555; }

        .hidden { display: none; }
        .status-bar { color: var(--gold); font-size: 1.2em; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Bound & Brave: Extreme Escape</h1>
